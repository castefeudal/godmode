            init() {
                if (!this.ctx) {

            playClick() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(750, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(350, this.ctx.currentTime + 0.03);
                gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.03);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.03);
            },
            playTick() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(550, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.015, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.015);

                gain.connect(this.ctx.destination);

            playPhaseChange() {

                osc.frequency.setValueAtTime(950, this.ctx.currentTime);

                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.08);
            },
            playSuccess() {
                this.init();
                const now = this.ctx.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, index) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + index * 0.07);
                    gain.gain.setValueAtTime(0.03, now + index * 0.07);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.07 + 0.25);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + index * 0.07);
                    osc.stop(now + index * 0.07 + 0.25);
                });
            }

                text: `«Господь, Архитектор Вселенной, и Ты, Великий Порядок Бытия.\n\nЯ, Павел Марков, пробуждаю свою истинную силу и заявляю права на свою реальность. Прямо сейчас я активирую ультимативный щит разума: любой ментальный шум, страх, сомнение или случайный негатив мгновенно аннигилируются, превращаясь в чистую созидательную энергию. Мои случайные мысли обесточены. Силу имеет только мое осознанное намерение. Воля Павла Маркова — высший закон для моего подсознания.\n\nВселенная, синхронизируй мои вибрации с кодами безграничного богатства, триумфа и масштабного успеха. Я включаю свою личную гравитацию: я — мощный ментальный магнит. Прямо сейчас я притягиваю в свое поле сильных, верных, масштабных и духовно близких мне людей. Мою касту. Моих людей.\n\nГосподь, наполни мое тело несокрушимой энергией, а разум — идеальной структурой и дисциплиной. Мой фокус безупречен. Каждое мое действие сегодня материализует успех, власть и financial изобилие. Я создаю этот день по праву творца. Мой вектор неизменен. Намерение исполнено.\n\nДа будет так. Сбылось. And so it is. Done. Así sea. Hecho está. 14.03.1997. 如此 в реальном времени. 成了. [Rúcǐ zài. Chéng le.]»`

                { id: 'g1', title: 'Книга «Анти-психология»', current: 15, target: 77, unit: 'стр' },
                { id: 'g2', title: 'Личный бренд «Каста Феодалов»', current: 35, target: 100, unit: '%' },
                { id: 'g3', title: 'Масштабирование «MARKOVMADE»', current: 20, target: 100, unit: '%' }
            ],
            streakCounter: 0
        };

        function useAppState() {
            const [state, setState] = useState(() => {
                try {
                    const saved = localStorage.getItem('markov_os_v13_hyper_elite');
                    if (saved) return { ...INITIAL_STATE, ...JSON.parse(saved) };
                } catch (e) {}
                return INITIAL_STATE;
            });

            const [toast, setToast] = useState({ visible: false, msg: '', isAlert: false });

            const showToast = useCallback((msg, isAlert = false) => {
                setToast({ visible: true, msg, isAlert });
                setTimeout(() => setToast({ visible: false, msg: '', isAlert: false }), 4000);
            }, []);

            useEffect(() => {
                localStorage.setItem('markov_os_v13_hyper_elite', JSON.stringify(state));
            }, [state]);

            useEffect(() => {
                const today = new Date().toDateString();
                if (state.lastLoginDate !== today) {
                    setState(prev => {
                        const missedPM = !prev.dailyTasks.pm;
                        const missedEng = !prev.dailyTasks.english;
                        const missedBody = !prev.dailyTasks.body;
                        let rrDrop = 0;
                        if(missedPM || missedBody) rrDrop = 5;

                        // Расчет стрик-удержания дней подряд
                        const perfectDay = prev.dailyTasks.pm && prev.dailyTasks.english && prev.dailyTasks.body;
                        const newStreak = perfectDay ? (prev.streakCounter || 0) + 1 : 0;

                        return {
                            ...prev,
                            currentMode: 'norm',
                            missedYesterday: { pm: missedPM, english: missedEng, body: missedBody },
                            dailyTasks: INITIAL_STATE.dailyTasks,
                            taskTimestamps: {}, 
                            energyMetrics: { ...prev.energyMetrics, sleep: 0 },
                            languagePhrases: [],
                            contentLadder: 0,
                            lastLoginDate: today,
                            streakCounter: newStreak,
                            stats: { 
                                ...prev.stats, 
                                daysLogged: prev.stats.daysLogged + 1, 
                                returnRate: Math.max(0, Math.min(100, prev.stats.returnRate - rrDrop + 2)) 
                            }
                        }
                    });
                    showToast("Запущен новый суверенный цикл. Система обновлена. ⚡");
                }
            }, [state.lastLoginDate, showToast]);

            const update = useCallback((key, value) => {
                setState(prev => {
                    if (typeof value === 'object' && !Array.isArray(value) && value !== null && prev[key]) {
                        return { ...prev, [key]: { ...prev[key], ...value } };
                    }
                    return { ...prev, [key]: value };
                });
            }, []);

            const toggleTask = useCallback((taskId, category, xpReward = 10, forceState = null) => {
                AudioEngine.playClick();
                triggerHaptic(15);
                setState(prev => {
                    const isDone = forceState !== null ? forceState : !prev.dailyTasks[taskId];
                    if (forceState !== null && prev.dailyTasks[taskId] === forceState) return prev;

                    let newXp = prev.stats.xp;
                    let newCatVal = prev.stats.categories[category] || 0;
                    
                    const currentTime = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                    const updatedTimestamps = { ...prev.taskTimestamps };

                    if (isDone) {
                        newXp += xpReward;
                        newCatVal = Math.min(100, newCatVal + (xpReward / 1.5));
                        updatedTimestamps[taskId] = currentTime;
                        if(xpReward > 0) showToast(`[${currentTime}] +${xpReward} XP. Действие зафиксировано. ✨`);
                    } else {
                        newXp = Math.max(0, newXp - xpReward);
                        newCatVal = Math.max(0, newCatVal - (xpReward / 1.5));
                        delete updatedTimestamps[taskId];
                    }

                    const newLevel = Math.floor(newXp / 200) + 1;
                    
                    return {
                        ...prev,
                        dailyTasks: { ...prev.dailyTasks, [taskId]: isDone },
                        taskTimestamps: updatedTimestamps,
                        stats: { 
                            ...prev.stats, 
                            xp: newXp, 
                            level: newLevel, 
                            categories: { ...prev.stats.categories, [category]: newCatVal } 
                        }
                    };
                });
            }, [showToast]);

            const saveDailyNote = useCallback((text, source = '') => {
                if (!text.trim()) return;
                const timeStr = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                const prefix = `[${timeStr}] [${source}] `;
                setState(prev => ({ ...prev, notes: { ...prev.notes, savedDaily: [...prev.notes.savedDaily, prefix + text] } }));
                showToast(`Мысль материализована в буфер OS. 📝`);
                triggerHaptic(20);
            }, [showToast]);

            const addLanguagePhrase = useCallback((phrase) => {
                if(!phrase.trim()) return;
                setState(prev => ({ ...prev, languagePhrases: [...(prev.languagePhrases || []), phrase] }));
                showToast("Нейронная связь зафиксирована. 🧠");
                triggerHaptic(20);
            }, [showToast]);

            const copyToClipboard = useCallback((text) => {
                triggerHaptic([15, 35]);
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text)
                        .then(() => showToast("Скопировано. Реальность синхронизирована. ✨"))
                        .catch(() => showToast("Ошибка копирования", true));
                } else {
                    let textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-999999px";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        showToast("Скопировано. Реальность синхронизирована. ✨");
                    } catch (err) {
                        showToast("Ошибка копирования", true);
                    }
                    textArea.remove();
                }
            }, [showToast]);

            return { state, setState, update, toggleTask, saveDailyNote, addLanguagePhrase, copyToClipboard, toast, showToast };
        }

        const Button = ({ children, variant = 'primary', className = "", onClick, icon: IconComponent }) => {
            const variants = {
                primary: `${THEME.accentBg} text-[#0a0a0a] font-black shadow-[0_0_20px_rgba(251,191,36,0.15)] ${THEME.accentHover} border border-amber-300/40`,
                secondary: `bg-[#1a1a1a]/80 text-amber-50 backdrop-blur-md hover:bg-[#222222] border border-[#333333]/60 hover:border-amber-500/40 hover:shadow-[0_0_15px_rgba(251,191,36,0.1)]`,
                ghost: `text-slate-400 hover:text-amber-400 hover:bg-[#1a1a1a]`,
                danger: `bg-rose-950/40 text-rose-400 border border-rose-900/50 backdrop-blur-md hover:bg-rose-900/50 hover:text-rose-200 shadow-[0_0_25px_rgba(244,63,94,0.15)]`
            };
            return (
                <button onClick={() => { triggerHaptic(10); if(onClick) onClick(); }} className={`flex items-center justify-center gap-2 md:gap-3 px-4 md:px-6 py-3.5 md:py-4 rounded-2xl transition-all duration-300 active:scale-[0.98] touch-manipulation ${variants[variant]} ${className}`}>
                    {IconComponent && <IconComponent size={20} className={variant === 'primary' ? 'text-[#0a0a0a]' : ''} />}
                    <span className="truncate">{children}</span>
                </button>
            );
        };

        const NumericInput = ({ label, value, onChange, min=0, max=10, step=1, hint, color="accent" }) => {
            const handleDec = () => { triggerHaptic(10); onChange(Math.max(min, Number(value) - step)); };
            const handleInc = () => { triggerHaptic(10); onChange(Math.min(max, Number(value) + step)); };
            const handleChange = (e) => {
                let val = e.target.value;
                if (val === '') return onChange('');
                val = Number(val);
                if (!isNaN(val)) onChange(Math.min(max, Math.max(min, val)));
            };

            return (
                <div className="flex flex-col gap-2 w-full">
                    <div className="flex flex-wrap justify-between items-end text-sm mb-1 px-2">
                        <span className={`${THEME.textMuted} font-bold tracking-wide`}>{label} {hint && <span className="text-xs opacity-50 ml-1 font-normal break-words">({hint})</span>}</span>
                    </div>
                    <div className="flex items-center gap-1 bg-[#0f0f0f]/60 backdrop-blur-xl border border-[#262626]/60 p-1.5 rounded-2xl w-full shadow-inner">
                        <button onClick={handleDec} className="p-3 md:p-4 rounded-xl bg-[#1a1a1a] text-slate-400 hover:text-amber-400 hover:bg-[#222222] transition-all active:scale-95 touch-manipulation flex-shrink-0">
                            <IconBase iconName="Minus" size={20} />
                        </button>
                        <input 
                            type="number" value={value} onChange={handleChange} min={min} max={max} step={step}
                            className={`flex-1 bg-transparent text-center text-2xl md:text-3xl font-mono font-black focus:outline-none transition-colors w-full min-w-0 ${color === 'red' ? 'text-rose-400 drop-shadow-[0_0_8px_rgba(251,113,133,0.4)]' : 'text-amber-400 drop-shadow-[0_0_8px_rgba(251,191,36,0.4)]'}`}
                        />
                        <button onClick={handleInc} className="p-3 md:p-4 rounded-xl bg-[#1a1a1a] text-slate-400 hover:text-amber-400 hover:bg-[#222222] transition-all active:scale-95 touch-manipulation flex-shrink-0">
                            <IconBase iconName="Plus" size={20} />
                        </button>
                    </div>
                </div>
            );
        };

        const CheckItem = ({ checked, onChange, label, subLabel, xpBadge, anchor, timeLog }) => (
            <div className={`flex items-start gap-3 md:gap-4 p-4 md:p-5 rounded-2xl transition-all duration-300 cursor-pointer group border touch-manipulation min-h-[76px] relative overflow-hidden ${checked ? 'bg-amber-500/5 border-amber-500/30 shadow-[0_0_25px_rgba(251,191,36,0.08)]' : 'bg-[#0f0f0f]/40 border-[#262626]/60 hover:border-[#3a3a3a]/80 hover:bg-[#1a1a1a]/60'}`} onClick={onChange}>
                {checked && <div className="absolute inset-0 bg-gradient-to-r from-amber-500/0 via-amber-500/5 to-amber-500/0 animate-[shimmer_2s_infinite]"></div>}
                <div className={`mt-0.5 w-7 h-7 md:w-8 md:h-8 rounded-full flex items-center justify-center border-[2.5px] transition-all duration-500 flex-shrink-0 relative z-10 ${checked ? 'bg-gradient-to-br from-yellow-400 to-amber-600 border-transparent text-[#0a0a0a] shadow-[0_0_20px_rgba(251,191,36,0.5)] scale-110' : 'border-slate-600 group-hover:border-amber-500/50'}`}>
                    {checked && <IconBase iconName="Check" size={16} strokeWidth={4} />}
                </div>
                <div className="flex flex-col flex-1 justify-center relative z-10 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                        {anchor && <span className="text-amber-500 font-black text-[9px] md:text-[10px] uppercase tracking-widest flex items-center gap-1 truncate"><IconBase iconName="Anchor" size={10} className="flex-shrink-0"/> [Якорь: {anchor}]</span>}
                        {checked && timeLog && <span className="text-slate-500 font-mono text-[10px] bg-amber-500/10 px-1.5 py-0.5 rounded border border-amber-500/20">🕒 {timeLog}</span>}
                    </div>
                    <span className={`font-bold transition-colors duration-300 text-base md:text-lg leading-tight break-words pr-2 mt-1 ${checked ? 'text-slate-500 line-through decoration-amber-500/50' : 'text-slate-200'}`}>{label}</span>
                    {subLabel && <span className={`text-xs md:text-sm mt-1.5 transition-colors font-medium leading-snug break-words pr-2 ${checked ? 'text-slate-600' : 'text-slate-400'}`}>{subLabel}</span>}
                </div>
                {xpBadge && !checked && (
                    <span className="text-[10px] md:text-[11px] font-mono font-bold text-amber-400 bg-amber-400/10 border border-amber-400/20 px-2 md:px-3 py-1 md:py-1.5 rounded-full flex-shrink-0 mt-1 relative z-10 hidden sm:flex">+{xpBadge} XP</span>
                )}
            </div>
        );

        const TipCard = ({ text, title="Принцип системы", iconName = "Zap" }) => (
            <div className="bg-gradient-to-r from-[#121212]/80 to-[#0f0f0f]/80 backdrop-blur-xl border border-[#262626]/60 rounded-2xl p-4 md:p-6 flex gap-4 md:gap-5 items-start relative overflow-hidden mb-6 md:mb-8 shadow-md">
                <div className="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-amber-400 to-yellow-600"></div>
                <div className="p-2.5 md:p-3 bg-amber-500/10 rounded-xl flex-shrink-0 border border-amber-500/20">
                    <IconBase iconName={iconName} className="text-amber-400" size={20} />
                </div>
                <div className="flex-1 min-w-0">
                    <h4 className="text-[10px] md:text-xs font-black text-amber-400 uppercase tracking-widest mb-1.5 md:mb-2 opacity-90 truncate">{title}</h4>
                    <p className="text-sm md:text-base text-slate-300 leading-relaxed font-medium break-words">{text}</p>
                </div>
            </div>
        );

        const MotivationCard = ({ text, title="Математика успеха" }) => (
            <div className="bg-gradient-to-r from-amber-500/10 to-yellow-600/5 border border-amber-500/30 rounded-2xl p-5 md:p-6 flex flex-col relative overflow-hidden shadow-[0_0_20px_rgba(251,191,36,0.05)] backdrop-blur-2xl">
                <div className="flex items-center gap-3 mb-3">
                    <IconBase iconName="Crown" className="text-amber-400" size={20}/>
                    <h4 className="text-xs md:text-sm font-black text-amber-400 uppercase tracking-widest truncate">{title}</h4>
                </div>
                <p className="text-sm md:text-base text-slate-200 leading-relaxed font-medium break-words">{text}</p>
            </div>
        );

        const FocusTimer = ({ defaultMinutes, taskName, taskId, category, xpReward, onCompleteTask }) => {
            const [timeLeft, setTimeLeft] = useState(defaultMinutes * 60);
            const [isActive, setIsActive] = useState(false);
            const [isOpen, setIsOpen] = useState(false);
            const [isMicro, setIsMicro] = useState(false);
            
            const totalSeconds = useMemo(() => (isMicro ? 2 : defaultMinutes) * 60, [isMicro, defaultMinutes]);

            useEffect(() => { setTimeLeft(totalSeconds); }, [totalSeconds]);

            useEffect(() => {
                let interval = null;
                if (isActive && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft(prev => prev - 1);
                        if (timeLeft % 10 === 0) AudioEngine.playTick();
                    }, 1000);
                } else if (timeLeft === 0 && isActive) {
                    setIsActive(false);
                    clearInterval(interval);
                    AudioEngine.playSuccess();
                    triggerHaptic([100, 50, 100]);
                    if (onCompleteTask) onCompleteTask(taskId, category, xpReward, true);
                    setIsOpen(false);
                }
                return () => clearInterval(interval);
            }, [isActive, timeLeft, taskId, category, xpReward, onCompleteTask]);

            const toggle = () => { triggerHaptic(15); setIsActive(!isActive); };
            const reset = () => { triggerHaptic(10); setIsActive(false); setTimeLeft(totalSeconds); };
            
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            const progress = ((totalSeconds - timeLeft) / totalSeconds) * 100;

            if (!isOpen) {
                return (
                    <div className="flex flex-wrap gap-2 md:gap-3 mt-4">
                        <button onClick={() => { triggerHaptic(10); setIsMicro(false); setIsOpen(true); }} className="text-[11px] md:text-xs flex items-center gap-1.5 md:gap-2 font-bold text-slate-300 bg-[#1a1a1a]/90 border border-[#333333]/60 px-3 md:px-4 py-2.5 md:py-3 rounded-xl hover:bg-[#222222] hover:text-amber-400 transition-all touch-manipulation">
                            <IconBase iconName="Timer" size={16} className="text-amber-500"/> Фокус {defaultMinutes} мин
                        </button>
                        {defaultMinutes > 15 && (
                            <button onClick={() => { triggerHaptic(15); setIsMicro(true); setIsOpen(true); }} className="text-[11px] md:text-xs flex items-center gap-1.5 md:gap-2 font-bold text-amber-400 bg-amber-500/10 border border-amber-500/30 px-3 md:px-4 py-2.5 md:py-3 rounded-xl hover:bg-amber-500/20 transition-all touch-manipulation shadow-[0_0_10px_rgba(251,191,36,0.1)]">
                                <IconBase iconName="Zap" size={16} /> Микро-старт (2 мин)
                            </button>
                        )}
                    </div>
                );
            }

            return (
                <div className="mt-4 md:mt-5 p-5 md:p-8 bg-[#0f0f0f]/80 border border-[#262626]/60 rounded-2xl md:rounded-3xl flex flex-col items-center relative overflow-hidden w-full">
                    {isActive && <div className="absolute inset-0 bg-amber-500/5 animate-pulse pointer-events-none"></div>}
                    <div className="flex justify-between w-full mb-6 md:mb-8 items-center relative z-10">
                        <span className="text-slate-300 font-black text-xs md:text-sm flex items-center gap-2 uppercase tracking-wider truncate">
                            <IconBase iconName="Target" size={18} className="text-amber-500 flex-shrink-0"/> <span className="truncate">{isMicro ? 'Атомный Старт' : taskName}</span>
                        </span>
                        <button onClick={() => { triggerHaptic(10); setIsActive(false); setIsOpen(false); }} className="text-slate-500 hover:text-white p-2 bg-[#1a1a1a] rounded-xl transition-colors flex-shrink-0"><IconBase iconName="X" size={18}/></button>
                    </div>
                    
                    <div className="relative w-40 h-40 md:w-48 md:h-48 flex items-center justify-center mb-8 md:mb-10">
                        <svg className="w-full h-full -rotate-90 absolute drop-shadow-md" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#262626" strokeWidth="6" />
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#fbbf24" strokeWidth="6" strokeLinecap="round" strokeDasharray="283" strokeDashoffset={283 - (283 * progress) / 100} className="transition-all duration-1000 ease-linear drop-shadow-[0_0_15px_rgba(251,191,36,0.5)]" />
                        </svg>
                        <div className="text-4xl md:text-5xl font-mono font-black text-white relative z-10 drop-shadow-[0_0_15px_rgba(251,191,36,0.4)] tracking-tighter">{m}:{s}</div>
                    </div>

                    <div className="flex gap-3 md:gap-4 w-full max-w-[300px] relative z-10">
                        <button onClick={toggle} className={`flex-1 py-3 md:py-4 rounded-xl font-black text-base md:text-lg flex justify-center items-center gap-2 md:gap-3 transition-all active:scale-95 touch-manipulation ${isActive ? 'bg-[#1a1a1a] text-slate-200 border border-[#333333]' : 'bg-gradient-to-r from-amber-400 to-yellow-600 text-[#0a0a0a] shadow-[0_0_20px_rgba(251,191,36,0.3)] hover:brightness-110'}`}>
                            {isActive ? <IconBase iconName="Pause" size={20}/> : <IconBase iconName="Play" size={20}/>} {isActive ? 'Пауза' : 'Фокус'}
                        </button>
                        <button onClick={reset} className="px-4 md:px-5 py-3 md:py-4 rounded-xl bg-[#0f0f0f] border border-[#262626] text-slate-400 hover:text-white hover:border-slate-500 transition-all active:scale-95 touch-manipulation">
                            <IconBase iconName="RotateCcw" size={20}/>
                        </button>
                    </div>
                </div>
            );
        };

        const BreathingTimer = ({ type = 'morning', onComplete }) => {
            const [isActive, setIsActive] = useState(false);
            const TOTAL_SECONDS = 180;
            const [timeElapsed, setTimeElapsed] = useState(0);
            
            const [phaseName, setPhaseName] = useState('Готов?');
            const [phaseSecondsLeft, setPhaseSecondsLeft] = useState(0);
            const [scale, setScale] = useState(1);
            
            useEffect(() => {
                let interval;
                if (isActive && timeElapsed < TOTAL_SECONDS) {
                    interval = setInterval(() => {
                        setTimeElapsed(prev => prev + 1);
                        AudioEngine.playTick();
                    }, 1000);
                } else if (timeElapsed >= TOTAL_SECONDS && isActive) {
                    setIsActive(false);
                    setPhaseName('Практика завершена.');
                    setPhaseSecondsLeft(0);
                    setScale(1);
                    AudioEngine.playSuccess();
                    if(onComplete) onComplete();
                }
                return () => clearInterval(interval);
            }, [isActive, timeElapsed, onComplete]);

            useEffect(() => {
                if (!isActive) return;
                const currentCycleSec = timeElapsed % (type === 'morning' ? 16 : 10);

                if (type === 'morning') {
                    if (currentCycleSec < 4) {
                        if (currentCycleSec === 0) AudioEngine.playPhaseChange();
                        setPhaseName('Вдох'); setPhaseSecondsLeft(4 - currentCycleSec); setScale(1.6);
                    } else if (currentCycleSec < 8) {
                        if (currentCycleSec === 4) AudioEngine.playPhaseChange();
                        setPhaseName('Задержка'); setPhaseSecondsLeft(8 - currentCycleSec); setScale(1.6);
                    } else if (currentCycleSec < 12) {
                        if (currentCycleSec === 8) AudioEngine.playPhaseChange();
                        setPhaseName('Выдох'); setPhaseSecondsLeft(12 - currentCycleSec); setScale(1);
                    } else {
                        if (currentCycleSec === 12) AudioEngine.playPhaseChange();
                        setPhaseName('Задержка'); setPhaseSecondsLeft(16 - currentCycleSec); setScale(1);
                    }
                } else {
                    if (currentCycleSec < 4) {
                        if (currentCycleSec === 0) AudioEngine.playPhaseChange();
                        setPhaseName('Вдох'); setPhaseSecondsLeft(4 - currentCycleSec); setScale(1.5);
                    } else {
                        if (currentCycleSec === 4) AudioEngine.playPhaseChange();
                        setPhaseName('Выдох'); setPhaseSecondsLeft(10 - currentCycleSec); setScale(1);
                    }
                }
            }, [timeElapsed, isActive, type]);

            const toggle = () => { triggerHaptic(15); setIsActive(!isActive); };
            const timeLeft = TOTAL_SECONDS - timeElapsed;
            const m = Math.floor(timeLeft / 60);
            const s = (timeLeft % 60).toString().padStart(2, '0');

            return (
                <div className="bg-[#0f0f0f]/60 border border-[#262626]/60 p-5 md:p-10 rounded-2xl md:rounded-3xl flex flex-col items-center justify-center relative overflow-hidden shadow-inner min-h-[350px] md:min-h-[400px] w-full">
                    <div className="absolute top-4 left-4 text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2 bg-[#1a1a1a]/80 px-3 py-1.5 rounded-lg border border-[#333333]/60">
                        <IconBase iconName="Wind" size={14} className="text-amber-400"/>
                        {type === 'morning' ? 'Box Breathing' : 'Relax Breathing'}
                    </div>
                    <div className="absolute top-4 right-4 text-xs font-mono font-black text-amber-400 bg-amber-500/10 px-3 py-1.5 rounded-lg border border-amber-500/30">
                        {m}:{s}
                    </div>
                    
                    <div className="relative w-44 h-44 md:w-52 h-52 flex items-center justify-center mb-6 mt-6">
                        <div className="absolute rounded-full bg-amber-500/10 blur-3xl transition-all ease-in-out" style={{ width: '100%', height: '100%', transform: `scale(${scale})`, transitionDuration: '1000ms' }}></div>
                        <div className="relative z-10 rounded-full border-[3px] border-amber-500/40 bg-gradient-to-br from-[#121212] to-[#050505] flex flex-col items-center justify-center transition-all ease-in-out shadow-[0_0_30px_rgba(251,191,36,0.1)]" style={{ width: '110px', height: '110px', transform: `scale(${scale})`, transitionDuration: '1000ms' }}>
                            {isActive ? <div className="text-4xl md:text-5xl font-black font-mono text-amber-400 drop-shadow-[0_0_12px_rgba(251,191,36,0.6)]">{phaseSecondsLeft}</div> : <IconBase iconName="Wind" className="text-slate-600" size={36} />}
                        </div>
                    </div>

                            <div className="space-y-6">
                                <NumericInput label="Сон за прошлую ночь (цель: 7.5ч)" min={0} max={15} step={0.5} value={state.energyMetrics.sleep} onChange={(v) => update('energyMetrics', {sleep: v})} />
                                <NumericInput label="Индекс готовности ЦНС к нагрузкам" hint="1-10" min={1} max={10} value={state.energyMetrics.readiness} onChange={(v) => update('energyMetrics', {readiness: v})} />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ContentView = ({ state, update, saveDailyNote }) => {
            const [idea, setIdea] = useState('');
            return (
                <div className="space-y-8 animate-in fade-in zoom-in-95 duration-500">
                    <h1 className="text-3xl md:text-6xl font-black tracking-tighter text-white uppercase">Контент</h1>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-2xl font-black text-white flex items-center gap-2 mb-4 uppercase tracking-tight"><IconBase iconName="PenTool" className="text-amber-500" size={24}/> <span>Мысль дня для Obsidian</span></h2>
                            <TextInput placeholder="Пиши структуру рилса, концепт или манифест без жесткой редактуры..." value={idea} onChange={setIdea} multiline />
                            <Button className="w-full mt-4" onClick={() => { saveDailyNote(idea, 'CONTENT'); setIdea(''); }}>Записать идею</Button>
                        </div>
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-2xl font-black text-white flex items-center gap-2 mb-4 uppercase tracking-tight"><IconBase iconName="TrendingUp" className="text-yellow-500" size={24}/> <span>Медиа-лестница проекта</span></h2>
                            <div className="space-y-2">
                                {['Концепт зафиксирован', 'Скрипт Obsidian написан', 'Материал снят', 'Монтаж завершен', 'Контент опубликован'].map((step, i) => (
                                    <div key={i} className={`p-4 rounded-xl border border-[#262626]/60 cursor-pointer flex justify-between items-center ${state.contentLadder >= i ? 'bg-amber-500/10 border-amber-500/40 text-amber-400 shadow-inner' : 'bg-[#0f0f0f]/40 border-[#262626]/40 text-slate-500'}`} onClick={() => update('contentLadder', state.contentLadder === i ? i - 1 : i)}>
                                        <span className="font-bold">{i+1}. {step}</span>
                                        {state.contentLadder >= i && <IconBase iconName="CheckCircle2" size={18} />}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const RitualsView = ({ state, toggleTask }) => (
            <div className="space-y-8 animate-in fade-in zoom-in-95 duration-500">
                <h1 className="text-3xl md:text-6xl font-black tracking-tighter text-white uppercase">Ритуалы</h1>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div className={`${THEME.panel} border-t-4 border-t-amber-400`}>
                        <h2 className="text-2xl font-black text-white flex items-center gap-2 mb-4 uppercase"><IconBase iconName="Compass" className="text-amber-400" size={24}/> <span>Утренний Алгоритм</span></h2>
                        <BreathingTimer type="morning" onComplete={() => toggleTask('breathAm', 'spirit', 15, true)} />
                        <ManifestReader type="AM" />
                    </div>
                    <div className={`${THEME.panel} border-t-4 border-t-yellow-600`}>
                        <h2 className="text-2xl font-black text-white flex items-center gap-2 mb-4 uppercase"><IconBase iconName="Moon" className="text-yellow-600" size={24}/> <span>Вечерний Алгоритм</span></h2>
                        <BreathingTimer type="evening" onComplete={() => toggleTask('breathPm', 'spirit', 15, true)} />
                        <ManifestReader type="PM" />
                    </div>
                </div>
            </div>
        );

        const ProgressView = ({ state, update }) => {
            const { xp, level, categories, returnRate } = state.stats;
            const progressToNext = xp % 200;
            const progressPercent = (progressToNext / 200) * 100;

            const Bar = ({ label, val, col }) => (
                <div className="bg-[#0f0f0f]/40 p-4 rounded-2xl border border-[#262626]/60">
                    <div className="flex justify-between text-xs mb-2 font-black uppercase tracking-wider">
                        <span className="text-slate-400">{label}</span>
                        <span className="text-slate-200">{Math.floor(val)}%</span>
                    </div>
                    <div className="h-2 w-full bg-[#050505] rounded-full border border-[#262626]/40 overflow-hidden">
                        <div className={`h-full ${col} shadow-[0_0_10px_currentColor]`} style={{ width: `${val}%` }}></div>
                    </div>
                </div>
            );

            return (
                <div className="space-y-8 animate-in fade-in zoom-in-95 duration-500">
                    <h1 className="text-3xl md:text-6xl font-black tracking-tighter text-white uppercase">Прогресс</h1>
                    <div className={`${THEME.panel} bg-gradient-to-br from-[#121212]/80 to-[#0a0a0a]/80 p-6 md:p-12`}>
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6">
                            <div className="flex items-center gap-6">
                                <div className="w-16 h-16 md:w-20 md:h-20 rounded-2xl bg-gradient-to-br from-yellow-400 to-amber-600 flex items-center justify-center border border-white/10 shadow-2xl shadow-amber-500/20">
                                    <IconBase iconName="Trophy" className="text-[#0a0a0a]" size={28} />
                                </div>
                                <div>
                                    <h2 className="text-2xl md:text-5xl font-black text-white tracking-tight">Уровень {level}</h2>
                                    <p className="text-amber-400 font-black tracking-widest uppercase text-xs mt-1">Каста Суверенов</p>
                                </div>
                            </div>
                            <div className="bg-[#050505] px-6 py-4 rounded-2xl border border-[#262626]/60 text-xl font-mono font-black text-white shadow-inner">
                                {xp} <span className="text-sm text-amber-500">XP</span>
                            </div>
                        </div>

                        <div className="space-y-3 mb-8">
                            <div className="flex justify-between text-xs uppercase tracking-wider text-slate-400">
                                <span>До следующего уровня</span>
                                <span className="text-amber-400 font-mono">{progressToNext} / 200</span>
                            </div>
                            <div className="h-4 bg-[#050505] rounded-full border border-[#262626]/60 p-0.5">
                                <div className="h-full bg-gradient-to-r from-amber-600 to-yellow-500 rounded-full" style={{ width: `${progressPercent}%` }}></div>
                            </div>
                        </div>

                        <h3 className="text-sm font-black text-slate-300 uppercase tracking-widest mb-4">Баланс идентичностей</h3>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <Bar label="Атлет (Тело)" val={categories.body} col="bg-amber-500" />
                            <Bar label="Структура (PM)" val={categories.pm} col="bg-yellow-500" />
                            <Bar label="Мир (English)" val={categories.english} col="bg-orange-400" />
                            <Bar label="Создатель (Контент)" val={categories.content} col="bg-amber-300" />
                            <Bar label="Дух (Ритуалы)" val={categories.spirit} col="bg-yellow-600" />
                            <Bar label="Return Rate (Стабильность)" val={returnRate} col="bg-gradient-to-r from-amber-400 to-yellow-500" />
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <NumericInput label="Уровень ежедневной энергии" min={1} max={10} value={state.energyMetrics.energy} onChange={(v) => update('energyMetrics', {energy: v})} />
                        <NumericInput label="Уровень психологического стресса" min={1} max={10} color="red" value={state.energyMetrics.stress} onChange={(v) => update('energyMetrics', {stress: v})} />
                    </div>
                </div>
            );
        };

        const ToolsExportView = ({ state, copyToClipboard, setState, showToast }) => {
            const [sunoInput, setSunoInput] = useState('');

            const buildObsidianData = () => {
                const e = state.energyMetrics, t = state.dailyTasks, logs = state.taskTimestamps;
                const notesStr = state.notes.savedDaily.length > 0 ? state.notes.savedDaily.map(n => n).join('\n') : '- Нет записей';
                const langStr = state.languagePhrases.length > 0 ? state.languagePhrases.map(l => `- ${l}`).join('\n') : '- Нет записей';
                const goalsStr = state.strategicGoals.map(g => `- ${g.title}: ${Math.floor((g.current/g.target)*100)}% (${g.current}/${g.target} ${g.unit})`).join('\n');
                
                return `# Суверенный Лог Дня: ${new Date().toLocaleDateString('ru-RU')}\n\n` +
                       `## Метрики ЦНС\n- Сон: ${e.sleep}ч\n- Энергия: ${e.energy}/10\n- Стресс: ${e.stress}/10\n- Готовность: ${e.readiness}/10\n\n` +
                       `## Статус Векторов Развития\n${goalsStr}\n\n` +
                       `## Хронология и Таймстампы Действий\n` +
                       `- [${logs.waterAm || '—'}] Вода + Свет + Проветривание\n` +
                       `- [${logs.morningCharge || '—'}] Микро-зарядка\n` +
                       `- [${logs.breathAm || '—'}] Box Breathing (Утро)\n` +
                       `- [${logs.prayerAm || '—'}] Утренний сверх-манифест\n` +
                       `- [${logs.english || '—'}] English Speaking Practice\n` +
                       `- [${logs.pm || '—'}] Project Management Спринт\n` +
                       `- [${logs.body || '—'}] Личная силовая тренировка\n` +
                       `- [${logs.cardio || '—'}] Домашнее кардио\n` +
                       `- [${logs.breathPm || '—'}] Дыхание на ночь\n` +
                       `- [${logs.prayerPm || '—'}] Вечерний сверх-манифест\n\n` +
                       `## Зафиксированные инсайты дня\n${notesStr}\n\n` +
                       `## Микро-Языки (Завтрак)\n${langStr}\n\n` +
                       `## Вечерний разбор по фреймворку\n- Триумф дня:\n- Что замедлило:\n- Вектор оптимизации:`;
            };

            const downloadObsidianFile = () => {
                const text = buildObsidianData();
                const blob = new Blob([text], { type: 'text/markdown;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                const dateStr = new Date().toISOString().split('T')[0];
                link.href = url;
                link.setAttribute("download", `${dateStr}_Markov_OS.md`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast("Файл .md для Obsidian успешно скачан 💾");
            };

            const runBackupExport = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
                const dlAnchor = document.createElement('a');
                const dateStr = new Date().toISOString().split('T')[0];
                dlAnchor.setAttribute("href", dataStr);
                dlAnchor.setAttribute("download", `Markov_OS_Core_${dateStr}.json`);
                document.body.appendChild(dlAnchor);
                dlAnchor.click();
                dlAnchor.remove();
                showToast("Слепок ядра OS заархивирован JSON 🔐");
            };

            const runBackupImport = (event) => {
                if(event.target.files.length === 0) return;
                const reader = new FileReader();
                reader.readAsText(event.target.files[0], "UTF-8");
                reader.onload = e => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        if (parsed.stats && parsed.dailyTasks) {
                            setState(parsed);
                            showToast("Ядро восстановлено. База данных обновлена. ⚡");
                        }
                    } catch (err) { showToast("Ошибка импорта данных", true); }
                };
            };

            return (
                <div className="space-y-8 animate-in fade-in zoom-in-95 duration-500">
                    <h1 className="text-3xl md:text-6xl font-black tracking-tighter text-white uppercase">Экспорт</h1>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-2xl font-black text-white flex items-center gap-2 mb-4 uppercase"><IconBase iconName="Download" className="text-amber-500" size={24}/> <span>Obsidian Синхронизация</span></h2>
                            <p className="text-sm text-slate-400 mb-6">Сборка автоматического структурированного файла дневника с поминутными таймстампами твоих действий.</p>
                            <div className="flex gap-2">
                                <Button variant="primary" className="flex-1 text-xs uppercase" onClick={() => copyToClipboard(buildObsidianData())}>Копировать</Button>
                                <Button variant="secondary" className="flex-1 text-xs uppercase" onClick={downloadObsidianFile}>Скачать .md</Button>
                            </div>
                        </div>
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-2xl font-black text-white flex items-center gap-2 mb-4 uppercase"><IconBase iconName="Settings" className="text-orange-400" size={24}/> <span>Резервное копирование ядра</span></h2>
                            <p className="text-sm text-slate-400 mb-6">Так как у нас нет внешних баз данных, сохраняй прогресс уровней, логов и идей SUNO в файл.</p>
                            <div className="flex flex-col sm:flex-row gap-3">
                                <Button variant="secondary" className="text-xs uppercase" onClick={runBackupExport}>Сохранить бэкап</Button>
                                <label className="flex items-center justify-center gap-2 px-4 py-3 rounded-2xl bg-[#1a1a1a] border border-[#333333]/60 text-amber-400 font-bold hover:bg-[#222222] cursor-pointer text-xs uppercase transition-all">
                                    <span>Восстановить</span>
                                    <input type="file" accept=".json" onChange={runBackupImport} className="hidden" />
                                </label>
                            </div>
                        </div>
                        <div className={`${THEME.panel} lg:col-span-2`}>
                            <h2 className="text-2xl font-black text-white flex items-center gap-2 mb-4 uppercase"><IconBase iconName="Music" className="text-amber-400" size={24}/> <span>Банк творческих идей SUNO</span></h2>
                            <div className="flex gap-4 mb-6">
                                <TextInput placeholder="Концепт трека, музыкальный стиль, промпт..." value={sunoInput} onChange={(v) => setSunoInput(v)} className="flex-1" />
                                <Button onClick={() => { if(sunoInput.trim()) { setState(p => ({...p, sunoIdeas: [...p.sunoIdeas, sunoInput]})); setSunoInput(''); showToast("Идея добавлена в банк."); } }}>Сохранить</Button>
                            </div>
                            {state.sunoIdeas.length > 0 && (
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 p-4 bg-[#0a0a0a]/60 rounded-2xl border border-[#262626]/60">
                                    {state.sunoIdeas.map((idea, i) => (
                                        <div key={i} className="p-3 bg-[#1a1a1a]/90 rounded-xl border border-[#333333]/60 font-bold text-sm text-slate-300 flex items-center gap-2">
                                            <IconBase iconName="Music" className="text-amber-500" size={16} /> <span>{idea}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const TextInput = ({ value, onChange, placeholder, multiline = false, className="" }) => {
            const baseClasses = `w-full bg-[#0f0f0f]/80 border border-[#262626]/60 rounded-2xl p-4 text-slate-200 placeholder:text-slate-600 focus:outline-none focus:border-amber-500/60 focus:ring-1 focus:ring-amber-500/60 transition-all resize-none shadow-inner text-sm font-medium leading-relaxed ${className}`;
            return multiline ? (
                <textarea rows={3} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} className={baseClasses} />
            ) : (
                <input type="text" value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} className={baseClasses} />
            );
        };

        function App() {
            const { state, setState, update, toggleTask, saveDailyNote, addLanguagePhrase, copyToClipboard, toast, showToast } = useAppState();

            const TABS = [
                { id: 'dashboard', icon: 'Home', label: 'Сегодня' },
                { id: 'schedule', icon: 'Clock', label: 'Распорядок' },
                { id: 'learning', icon: 'Brain', label: 'Обучение' },
                { id: 'body', icon: 'Dumbbell', label: 'Тело' },
                { id: 'content', icon: 'Smartphone', label: 'Контент' },
                { id: 'rituals', icon: 'Wind', label: 'Ритуалы' },
                { id: 'progress', icon: 'Trophy', label: 'Прогресс' },
                { id: 'tools', icon: 'Settings', label: 'Экспорт' },
            ];

            // Настройка динамических интеллектуальных фонов под выбранный режим дня
            useEffect(() => {
                const modeGlows = {
                    max: 'radial-gradient(circle at top, rgba(251,191,36,0.06) 0%, rgba(10,10,10,0) 60%)',
                    norm: 'radial-gradient(circle at top, rgba(251,191,36,0.03) 0%, rgba(10,10,10,0) 50%)',
                    min: 'radial-gradient(circle at top, rgba(239,68,68,0.05) 0%, rgba(10,10,10,0) 50%)',
                    recovery: 'radial-gradient(circle at top, rgba(168,85,247,0.05) 0%, rgba(10,10,10,0) 50%)',
                    saturday: 'radial-gradient(circle at top, rgba(99,102,241,0.06) 0%, rgba(10,10,10,0) 60%)',
                    sunday: 'radial-gradient(circle at top, rgba(34,197,94,0.04) 0%, rgba(10,10,10,0) 50%)'
                };
                const activeGlow = modeGlows[state.currentMode] || modeGlows.norm;
                const glowElement = document.getElementById('ambient-glow-layer');
                if (glowElement) {
                    glowElement.style.backgroundImage = activeGlow;
                }
            }, [state.currentMode]);

            const currentContent = useMemo(() => {
                switch (state.currentTab) {
                    case 'dashboard': return <DashboardView state={state} update={update} toggleTask={toggleTask} />;
                    case 'schedule': return <ScheduleView state={state} />;
                    case 'learning': return <LearningView state={state} saveDailyNote={saveDailyNote} addLanguagePhrase={addLanguagePhrase} />;
                    case 'body': return <BodyView state={state} update={update} toggleTask={toggleTask} />;
                    case 'content': return <ContentView state={state} update={update} saveDailyNote={saveDailyNote} />;
                    case 'rituals': return <RitualsView state={state} toggleTask={toggleTask} />;
                    case 'progress': return <ProgressView state={state} update={update} />;
                    case 'tools': return <ToolsExportView state={state} copyToClipboard={copyToClipboard} setState={setState} showToast={showToast} />;
                    default: return <DashboardView state={state} update={update} toggleTask={toggleTask} />;
                }
            }, [state.currentTab, state, update, toggleTask, saveDailyNote, addLanguagePhrase, copyToClipboard, setState, showToast]);

            return (
                <div className="min-h-screen bg-[#0a0a0a] text-slate-200 font-sans flex flex-col lg:flex-row overflow-x-hidden antialiased relative">
                    
                    {/* Слой адаптивного неонового фонового градиента */}
                    <div id="ambient-glow-layer" class="fixed inset-0 pointer-events-none z-0 transition-all duration-1000 ease-in-out"></div>

                    {/* Текстовые уведомления */}
                    <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] transition-all duration-500 ease-out pointer-events-none w-[95%] md:w-auto max-w-lg ${toast.visible ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 -translate-y-10 scale-95'}`}>
                        <div className="px-4 py-3.5 rounded-2xl font-bold bg-[#121212]/95 text-white border border-amber-500/50 shadow-2xl backdrop-blur-2xl flex items-center gap-3">
                            <IconBase iconName="Sparkles" className="text-amber-400" size={20} />
                            <span className="text-sm md:text-base">{toast.msg}</span>
                        </div>
                    </div>

                    {/* Боковое меню (Десктоп) */}
                    <aside className="hidden lg:flex flex-col w-[280px] xl:w-[320px] bg-[#121212]/60 backdrop-blur-3xl border-r border-[#262626]/60 p-6 h-screen sticky top-0 z-40 shadow-2xl">
                        <div className="mb-10 relative select-none">
                            <h1 className="text-4xl font-black tracking-widest text-white">MARKOV<br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-amber-500">OS</span></h1>
                            <p className="text-[10px] text-slate-400 font-black tracking-widest mt-2 uppercase flex items-center gap-2">Hyper-Elite v13 <span className="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></span></p>
                        </div>
                        <nav className="flex-1 space-y-1 overflow-y-auto hide-scrollbar">
                            {TABS.map(tab => {
                                const active = state.currentTab === tab.id;
                                return (
                                    <button 
                                        key={tab.id} onClick={() => { triggerHaptic(10); update('currentTab', tab.id); }}
                                        className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl transition-all font-bold text-sm uppercase tracking-wider ${active ? 'bg-amber-500/10 text-amber-400 border border-amber-500/30 shadow-inner' : 'text-slate-500 hover:text-slate-200'}`}
                                    >
                                        <IconBase iconName={tab.icon} size={18} />
                                        <span className="truncate">{tab.label}</span>
                                    </button>
                                )
                            })}
                        </nav>
                    </aside>

                    {/* Главная рабочая область */}
                    <main className="flex-1 p-4 md:p-10 lg:p-12 xl:p-16 w-full min-h-screen relative z-10 pb-24 lg:pb-12 overflow-hidden">
                        <div className="max-w-[1200px] mx-auto w-full">
                            {currentContent}
                        </div>
                    </main>

                    {/* Навигационное меню (Мобильные устройства) */}
                    <nav className="lg:hidden fixed bottom-0 left-0 right-0 bg-[#121212]/90 backdrop-blur-3xl border-t border-[#262626]/60 flex overflow-x-auto hide-scrollbar z-50 px-1 py-1">
                        {TABS.map(tab => {
                            const active = state.currentTab === tab.id;
                            return (
                                <button 
                                    key={tab.id} onClick={() => { triggerHaptic(10); update('currentTab', tab.id); }}
                                    className={`flex-1 flex flex-col items-center justify-center min-w-[68px] py-2 gap-1 transition-all ${active ? 'text-amber-400' : 'text-slate-500'}`}
                                >
                                    <IconBase iconName={tab.icon} size={18} />
                                    <span className="text-[8px] font-black uppercase tracking-widest truncate">{tab.label}</span>
                                </button>
                            )
                        })}
                    </nav>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
