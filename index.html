    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            background-color: #0a0a0a; 
            color: #e2e8f0; 
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.8s ease, color 0.5s ease;
            line-height: 1.65;
        }
        
        /* Шрифтовая эргономика для защиты глаз */
        h1, h2, h3, h4 {
            letter-spacing: 0.05em !important;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        
        ::selection { background: rgba(251,191,36,0.3); color: white; }
        .touch-manipulation { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn95 { from { transform: scale(0.97); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        /* Золотой праздничный салют успеха */
        @keyframes successSalute {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.5); }
            50% { transform: scale(1.02); box-shadow: 0 0 35px 10px rgba(245, 158, 11, 0.3); border-color: rgba(245, 158, 11, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        .animate-in { animation-fill-mode: forwards; }
        .fade-in { animation-name: fadeIn; }
        .zoom-in-95 { animation-name: zoomIn95; }
        .duration-500 { animation-duration: 500ms; }
        
        .task-success-animate {
            animation: successSalute 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Визуальное всплытие карточек при наведении */
        .premium-elevation {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease, box-shadow 0.4s ease;
            will-change: transform, box-shadow;
        }
        .premium-elevation:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.9);
        }

        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            nav.fixed.bottom-0 { padding-bottom: calc(0.5rem + env(safe-area-inset-bottom)); }
        }
    </style>
</head>

        // Web Audio API Звуковой Движок
        const AudioEngine = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            playClick() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(750, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(350, this.ctx.currentTime + 0.03);
                gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.03);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.03);
            },
            playTick() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(550, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.012, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.015);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.015);
            },
            playPhaseChange() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(950, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.025, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.08);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.08);
            },
            playSuccess() {
                this.init();
                const now = this.ctx.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, index) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + index * 0.07);
                    gain.gain.setValueAtTime(0.03, now + index * 0.07);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.07 + 0.25);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + index * 0.07);
                    osc.stop(now + index * 0.07 + 0.25);
                });
            }

        const MODES = {

        const MANIFESTS = {
            AM: {
                title: "УТРЕННИЙ СВЕРХ-МАНИФЕСТ",
                instruction: "Читай стоя, расправив плечи, глубоким и командным голосом. Твой разум — абсолютный закон.",
                text: "«Господь, Архитектор Вселенной, и Ты, Великий Порядок Бытия.\n\nЯ, Павел Марков, пробуждаю свою истинную силу и заявляю права на свою реальность. Прямо сейчас я активирую ультимативный щит разума: любой ментальный шум, страх, сомнение или случайный негатив мгновенно аннигилируются, превращаясь в чистую созидательную энергию. Воля Павла Маркова — высший закон для моего подсознания.\n\nВселенная, синхронизируй мои вибрации с кодами безграничного богатства, триумфа и масштабного успеха. Я включаю свою личную гравитацию: я — мощный ментальный магнит. Прямо сейчас я притягиваю в свое поле сильных, верных, масштабных и духовно близких мне людей. Мою касту. Моих людей.\n\nГосподь, наполни мое тело несокрушимой энергией, а разум — идеальной структуру и дисциплиной. Мой фокус безупречен. Каждое мое действие сегодня материализует успех, власть и изобилие. Я создаю этот день по праву творца. Намерение исполнено.\n\nДа будет так. Сбылось. Done. Así sea. Hecho está. 14.03.1997. 如此 в реальном времени. 成了. [Rúcǐ zài. Chéng le.]»"

                text: "«Господь, Творец всего сущего, и Ты, Вселенная, разворачивающая миры в безупречном порядке.\n\nЯ, Павел Марков, подвожу итог этого дня. Прямо сейчас я полностью очищаю свое пространство от дневного шума и суеты. Любое внешнее влияние, чужие эмоции, страхи и сомнения обесточены, стерты и лишены силы. Мой разум чист, стабилен и неуязвим.\n\nЯ принимаю этот день во всей его полноте — как идеальную и необходимую структуру своего опыта. Моя дисциплина зафиксирована, мои действия неизбежно ведут к триумфу. Всё, что произошло сегодня, уже работает на меня и приумножает мою силу.\n\nПока мое тело погружается в глубокий, исцеляющий сон, мое подсознание программирует физический мир. Вселенная перестраивает реальность под мои утренние манифесты. Мои клетки обновляются, моя сила растет в тишине. Я засыпаю с абсолютным знанием своего величия.\n\nДа будет так. Сбылось. Done. Así sea. Hecho está. 14.03.1997. 优质 в реальном времени. 成了. [Rúcǐ zài. Chéng le.]»"

        const INITIAL_STATE = {
            currentTab: 'dashboard',
            currentMode: 'norm',
            circadianOverride: null, 
            deepFocusActive: false, 
            energyMetrics: { sleep: 7.5, energy: 7, stress: 3, readiness: 7 },
            dailyTasks: {
                waterAm: false, morningCharge: false, breathAm: false, prayerAm: false,
                pm: false, english: false, body: false, content: false, cardio: false,
                breathPm: false, prayerPm: false, supplements: false, electrolytes: false, cnsOpt: false
            },
            taskTimestamps: {},
            notes: { savedDaily: [], stoicTriump: '', stoicGrowth: '' },
            sunoIdeas: [],
            languagePhrases: [],
            stats: { xp: 0, level: 1, returnRate: 100, daysLogged: 1, categories: { body: 15, pm: 15, english: 15, content: 15, spirit: 15 } },
            contentLadder: -1,
            lastLoginDate: new Date().toDateString(),
            streakCounter: 0,
            bookProgress: { chapter: 1, totalPages: 15 }
        };

        function useAppState() {
            const [state, setState] = useState(() => {
                try {
                    const saved = localStorage.getItem('markov_os_v15_hyper_elite');
                    if (saved) return { ...INITIAL_STATE, ...JSON.parse(saved) };
                } catch (e) {}
                return INITIAL_STATE;
            });
            const [toast, setToast] = useState({ visible: false, msg: '' });
            const [globalFocusId, setGlobalFocusId] = useState(null);

            const showToast = useCallback((msg) => {
                setToast({ visible: true, msg });
                setTimeout(() => setToast({ visible: false, msg: '' }), 3500);
            }, []);

            useEffect(() => {
                localStorage.setItem('markov_os_v15_hyper_elite', JSON.stringify(state));
            }, [state]);

            useEffect(() => {
                const today = new Date().toDateString();
                if (state.lastLoginDate !== today) {
                    setState(prev => {
                        const perfectDay = prev.dailyTasks.pm && prev.dailyTasks.body && prev.dailyTasks.waterAm;
                        const newStreak = perfectDay ? (prev.streakCounter || 0) + 1 : 0;
                        const drop = (!prev.dailyTasks.pm || !prev.dailyTasks.body) ? 6 : 0;

                        return {
                            ...prev,
                            currentMode: 'norm',
                            deepFocusActive: false,
                            dailyTasks: INITIAL_STATE.dailyTasks,
                            taskTimestamps: {},
                            languagePhrases: [],
                            lastLoginDate: today,
                            streakCounter: newStreak,
                            stats: {
                                ...prev.stats,
                                daysLogged: prev.stats.daysLogged + 1,
                                returnRate: Math.max(20, Math.min(100, prev.stats.returnRate - drop + 3))
                            }
                        };
                    });
                    showToast("Запущен новый суверенный цикл. Архитектура обновлена. ⚡");
                }
            }, [state.lastLoginDate, showToast]);

            const update = useCallback((key, value) => {
                setState(prev => {
                    if (typeof value === 'object' && !Array.isArray(value) && value !== null && prev[key]) {
                        return { ...prev, [key]: { ...prev[key], ...value } };
                    }
                    return { ...prev, [key]: value };
                });
            }, []);

            const toggleTask = useCallback((taskId, category, xpReward = 10, forceState = null) => {
                AudioEngine.playClick();
                triggerHaptic(15);
                const currentTime = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                
                const el = document.getElementById(`task-card-${taskId}`);
                if (el && (forceState === true || !state.dailyTasks[taskId])) {
                    el.classList.add('task-success-animate');
                    setTimeout(() => el.classList.remove('task-success-animate'), 600);
                }

                setState(prev => {
                    const isDone = forceState !== null ? forceState : !prev.dailyTasks[taskId];
                    if (forceState !== null && prev.dailyTasks[taskId] === forceState) return prev;

                    let newXp = prev.stats.xp;
                    let catVal = prev.stats.categories[category] || 0;
                    const updatedTimestamps = { ...prev.taskTimestamps };

                    // Нумерологический Сакральный Буст Энергии
                    const completedCount = Object.values(prev.dailyTasks).filter(Boolean).length + (isDone ? 1 : -1);
                    const isNumerologyMatch = [5, 7, 14].includes(completedCount);
                    const finalReward = isDone && isNumerologyMatch ? xpReward + 25 : xpReward;

                    if (isDone) {
                        newXp += finalReward;
                        catVal = Math.min(100, catVal + finalReward / 1.5);
                        updatedTimestamps[taskId] = currentTime;
                        AudioEngine.playSuccess();
                    } else {
                        newXp = Math.max(0, newXp - finalReward);
                        catVal = Math.max(0, catVal - finalReward / 1.5);
                        delete updatedTimestamps[taskId];
                    }

                    return {
                        ...prev,
                        dailyTasks: { ...prev.dailyTasks, [taskId]: isDone },
                        taskTimestamps: updatedTimestamps,
                        stats: {
                            ...prev.stats,
                            xp: newXp,
                            level: Math.floor(newXp / 200) + 1,
                            categories: { ...prev.stats.categories, [category]: catVal }
                        }
                    };
                });
                
                showToast(`Матрица логов обновлена. Действие сохранено. ✨`);
            }, [state.dailyTasks, showToast]);

            return { state, setState, update, toggleTask, toast, showToast, globalFocusId, setGlobalFocusId };
        }

        // Общие UI компоненты
        const Button = ({ children, variant = 'primary', className = "", onClick, icon: iconName }) => {
            const variants = {
                primary: `${THEME.accentBg} text-[#0a0a0a] font-black shadow-[0_0_20px_rgba(251,191,36,0.15)] ${THEME.accentHover} border border-amber-300/40`,
                secondary: `bg-[#1a1a1a]/80 text-amber-50 backdrop-blur-md hover:bg-[#222222] border border-[#333333]/60 hover:border-amber-500/40`,
                danger: `bg-rose-950/40 text-rose-400 border border-rose-900/50 backdrop-blur-md hover:bg-rose-900/50 hover:text-rose-200 shadow-[0_0_25px_rgba(244,63,94,0.15)]`
            };
            return (
                <button onClick={() => { triggerHaptic(10); if(onClick) onClick(); }} className={`flex items-center justify-center gap-2 px-5 py-3.5 rounded-2xl transition-all duration-300 active:scale-[0.98] touch-manipulation font-bold uppercase tracking-wider text-xs ${variants[variant]} ${className}`}>
                    {iconName && <IconBase iconName={iconName} size={16} />}
                    <span className="truncate">{children}</span>
                </button>
            );
        };

        const NumericInput = ({ label, value, onChange, min=0, max=10, step=1, hint, color="accent" }) => {
            return (
                <div className="flex flex-col gap-2 w-full">
                    <span className={`${THEME.textMuted} text-xs font-black uppercase tracking-widest px-1`}>{label} {hint && <span className="opacity-40 normal-case font-normal">({hint})</span>}</span>
                    <div className="flex items-center bg-[#0f0f0f]/60 backdrop-blur-xl border border-[#262626]/60 p-1.5 rounded-2xl w-full">
                        <button onClick={() => { triggerHaptic(10); onChange(Math.max(min, Number(value) - step)); }} className="p-3 rounded-xl bg-[#1a1a1a] text-slate-300 hover:text-amber-400 active:scale-95"><IconBase iconName="Minus" size={16}/></button>
                        <input type="number" readOnly value={value} className={`flex-1 bg-transparent text-center text-2xl font-mono font-black ${color === 'red' ? 'text-rose-400' : 'text-amber-400'}`} />
                        <button onClick={() => { triggerHaptic(10); onChange(Math.min(max, Number(value) + step)); }} className="p-3 rounded-xl bg-[#1a1a1a] text-slate-300 hover:text-amber-400 active:scale-95"><IconBase iconName="Plus" size={16}/></button>
                    </div>
                </div>
            );
        };

        const CheckItem = ({ id, checked, onChange, label, subLabel, anchor, timeLog }) => (
            <div id={`task-card-${id}`} className={`flex items-start gap-4 p-4 rounded-2xl transition-all duration-300 cursor-pointer border relative overflow-hidden premium-elevation ${checked ? 'bg-amber-500/5 border-amber-500/30' : 'bg-[#0f0f0f]/40 border-[#262626]/60 hover:border-amber-500/40'}`} onClick={onChange}>
                <div className={`mt-0.5 w-7 h-7 rounded-full flex items-center justify-center border-2 flex-shrink-0 ${checked ? 'bg-gradient-to-br from-yellow-400 to-amber-600 border-transparent text-[#0a0a0a]' : 'border-slate-500'}`}>
                    {checked && <IconBase iconName="Check" size={14} strokeWidth={4} />}
                </div>
                <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap mb-1">
                        {anchor && <span className="text-amber-500 font-black text-[10px] uppercase tracking-widest flex items-center gap-1"><IconBase iconName="Anchor" size={10}/> {anchor}</span>}
                        {checked && timeLog && <span className="text-slate-400 font-mono text-[10px] bg-amber-500/10 px-1.5 py-0.5 rounded">🕒 {timeLog}</span>}
                    </div>
                    <span className={`font-bold block text-base md:text-lg leading-tight break-words ${checked ? 'text-slate-400 line-through decoration-amber-500/50' : 'text-slate-200'}`}>{label}</span>
                    {subLabel && <span className={`text-xs md:text-sm mt-1 block leading-snug ${checked ? 'text-slate-500' : 'text-slate-300'}`}>{subLabel}</span>}
                </div>
            </div>
        );

        const TipCard = ({ text, title="Логика системы", iconName = "Zap" }) => (
            <div className="bg-gradient-to-r from-[#121212]/80 to-[#0f0f0f]/80 backdrop-blur-xl border border-[#262626]/60 rounded-2xl p-5 flex gap-4 items-start relative overflow-hidden shadow-md">
                <div className="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-amber-400 to-yellow-600"></div>
                <div className="p-2.5 bg-amber-500/10 rounded-xl flex-shrink-0 border border-amber-500/20 text-amber-400">
                    <IconBase iconName={iconName} size={18} />
                </div>
                <div className="flex-1 min-w-0">
                    <h4 className="text-[10px] font-black text-amber-400 uppercase tracking-widest mb-1">{title}</h4>
                    <p className="text-sm text-slate-200 leading-relaxed font-medium break-words">{text}</p>
                </div>
            </div>
        );

        const FocusTimer = ({ defaultMinutes, taskName, taskId, category, xpReward, onCompleteTask, state, update, setGlobalFocusId, globalFocusId }) => {
            const [timeLeft, setTimeLeft] = useState(defaultMinutes * 60);
            const [isActive, setIsActive] = useState(false);
            const [isOpen, setIsOpen] = useState(false);
            const [isMicro, setIsMicro] = useState(false);
            
            const totalSeconds = useMemo(() => (isMicro ? 2 : defaultMinutes) * 60, [isMicro, defaultMinutes]);
            useEffect(() => { setTimeLeft(totalSeconds); }, [totalSeconds]);

            useEffect(() => {
                let interval = null;
                if (isActive && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft(prev => prev - 1);
                        if (timeLeft % 10 === 0) AudioEngine.playTick();
                    }, 1000);
                } else if (timeLeft === 0 && isActive) {
                    setIsActive(false);
                    clearInterval(interval);
                    AudioEngine.playSuccess();
                    triggerHaptic([100, 50, 100]);
                    onCompleteTask(taskId, category, xpReward, true);
                    setIsOpen(false);
                    update('deepFocusActive', false);
                    setGlobalFocusId(null);
                }
                return () => clearInterval(interval);
            }, [isActive, timeLeft, taskId, category, xpReward, onCompleteTask]);

            const handleToggleActive = () => {
                const nextActive = !isActive;
                setIsActive(nextActive);
                update('deepFocusActive', nextActive);
                if (nextActive) {
                    setGlobalFocusId(taskId);
                } else {
                    setGlobalFocusId(null);
                }
            };

            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            const progress = ((totalSeconds - timeLeft) / totalSeconds) * 100;

            if (state.deepFocusActive && globalFocusId !== taskId) return null;

            if (!isOpen) return (
                <div className="flex gap-2.5 mt-3">
                    <button onClick={() => { setIsMicro(false); setIsOpen(true); }} className="text-[11px] flex items-center gap-2 font-bold text-slate-200 bg-[#161616] border border-[#2b2b2b] px-3.5 py-2.5 rounded-xl hover:text-amber-400 transition-colors">
                        <IconBase iconName="Clock" size={14} className="text-amber-500"/> Спринт {defaultMinutes} мин
                    </button>
                    <button onClick={() => { setIsMicro(true); setIsOpen(true); }} className="text-[11px] flex items-center gap-2 font-bold text-amber-400 bg-amber-500/10 border border-amber-500/20 px-3.5 py-2.5 rounded-xl">
                        <IconBase iconName="Zap" size={14} /> Атомный старт (2 мин)
                    </button>
                </div>
            );

            return (
                <div className="mt-4 p-5 bg-[#0a0a0a]/90 border border-[#262626] rounded-2xl flex flex-col items-center w-full animate-in zoom-in-95">
                    <div className="flex justify-between w-full mb-4 items-center">
                        <span className="text-slate-200 font-black text-xs uppercase tracking-wider truncate flex items-center gap-1">
                            <IconBase iconName="Target" size={14} className="text-amber-500"/> {isMicro ? 'Микро-Концентрация' : taskName}
                        </span>
                        <button onClick={() => { setIsActive(false); setIsOpen(false); update('deepFocusActive', false); setGlobalFocusId(null); }} className="text-slate-400 hover:text-white p-1.5 bg-[#1a1a1a] rounded-lg"><IconBase iconName="X" size={14}/></button>
                    </div>
                    <div className="relative w-36 h-36 flex items-center justify-center mb-5">
                        <svg className="w-full h-full -rotate-90 absolute" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="44" fill="none" stroke="#1f1f1f" strokeWidth="6" />
                            <circle cx="50" cy="50" r="44" fill="none" stroke="#fbbf24" strokeWidth="6" strokeLinecap="round" strokeDasharray="276" strokeDashoffset={276 - (276 * progress) / 100} className="transition-all duration-1000 ease-linear" />
                        </svg>
                        <div className="text-3xl font-mono font-black text-white">{m}:{s}</div>
                    </div>
                    <div className="flex gap-2 w-full max-w-[240px]">
                        <button onClick={handleToggleActive} className={`flex-1 py-2.5 rounded-xl font-black text-xs uppercase ${isActive ? 'bg-[#1a1a1a] text-slate-200' : 'bg-amber-400 text-black'}`}>
                            {isActive ? 'Пауза' : 'Старт'}
                        </button>
                        <button onClick={() => { isActive(false); setTimeLeft(totalSeconds); }} className="p-2.5 rounded-xl bg-[#0f0f0f] border border-[#262626] text-slate-300"><IconBase iconName="Clock" size={16}/></button>
                    </div>
                </div>
            );
        };

        const ManifestReader = ({ type, onCodeClick }) => {
            const m = MANIFESTS[type];
            const [expanded, setExpanded] = useState(false);
            return (
                <div className="mt-4 p-4 rounded-xl bg-[#0a0a0a]/60 border border-[#222222]">
                    <div className="flex justify-between items-center cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div>
                            <h4 className="text-xs font-black text-slate-200 tracking-wider uppercase">{m.title}</h4>
                            <p className="text-[10px] text-slate-400 mt-0.5">{m.instruction.substring(0, 45)}...</p>
                        </div>
                        <span className="text-amber-400 text-xs font-mono">{expanded ? 'СВЕРНУТЬ' : 'РАЗВЕРНУТЬ'}</span>
                    </div>
                    {expanded && (
                        <div className="mt-4 pt-4 border-t border-[#222222] animate-in fade-in">
                            <p className="text-[11px] text-amber-500/80 italic leading-relaxed mb-3">{m.instruction}</p>
                            <p className="text-xs text-slate-200 whitespace-pre-line leading-relaxed font-medium bg-[#111] p-3 rounded-lg border border-[#222]/40 select-all">
                                {m.text.split("14.03.1997").map((part, i, arr) => (
                                    <React.Fragment key={i}>
                                        {part}
                                        {i < arr.length - 1 && (
                                            <span onClick={(e) => { e.stopPropagation(); onCodeClick(); }} className="text-amber-400 font-bold border-b border-dashed border-amber-400 cursor-pointer hover:text-amber-300">
                                                14.03.1997
                                            </span>
                                        )}
                                    </React.Fragment>
                                ))}
                            </p>
                        </div>
                    )}
                </div>
            );
        };

        const BreathingTimer = ({ type = 'morning', onCompleteAction, compact = false }) => {
            const [isActive, setIsActive] = useState(false);
            const [timeElapsed, setTimeElapsed] = useState(0);
            const [phaseName, setPhaseName] = useState('Готовность');
            const [phaseLeft, setPhaseLeft] = useState(0);
            const [circleScale, setCircleScale] = useState(1);

            const TOTAL_SECONDS = 120;

            useEffect(() => {
                let interval = null;
                if (isActive && timeElapsed < TOTAL_SECONDS) {
                    interval = setInterval(() => {
                        setTimeElapsed(prev => {
                            const next = prev + 1;
                            AudioEngine.playTick();
                            return next;
                        });
                    }, 1000);
                } else if (timeElapsed >= TOTAL_SECONDS && isActive) {
                    setIsActive(false);
                    setPhaseName('Завершено');
                    setCircleScale(1);
                    AudioEngine.playSuccess();
                    if(onCompleteAction) onCompleteAction();
                }
                return () => clearInterval(interval);
            }, [isActive, timeElapsed, onCompleteAction]);

            useEffect(() => {
                if (!isActive) return;
                const cycle = timeElapsed % (type === 'morning' ? 16 : 10);

                if (type === 'morning' || type === 'quick') {
                    if (cycle < 4) {
                        if (cycle === 0) AudioEngine.playPhaseChange();
                        setPhaseName('Вдох'); setPhaseLeft(4 - cycle); setCircleScale(1.4);
                    } else if (cycle < 8) {
                        if (cycle === 4) AudioEngine.playPhaseChange();
                        setPhaseName('Задержка'); setPhaseLeft(8 - cycle); setCircleScale(1.4);
                    } else if (cycle < 12) {
                        if (cycle === 8) AudioEngine.playPhaseChange();
                        setPhaseName('Выдох'); setPhaseLeft(12 - cycle); setCircleScale(1.0);
                    } else {
                        if (cycle === 12) AudioEngine.playPhaseChange();
                        setPhaseName('Задержка'); setPhaseLeft(16 - cycle); setCircleScale(1.0);
                    }
                } else {
                    if (cycle < 4) {
                        if (cycle === 0) AudioEngine.playPhaseChange();
                        setPhaseName('Вдох'); setPhaseLeft(4 - cycle); setCircleScale(1.3);
                    } else {
                        if (cycle === 4) AudioEngine.playPhaseChange();
                        setPhaseName('Выдох'); setPhaseLeft(10 - cycle); setCircleScale(1.0);
                    }
                }
            }, [timeElapsed, isActive, type]);

            const rem = TOTAL_SECONDS - timeElapsed;
            const mins = Math.floor(rem / 60);
            const secs = (rem % 60).toString().padStart(2, '0');

            if (compact) {
                return (
                    <div className="flex items-center justify-between p-4 rounded-2xl bg-amber-500/10 border border-amber-500/30 w-full animate-in fade-in">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 rounded-full bg-amber-500/20 flex items-center justify-center font-mono text-amber-400 font-black text-xs" style={{ transform: `scale(${circleScale})`, transition: 'all 1s' }}>
                                {isActive ? phaseLeft : '!'}
                            </div>
                            <div>
                                <h4 className="text-xs font-black text-white uppercase tracking-wider">{isActive ? `Перезагрузка: ${phaseName}` : 'Быстрая перезагрузка ЦНС'}</h4>
                                <p className="text-[10px] font-mono text-amber-400/80">Осталось сессии: {mins}:{secs}</p>
                            </div>
                        </div>
                        <button onClick={() => setIsActive(!isActive)} className="px-4 py-2 rounded-xl bg-amber-400 text-black font-black text-[10px] uppercase tracking-wider">
                            {isActive ? 'Стоп' : 'Старт'}
                        </button>
                    </div>
                );
            }

            return (
                <div className="bg-[#0f0f0f]/60 border border-[#262626]/60 p-6 rounded-2xl flex flex-col items-center justify-center relative min-h-[300px] w-full">
                    <div className="absolute top-4 left-4 text-[10px] font-black text-slate-300 uppercase tracking-widest bg-[#1a1a1a] px-2.5 py-1.5 rounded border border-[#333]/60">
                        {type === 'morning' ? 'Box Breathing (4-4-4-4)' : 'Relax Breathing (4-6)'}
                    </div>
                    <div className="absolute top-4 right-4 text-xs font-mono font-black text-amber-400 bg-amber-500/10 px-2.5 py-1.5 rounded">
                        {mins}:{secs}
                    </div>
                    <div className="relative w-32 h-32 flex items-center justify-center my-4">
                        <div className="absolute rounded-full bg-amber-500/5 blur-2xl transition-all duration-1000 w-full h-full" style={{ transform: `scale(${circleScale})` }}></div>
                        <div className="relative z-10 rounded-full border-2 border-amber-500/30 bg-gradient-to-br from-[#121212] to-[#050505] flex flex-col items-center justify-center transition-all duration-1000 shadow-xl" style={{ width: '90px', height: '90px', transform: `scale(${circleScale})` }}>
                            {isActive ? <div className="text-2xl font-black font-mono text-amber-400">{phaseLeft}</div> : <IconBase iconName="Wind" className="text-slate-400" size={24} />}
                        </div>
                    </div>
                    <div className="text-lg font-black text-white h-6 uppercase tracking-tight">{phaseName}</div>
                    <Button variant={isActive ? 'secondary' : 'primary'} onClick={() => { triggerHaptic(15); setIsActive(!isActive); }} className="w-full max-w-[180px] mt-4">
                        {isActive ? 'Пауза' : (timeElapsed > 0 ? 'Продолжить' : 'Запустить')}
                    </Button>
                </div>
            );
        };

        // ЭКРАН 1: Главный Дашборд
        const DashboardView = ({ state, update, toggleTask, setGlobalFocusId, globalFocusId, onCodeClick }) => {
            const todayDate = new Date().toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
            const mode = state.currentMode;
            const timeSettings = MODES[mode] || MODES.NORM;

            const randomQuote = useMemo(() => {
                const seed = state.stats.xp + (state.streakCounter * 7);
                return STOIC_QUOTES[seed % STOIC_QUOTES.length];
            }, [state.stats.xp, state.streakCounter]);

            const bookPercent = useMemo(() => Math.min(100, Math.floor((state.bookProgress.totalPages / 77) * 100)), [state.bookProgress.totalPages]);

            const currentChapterName = useMemo(() => {
                const chapters = [
                    "Глава 1: Иллюзия ментального шума",
                    "Глава 2: Дихотомия контроля в действии",
                    "Глава 3: Разрушение современных психологических догм",
                    "Глава 4: Нейробиология суверенной воли",
                    "Глава 5: Математика личных алгоритмов",
                    "Глава 6: Выход из когнитивного плена",
                    "Глава 7: Создание личной касты"
                ];
                return chapters[Math.min(6, state.bookProgress.chapter - 1)];
            }, [state.bookProgress.chapter]);

            const targetDaysLeft = useMemo(() => {
                const totalPagesLeft = 77 - state.bookProgress.totalPages;
                return Math.ceil(totalPagesLeft / 2) || 1;
            }, [state.bookProgress.totalPages]);

            return (
                <div className="space-y-6 animate-in fade-in zoom-in-95 duration-500">
                    <BreathingTimer type="quick" compact={true} />

                    {/* Модуль Амор Фати */}
                    <div className="p-5 rounded-3xl bg-gradient-to-r from-amber-500/10 via-transparent to-transparent border border-amber-500/20 shadow-lg relative overflow-hidden backdrop-blur-2xl">
                        <div className="absolute right-4 top-4 opacity-5"><IconBase iconName="Anchor" size={70} /></div>
                        <span className="text-[10px] font-black text-amber-500 uppercase tracking-widest bg-amber-500/10 px-2 py-0.5 rounded">Щит Разума // Amor Fati</span>
                        <p className="mt-2 text-sm md:text-base italic font-medium text-slate-200 leading-relaxed">"{randomQuote.text}"</p>
                        <h4 className="mt-1 text-xs font-bold text-slate-400 font-mono text-right">— {randomQuote.author}</h4>
                    </div>

                    {/* Заголовок и Управление матрицей */}
                    <div className="flex flex-col xl:flex-row justify-between items-start xl:items-end gap-4">
                        <div>
                            <div className="flex items-center gap-3">
                                <h1 className="text-3xl md:text-5xl font-black tracking-tighter text-white uppercase">Сегодня</h1>
                                {state.streakCounter > 0 && (
                                    <div className="flex items-center gap-1.5 px-3 py-1 rounded-full bg-gradient-to-r from-orange-500 to-amber-500 text-black font-black text-xs shadow-lg">
                                        <IconBase iconName="Flame" size={14} /> <span>STREAK: {state.streakCounter} ДН</span>
                                    </div>
                                )}
                            </div>
                            <p className="text-amber-400 font-mono mt-1 capitalize text-sm tracking-widest font-bold flex items-center gap-1.5"><IconBase iconName="Calendar" size={16}/> {todayDate}</p>
                        </div>
                        
                        <div className="flex bg-[#0f0f0f]/60 p-1.5 rounded-2xl border border-[#262626]/60 overflow-x-auto w-full xl:w-auto hide-scrollbar gap-1 items-center">
                            {Object.values(MODES).map(m => (
                                <button 
                                    key={m.id} onClick={() => { triggerHaptic(15); update('currentMode', m.id); }}
                                    className={`px-3 py-2 rounded-xl text-xs font-black transition-all duration-300 uppercase tracking-wider whitespace-nowrap ${state.currentMode === m.id ? 'bg-gradient-to-r from-amber-400 to-yellow-600 text-[#0a0a0a] shadow-lg' : 'text-slate-400 hover:text-slate-200'}`}
                                >
                                    {m.label}
                                </button>
                            ))}
                            <button onClick={() => { triggerHaptic([40, 40, 40]); update('currentMode', 'min'); }} className="px-3 py-2 rounded-xl text-xs font-black bg-rose-950/50 text-rose-400 border border-rose-900/60 uppercase tracking-wider hover:bg-rose-900 hover:text-white ml-2 flex-shrink-0 animate-pulse">
                                ЦНС Перегрузка
                            </button>
                        </div>
                    </div>

                    {/* Интерактивный Калькулятор Стратегических Целей */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div className="p-5 rounded-3xl bg-[#121212]/50 border border-[#262626]/60 backdrop-blur-3xl flex flex-col justify-between">
                            <div>
                                <div className="flex justify-between items-start">
                                    <div>
                                        <h4 className="text-sm font-black uppercase text-slate-200 tracking-wide">Книга «Анти-психология»</h4>
                                        <p className="text-[11px] text-amber-500 font-medium mt-0.5">{currentChapterName}</p>
                                    </div>
                                    <div className="text-right">
                                        <span className="font-mono text-xs font-black text-amber-400 block">{bookPercent}%</span>
                                        <span className="text-[9px] text-slate-400 font-mono">Осталось: ~{targetDaysLeft} дн.</span>
                                    </div>
                                </div>
                                <div className="w-full h-1.5 bg-[#050505] rounded-full mt-3 overflow-hidden border border-[#262626]/40">
                                    <div className="h-full bg-gradient-to-r from-amber-500 to-yellow-500 transition-all duration-500" style={{ width: `${bookPercent}%` }}></div>
                                </div>
                            </div>
                            <div className="flex justify-between items-center mt-4 pt-3 border-t border-[#262626]/40 flex-wrap gap-2">
                                <span className="font-mono text-xs text-slate-400">{state.bookProgress.totalPages} / 77 страниц</span>
                                <div className="flex gap-2 items-center">
                                    <span className="text-[10px] font-black text-slate-300 uppercase mr-1">Глава:</span>
                                    <div className="flex bg-[#0a0a0a] rounded-lg p-0.5 border border-[#222]">
                                        <button onClick={() => update('bookProgress', { chapter: Math.max(1, state.bookProgress.chapter - 1) })} className="px-2 py-0.5 text-slate-300 font-mono text-xs hover:text-white">-</button>

                    { time: '12:05', title: 'Project Management [Фокус]', desc: '[Якорь: Конец English]. Бизнес-архитектура, личные системы.', icon: 'BrainCircuit', highlight: true },
                    { time: '13:05', title: 'Разгрузка коры', desc: 'Легальный блок соцсетей. Охлаждение префронтальной зоны.', icon: 'Clock' },
