                }, 3000);
            }, []);

            // Дебаунс синхронизации состояния
            useEffect(() => {
                if (saveDebounceRef.current) clearTimeout(saveDebounceRef.current);
                saveDebounceRef.current = setTimeout(() => {
                    safeStorage.set(state);
                }, 250);
                return () => { if (saveDebounceRef.current) clearTimeout(saveDebounceRef.current); };
            }, [state]);

            // Экстренное сохранение при выгрузке страницы браузера
            useEffect(() => {
                const handleUnload = () => safeStorage.set(state);
                window.addEventListener('beforeunload', handleUnload);
                return () => window.removeEventListener('beforeunload', handleUnload);
            }, [state]);

            // Проверка и смена суточных циклов с логированием истории
            useEffect(() => {
                const today = new Date().toDateString();
                if (state.lastLoginDate !== today) {
                    setState(prev => {
                        const yesterdayStr = prev.lastLoginDate || new Date(Date.now() - 86400000).toDateString();
                        const updatedHistory = { ...prev.history };
                        
                        // Сохранение полной структуры предыдущего дня в архив истории
                        updatedHistory[yesterdayStr] = {
                            date: yesterdayStr,
                            dailyTasks: { ...prev.dailyTasks },
                            taskTimestamps: { ...prev.taskTimestamps },
                            energyMetrics: { ...prev.energyMetrics },
                            currentMode: prev.currentMode,
                            xpEarned: prev.stats.xp
                        };

                        const coreCompletedAll = CORE_TASKS.every(k => prev.dailyTasks[k] || !INITIAL_STATE.dailyTasks.hasOwnProperty(k));
                        const newStreak = coreCompletedAll ? (prev.streakCounter || 0) + 1 : 0;
                        const penaltyRate = !prev.dailyTasks.pm || !prev.dailyTasks.body ? 5 : 0;

                        return {
                            ...prev,
                            currentMode: 'NORM',
                            deepFocusActive: false,
                            dailyTasks: { ...INITIAL_STATE.dailyTasks },
                            taskTimestamps: {},
                            languagePhrases: [],
                            lastLoginDate: today,
                            streakCounter: newStreak,
                            history: updatedHistory,
                            stats: {
                                ...prev.stats,
                                daysLogged: (prev.stats.daysLogged || 1) + 1,
                                returnRate: Math.max(20, Math.min(100, (prev.stats.returnRate || 100) - penaltyRate + 3))
                            }
                        };
                    });
                    showToast("Запущен новый суверенный цикл. Настройки сброшены. ⚡");
                }
            }, [state.lastLoginDate, showToast]);

            const update = useCallback((key, value) => {
                setState(prev => {
                    if (typeof value === 'object' && !Array.isArray(value) && value !== null && prev[key]) {
                        return { ...prev, [key]: { ...prev[key], ...value } };
                    }
                    return { ...prev, [key]: value };
                });
            }, []);

            const toggleTask = useCallback((taskId, category, xpReward = 10, forceState = null) => {
                setState(prev => {
                    const isDone = forceState !== null ? forceState : !prev.dailyTasks[taskId];
                    if (forceState !== null && prev.dailyTasks[taskId] === forceState) return prev;

                    AudioEngine.playClick(prev.settings.soundEnabled);
                    triggerHaptic(prev.settings.hapticsEnabled, 14);

                    const currentTime = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                    let newXp = prev.stats.xp || 0;
                    let catVal = prev.stats.categories[category] || 0;
                    const updatedTimestamps = { ...prev.taskTimestamps };

                    // Бонусные очки за выполнение ключевых задач ядра
                    const isCore = CORE_TASKS.includes(taskId);
                    const finalReward = isCore && isDone ? xpReward + 10 : xpReward;

                    if (isDone) {
                        newXp += finalReward;
                        catVal = Math.min(100, catVal + finalReward / 2);
                        updatedTimestamps[taskId] = currentTime;
                        AudioEngine.playSuccess(prev.settings.soundEnabled);
                    } else {
                        newXp = Math.max(0, newXp - finalReward);
                        catVal = Math.max(0, catVal - finalReward / 2);
                        delete updatedTimestamps[taskId];
                    }

                    const computedLevel = Math.floor(Math.sqrt(newXp / 100)) + 1;

                    return {
                        ...prev,
                        dailyTasks: { ...prev.dailyTasks, [taskId]: isDone },
                        taskTimestamps: updatedTimestamps,
                        stats: {
                            ...prev.stats,
                            xp: newXp,
                            level: computedLevel,
                            categories: { ...prev.stats.categories, [category]: catVal }
                        }
                    };
                });
                showToast("Действие зафиксировано в матрице.");
            }, [showToast]);

            return { state, setState, update, toggleTask, toast, showToast, globalFocusId, setGlobalFocusId };
        }

        // Кнопки интерфейса с встроенной поддержкой доступности
        const Button = React.memo(({ children, variant = 'primary', className = "", onClick, icon: iconName, ariaLabel }) => {
            const variants = {
                primary: `${THEME.accentBg} text-[#0a0a0a] font-black ${THEME.accentHover} border border-amber-400/20`,
                secondary: `bg-[#1c1c1c] text-neutral-200 hover:bg-[#262626] border border-[#333]`,
                danger: `bg-red-950/40 text-red-400 border border-red-900/40 hover:bg-red-900/40 hover:text-red-100`
            };
            return (
                <button 
                    type="button"
                    aria-label={ariaLabel}
                    onClick={onClick} 
                    className={`flex items-center justify-center gap-2 px-4 py-3 rounded-xl transition-all duration-200 active:scale-[0.99] touch-manipulation font-bold uppercase tracking-wide text-xs min-h-[44px] ${variants[variant]} ${className}`}
                >
                    {iconName && <IconBase iconName={iconName} size={14} />}
                    {children && <span className="truncate">{children}</span>}
                </button>
            );
        });
        Button.displayName = 'Button';

        const NumericInput = React.memo(({ label, value, onChange, min=0, max=10, step=1, hint, color="accent" }) => {
            return (
                <div className="flex flex-col gap-1.5 w-full">
                    <span className={`${THEME.textMuted} text-xs font-bold uppercase tracking-wider px-1`}>
                        {label} {hint && <span className="opacity-50 font-normal text-[11px]">({hint})</span>}
                    </span>
                    <div className="flex items-center bg-[#141414] border border-[#262626] p-1 rounded-xl w-full">
                        <button type="button" aria-label="Уменьшить значение" onClick={() => onChange(Math.max(min, Number(value) - step))} className="p-3 rounded-lg bg-[#1c1c1c] text-neutral-300 hover:text-amber-400 active:scale-95 min-h-[44px] min-w-[44px] flex items-center justify-center"><IconBase iconName="Minus" size={14}/></button>
                        <input type="number" readOnly value={value} className={`flex-1 bg-transparent text-center text-xl font-mono font-bold ${color === 'red' ? 'text-red-400' : 'text-amber-400'}`} />
                        <button type="button" aria-label="Увеличить значение" onClick={() => onChange(Math.min(max, Number(value) + step))} className="p-3 rounded-lg bg-[#1c1c1c] text-neutral-300 hover:text-amber-400 active:scale-95 min-h-[44px] min-w-[44px] flex items-center justify-center"><IconBase iconName="Plus" size={14}/></button>
                    </div>
                </div>
            );
        });
        NumericInput.displayName = 'NumericInput';

        const CheckItem = React.memo(({ id, checked, onChange, label, subLabel, anchor, timeLog }) => {
            const isUrgent = !checked && (id === 'morningHygiene' || id === 'waterAm' || id === 'supplements');
            return (
                <button 
                    type="button"
                    id={`task-card-${id}`} 
                    aria-pressed={checked}
                    className={`w-full text-left flex items-start gap-4 p-4 rounded-xl transition-all border relative overflow-hidden min-h-[52px] touch-manipulation ${checked ? 'bg-amber-500/5 border-amber-500/20' : isUrgent ? 'bg-red-500/5 border-red-500/20 hover:border-red-500/40' : 'bg-[#141414] border-[#262626] hover:border-amber-500/30'}`} 
                    onClick={onChange}
                >
                    <div className={`mt-0.5 w-6 h-6 rounded-full flex items-center justify-center border-2 flex-shrink-0 ${checked ? 'bg-amber-500 border-transparent text-neutral-950' : isUrgent ? 'border-red-500/70' : 'border-neutral-500'}`}>
                        {checked && <IconBase iconName="Check" size={12} strokeWidth={4} />}
                    </div>
                    <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap mb-0.5">
                            <span className={`${isUrgent ? 'text-red-400' : 'text-amber-500'} font-bold text-[10px] uppercase tracking-wider flex items-center gap-1`}><IconBase iconName="Anchor" size={9}/> {anchor || 'Действие'}</span>
                            {checked && timeLog && <span className="text-neutral-400 font-mono text-[10px] bg-neutral-800 px-1.5 py-0.5 rounded">🕒 {timeLog}</span>}
                        </div>
                        <span className={`font-bold block text-sm md:text-base leading-tight break-words ${checked ? 'text-neutral-500 line-through decoration-amber-500/30' : 'text-neutral-100'}`}>{label}</span>
                        {subLabel && <span className={`text-xs mt-1 block leading-normal ${checked ? 'text-neutral-500' : 'text-neutral-400'}`}>{subLabel}</span>}
                    </div>
                </button>
            );
        });
        CheckItem.displayName = 'CheckItem';

        const TipCard = React.memo(({ text, title="Логика системы", iconName = "Zap" }) => (
            <div className="bg-[#121212] border border-[#262626] rounded-xl p-4 flex gap-3 items-start relative overflow-hidden shadow-sm">
                <div className="absolute left-0 top-0 bottom-0 w-1 bg-amber-500"></div>
                <div className="p-2 bg-amber-500/10 rounded-lg flex-shrink-0 text-amber-400 border border-amber-500/10">
                    <IconBase iconName={iconName} size={16} />
                </div>
                <div className="flex-1 min-w-0">
                    <h4 className="text-[10px] font-bold text-amber-400 uppercase tracking-wider mb-0.5">{title}</h4>
                    <p className="text-xs text-neutral-300 leading-relaxed font-medium break-words">{text}</p>
                </div>
            </div>
        ));
        TipCard.displayName = 'TipCard';

        // Стабильный высокоточный таймер на базе Date.now()
        const FocusTimer = ({ defaultMinutes, taskName, taskId, category, xpReward, onCompleteTask, state, update, setGlobalFocusId, globalFocusId }) => {
            const [timeLeft, setTimeLeft] = useState(defaultMinutes * 60);
            const [isActive, setIsActive] = useState(false);
            const [isOpen, setIsOpen] = useState(false);
            const [isMicro, setIsMicro] = useState(false);
            
            const endTimeRef = useRef(null);
            const intervalRef = useRef(null);
            const completedTriggered = useRef(false);
            
            const totalSeconds = useMemo(() => (isMicro ? 2 : defaultMinutes) * 60, [isMicro, defaultMinutes]);
            
            useEffect(() => { 
                setTimeLeft(totalSeconds); 
                completedTriggered.current = false;
                if (isActive) {
                    endTimeRef.current = Date.now() + totalSeconds * 1000;
                }
            }, [totalSeconds]);

            useEffect(() => {
                if (isActive) {
                    intervalRef.current = setInterval(() => {
                        const remaining = Math.max(0, Math.ceil((endTimeRef.current - Date.now()) / 1000));
                        setTimeLeft(remaining);
                        
                        if (remaining <= 0) {
                            setIsActive(false);
                            clearInterval(intervalRef.current);
                            if (!completedTriggered.current) {
                                completedTriggered.current = true;
                                AudioEngine.playSuccess(state.settings.soundEnabled);
                                onCompleteTask(taskId, category, xpReward, true);
                                setIsOpen(false);
                                update('deepFocusActive', false);
                                setGlobalFocusId(null);
                            }
                        } else if (remaining % 10 === 0) {
                            AudioEngine.playTick(state.settings.soundEnabled);
                        }
                    }, 250);
                } else {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                }
                return () => { if (intervalRef.current) clearInterval(intervalRef.current); };
            }, [isActive, taskId, category, xpReward, onCompleteTask, update, setGlobalFocusId, state.settings.soundEnabled]);

            const handleToggleActive = () => {
                const nextActive = !isActive;
                if (nextActive) {
                    endTimeRef.current = Date.now() + timeLeft * 1000;
                    setGlobalFocusId(taskId);
                } else {
                    setGlobalFocusId(null);
                }
                setIsActive(nextActive);
                update('deepFocusActive', nextActive);
            };

            const handleReset = () => {
                setIsActive(false);
                update('deepFocusActive', false);
                setGlobalFocusId(null);
                setTimeLeft(totalSeconds);
            };

            if (defaultMinutes <= 0) return null;
            if (state.deepFocusActive && globalFocusId !== taskId) return null;

            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            const progress = totalSeconds > 0 ? ((totalSeconds - timeLeft) / totalSeconds) * 100 : 0;

            if (!isOpen) return (
                <div className="flex gap-2 mt-2 flex-wrap">
                    <button type="button" onClick={() => { setIsMicro(false); setIsOpen(true); }} className="text-xs flex items-center gap-2 font-bold text-neutral-200 bg-[#1a1a1a] border border-[#2d2d2d] px-3 py-2 rounded-xl hover:text-amber-400 min-h-[40px]">
                        <IconBase iconName="Clock" size={12} className="text-amber-500"/> Спринт {defaultMinutes} мин
                    </button>
                    <button type="button" onClick={() => { setIsMicro(true); setIsOpen(true); }} className="text-xs flex items-center gap-2 font-bold text-amber-400 bg-amber-500/10 border border-amber-500/20 px-3 py-2 rounded-xl min-h-[40px]">
                        <IconBase iconName="Zap" size={12} /> Ускоренный старт (2 мин)
                    </button>
                </div>
            );

            return (
                <div className="mt-3 p-4 bg-[#0d0d0d] border border-[#262626] rounded-xl flex flex-col items-center w-full animate-in zoom-in-95">
                    <div className="flex justify-between w-full mb-3 items-center">
                        <span className="text-neutral-200 font-bold text-xs uppercase tracking-wide truncate flex items-center gap-1.5">
                            <IconBase iconName="Target" size={12} className="text-amber-500"/> {isMicro ? 'Микро-Фокус' : taskName}
                        </span>
                        <button type="button" onClick={() => { setIsActive(false); setIsOpen(false); update('deepFocusActive', false); setGlobalFocusId(null); }} className="text-neutral-400 hover:text-white p-1.5 bg-[#1a1a1a] rounded-lg min-h-[32px] min-w-[32px] flex items-center justify-center"><IconBase iconName="X" size={12}/></button>
                    </div>
                    <div className="relative w-28 h-28 flex items-center justify-center mb-4">
                        <svg className="w-full h-full -rotate-90 absolute" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="44" fill="none" stroke="#1c1c1c" strokeWidth="5" />
                            <circle cx="50" cy="50" r="44" fill="none" stroke="#f59e0b" strokeWidth="5" strokeLinecap="round" strokeDasharray="276" strokeDashoffset={276 - (276 * progress) / 100} style={{ transition: 'stroke-dashoffset 0.3s ease' }} />
                        </svg>
                        <div className="text-2xl font-mono font-bold text-white">{m}:{s}</div>
                    </div>
                    <div className="flex gap-2 w-full max-w-[200px]">
                        <button type="button" onClick={handleToggleActive} className={`flex-1 py-2 rounded-lg font-bold text-xs uppercase min-h-[38px] ${isActive ? 'bg-[#222] text-neutral-200' : 'bg-amber-500 text-neutral-950'}`}>
                            {isActive ? 'Пауза' : 'Старт'}
                        </button>
                        <button type="button" onClick={handleReset} className="p-2 rounded-lg bg-[#141414] border border-[#262626] text-neutral-300 min-h-[38px] min-w-[38px] flex items-center justify-center"><IconBase iconName="Clock" size={14}/></button>
                    </div>
                </div>
            );
        };

        // Защищенный от наложений тренажер калибровки дыхания
        const BreathingTimer = ({ type, state, onCompleteAction }) => {
            const [phase, setPhase] = useState('Ожидание');
            const [timeLeft, setTimeLeft] = useState(0);
            const [isRunning, setIsRunning] = useState(false);
            const timerRef = useRef(null);

            const clearTimer = () => {
                if (timerRef.current) {
                    clearTimeout(timerRef.current);
                    timerRef.current = null;
                }
            };

            useEffect(() => { return () => clearTimer(); }, []);

            const startBreathing = () => {
                clearTimer();
                setIsRunning(true);
                setPhase('Вдох');
                setTimeLeft(4);
            };

            const handleReset = () => {
                clearTimer();
                setIsRunning(false);
                setPhase('Ожидание');
                setTimeLeft(0);
            };

            useEffect(() => {
                if (isRunning && timeLeft > 0) {
                    timerRef.current = setTimeout(() => {
                        setTimeLeft(timeLeft - 1);
                    }, 1000);
                } else if (isRunning && timeLeft === 0) {
                    AudioEngine.playPhaseChange(state.settings.soundEnabled);
                    if (phase === 'Вдох') {
                        setPhase('Задержка'); setTimeLeft(4);
                    } else if (phase === 'Задержка') {
                        setPhase('Выдох'); setTimeLeft(4);
                    } else if (phase === 'Выдох') {
                        setPhase('Пауза после выдоха'); setTimeLeft(4);
                    } else {
                        setIsRunning(false);
                        setPhase('Завершено');
                        if (onCompleteAction) onCompleteAction();
                    }
                }
                return () => clearTimeout(timerRef.current);
            }, [isRunning, timeLeft, phase, state.settings.soundEnabled]);

            const sphereScale = useMemo(() => {
                if (!isRunning) return 'scale-100';
                if (phase === 'Вдох') return 'scale-125 duration-1000';
                if (phase === 'Задержка') return 'scale-125 duration-0';
                if (phase === 'Выдох') return 'scale-95 duration-1000';
                return 'scale-95 duration-0';
            }, [isRunning, phase]);

            return (
                <div className="p-4 bg-[#0d0d0d] border border-[#262626] rounded-xl text-center flex flex-col items-center justify-center space-y-3 mb-3">
                    <h4 className="text-xs font-bold uppercase text-amber-400">
                        {state.settings.evidenceMode ? "Дыхательный цикл для снижения возбуждения" : "Квадратное дыхание стабилизации коры"}
                    </h4>
                    
                    <div className="w-20 h-20 flex items-center justify-center relative my-1">
                        <div className={`absolute w-12 h-12 rounded-full bg-amber-500/20 transition-transform transform ${sphereScale}`}></div>
                        <div className={`absolute w-10 h-10 rounded-full bg-amber-500 transition-transform transform ${sphereScale} flex items-center justify-center`}>
                            <IconBase iconName="Wind" size={14} className="text-neutral-950" />
                        </div>
                    </div>

                    <div className="text-lg font-mono font-bold text-white">{phase} {isRunning && `: ${timeLeft}`}</div>
                    <div className="flex gap-2 w-full">
                        <button type="button" onClick={startBreathing} disabled={isRunning} className="flex-1 py-2 bg-[#1c1c1c] border border-[#333] hover:border-amber-500/30 text-neutral-200 rounded-lg font-bold text-xs uppercase disabled:opacity-40 min-h-[38px]">
                            {isRunning ? 'Дыхание активно' : 'Запуск подсказок'}
                        </button>
                        {isRunning && (
                            <button type="button" onClick={handleReset} className="px-3 bg-red-950/40 text-red-400 border border-red-900/40 rounded-lg text-xs font-bold uppercase min-h-[38px]">
                                Сброс
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        const ManifestReader = ({ type, onCodeClick }) => {
            const data = {
                AM: {
                    title: "УТРЕННИЙ НАСТРОЙ РАЗУМА",
                    text: "Я, Павел Марков, активирую фокус разума. Любой ментальный шум, страх или сомнение лишаются силы и преобразуются в чистую созидательную энергию. Моя воля — закон для моего подсознания. Я притягиваю в свое поле сильных, верных и масштабных людей. Мою касту. Мой фокус безупречен. Намерение исполнено. Да будет так."
                },
                PM: {
                    title: "ВЕЧЕРНЕЕ СНИЖЕНИЕ НАГРУЗКИ",
                    text: "Я, Павел Марков, очищаю пространство от дневного шума и суеты. Любое внешнее влияние теряет силу. Разум стабилен и неуязвим. Я принимаю этот день во всей полноте — как необходимую структуру опыта. Пока тело погружается в сон, клетки восстанавливаются, а сила растет в тишине. Засыпаю с абсолютным знанием своего пути."
                }
            }[type];

            return (
                <div className="p-4 bg-[#0c0c0c] border border-[#222] rounded-xl space-y-2">
                    <h3 className="text-xs font-bold text-white uppercase">{data.title}</h3>
                    <div className="text-xs text-neutral-300 whitespace-pre-wrap max-h-36 overflow-y-auto hide-scrollbar bg-[#050505] p-3 rounded-lg border border-[#1a1a1a] leading-relaxed">
                        {data.text}
                    </div>
                    <button type="button" onClick={onCodeClick} className="w-full py-1 text-[10px] font-mono font-bold text-amber-500/40 hover:text-amber-400 uppercase tracking-wider min-h-[28px]">
                        [ Показать Скрытые Коды Матрицы ]
                    </button>
                </div>
            );
        };

        // Главная панель управления (Dashboard)
        const DashboardView = ({ state, update, toggleTask, setGlobalFocusId, globalFocusId, onCodeClick }) => {
            const ev = state.settings.evidenceMode;
            
            const randomQuote = useMemo(() => {
                const seed = (state.stats.xp || 0) + (state.streakCounter * 7);
                return STOIC_QUOTES[seed % STOIC_QUOTES.length];
            }, [state.stats.xp, state.streakCounter]);

            const dayAnalytics = useMemo(() => {
                const keys = Object.keys(state.dailyTasks);
                const total = keys.length;
                const completed = Object.values(state.dailyTasks).filter(Boolean).length;
                const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
                
                const coreTotal = CORE_TASKS.length;
                const coreCompleted = CORE_TASKS.filter(k => state.dailyTasks[k]).length;

                let status = "Фундамент не закрыт";
                let statusColor = "text-red-400";

                if (coreCompleted === coreTotal) {
                    status = "Минимум";
                    statusColor = "text-neutral-400";
                    if (percent > 50) status = "Нормальный день";
                    if (percent > 85) {
                        status = "Сильный день";
                        statusColor = "text-amber-400";
                    }
                }

                return { total, completed, percent, coreTotal, coreCompleted, status, statusColor };
            }, [state.dailyTasks]);

            const nextBestAction = useMemo(() => {
                if (!state.dailyTasks.waterAm) {
                    return { taskId: 'waterAm', category: 'spirit', xp: 5, text: ev ? "Восстановить гидратацию после сна" : "Вода 500 мл + проветривание", hint: "Стакан Боржоми с солью. Стабилизирует водно-солевой баланс." };
                } else if (!state.dailyTasks.morningHygiene) {
                    return { taskId: 'morningHygiene', category: 'spirit', xp: 5, text: ev ? "Короткий холодный стимул для бодрости" : "Гигиена AM", hint: "Контрастный душ, скребок для языка, формирование контура." };
                } else if (!state.dailyTasks.pm && state.currentMode !== 'RECOVERY') {
                    return { taskId: 'pm', category: 'pm', xp: 15, text: "Project Management Спринт", hint: "Фокусная работа по развитию архитектуры и систем управления." };
                } else if (!state.dailyTasks.body && state.currentMode !== 'RECOVERY') {
                    return { taskId: 'body', category: 'body', xp: 20, text: "Личная тренировка в клубе", hint: "Интеграция физической нагрузки. Фоновое прослушивание аудиокниг." };
                } else if (!state.dailyTasks.eveningHygiene) {
                    return { taskId: 'eveningHygiene', category: 'spirit', xp: 5, text: ev ? "Подготовка ко сну и очищение" : "Гигиена PM", hint: "Чистка зубов, флосс, уход за кожей лица." };
                }
                return null;
            }, [state.dailyTasks, state.currentMode, ev]);

            return (
                <div className="space-y-5 transform transition-all animate-in fade-in zoom-in-95">
                    <BreathingTimer type="quick" state={state} compact={true} />

                    {/* Раздел А. Сводка дня */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 bg-[#121212] p-4 border border-[#262626] rounded-2xl shadow-lg">
                        <div className="p-3 bg-[#0a0a0a] rounded-xl border border-[#1f1f1f]">
                            <span className="text-[10px] text-neutral-400 font-bold uppercase block tracking-wider">Выполнено задач</span>
                            <span className="text-xl font-mono font-bold text-amber-400">{dayAnalytics.completed} <span className="text-xs text-neutral-500">/ {dayAnalytics.total}</span></span>
                        </div>
                        <div className="p-3 bg-[#0a0a0a] rounded-xl border border-[#1f1f1f]">
                            <span className="text-[10px] text-neutral-400 font-bold uppercase block tracking-wider">Процент выполнения</span>
                            <span className="text-xl font-mono font-bold text-amber-500">{dayAnalytics.percent}%</span>
                        </div>
                        <div className="p-3 bg-[#0a0a0a] rounded-xl border border-[#1f1f1f]">
                            <span className="text-[10px] text-neutral-400 font-bold uppercase block tracking-wider">Ключевые якоря</span>
                            <span className="text-xl font-mono font-bold text-orange-400">{dayAnalytics.coreCompleted} <span className="text-xs text-neutral-500">/ {dayAnalytics.coreTotal}</span></span>
                        </div>
                        <div className="p-3 bg-[#0a0a0a] rounded-xl border border-[#1f1f1f]">
                            <span className="text-[10px] text-neutral-400 font-bold uppercase block tracking-wider">Статус системы</span>
                            <span className={`text-xs font-bold uppercase block mt-1.5 truncate ${dayAnalytics.statusColor}`}>{dayAnalytics.status}</span>
                        </div>
                    </div>

                    {/* Раздел В. Следующее лучшее действие */}
                    <div className="p-4 rounded-xl bg-gradient-to-r from-amber-500/10 via-amber-600/5 to-transparent border border-amber-500/20 shadow-md flex items-center justify-between gap-4">
                        <div className="flex items-center gap-3 min-w-0">
                            <div className="p-2.5 bg-amber-500 rounded-lg text-neutral-950 flex-shrink-0">
                                <IconBase iconName="Target" size={16} strokeWidth={3} />
                            </div>
                            <div className="min-w-0">
                                <span className="text-[9px] font-mono font-bold text-amber-400 uppercase tracking-wider block">Следующий шаг</span>
                                <h3 className="text-sm md:text-base font-bold text-white uppercase tracking-wide truncate">{nextBestAction ? nextBestAction.text : "Фундамент дня полностью закрыт"}</h3>
                                <p className="text-xs text-neutral-400 truncate font-medium">{nextBestAction ? nextBestAction.hint : "Все базовые якоря успешно зафиксированы в логах"}</p>
                            </div>
                        </div>
                        {nextBestAction && (
                            <button 
                                type="button" 
                                onClick={() => toggleTask(nextBestAction.taskId, nextBestAction.category, nextBestAction.xp)}
                                className="px-3 py-1.5 bg-amber-500/20 hover:bg-amber-500 text-amber-400 hover:text-black font-bold text-xs uppercase rounded-lg transition-colors border border-amber-500/30 whitespace-nowrap min-h-[34px]"
                            >
                                Выполнить
                            </button>
                        )}
                    </div>

                    {/* Конфигуратор режимов дня */}
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                        <div className="flex items-center gap-2">
                            <h2 className="text-xl font-bold text-white uppercase tracking-tight">Сегодня</h2>
                            {state.streakCounter > 0 && (
                                <div className="flex items-center gap-1 px-2.5 py-0.5 rounded-full bg-orange-500 text-neutral-950 font-bold text-[10px]">
                                    <IconBase iconName="Flame" size={10} /> <span>STREAK: {state.streakCounter} ДН</span>
                                </div>
                            )}
                        </div>
                        <div className="flex bg-[#141414] p-1 rounded-xl border border-[#262626] overflow-x-auto w-full sm:w-auto hide-scrollbar gap-1 items-center">
                            {['MAX', 'NORM', 'MIN', 'RECOVERY'].map(mId => (
                                <button 
                                    type="button"
                                    key={mId} onClick={() => update('currentMode', mId)}
                                    className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all duration-150 uppercase whitespace-nowrap min-h-[36px] ${state.currentMode === mId ? 'bg-amber-500 text-neutral-950 font-black' : 'text-neutral-400 hover:text-neutral-200'}`}
                                >
                                    {MODES[mId]?.label || mId}
                                </button>
                            ))}
                        </div>
                    </div>

                    {state.currentMode === 'RECOVERY' && (
                        <TipCard title="Режим низкой нагрузки" text="Активирован профиль восстановления. Все тяжелые рабочие спринты и лингвистические практики приостановлены. Сконцентрируйтесь на регенерации ресурсов, легкой активности и сне." iconName="Moon" />
                    )}

                    {/* Раздел С. Основные задачи */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="p-4 bg-[#121212] border border-[#262626] rounded-xl space-y-3">
                            <h4 className="text-[10px] font-bold text-amber-500 uppercase tracking-wider">Обязательные утренние якоря</h4>
                            <CheckItem id="waterAm" anchor="Вода" checked={state.dailyTasks.waterAm} timeLog={state.taskTimestamps.waterAm} onChange={() => toggleTask('waterAm', 'spirit', 5)} label={ev ? "Стакан Боржоми с солью + проветривание" : "Стакан Боржоми с солью + Проветривание"} subLabel={ev ? "Восстановление гидратации и водно-солевого баланса" : "Запуск почек, выравнивание водно-солевого баланса."} />
                            <CheckItem id="morningHygiene" anchor="Гигиена AM" checked={state.dailyTasks.morningHygiene} timeLog={state.taskTimestamps.morningHygiene} onChange={() => toggleTask('morningHygiene', 'spirit', 5)} label="Контрастный душ + Скребок + Бритьё" subLabel={ev ? "Короткий холодный стимул для бодрости" : "Мгновенный выброс норадреналина, жесткий контур бренда."} />
                            <CheckItem id="morningCharge" anchor="Тонус" checked={state.dailyTasks.morningCharge} timeLog={state.taskTimestamps.morningCharge} onChange={() => toggleTask('morningCharge', 'body', 5)} label="Зарядка мобильности волокон" subLabel="Легкая суставная разминка и активация тонуса (2 мин)." />
                        </div>

                        <div className="p-4 bg-[#121212] border border-[#262626] rounded-xl space-y-3">
                            <h4 className="text-[10px] font-bold text-amber-400 uppercase tracking-wider">Обязательные вечерние якоря</h4>
                            <CheckItem id="eveningHygiene" anchor="Гигиена PM" checked={state.dailyTasks.eveningHygiene} timeLog={state.taskTimestamps.eveningHygiene} onChange={() => toggleTask('eveningHygiene', 'spirit', 5)} label="Очищение зубов + Ирригатор" subLabel="Качественная санация ротовой полости перед сном." />
                            <CheckItem id="faceCare" anchor="Уход" checked={state.dailyTasks.faceCare} timeLog={state.taskTimestamps.faceCare} onChange={() => toggleTask('faceCare', 'spirit', 5)} label="Пенка для лица + Увлажнение" subLabel="Регенерация и защита дерматологического барьера." />
                            <CheckItem id="cardio" anchor="Дренаж" checked={state.dailyTasks.cardio} timeLog={state.taskTimestamps.cardio} onChange={() => toggleTask('cardio', 'body', 15)} label={ev ? "Лёгкая аэробная активность дома (20 мин)" : "Домашнее кардио (20-25 мин)"} subLabel={ev ? "Снижение субъективного психологического напряжения" : "Сжигание дневного кортизола."} />
                        </div>
                    </div>

                    {/* Раздел D. Вторичные рабочие блоки */}
                    {!state.settings.compactMode && (
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                            <div className="p-4 bg-[#121212] border border-[#262626] rounded-xl space-y-3">
                                <h2 className="text-sm font-bold text-white uppercase flex items-center gap-2"><IconBase iconName="Activity" className="text-amber-500" size={14}/> <span>Спринты и тренировки</span></h2>
                                {state.currentMode === 'RECOVERY' ? (
                                    <p className="text-xs text-neutral-400 italic">Спринты отключены для восстановления нервной системы.</p>
                                ) : (
                                    <div className="space-y-3">
                                        <div className="p-2 bg-[#0a0a0a] border border-[#1f1f1f] rounded-lg">
                                            <CheckItem id="pm" anchor="Бизнес" checked={state.dailyTasks.pm} timeLog={state.taskTimestamps.pm} onChange={() => toggleTask('pm', 'pm', 15)} label="Project Management Спринт" subLabel={`Продолжительность: ${MODES[state.currentMode]?.pmTime || 60} мин.`} />
                                            {!state.dailyTasks.pm && <FocusTimer defaultMinutes={MODES[state.currentMode]?.pmTime || 60} taskName="PM Deep Work" taskId="pm" category="pm" xpReward={15} onCompleteTask={toggleTask} state={state} update={update} setGlobalFocusId={setGlobalFocusId} globalFocusId={globalFocusId} />}
                                        </div>
                                        {state.currentMode !== 'MIN' && (
                                            <div className="p-2 bg-[#0a0a0a] border border-[#1f1f1f] rounded-lg">
                                                <CheckItem id="english" anchor="Языки" checked={state.dailyTasks.english} timeLog={state.taskTimestamps.english} onChange={() => toggleTask('english', 'english', 10)} label="English Speaking Practice" subLabel={`Продолжительность: ${MODES[state.currentMode]?.engTime || 25} мин.`} />
                                                {!state.dailyTasks.english && <FocusTimer defaultMinutes={MODES[state.currentMode]?.engTime || 25} taskName="English Speaking" taskId="english" category="english" xpReward={10} onCompleteTask={toggleTask} state={state} update={update} setGlobalFocusId={setGlobalFocusId} globalFocusId={globalFocusId} />}
                                            </div>
                                        )}
                                        <CheckItem id="body" anchor="Силовая" checked={state.dailyTasks.body} timeLog={state.taskTimestamps.body} onChange={() => toggleTask('body', 'body', 20)} label={state.currentMode === 'MIN' ? "Мягкий стрейчинг (10 мин)" : "Силовая тренировка в клубе «Стимул»"} subLabel="Работа над физическим статусом с параллельной аудиокнигой." />
                                    </div>
                                )}
                            </div>
                            <div className="p-4 bg-gradient-to-br from-amber-500/5 to-transparent border border-amber-500/10 rounded-xl flex flex-col justify-between">
                                <div>
                                    <span className="text-[10px] font-bold text-amber-500 uppercase tracking-wider bg-amber-500/10 px-2 py-0.5 rounded">Философия // Amor Fati</span>
                                    <p className="mt-3 text-sm italic text-neutral-200 leading-relaxed">"{randomQuote.text}"</p>
                                    <h4 className="mt-1 text-xs font-bold text-neutral-400 text-right">— {randomQuote.author}</h4>
                                </div>
                                <div className="mt-3 p-3 rounded-lg bg-[#0a0a0a]/50 border border-[#262626] text-xs text-neutral-300">
                                    <span className="font-bold text-amber-400 block mb-0.5">Контур контроля:</span>
                                    Управляйте началом дня до контакта с входящим терабайтом информации. Стабильность ритуалов формирует качество фокуса.
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ScheduleView = ({ state }) => {
            const mode = state.currentMode.toLowerCase();
            const timeline = useMemo(() => {
                if (mode === 'saturday') return [
                    { time: '11:00', title: 'Пробуждение', desc: 'Глубокая гидратация, инсоляция, ограничение деструктивного дофамина.', icon: 'Compass' },
                    { time: '14:00', title: 'Творческий инкубатор', desc: 'Сборка музыкальных промптов Suno, архивирование концептов в Obsidian.', icon: 'Music' },
                    { time: '18:00', title: 'Рефид нутрициолога', desc: 'Контролируемый профицит до 4500 ккал для снятия зажимов ЦНС.', icon: 'Utensils' }
                ];
                if (mode === 'sunday') return [
                    { time: '11:00', title: 'Утренний блок', desc: 'Гидратация, вентиляция, информационный вакуум.', icon: 'Compass' },
                    { time: '13:00', title: 'Аналоговое планирование', desc: 'Распределение векторов развития на физической магнитной доске.', icon: 'Layout' },
                    { time: '19:00', title: 'Декомпозиция книги', desc: 'Формирование тезисов для проекта «Anti-психология».', icon: 'Edit3' }
                ];
                return [
                    { time: '10:30', title: 'Синхронизация подъёма', desc: 'Боржоми с солью, яркий свет для калибровки циркадных ритмов, проветривание.', icon: 'Compass' },
                    { time: '10:45', title: 'Подготовка когнитивного щита', desc: 'Дыхательная сессия стабилизации и утреннее чтение целевых манифестов.', icon: 'Flame' },
                    { time: '11:10', title: 'Лингвистический блок', desc: 'Завтрак, прием нутрицевтиков (Омега-3, D3), разбор фраз лингво-спринта.', icon: 'Utensils', highlight: true },
                    { time: '11:35', title: 'English Speaking Practice', desc: 'Активная речевая тренировка для глобального масштабирования бренда.', icon: 'Globe', highlight: true },
                    { time: '12:05', title: 'Бизнес-архитектура [Фокус]', desc: 'Фокусный слот разработки систем управления и менторских программ.', icon: 'BrainCircuit', highlight: true },
                    { time: '16:00', title: 'Слот физического статуса', desc: 'Силовая сессия в клубе «Стимул» под образовательную аудиокнигу.', icon: 'Dumbbell' },
                    { time: '23:00', title: 'Аэробная разгрузка', desc: 'Домашнее кардио для снижения субъективного напряжения.', icon: 'Activity' }
                ];
            }, [mode]);

            return (
                <div className="space-y-4 transform transition-all animate-in fade-in zoom-in-95">
                    <h1 className="text-2xl font-bold tracking-tight text-white uppercase">Рельсы распорядка</h1>
                    <div className="bg-[#121212] border border-[#262626] rounded-2xl p-4 md:p-6 shadow-lg">
                        <div className="relative border-l border-[#262626] ml-3 md:ml-4 space-y-6 py-1">
                            {timeline.map((item, i) => (
                                <div key={i} className="relative pl-6 md:pl-8 group">
                                    <div className="absolute -left-[13px] top-1 w-6 h-6 rounded-full border border-[#262626] bg-[#0a0a0a] flex items-center justify-center text-neutral-400 group-hover:border-amber-400 transition-colors">
                                        <IconBase iconName={item.icon || "Clock"} size={11} />
                                    </div>
                                    <div className={`p-3.5 rounded-xl border border-transparent transition-all ${item.highlight ? 'bg-[#181818]/60 border-[#222]' : 'hover:bg-[#141414]'}`}>
                                        <span className="font-mono font-bold text-xs bg-amber-500/10 text-amber-400 px-2 py-0.5 rounded">{item.time}</span>
                                        <h3 className="text-base font-bold mt-2 uppercase text-white tracking-wide">{item.title}</h3>
                                        <p className="text-xs md:text-sm text-neutral-300 mt-0.5 leading-relaxed">{item.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const LearningView = ({ state, saveDailyNote, addLanguagePhrase }) => {
            const [pmInput, setPmInput] = useState('');
            const [engInput, setEngInput] = useState('');
            const [langPhrase, setLangPhrase] = useState('');
            const [langTranslit, setLangTranslit] = useState('');
            const [langTranslation, setLangTranslation] = useState('');

            return (
                <div className="space-y-5 transform transition-all animate-in fade-in zoom-in-95">
                    <h1 className="text-2xl font-bold text-white uppercase">Архив обучения</h1>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="BookOpen" className="text-amber-500" size={16}/> <span>Развитие бизнес-архитектуры</span></h2>
                            <textarea rows={3} placeholder="Фиксация инсайтов, систем управления, стратегий менторства Павла..." value={pmInput} onChange={e => setPmInput(e.target.value)} className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-white placeholder:text-neutral-700 focus:outline-none focus:border-amber-500/50 text-xs resize-none" />
                            <Button variant="secondary" className="w-full mt-2" onClick={() => { if(pmInput.trim()){ saveDailyNote(pmInput, 'PM'); setPmInput(''); }}}>Сохранить в буфер</Button>
                        </div>
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="Globe" className="text-amber-500" size={16}/> <span>English Speech Буфер</span></h2>
                            <textarea rows={3} placeholder="Речевые модули, сложные конструкции, тезисы масштабирования личного бренда..." value={engInput} onChange={e => setEngInput(e.target.value)} className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-white placeholder:text-neutral-700 focus:outline-none focus:border-amber-500/50 text-xs resize-none" />
                            <Button variant="secondary" className="w-full mt-2" onClick={() => { if(engInput.trim()){ saveDailyNote(engInput, 'ENG'); setEngInput(''); }}}>Фиксировать в системе</Button>
                        </div>
                        <div className={`${THEME.panel} lg:col-span-2`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="Utensils" className="text-amber-400" size={16}/> <span>Лингво-интеграция за завтраком (С кириллическим транслитом)</span></h2>
                            <div className="space-y-3">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                    <input type="text" placeholder="Иноязычная фраза / иероглиф" value={langPhrase} onChange={e => setLangPhrase(e.target.value)} className="bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-xs text-white focus:outline-none focus:border-amber-500/50 border-l-2 border-l-amber-500" />
                                    <input type="text" placeholder="Кириллическая транслитерация" value={langTranslit} onChange={e => setLangTranslit(e.target.value)} className="bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-xs text-white focus:outline-none focus:border-amber-500/50" />
                                    <input type="text" placeholder="Перевод смысловой структуры" value={langTranslation} onChange={e => setLangTranslation(e.target.value)} className="bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-xs text-white focus:outline-none focus:border-amber-500/50" />
                                </div>
                                <Button className="w-full" onClick={() => { if(langPhrase.trim() && langTranslit.trim() && langTranslation.trim()){ addLanguagePhrase(`${langPhrase} → [${langTranslit}] → ${langTranslation}`); setLangPhrase(''); setLangTranslit(''); setLangTranslation(''); }}}>Построить ассоциативную связь</Button>
                                {state.languagePhrases && state.languagePhrases.length > 0 && (
                                    <div className="mt-2 p-2 bg-[#0a0a0a] rounded-xl border border-[#222] space-y-1.5">
                                        {state.languagePhrases.map((phrase, idx) => (
                                            <div key={idx} className="text-xs font-mono text-amber-400 bg-[#141414] p-2 rounded.xl border border-[#262626]">
                                                {phrase}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const BodyView = ({ state, update, toggleTask }) => {
            const ev = state.settings.evidenceMode;
            return (
                <div className="space-y-5 transform transition-all animate-in fade-in zoom-in-95">
                    <h1 className="text-2xl font-bold text-white uppercase">Физический статус</h1>
                    <TipCard text="Физический статус тела — базовая манифестация личного бренда. Поддержание силовой выносливости и качественной гидратации обеспечивает высокую работоспособность префронтальной коры." iconName="Dumbbell" />
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="Activity" className="text-amber-400" size={16}/> <span>Физические лог-якоря</span></h2>
                            <div className="space-y-2">
                                <CheckItem id="body" anchor="Стимул" checked={state.dailyTasks.body} timeLog={state.taskTimestamps.body} onChange={() => toggleTask('body', 'body', 20)} label="Силовая сессия в клубе «Стимул»" subLabel="Фиксированный блок силовой нагрузки. Фоном идет образовательная книга." />
                                <CheckItem id="cardio" anchor="Дом" checked={state.dailyTasks.cardio} timeLog={state.taskTimestamps.cardio} onChange={() => toggleTask('cardio', 'body', 15)} label={ev ? "Аэробный лимфодренаж дома (20 мин)" : "Кардио дома (20-25 мин)"} subLabel={ev ? "Снижение уровня стресса и поддержка метаболизма" : "Сжигание дневного кортизола, стимуляция липолиза."} />
                            </div>
                        </div>
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="Battery" className="text-amber-500" size={16}/> <span>Биохакинг и оптимизация ЦНС</span></h2>
                            <div className="space-y-4">
                                <CheckItem id="supplements" anchor="Нутриенты" checked={state.dailyTasks.supplements} timeLog={state.taskTimestamps.supplements} onChange={() => toggleTask('supplements', 'body', 10)} label="Микронутриентная поддержка" subLabel="Омега-3 и D3 в утренний период, соединения магния в вечернее время." />
                                <CheckItem id="electrolytes" anchor="Гидратация" checked={state.dailyTasks.electrolytes} timeLog={state.taskTimestamps.electrolytes} onChange={() => toggleTask('electrolytes', 'body', 10)} label="Минерализация водно-солевого баланса" subLabel="Прием минеральной воды (Боржоми/Ессентуки) для компенсации потерь." />
                                <CheckItem id="cnsOpt" anchor="Оптимизация" checked={state.dailyTasks.cnsOpt} timeLog={state.taskTimestamps.cnsOpt} onChange={() => toggleTask('cnsOpt', 'spirit', 10)} label={ev ? "Блоки снижения когнитивного шума" : "Предотвращение выгорания ЦНС"} subLabel="Изолированные паузы отдыха от входящих цифровых потоков." />
                                <hr className="border-[#262626]" />
                                <NumericInput label="Продолжительность сна (целевая: 7.5ч)" min={0} max={15} step={0.5} value={state.energyMetrics.sleep} onChange={(v) => update('energyMetrics', {sleep: v})} />
                                <NumericInput label="Субъективный индекс готовности к нагрузкам" hint="1-10" min={1} max={10} value={state.energyMetrics.readiness} onChange={(v) => update('energyMetrics', {readiness: v})} />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ContentView = ({ state, update, saveDailyNote }) => {
            const [contentIdea, setContentIdea] = useState('');
            
            const insertScriptTemplate = (type) => {
                let template = "";
                if (type === 'dogma') {
                    template = "ХУК: Почему популярные психологические концепции могут ограничивать ваше развитие...\n\nСУТЬ: Разбор когнитивного шума сквозь призму стоической философии. Дисциплина и алгоритмизация как основа стабильности.\n\nПРИЗЫВ: Систематизируйте хаос. Переходите в структуру.";
                } else if (type === 'cns') {
                    template = "ХУК: Физиологические методы борьбы с утомлением и когнитивными перегрузками...\n\nСУТЬ: Роль гидратации, контрастных температурных стимулов и паттернов квадратного дыхания в снижении возбуждения коры.\n\nПРИЗЫВ: Тело — ваш главный инструмент. Подписывайтесь.";
                } else if (type === 'math') {
                    template = "ХУК: Математический анализ доступного временного ресурса...\n\nСУТЬ: Наглядная сетка Memento Mori. Осознание необратимости расхода недель. Конвертация времени в твердые результаты.\n\nПРИЗЫВ: Перестаньте откладывать, внедряйте жесткие личные алгоритмы.";
                }
                setContentIdea(template);
            };

            return (
                <div className="space-y-5 transform transition-all animate-in fade-in zoom-in-95">
                    <h1 className="text-2xl font-bold text-white uppercase">Производство смыслов</h1>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-2 uppercase"><IconBase iconName="Edit3" className="text-amber-500" size={16}/> <span>Инкубатор сценариев и Obsidian</span></h2>
                            <div className="flex flex-wrap gap-1.5 mb-3">
                                <button type="button" onClick={() => insertScriptTemplate('dogma')} className="text-[10px] font-bold uppercase tracking-wide bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2.5 py-1.5 rounded-lg hover:bg-amber-500/20">Скрипт: Разрушение догм</button>
                                <button type="button" onClick={() => insertScriptTemplate('cns')} className="text-[10px] font-bold uppercase tracking-wide bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2.5 py-1.5 rounded-lg hover:bg-amber-500/20">Скрипт: Биохакинг воли</button>
                                <button type="button" onClick={() => insertScriptTemplate('math')} className="text-[10px] font-bold uppercase tracking-wide bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2.5 py-1.5 rounded-lg hover:bg-amber-500/20">Скрипт: Математика времени</button>
                            </div>
                            <textarea rows={5} placeholder="Тексты роликов, идеи Reels, ключевые тезисы манифеста книги..." value={contentIdea} onChange={e => setContentIdea(e.target.value)} className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-white placeholder:text-neutral-700 focus:outline-none focus:border-amber-500/50 text-xs resize-none leading-relaxed" />
                            <Button className="w-full mt-2" onClick={() => { if(contentIdea.trim()){ saveDailyNote(contentIdea, 'CONTENT'); setContentIdea(''); }}}>Интегрировать идею в ядро</Button>
                        </div>
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="TrendingUp" className="text-amber-500" size={16}/> <span>Производственный цикл контента</span></h2>
                            <div className="space-y-1.5">
                                {['Концептуальный смысл зафиксирован', 'Сценарий декомпозирован в Obsidian', 'Материал захвачен на съемках', 'Пост-продакшн и цветокоррекция', 'Контент успешно опубликован в матрице'].map((step, i) => (
                                    <button type="button" key={i} className={`w-full p-3 rounded-lg border flex justify-between items-center transition-all min-h-[40px] ${state.contentLadder >= i ? 'bg-amber-500/10 border-amber-500/30 text-amber-400' : 'bg-[#0a0a0a] border-[#262626] text-neutral-400'}`} onClick={() => update('contentLadder', state.contentLadder === i ? i - 1 : i)}>
                                        <span className="text-xs font-bold uppercase tracking-wide">{i+1}. {step}</span>
                                        {state.contentLadder >= i && <IconBase iconName="Check" size={12} strokeWidth={3} />}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const RitualsView = ({ state, toggleTask, onCodeClick }) => {
            return (
                <div className="space-y-5 transform transition-all animate-in fade-in zoom-in-95">
                    <h1 className="text-2xl font-bold text-white uppercase">Психоэмоциональный настрой</h1>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div className={`${THEME.panel} border-t-2 border-t-amber-500`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-2 uppercase"><IconBase iconName="Flame" className="text-amber-400" size={16}/> <span>Утренний протокол калибровки</span></h2>
                            <BreathingTimer type="morning" state={state} onCompleteAction={() => toggleTask('breathAm', 'spirit', 15, true)} />
                            <ManifestReader type="AM" onCodeClick={onCodeClick} />
                        </div>
                        <div className={`${THEME.panel} border-t-2 border-t-amber-600`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-2 uppercase"><IconBase iconName="Moon" className="text-amber-500" size={16}/> <span>Вечерний протокол декомпрессии</span></h2>
                            <BreathingTimer type="evening" state={state} onCompleteAction={() => toggleTask('breathPm', 'spirit', 15, true)} />
                            <ManifestReader type="PM" onCodeClick={onCodeClick} />
                        </div>
                    </div>
                </div>
            );
        };

        // Новая вкладка комплексного анализа истории за последние 30 дней
        const HistoryView = ({ state }) => {
            const historyList = useMemo(() => {
                return Object.values(state.history || {}).sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 30);
            }, [state.history]);

            const historyStats = useMemo(() => {
                const items = Object.values(state.history || {});
                if (items.length === 0) return { avg7: 0, avg30: 0, best: '—', worst: '—' };
                
                const calcPercent = (day) => {
                    const t = Object.keys(day.dailyTasks || {}).length;
                    const c = Object.values(day.dailyTasks || {}).filter(Boolean).length;
                    return t > 0 ? Math.round((c / t) * 100) : 0;
                };

                const percents = items.map(calcPercent);
                const avg7 = percents.slice(0, 7).reduce((a, b) => a + b, 0) / Math.min(items.length, 7);
                const avg30 = percents.slice(0, 30).reduce((a, b) => a + b, 0) / Math.min(items.length, 30);
                
                let bestIdx = percents.indexOf(Math.max(...percents));
                let worstIdx = percents.indexOf(Math.min(...percents));

                return {
                    avg7: Math.round(avg7 || 0),
                    avg30: Math.round(avg30 || 0),
                    best: items[bestIdx] ? `${items[bestIdx].date} (${percents[bestIdx]}%)` : '—',
                    worst: items[worstIdx] ? `${items[worstIdx].date} (${percents[worstIdx]}%)` : '—'
                };
            }, [state.history]);

            return (
                <div className="space-y-5 transform transition-all animate-in fade-in zoom-in-95">
                    <h1 className="text-2xl font-bold text-white uppercase">Аналитика архивных циклов</h1>
                    
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 bg-[#121212] p-4 border border-[#262626] rounded-2xl shadow-md">
                        <div className="p-3 bg-[#0a0a0a] rounded-xl border border-[#1f1f1f]">
                            <span className="text-[10px] text-neutral-400 font-bold uppercase block tracking-wider">Среднее за 7 дней</span>
                            <span className="text-xl font-mono font-bold text-amber-400">{historyStats.avg7}%</span>
                        </div>
                        <div className="p-3 bg-[#0a0a0a] rounded-xl border border-[#1f1f1f]">
                            <span className="text-[10px] text-neutral-400 font-bold uppercase block tracking-wider">Среднее за 30 дней</span>
                            <span className="text-xl font-mono font-bold text-amber-500">{historyStats.avg30}%</span>
                        </div>
                        <div className="p-3 bg-[#0a0a0a] rounded-xl border border-[#1f1f1f]">
                            <span className="text-[10px] text-neutral-400 font-bold uppercase block tracking-wider">Пиковый триумф</span>
                            <span className="text-xs font-bold text-neutral-200 mt-1 block truncate">{historyStats.best}</span>
                        </div>
                        <div className="p-3 bg-[#0a0a0a] rounded-xl border border-[#1f1f1f]">
                            <span className="text-[10px] text-neutral-400 font-bold uppercase block tracking-wider">Минимальная точка</span>
                            <span className="text-xs font-bold text-red-400 mt-1 block truncate">{historyStats.worst}</span>
                        </div>
                    </div>

                    <div className={`${THEME.panel}`}>
                        <h3 className="text-sm font-bold text-white uppercase tracking-wider mb-4">Журнал последних логов</h3>
                        {historyList.length === 0 ? (
                            <p className="text-xs text-neutral-500 italic text-center py-6">Логи истории пока отсутствуют. Слепки структуры создаются автоматически в конце дня.</p>
                        ) : (
                            <div className="space-y-2.5 max-h-96 overflow-y-auto hide-scrollbar pr-1">
                                {historyList.map((day, idx) => {
                                    const total = Object.keys(day.dailyTasks || {}).length;
                                    const completed = Object.values(day.dailyTasks || {}).filter(Boolean).length;
                                    const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
                                    const coreCount = CORE_TASKS.filter(k => day.dailyTasks?.[k]).length;
                                    
                                    return (
                                        <div key={idx} className="p-3 bg-[#0a0a0a] border border-[#262626] rounded-xl flex flex-col sm:flex-row justify-between sm:items-center gap-3">
                                            <div>
                                                <span className="text-xs font-mono font-bold text-white">{day.date}</span>
                                                <div className="flex gap-2 items-center mt-1 flex-wrap">
                                                    <span className="text-[9px] font-bold bg-neutral-800 text-neutral-300 px-1.5 py-0.5 rounded uppercase">{day.currentMode || 'NORM'}</span>
                                                    <span className="text-[9px] font-bold text-orange-400">Якоря: {coreCount} / 5</span>
                                                </div>
                                            </div>
                                            <div className="sm:text-right w-full sm:w-auto">
                                                <span className="text-xs font-mono font-bold text-amber-400 block">{completed} / {total} задач ({pct}%)</span>
                                                <div className="w-full sm:w-28 h-1 bg-[#161616] rounded-full overflow-hidden mt-1 border border-[#262626]/20">
                                                    <div className="h-full bg-amber-500" style={{ width: `${pct}%` }}></div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ProgressView = ({ state, update }) => {
            const { xp, level, categories, returnRate } = state.stats;
            
            // Расчет прогресса до следующего уровня на базе квадратичной формулы
            const currentLevelXpBase = Math.pow(level - 1, 2) * 100;
            const nextLevelXpBase = Math.pow(level, 2) * 100;
            const xpInCurrentLevel = xp - currentLevelXpBase;
            const xpRequiredForNextLevel = nextLevelXpBase - currentLevelXpBase;
            const progressPercent = Math.min(100, Math.max(0, (xpInCurrentLevel / xpRequiredForNextLevel) * 100));

            const [selectedWeek, setSelectedWeek] = useState(null);

            const currentAgeWeeks = useMemo(() => {
                const birthDate = new Date(1997, 2, 14);
                const now = new Date();
                return Math.floor((now - birthDate) / (1000 * 60 * 60 * 24 * 7));
            }, []);

            const handleWeekClick = (index) => {
                const weekNum = index + 1;
                const isPassed = index < currentAgeWeeks;
                const diff = Math.abs(currentAgeWeeks - index);
                
                let text = "";
                if (index === currentAgeWeeks) {
                    text = "Текущая неделя. Ваша активность в эти 7 дней определяет траекторию развития личных систем.";
                } else if (isPassed) {
                    text = `${diff} нед. назад. Опыт зафиксирован и превращен в фундамент текущих компетенций.`;
                } else {
                    text = `Через ${diff} нед. Достижение целевых результатов формируется решениями, принимаемыми сегодня.`;
                }
                setSelectedWeek({ weekNum, text });
            };

            const RenderBar = ({ label, val, col }) => (
                <div className="bg-[#141414] p-3.5 rounded-xl border border-[#262626]">
                    <div className="flex justify-between text-[10px] mb-1 font-bold uppercase tracking-wide">
                        <span className="text-neutral-300">{label}</span>
                        <span className="text-neutral-200">{Math.floor(val)}%</span>
                    </div>
                    <div className="h-1 w-full bg-[#050505] rounded-full overflow-hidden">
                        <div className={`h-full ${col}`} style={{ width: `${val}%` }}></div>
                    </div>
                </div>
            );

            return (
                <div className="space-y-5 transform transition-all animate-in fade-in zoom-in-95">
                    <h1 className="text-2xl font-bold text-white uppercase">Индикаторы прогресса</h1>
                    <div className={`${THEME.panel}`}>
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                            <div className="flex items-center gap-3">
                                <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center shadow-md">
                                    <IconBase iconName="Trophy" className="text-neutral-950" size={20} />
                                </div>
                                <div>
                                    <h2 className="text-xl font-bold text-white tracking-tight">Уровень Павла: {level}</h2>
                                    <p className="text-amber-500 font-bold tracking-wider uppercase text-[10px]">Код развития личного бренда</p>
                                </div>
                            </div>
                            <div className="bg-[#050505] px-3 py-1.5 rounded-lg border border-[#262626] font-mono text-sm font-bold text-white">
                                {xp} <span className="text-xs text-amber-500">XP</span>
                            </div>
                        </div>

                        <div className="space-y-1 mb-5">
                            <div className="flex justify-between text-[10px] uppercase tracking-wider text-neutral-400">
                                <span>Прогресс до уровня {level + 1}</span>
                                <span className="text-amber-400 font-mono">{Math.round(xpInCurrentLevel)} / {xpRequiredForNextLevel} XP</span>
                            </div>
                            <div className="h-2 bg-[#050505] rounded-full p-0.5 border border-[#262626]/40">
                                <div className="h-full bg-gradient-to-r from-amber-600 to-amber-400 rounded-full" style={{ width: `${progressPercent}%` }}></div>
                            </div>
                        </div>

                        <h3 className="text-xs font-bold text-neutral-300 uppercase tracking-wider mb-2.5">Баланс функциональных идентичностей</h3>
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                            <RenderBar label="Атлетизм (Тело)" val={categories.body} col="bg-amber-500" />
                            <RenderBar label="Управление (PM)" val={categories.pm} col="bg-amber-600" />
                            <RenderBar label="Масштаб (English)" val={categories.english} col="bg-orange-500" />
                            <RenderBar label="Контент (Создатель)" val={categories.content} col="bg-yellow-500" />
                            <RenderBar label="Психика (Настрой)" val={categories.spirit} col="bg-amber-400" />
                            <RenderBar label="Стабильность (Return Rate)" val={returnRate} col="bg-neutral-400" />
                        </div>
                    </div>

                    <div className={`${THEME.panel}`}>
                        <div className="flex justify-between items-center mb-3">
                            <div>
                                <h3 className="text-sm font-bold text-white uppercase tracking-wider">Модуль распределения времени (Memento Mori)</h3>
                                <p className="text-xs text-neutral-400">Сетка прожитых и доступных недель жизни (из расчета 80 лет).</p>
                            </div>
                            <span className="text-xs font-mono font-bold text-red-400 bg-red-500/10 px-2.5 py-1 rounded">Осталось: {4160 - currentAgeWeeks} нед</span>
                        </div>

                        {selectedWeek && (
                            <div className="mb-3 p-3 bg-[#181818] border border-amber-500/20 rounded-xl flex justify-between items-start animate-in fade-in">
                                <div className="min-w-0">
                                    <h4 className="text-xs font-bold text-amber-400 uppercase">Метка недели №{selectedWeek.weekNum}</h4>
                                    <p className="text-xs text-neutral-200 mt-0.5 leading-relaxed">{selectedWeek.text}</p>
                                </div>
                                <button type="button" onClick={() => setSelectedWeek(null)} className="text-neutral-400 hover:text-white ml-2 p-1 bg-[#222] rounded"><IconBase iconName="X" size={12}/></button>
                            </div>
                        )}
                        
                        <div className="p-3 bg-[#070707] rounded-xl border border-[#222] overflow-x-auto hide-scrollbar touch-manipulation">
                            <div className="min-w-[760px] space-y-[2px]">
                                {Array.from({ length: 80 }).map((_, yearIdx) => (
                                    <div key={yearIdx} className="flex gap-[2px] items-center">
                                        <span className="w-5 text-[8px] font-mono font-bold text-neutral-600 text-right mr-1.5 select-none">{yearIdx}</span>
                                        {Array.from({ length: 52 }).map((_, weekInYearIdx) => {
                                            const globalIndex = yearIdx * 52 + weekInYearIdx;
                                            const isPassed = globalIndex < currentAgeWeeks;
                                            const isCurrent = globalIndex === currentAgeWeeks;
                                            return (
                                                <button 
                                                    type="button"
                                                    key={weekInYearIdx} 
                                                    onClick={() => handleWeekClick(globalIndex)}
                                                    aria-label={`Неделя жизни номер ${globalIndex + 1}`}
                                                    className={`flex-1 aspect-square rounded-[1px] transition-all duration-150 min-h-[9px] ${isCurrent ? 'bg-amber-400 scale-125 z-10 ring-1 ring-white' : isPassed ? 'bg-amber-500/15 border-[0.2px] border-amber-600/10 hover:bg-amber-500/30' : 'bg-[#141414] border-[0.2px] border-[#222] hover:bg-[#2a2a2a]'}`}
                                                />
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ToolsExportView = ({ state, setState, showToast, update }) => {
            const [sunoInput, setSunoInput] = useState('');

            const generateObsidianData = () => {
                const m = state.energyMetrics, logs = state.taskTimestamps;
                return `# Лог дня Павла Маркова: ${new Date().toLocaleDateString('ru-RU')}\n\n` +
                       `## Метрики состояния\n- Сон: ${m.sleep}ч\n- Энергия: ${m.energy}/10\n- Напряжение: ${m.stress}/10\n- Готовность к нагрузкам: ${m.readiness}/10\n\n` +
                       `## Прогресс книги «Anti-психология»\n- Глава: ${state.bookProgress.chapter}, Прописано страниц: ${state.bookProgress.totalPages}/77\n\n` +
                       `## Анализ по методологии стоицизма\n` +
                       `### Дневной триумф\n${state.notes.stoicTriump || 'Нет записей'}\n\n` +
                       `### Точки роста и уязвимости\n${state.notes.stoicGrowth || 'Нет записей'}\n\n` +
                       `## Лог выполненных якорей\n` +
                       `- [${logs.morningHygiene || '—'}] Санация и душ AM\n` +
                       `- [${logs.waterAm || '—'}] Гидратация Боржоми\n` +
                       `- [${logs.pm || '—'}] PM сессия управления\n` +
                       `- [${logs.body || '—'}] Силовая тренировка в клубе\n\n` +
                       `## Зафиксированные инсайты дня\n${state.notes.savedDaily.join('\n') || 'Нет записей'}`;
            };

            const runCopy = () => {
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        navigator.clipboard.writeText(generateObsidianData()).then(() => showToast("Лог скопирован по шаблону. ✨"));
                    } else {
                        showToast("Копирование недоступно. Скопируйте текст вручную.");
                    }
                } catch(e) { showToast("Сбой копирования."); }
            };

            const runDownloadMarkdown = () => {
                try {
