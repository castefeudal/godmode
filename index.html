                            <div className="space-y-3">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                    <input type="text" disabled={wBlock} placeholder="Иноязычное слово / иероглиф" value={langPhrase} onChange={e => setLangPhrase(e.target.value)} className="bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-sm text-white focus:outline-none focus:border-amber-500/50 border-l-2 border-l-amber-500 font-medium disabled:opacity-60" />
                                    <input type="text" disabled={wBlock} placeholder="Кириллическая транслитерация (для китайского)" value={langTranslit} onChange={e => setLangTranslit(e.target.value)} className="bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-sm text-white focus:outline-none focus:border-amber-500/50 font-medium disabled:opacity-60" />
                                    <input type="text" disabled={wBlock} placeholder="Смысловой перевод на русский" value={langTranslation} onChange={e => setLangTranslation(e.target.value)} className="bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-sm text-white focus:outline-none focus:border-amber-500/50 font-medium disabled:opacity-60" />
                                </div>
                                <Button className="w-full" onClick={() => { if(langPhrase.trim() && langTranslation.trim()){ const payload = langTranslit.trim() ? `${langPhrase} → [${langTranslit}] → ${langTranslation}` : `${langPhrase} → ${langTranslation}`; addLanguagePhrase(payload); setLangPhrase(''); setLangTranslit(''); setLangTranslation(''); }}}>Построить языковую связь</Button>
                                {state.languagePhrases && state.languagePhrases.length > 0 && (
                                    <div className="mt-2 p-2 bg-[#0a0a0a] rounded-xl border border-[#222] space-y-1.5">
                                        {state.languagePhrases.map((phrase, idx) => (
                                            <div key={idx} className="text-xs font-mono text-amber-400 bg-[#141414] p-2 rounded-xl border border-[#262626] break-all font-bold">
                                                {phrase}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const BodyView = ({ state, update, toggleTask }) => {
            const wBlock = !canWrite(state);
            return (
                <div className="space-y-5 transform transition-all anonymity-fade animate-in fade-in zoom-in-95">
                    <AccessBanner state={state} setState={update} />
                    <h1 className="text-2xl font-bold text-white uppercase">Физическая форма и ресурсы</h1>
                    <TipCard text="Ваша физическая форма — главный рабочий актив. Силовой тренинг в «Стимуле», адекватное кардио после работы и четкая гидратация формируют уровень вашей энергии." iconName="Dumbbell" />
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div className={`${THEME.panel} space-y-4`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-1 uppercase"><IconBase iconName="Activity" className="text-amber-400" size={16}/> <span>Движение и нагрузки</span></h2>
                            <CheckItem id="morningCharge" anchor="Утро" disabled={wBlock} checked={state.dailyTasks.morningCharge} timeLog={state.taskTimestamps.morningCharge} onChange={() => toggleTask('morningCharge', 'body', 5)} label="Разминка суставов" subLabel="2–5 минут легкого движения сразу после подъема." mode={state.currentMode} />
                            <CheckItem id="body" anchor="Работа" disabled={wBlock} checked={state.dailyTasks.body} timeLog={state.taskTimestamps.body} onChange={() => toggleTask('body', 'body', 20)} label="Силовая тренировка 1 час" subLabel="Основной тренировочный объем в фитнес-клубе." mode={state.currentMode} />
                            <CheckItem id="cardio" anchor="Вечер" disabled={wBlock} checked={state.dailyTasks.cardio} timeLog={state.taskTimestamps.cardio} onChange={() => toggleTask('cardio', 'body', 15)} label="Легкое кардио после работы" subLabel="20–30 минут спокойного движения для жиросжигания." mode={state.currentMode} />
                        </div>
                        <div className={`${THEME.panel} space-y-4`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-1 uppercase"><IconBase iconName="Battery" className="text-amber-500" size={16}/> <span>Сон и метрики восстановления</span></h2>
                            <NumericInput label="Фактическая продолжительность сна (ч)" readOnly={wBlock} min={0} max={12} step={0.5} value={state.energyMetrics.sleep} onChange={(v) => update('energyMetrics', {sleep: v})} />
                            <NumericInput label="Субъективный уровень утренней энергии" hint="1-10" readOnly={wBlock} min={1} max={10} value={state.energyMetrics.energy} onChange={(v) => update('energyMetrics', {energy: v})} />
                            <NumericInput label="Индекс готовности к силовым нагрузкам" hint="1-10" readOnly={wBlock} min={1} max={10} value={state.energyMetrics.readiness} onChange={(v) => update('energyMetrics', {readiness: v})} />
                        </div>
                    </div>
                    <CuttingPanel state={state} update={update} readOnly={wBlock} />
                </div>
            );
        };

        const ContentView = ({ state, update, saveDailyNote }) => {
            const [contentIdea, setContentIdea] = useState('');
            const wBlock = !canWrite(state);
            
            const insertScriptTemplate = (type) => {
                if (wBlock) return;
                let template = "";
                if (type === 'dogma') {
                    template = "ХУК: Почему слепая вера в популярные советы уводит вас от результатов...\n\nСУТЬ: Разбор иллюзий и замена их на дисциплину, жесткую структуру и ежедневное выполнение базовых алгоритмов.\n\nПРИЗЫВ: Хватит хаоса. Внедряйте понятную рабочую систему.";
                } else if (type === 'will') {
                    template = "ХУК: Истинная природа дисциплины, о которой молчат...\n\nСУТЬ: Роль правильного утреннего старта, гидратации, контроля сна и питания. Дисциплина — это не мучение, это архитектура привычек.\n\nПРИЗЫВ: Наведите порядок в базе, и фокус включится сам.";
                } else if (type === 'time') {
                    template = "ХУК: Жесткая математика доступного вам времени...\n\nСУТЬ: Наглядный разбор сетки Memento Mori. Осознание ограниченности недель жизни. Конвертация пустого залипания в твердые осязаемые плоды.\n\nПРИЗЫВ: Начните ценить свои часы. Действуйте сегодня.";
                }
                setContentIdea(template);
            };

            return (
                <div className="space-y-5 transform transition-all anonymity-fade animate-in fade-in zoom-in-95">
                    <AccessBanner state={state} setState={update} />
                    <h1 className="text-2xl font-bold text-white uppercase">Создание контента</h1>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-2 uppercase"><IconBase iconName="Edit3" className="text-amber-500" size={16}/> <span>Инкубатор сценариев (Reels / Блог)</span></h2>
                            <div className="flex flex-wrap gap-1.5 mb-3">
                                <button type="button" disabled={wBlock} onClick={() => insertScriptTemplate('dogma')} className="text-[10px] font-bold uppercase tracking-wide bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2.5 py-1.5 rounded-lg hover:bg-amber-500/20 disabled:opacity-40">Разрушение догм</button>
                                <button type="button" disabled={wBlock} onClick={() => insertScriptTemplate('will')} className="text-[10px] font-bold uppercase tracking-wide bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2.5 py-1.5 rounded-lg hover:bg-amber-500/20 disabled:opacity-40">Архитектура привычек</button>
                                <button type="button" disabled={wBlock} onClick={() => insertScriptTemplate('time')} className="text-[10px] font-bold uppercase tracking-wide bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2.5 py-1.5 rounded-lg hover:bg-amber-500/20 disabled:opacity-40">Математика времени</button>
                            </div>
                            <textarea rows={5} disabled={wBlock} placeholder="Тексты будущих роликов, идеи для Instagram/TikTok, тезисы глав..." value={contentIdea} onChange={e => setContentIdea(e.target.value)} className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-white placeholder:text-neutral-700 focus:outline-none focus:border-amber-500/50 text-sm resize-none leading-relaxed font-medium disabled:opacity-60" />
                            <Button className="w-full mt-2" onClick={() => { if(contentIdea.trim()){ saveDailyNote(contentIdea, 'CONTENT'); setContentIdea(''); }}}>Интегрировать идею контента</Button>
                        </div>
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="TrendingUp" className="text-amber-500" size={16}/> <span>Производственный цикл публикации</span></h2>
                            <div className="space-y-1.5">
                                {['Ключевой смысл зафиксирован в Obsidian', 'Сценарий детально прописан по структуре', 'Видеоматериал полностью отснят', 'Монтаж, звук и цветокоррекция завершены', 'Контент успешно опубликован на платформах'].map((step, i) => (
                                    <button type="button" key={i} disabled={wBlock} className={`w-full p-3 rounded-lg border flex justify-between items-center transition-all min-h-[44px] ${state.contentLadder >= i ? 'bg-amber-500/10 border-amber-500/30 text-amber-400' : 'bg-[#0a0a0a] border-[#262626] text-neutral-400'} disabled:opacity-80`} onClick={() => update('contentLadder', state.contentLadder === i ? i - 1 : i)}>
                                        <span className="text-sm font-bold uppercase tracking-wide">{i+1}. {step}</span>
                                        {state.contentLadder >= i && <IconBase iconName="Check" size={12} strokeWidth={3} />}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const RitualsView = ({ state, toggleTask, onCodeClick, update }) => {
            const wBlock = !canWrite(state);
            return (
                <div className="space-y-5 transform transition-all anonymity-fade animate-in fade-in zoom-in-95">
                    <AccessBanner state={state} setState={update} />
                    <h1 className="text-2xl font-bold text-white uppercase">Ритуалы и Манифесты</h1>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div className={`${THEME.panel} border-t-2 border-t-amber-500`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-2 uppercase"><IconBase iconName="Flame" className="text-amber-400" size={16}/> <span>Утренний настрой</span></h2>
                            <BreathingTimer type="morning" state={state} onCompleteAction={() => toggleTask('breathAm', 'spirit', 10, true)} disabled={wBlock} />
                            <ManifestReader type="AM" onCodeClick={onCodeClick} />
                        </div>
                        <div className={`${THEME.panel} border-t-2 border-t-amber-600`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-2 uppercase"><IconBase iconName="Moon" className="text-amber-500" size={16}/> <span>Вечерняя разгрузка</span></h2>
                            <BreathingTimer type="evening" state={state} onCompleteAction={() => toggleTask('breathPm', 'spirit', 10, true)} disabled={wBlock} />
                            <ManifestReader type="PM" onCodeClick={onCodeClick} />
                        </div>
                    </div>
                </div>
            );
        };

        const HistoryView = ({ state, update }) => {
            const [expandedDay, setExpandedDay] = useState(null);

            const safeTime = (date) => {
                if (!date) return 0;
                const time = new Date(date).getTime();
                return Number.isFinite(time) ? time : 0;
            };

            const sortedHistory = useMemo(() => {
                return Object.values(state.history || {})
                    .filter(Boolean)
                    .sort((a, b) => safeTime(b.archivedAt || b.date) - safeTime(a.archivedAt || a.date));
            }, [state.history]);

            const historyList30 = useMemo(() => sortedHistory.slice(0, 30), [sortedHistory]);

            return (
                <div className="space-y-5 transform transition-all anonymity-fade animate-in fade-in zoom-in-95">
                    <AccessBanner state={state} setState={update} />
                    <h1 className="text-2xl font-bold text-white uppercase">История выполненных дней</h1>
                    <div className={`${THEME.panel}`}>
                        <h3 className="text-sm font-bold text-white uppercase tracking-wider mb-4">Лог предыдущих периодов (До 30 дней)</h3>
                        {historyList30.length === 0 ? (
                            <p className="text-sm text-neutral-500 italic text-center py-6">Ваша история активности начнет заполняться со следующего календарного дня.</p>
                        ) : (
                            <div className="space-y-3 max-h-[500px] overflow-y-auto hide-scrollbar pr-1">
                                {historyList30.map((day, idx) => {
                                    const total = day.total || Object.keys(day.dailyTasks || {}).length;
                                    const completed = day.completed !== undefined ? day.completed : Object.values(day.dailyTasks || {}).filter(Boolean).length;
                                    const pct = day.completionPercent !== undefined ? day.completionPercent : (total > 0 ? Math.round((completed / total) * 100) : 0);
                                    
                                    const isExpanded = expandedDay === day.date;

                                    return (
                                        <div key={idx} className="p-4 bg-[#0a0a0a] border border-[#262626] rounded-xl flex flex-col space-y-3 transition-all">
                                            <div className="flex flex-col sm:flex-row justify-between sm:items-center gap-3">
                                                <div className="space-y-1">
                                                    <span className="text-sm font-mono font-bold text-white">{day.date}</span>
                                                    <div className="flex gap-2 items-center flex-wrap">
                                                        <span className="text-[10px] font-bold bg-neutral-800 text-neutral-300 px-1.5 py-0.5 rounded uppercase">{day.currentMode || 'NORM'}</span>
                                                        <span className="text-[10px] font-bold text-orange-400">Якоря: {day.coreCompleted || 0} / {day.coreTotal || 0}</span>
                                                        {day.cuttingTracker?.weightMorning && <span className="text-[10px] font-mono text-amber-400">Вес: {day.cuttingTracker.weightMorning} кг</span>}
                                                        {day.cuttingTracker?.calories && <span className="text-[10px] font-mono text-neutral-400">{day.cuttingTracker.calories} ккал</span>}
                                                    </div>
                                                </div>
                                                <div className="flex items-center justify-between sm:justify-end gap-4 w-full sm:w-auto">
                                                    <div className="sm:text-right">
                                                        <span className="text-sm font-mono font-bold text-amber-400 block">{completed} / {total} ({pct}%)</span>
                                                        <div className="w-28 h-1 bg-[#161616] rounded-full overflow-hidden mt-1 border border-[#262626]/20">
                                                            <div className="h-full bg-amber-500" style={{ width: `${pct}%` }}></div>
                                                        </div>
                                                    </div>
                                                    <button 
                                                        type="button"
                                                        onClick={() => setExpandedDay(isExpanded ? null : day.date)}
                                                        className="px-3 py-1.5 rounded-lg bg-[#1c1c1c] border border-[#333] hover:text-amber-400 text-xs font-bold uppercase transition-colors"
                                                    >
                                                        {isExpanded ? 'Скрыть' : 'Детали'}
                                                    </button>
                                                </div>
                                            </div>

                                            {isExpanded && (
                                                <div className="pt-3 border-t border-[#262626] text-xs space-y-2 text-neutral-300 font-medium animate-in fade-in">
                                                    {day.mainGoal?.title && (
                                                        <p><span className="text-amber-400 font-bold uppercase">Главная задача:</span> {day.mainGoal.title} — {day.mainGoal.description || 'Без описания'}</p>
                                                    )}
                                                    {day.energyMetrics && (
                                                        <p><span className="text-neutral-400 font-bold uppercase">Сон / Энергия / Готовность:</span> {day.energyMetrics.sleep || 0}ч // {day.energyMetrics.energy || 0}/10 // {day.energyMetrics.readiness || 0}/10</p>
                                                    )}
                                                    {day.taskTimestamps && Object.keys(day.taskTimestamps).length > 0 && (
                                                        <div>
                                                            <span className="text-neutral-400 font-bold uppercase block mb-1">Метки времени якорей:</span>
                                                            <div className="flex flex-wrap gap-2 font-mono text-[10px]">
                                                                {Object.entries(day.taskTimestamps).map(([tid, time]) => (
                                                                    <span key={tid} className="bg-[#141414] px-2 py-0.5 border border-[#222] rounded text-neutral-300">
                                                                        {TASK_LABELS[tid] || tid}: {time}
                                                                    </span>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ProgressView = ({ state, update }) => {
            const { xp, level, categories, returnRate } = state.stats;
            const [selectedWeek, setSelectedWeek] = useState(null);

            const currentLevelXpBase = Math.pow(level - 1, 2) * 100;
            const nextLevelXpBase = Math.pow(level, 2) * 100;
            const xpInCurrentLevel = xp - currentLevelXpBase;
            const xpRequiredForNextLevel = nextLevelXpBase - currentLevelXpBase;
            const progressPercent = xpRequiredForNextLevel > 0 ? Math.min(100, Math.max(0, (xpInCurrentLevel / xpRequiredForNextLevel) * 100)) : 0;

            const currentAgeWeeks = useMemo(() => {
                const birthDate = new Date(1997, 2, 14);
                const now = new Date();
                return Math.floor((now - birthDate) / (1000 * 60 * 60 * 24 * 7));
            }, []);

            const handleWeekClick = (index) => {
                const weekNum = index + 1;
                const isPassed = index < currentAgeWeeks;
                const diff = Math.abs(currentAgeWeeks - index);
                
                let text = "";
                if (index === currentAgeWeeks) {
                    text = "Текущая неделя вашей жизни. Ваша собранность сегодня определяет траекторию развития систем завтра.";
                } else if (isPassed) {
                    text = `${diff} нед. назад. Пройденный опыт усвоен и заложен в ваш фундаментальный пласт характера.`;
                } else {
                    text = `Через ${diff} нед. Достижение поставленных долгосрочных целей формируется решениями прямо сейчас.`;
                }
                setSelectedWeek({ weekNum, text });
            };

            const RenderBar = ({ label, val, col }) => (
                <div className="bg-[#141414] p-3.5 rounded-xl border border-[#262626]">
                    <div className="flex justify-between text-xs mb-1 font-bold uppercase tracking-wide">
                        <span className="text-neutral-300">{label}</span>
                        <span className="text-neutral-200">{Math.floor(val)}%</span>
                    </div>
                    <div className="h-1.5 w-full bg-[#050505] rounded-full overflow-hidden">
                        <div className={`h-full ${col}`} style={{ width: `${val}%` }}></div>
                    </div>
                </div>
            );

            return (
                <div className="space-y-5 transform transition-all anonymity-fade animate-in fade-in zoom-in-95">
                    <AccessBanner state={state} setState={update} />
                    <h1 className="text-2xl font-bold text-white uppercase">Индикаторы прогресса</h1>
                    <div className={`${THEME.panel}`}>
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                            <div className="flex items-center gap-3">
                                <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center shadow-md">
                                    <IconBase iconName="Trophy" className="text-neutral-950" size={20} />
                                </div>
                                <div>
                                    <h2 className="text-xl font-bold text-white tracking-tight">Уровень системы: {level}</h2>
                                    <p className="text-amber-500 font-bold tracking-wider uppercase text-[10px]">Код развития личного бренда Павла</p>
                                </div>
                            </div>
                            <div className="bg-[#050505] px-3 py-1.5 rounded-lg border border-[#262626] font-mono text-sm font-bold text-white">
                                {xp} <span className="text-xs text-amber-500">XP</span>
                            </div>
                        </div>

                        <div className="space-y-1 mb-5">
                            <div className="flex justify-between text-xs uppercase tracking-wider text-neutral-400">
                                <span>До уровня {level + 1}</span>
                                <span className="text-amber-400 font-mono">{Math.round(xpInCurrentLevel)} / {xpRequiredForNextLevel} XP</span>
                            </div>
                            <div className="h-2.5 bg-[#050505] rounded-full p-0.5 border border-[#262626]/40">
                                <div className="h-full bg-gradient-to-r from-amber-600 to-amber-400 rounded-full" style={{ width: `${progressPercent}%` }}></div>
                            </div>
                        </div>

                        <h3 className="text-xs font-bold text-neutral-300 uppercase tracking-wider mb-2.5">Баланс идентичностей</h3>
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                            <RenderBar label="Атлетизм (Тело)" val={categories.body} col="bg-amber-500" />
                            <RenderBar label="Управление (PM)" val={categories.pm} col="bg-amber-600" />
                            <RenderBar label="Масштаб (English)" val={categories.english} col="bg-orange-500" />
                            <RenderBar label="Контент (Создатель)" val={categories.content} col="bg-yellow-500" />
                            <RenderBar label="Психика (Настрой)" val={categories.spirit} col="bg-amber-400" />
                            <RenderBar label="Стабильность (Return Rate)" val={returnRate} col="bg-neutral-400" />
                        </div>
                    </div>

                    <div className={`${THEME.panel}`}>
                        <div className="flex justify-between items-center mb-3">
                            <div>
                                <h3 className="text-sm font-bold text-white uppercase tracking-wider">Модуль времени (Memento Mori)</h3>
                                <p className="text-xs text-neutral-400">Прожитые и доступные недели жизни (из расчета 80 лет жизни).</p>
                            </div>
                            <span className="text-xs font-mono font-bold text-red-400 bg-red-500/10 px-2.5 py-1 rounded">Осталось: {4160 - currentAgeWeeks} нед</span>
                        </div>

                        {selectedWeek && (
                            <div className="mb-3 p-3 bg-[#181818] border border-amber-500/20 rounded-xl flex justify-between items-start animate-in fade-in">
                                <div className="min-w-0">
                                    <h4 className="text-xs font-bold text-amber-400 uppercase">Метка недели №{selectedWeek.weekNum}</h4>
                                    <p className="text-sm text-neutral-200 mt-0.5 leading-relaxed font-medium">{selectedWeek.text}</p>
                                </div>
                                <button type="button" onClick={() => setSelectedWeek(null)} className="text-neutral-400 hover:text-white ml-2 p-1 bg-[#222] rounded flex items-center justify-center min-h-[24px] min-w-[24px]"><IconBase iconName="X" size={12}/></button>
                            </div>
                        )}
                        
                        <div className="p-3 bg-[#070707] rounded-xl border border-[#222] overflow-x-auto hide-scrollbar touch-manipulation">
                            <div className="min-w-[760px] space-y-[2px]">
                                {Array.from({ length: 80 }).map((_, yearIdx) => (
                                    <div key={yearIdx} className="flex gap-[2px] items-center">
                                        <span className="w-5 text-[8px] font-mono font-bold text-neutral-600 text-right mr-1.5 select-none">{yearIdx}</span>
                                        {Array.from({ length: 52 }).map((_, weekInYearIdx) => {
                                            const globalIndex = yearIdx * 52 + weekInYearIdx;
                                            const isPassed = globalIndex < currentAgeWeeks;
                                            const isCurrent = globalIndex === currentAgeWeeks;
                                            return (
                                                <button 
                                                    type="button"
                                                    key={weekInYearIdx} 
                                                    onClick={() => handleWeekClick(globalIndex)}
                                                    aria-label={`Неделя жизни номер ${globalIndex + 1}`}
                                                    className={`flex-1 aspect-square rounded-[1px] transition-all duration-150 min-h-[9px] ${isCurrent ? 'bg-amber-400 scale-125 z-10 ring-1 ring-white' : isPassed ? 'bg-amber-500/15 border-[0.2px] border-amber-600/10 hover:bg-amber-500/30' : 'bg-[#141414] border-[0.2px] border-[#222] hover:bg-[#2a2a2a]'}`}
                                                />
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ToolsExportView = ({ state, setState, showToast, update }) => {
            const [sunoInput, setSunoInput] = useState('');
            const [oldPin, setOldPin] = useState('');
            const [newPin, setNewPin] = useState('');
            const [newPinConfirm, setNewPinConfirm] = useState('');
            const [pinError, setPinError] = useState('');
            const wBlock = !canWrite(state);

            const generateObsidianData = () => {
                const m = state.energyMetrics, logs = state.taskTimestamps, cut = state.cuttingTracker;
                return `# Лог дня Markov OS: ${new Date().toLocaleDateString('ru-RU')}\n\n` +
                        `## Сегодня\n- День недели: ${formatDayName(new Date())}\n- Дата: ${formatFullDate(new Date())}\n- Режим дня: ${state.currentMode}\n- Задач выполнено: ${Object.values(state.dailyTasks).filter(Boolean).length} из ${Object.keys(state.dailyTasks).length}\n\n` +
                        `## Главная задача\n- Название: ${state.mainGoal.title}\n- Описание: ${state.mainGoal.description}\n- Выполнено: ${state.dailyTasks.mainTask ? 'Да' : 'Нет'}\n\n` +
                        `## Распорядок дня\n- 10:30 Проснулся → Вода\n- 11:00 Завтрак → Языковые спринты\n- 16:00 Старт рабочей смены в «Стимуле»\n- В процессе работы → Силовая сессия\n- 22:50 Дома → Жиросжигающее кардио\n- 01:00 Сон и выключение систем\n` +
                        `## Состояние восстановления\n- Сон: ${m.sleep}ч\n- Энергия: ${m.energy}/10\n- Индекс готовности: ${m.readiness}/10\n\n` +
                        `## Сушка сегодня\n- Вес: ${cut.weightMorning || '—'} кг\n- Калории: ${cut.calories || '—'} ккал\n- Белок: ${cut.protein || '—'} г\n- Вода: ${cut.water || '—'} л\n- Кардио: ${cut.cardioMinutes || '—'} мин\n\n` +
                        `## Тайминги ключевых якорей\n` +
                        `- [${logs.waterAm || '—'}] Вода после сна\n` +
                        `- [${logs.breakfast || '—'}] Сбалансированный завтрак\n` +
                        `- [${logs.mainTask || '—'}] Главная задача\n` +
                        `- [${logs.pm || '—'}] PM сессия\n` +
                        `- [${logs.body || '—'}] Силовая тренировка в «Стимуле»\n` +
                        `- [${logs.cardio || '—'}] Вечернее кардио\n` +
                        `- [${logs.sleep || '—'}] Сон\n\n` +
                        `## Зафиксированные инсайты обучения\n${state.notes.savedDaily.join('\n') || 'Нет записей для буфера.'}`;
            };

            const runCopy = () => {
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        navigator.clipboard.writeText(generateObsidianData()).then(() => showToast("Лог скопирован для Obsidian. ✨"));
                    } else {
                        showToast("Копирование ограничено. Скачайте файл .md.");
                    }
                } catch(e) { showToast("Сбой копирования."); }
            };

            const runDownloadMarkdown = () => {
                try {
                    const dataStr = "data:text/markdown;charset=utf-8," + encodeURIComponent(generateObsidianData());
                    const anchor = document.createElement('a');
                    anchor.setAttribute("href", dataStr);
                    anchor.setAttribute("download", `markov-os-log-${new Date().toISOString().split('T')[0]}.md`);
                    document.body.appendChild(anchor);
                    anchor.click();
                    anchor.remove();
                    showToast("Файл .md сгенерирован.");
                } catch(e) { showToast("Сбой скачивания Markdown."); }
            };

            const runBackupExport = () => {
                if (wBlock) { showToast("Доступно только владельцу."); return; }
                try {
                    const exportPackage = {
                        app: "Markov OS", exportedAt: new Date().toISOString(), schemaVersion: SCHEMA_VERSION, data: state
                    };
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportPackage));
                    const anchor = document.createElement('a');
                    anchor.setAttribute("href", dataStr);
                    anchor.setAttribute("download", `markov-os-backup-${new Date().toISOString().split('T')[0]}.json`);
                    document.body.appendChild(anchor);
                    anchor.click();
                    anchor.remove();
                    showToast("Архив экспортирован.");
                } catch(e) { showToast("Сбой экспорта."); }
            };

            const runBackupImport = (e) => {
                if (wBlock) { showToast("Доступно только владельцу."); return; }
                if (e.target.files.length === 0) return;
                const reader = new FileReader();
                reader.readAsText(e.target.files[0], "UTF-8");
                reader.onload = evt => {
                    try {
                        const parsed = JSON.parse(evt.target.result);
                        const sourceData = (parsed && parsed.app === "Markov OS" && parsed.data) ? parsed.data : parsed;

                        if (!sourceData || !sourceData.dailyTasks || !sourceData.stats) {
                            showToast("Файл не соответствует Markov OS.");
                            return;
                        }

                        const mergedState = migrateState(sourceData);
                        mergedState.access.mode = ACCESS_MODES.LOCKED;
                        setState(mergedState);
                        showToast("Бекап восстановлен. Требуется PIN.");
                    } catch (err) { showToast("Не удалось прочитать JSON."); }
                    e.target.value = '';
                };
            };

            const handleChangePin = async (e) => {
                e.preventDefault();
                if (wBlock) return;
                if (!oldPin || !newPin || !newPinConfirm) { setPinError('Заполните все поля.'); return; }
                if (newPin.length < 4) { setPinError('Новый PIN должен быть не менее 4 цифр.'); return; }
                if (newPin !== newPinConfirm) { setPinError('Новые PIN-коды не совпадают.'); return; }

                const oldHash = await hashText(oldPin);
                if (oldHash !== state.access.ownerPinHash) {
                    setPinError('Текущий PIN указан неверно.');
                    return;
                }

                const newHash = await hashText(newPin);
                update('access', { ownerPinHash: newHash });
                setOldPin('');
                setNewPin('');
                setNewPinConfirm('');
                setPinError('');
                showToast('PIN-код Суверена изменен.');
            };

            return (
                <div className="space-y-5 transform transition-all anonymity-fade animate-in fade-in zoom-in-95">
                    <AccessBanner state={state} setState={update} />
                    <h1 className="text-2xl font-bold text-white uppercase">Конфигурация Системы</h1>

                    <div className={`${THEME.panel} space-y-4`}>
                        <h2 className="text-base font-bold text-white flex items-center gap-2 mb-1 uppercase"><IconBase iconName="Target" className="text-amber-500" size={14}/> <span>Конструктор главной задачи</span></h2>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <div>
                                <label className="text-[11px] font-bold text-neutral-400 block mb-1 uppercase">Название задачи</label>
                                <input type="text" disabled={wBlock} value={state.mainGoal.title} onChange={e => update('mainGoal', { title: e.target.value })} className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-sm text-white font-bold focus:outline-none focus:border-amber-500/50 disabled:opacity-60" />
                            </div>
                            <div>
                                <label className="text-[11px] font-bold text-neutral-400 block mb-1 uppercase">Краткое описание / Смысл</label>
                                <input type="text" disabled={wBlock} value={state.mainGoal.description} onChange={e => update('mainGoal', { description: e.target.value })} className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-sm text-white font-bold focus:outline-none focus:border-amber-500/50 disabled:opacity-60" />
                            </div>
                        </div>
                        <div className="flex items-center justify-between p-3 bg-[#0a0a0a] border border-[#262626] rounded-xl flex-wrap gap-3">
                            <label className="flex items-center gap-2 text-xs font-bold uppercase text-neutral-300 cursor-pointer">
                                <input type="checkbox" disabled={wBlock} checked={state.mainGoal.active} onChange={e => update('mainGoal', { active: e.target.checked })} className="w-4 h-4 accent-amber-500 disabled:opacity-50" />
                                <span>Задача обязательна в расписании (11:45)</span>
                            </label>
                            <div className="w-full sm:w-48">
                                <NumericInput label="Лимит времени (мин)" readOnly={wBlock} min={15} max={60} step={5} value={state.mainGoal.timeLimitMinutes} onChange={v => update('mainGoal', { timeLimitMinutes: v })} />
                            </div>
                        </div>
                    </div>

                    <div className={`${THEME.panel} space-y-4`}>
                        <h2 className="text-base font-bold text-white flex items-center gap-2 mb-1 uppercase"><IconBase iconName="Shield" className="text-amber-500" size={14}/> <span>Контроль безопасности и сессии</span></h2>
                        {wBlock ? (
                            <p className="text-xs text-neutral-400 font-medium">Настройки административного доступа скрыты. Режим: Наблюдатель.</p>
                        ) : (
                            <div className="space-y-4">
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 text-xs text-neutral-300 font-medium">
                                    <div className="p-3 bg-[#0a0a0a] border border-[#262626] rounded-xl space-y-1">
                                        <span className="text-neutral-500 uppercase block font-bold text-[9px]">Статус сессии</span>
                                        <p>Права авторизации: <span className="text-amber-400 font-bold">Владелец</span></p>
                                        <p>Кликов заблокировано: <span className="text-mono text-neutral-400 font-bold">{state.access.guestClicks}</span></p>
                                    </div>
                                    <div className="w-full">
                                        <NumericInput label="Автоблокировка (минут)" readOnly={wBlock} min={5} max={240} step={5} value={state.settings.autoLockMinutes} onChange={v => update('settings', { autoLockMinutes: v })} />
                                    </div>
                                </div>
                                <form onSubmit={handleChangePin} className="p-4 bg-[#0a0a0a] border border-[#262626] rounded-xl space-y-3">
                                    <span className="text-xs font-bold text-neutral-400 uppercase tracking-wide block">Смена секретного PIN-кода</span>
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                                        <input type="password" inputMode="numeric" placeholder="Старый PIN" value={oldPin} onChange={e => setOldPin(e.target.value)} className="bg-[#121212] border border-[#262626] rounded-xl p-2.5 text-center text-sm font-mono text-white focus:outline-none focus:border-amber-500" />
                                        <input type="password" inputMode="numeric" placeholder="Новый PIN (мин. 4)" value={newPin} onChange={e => setNewPin(e.target.value)} className="bg-[#121212] border border-[#262626] rounded-xl p-2.5 text-center text-sm font-mono text-white focus:outline-none focus:border-amber-500" />
                                        <input type="password" inputMode="numeric" placeholder="Повтор нового" value={newPinConfirm} onChange={e => setNewPinConfirm(e.target.value)} className="bg-[#121212] border border-[#262626] rounded-xl p-2.5 text-center text-sm font-mono text-white focus:outline-none focus:border-amber-500" />
                                    </div>
                                    {pinError && <p className="text-xs font-bold text-red-400 uppercase tracking-wide">{pinError}</p>}
                                    <button type="submit" className="px-4 py-2 bg-[#1c1c1c] border border-[#333] text-amber-500 font-bold hover:bg-[#222] rounded-xl text-xs uppercase min-h-[38px]">Обновить PIN-код</button>
                                </form>
                            </div>
                        )}
                    </div>

                    <div className={`${THEME.panel} space-y-4`}>
                        <h2 className="text-base font-bold text-white flex items-center gap-2 mb-1 uppercase"><IconBase iconName="Settings" className="text-amber-500" size={14}/> <span>Интерфейс и пресеты</span></h2>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 text-xs font-bold uppercase text-neutral-300">
                            <label className="flex items-center justify-between p-3 bg-[#0a0a0a] border border-[#262626] rounded-xl min-h-[44px]">
                                <span>Рациональный вид подписей (Evidence)</span>
                                <input type="checkbox" disabled={wBlock} checked={state.settings.evidenceMode} onChange={e => update('settings', { evidenceMode: e.target.checked })} className="w-4 h-4 accent-amber-500" />
                            </label>
                            <label className="flex items-center justify-between p-3 bg-[#0a0a0a] border border-[#262626] rounded-xl min-h-[44px]">
                                <span>Компактный вид (Только базовые блоки)</span>
                                <input type="checkbox" disabled={wBlock} checked={state.settings.compactMode} onChange={e => update('settings', { compactMode: e.target.checked })} className="w-4 h-4 accent-amber-500" />
                            </label>
                            <label className="flex items-center justify-between p-3 bg-[#0a0a0a] border border-[#262626] rounded-xl min-h-[44px]">
                                <span>Звуковые эффекты кликов и таймера</span>
                                <input type="checkbox" disabled={wBlock} checked={state.settings.soundEnabled} onChange={e => update('settings', { soundEnabled: e.target.checked })} className="w-4 h-4 accent-amber-500" />
                            </label>
                            <label className="flex items-center justify-between p-3 bg-[#0a0a0a] border border-[#262626] rounded-xl min-h-[44px]">
                                <span>Тактильный отклик (Вибрация)</span>
                                <input type="checkbox" disabled={wBlock} checked={state.settings.hapticsEnabled} onChange={e => update('settings', { hapticsEnabled: e.target.checked })} className="w-4 h-4 accent-amber-500" />
                            </label>
                        </div>
                    </div>

                    <div className={`${THEME.panel} space-y-2`}>
                        <h2 className="text-base font-bold text-white flex items-center gap-2 uppercase"><IconBase iconName="Clock" className="text-amber-500" size={14}/> <span>Архитектура вашего графика дня</span></h2>
                        <div className="grid grid-cols-2 sm:grid-cols-5 gap-2 text-center text-xs font-mono font-bold text-neutral-300">
                            <div className="p-2.5 bg-[#0a0a0a] border border-[#222] rounded-xl"><span className="text-neutral-500 block text-[9px] uppercase font-sans mb-0.5">Подъем</span>10:30</div>
                            <div className="p-2.5 bg-[#0a0a0a] border border-[#222] rounded-xl"><span className="text-neutral-500 block text-[9px] uppercase font-sans mb-0.5">Старт работы</span>16:00</div>
                            <div className="p-2.5 bg-[#0a0a0a] border border-[#222] rounded-xl"><span className="text-neutral-500 block text-[9px] uppercase font-sans mb-0.5">Конец смены</span>22:40</div>
                            <div className="p-2.5 bg-[#0a0a0a] border border-[#222] rounded-xl"><span className="text-neutral-500 block text-[9px] uppercase font-sans mb-0.5">Кардио сессия</span>22:50</div>
                            <div className="p-2.5 bg-[#0a0a0a] border border-[#222] rounded-xl"><span className="text-neutral-500 block text-[9px] uppercase font-sans mb-0.5">Сон</span>01:00</div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-base font-bold text-white flex items-center gap-2 mb-2 uppercase"><IconBase iconName="Download" className="text-amber-500" size={14}/> <span>Синхронизация Obsidian</span></h2>
                            <p className="text-xs text-neutral-400 mb-3 font-medium">Экспорт текстового отчета текущих суток в вашу локальную базу знаний.</p>
                            <div className="flex gap-2">
                                <Button variant="primary" className="flex-1 text-xs" onClick={runCopy}>Копировать</Button>
                                <Button variant="secondary" className="flex-1 text-xs" onClick={runDownloadMarkdown}>Скачать .md</Button>
                            </div>
                        </div>
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-base font-bold text-white flex items-center gap-2 mb-2 uppercase"><IconBase iconName="Settings" className="text-amber-500" size={14}/> <span>Резервное хранилище</span></h2>
                            <p className="text-xs text-neutral-400 mb-3 font-medium">Экспорт или импорт всей истории дней, опыта и уровней в файл JSON.</p>
                            <div className="flex gap-2">
                                <Button variant="secondary" className="flex-1 text-xs" onClick={runBackupExport}>Экспорт бекапа</Button>
                                <label className="flex-1 flex items-center justify-center px-4 py-2 bg-[#1c1c1c] border border-[#333] text-amber-500 font-bold hover:bg-[#262626] cursor-pointer text-xs uppercase rounded-xl min-h-[44px] opacity-100">
                                    <span>Импорт</span>
                                    <input type="file" disabled={wBlock} accept=".json" onChange={runBackupImport} className="hidden" />
                                </label>
                            </div>
                        </div>
                    </div>

                    <div className={`${THEME.panel}`}>
                        <h2 className="text-base font-bold text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="Music" className="text-amber-400" size={14}/> <span>Творческий сейф идей SUNO</span></h2>
                        <div className="flex gap-2 mb-3">
                            <input type="text" disabled={wBlock} placeholder="Музыкальные концепты, идеи треков, текстовые наброски..." value={sunoInput} onChange={e => setSunoInput(e.target.value)} className="flex-1 bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-sm text-white focus:outline-none focus:border-amber-500/40 font-medium disabled:opacity-60" />
                            <Button onClick={() => { if(sunoInput.trim()){ setState(p => ({...p, sunoIdeas: [...p.sunoIdeas, sunoInput]})); setSunoInput(''); showToast("Концепт зафиксирован."); }}}>Зафиксировать</Button>
                        </div>
                        {state.sunoIdeas.length > 0 && (
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 p-2 bg-[#0a0a0a] rounded-xl border border-[#222]">
                                {state.sunoIdeas.map((idea, i) => (
                                    <div key={i} className="p-2.5 bg-[#141414] rounded-lg border border-[#262626] text-xs text-neutral-300 flex items-center gap-2 font-medium">
                                        <IconBase iconName="Music" className="text-amber-500" size={11} /> <span className="truncate">{idea}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                        <div className="pt-4 mt-2 border-t border-red-950/40 flex justify-end">
                            <button type="button" disabled={wBlock} onClick={() => {
                                const confirm = state.settings.confirmBeforeReset ? window.confirm("Вы действительно хотите обнулить Markov OS?") : true;
                                if(confirm) { localStorage.removeItem(STORAGE_KEY); window.location.reload(); }
                            }} className="text-red-400 font-bold uppercase text-[11px] hover:text-red-300 min-h-[32px] disabled:opacity-30">Сбросить всю базу данных</button>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const { state, setState, update, toggleTask, toast, showToast, globalFocusId, setGlobalFocusId } = useAppState();
            const [insightModalOpen, setInsightModalOpen] = useState(false);
            const [quickInsightText, setQuickInsightText] = useState('');
            const [numerologyModalOpen, setNumerologyModalOpen] = useState(false);

            const TABS = [
                { id: 'dashboard', icon: 'Home', label: 'Сегодня' },
                { id: 'schedule', icon: 'Clock', label: 'Распорядок' },
                { id: 'learning', icon: 'Brain', label: 'Заметки' },
                { id: 'body', icon: 'Dumbbell', label: 'Тело' },
                { id: 'content', icon: 'Smartphone', label: 'Контент' },
                { id: 'rituals', icon: 'Wind', label: 'Ритуалы' },
                { id: 'history', icon: 'History', label: 'Логи' },
                { id: 'progress', icon: 'Trophy', label: 'Прогресс' },
                { id: 'tools', icon: 'Settings', label: 'Система' }
            ];

            const computedCircadianPhase = useMemo(() => {
                if (state.circadianOverride) return state.circadianOverride;
                const hours = new Date().getHours();
                if (hours >= 6 && hours < 12) return 'УТРО AM';
                if (hours >= 12 && hours < 18) return 'ДЕНЬ DAY';
                return 'ВЕЧЕР PM';
            }, [state.circadianOverride]);

            const saveDailyNote = useCallback((text, source) => {
                if (!canWrite(state)) { showToast('Гостевой режим: запись отклонена.'); return; }
                const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                update('notes', { savedDaily: [...(state.notes.savedDaily || []), `[${time}] [${source}] ${text}`] });
                showToast("Инсайт добавлен в отчет дня.");
            }, [state.notes.savedDaily, update, showToast]);

            const addLanguagePhrase = useCallback((p) => {
                if (!canWrite(state)) { showToast('Гостевой режим: запись отклонена.'); return; }
                update('languagePhrases', [...(state.languagePhrases || []), p]);
                showToast("Связь зафиксирована.");
            }, [state.languagePhrases, update, showToast]);

            const handleAddQuickInsight = () => {
                if (!canWrite(state)) { showToast('Гостевой режим: изменения не сохраняются.'); setInsightModalOpen(false); return; }
                if (quickInsightText.trim()) {
                    saveDailyNote(quickInsightText, 'БЫСТРЫЙ-ИНСАЙТ');
                    setQuickInsightText('');
                    setInsightModalOpen(false);
                }
            };

            const toggleNumerology = () => {
                triggerHaptic(state.settings.hapticsEnabled, 15);
                setNumerologyModalOpen(!numerologyModalOpen);
            };

            const view = useMemo(() => {
                switch (state.currentTab) {
                    case 'dashboard': return <DashboardView state={state} update={update} toggleTask={toggleTask} setGlobalFocusId={setGlobalFocusId} globalFocusId={globalFocusId} onCodeClick={toggleNumerology} />;
                    case 'schedule': return <ScheduleView state={state} update={update} toggleTask={toggleTask} />;
                    case 'learning': return <LearningView state={state} saveDailyNote={saveDailyNote} addLanguagePhrase={addLanguagePhrase} update={update} />;
                    case 'body': return <BodyView state={state} update={update} toggleTask={toggleTask} />;
                    case 'content': return <ContentView state={state} update={update} saveDailyNote={saveDailyNote} />;
                    case 'rituals': return <RitualsView state={state} toggleTask={toggleTask} onCodeClick={toggleNumerology} update={update} />;
                    case 'history': return <HistoryView state={state} update={update} />;
                    case 'progress': return <ProgressView state={state} update={update} />;
                    case 'tools': return <ToolsExportView state={state} setState={setState} showToast={showToast} update={update} />;
                    default: return <DashboardView state={state} update={update} toggleTask={toggleTask} setGlobalFocusId={setGlobalFocusId} globalFocusId={globalFocusId} onCodeClick={toggleNumerology} />;
                }
            }, [state.currentTab, state, update, toggleTask, saveDailyNote, addLanguagePhrase, setState, showToast, globalFocusId, setGlobalFocusId, numerologyModalOpen]);

            const isCompact = state.settings.compactMode;

            if (state.access?.mode === ACCESS_MODES.LOCKED) {
                return <LockScreen state={state} setState={setState} showToast={showToast} />;
            }

            return (
                <div className="min-h-screen bg-[#0a0a0a] text-neutral-200 flex flex-col lg:flex-row overflow-x-hidden antialiased relative w-full">
                    <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] transition-all duration-300 ease-out pointer-events-none w-[90%] md:w-auto max-w-md ${toast.visible ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-4'}`}>
                        <div className="px-4 py-2.5 rounded-xl bg-[#161616] border border-amber-500/30 shadow-xl backdrop-blur-xl flex items-center gap-2 justify-center">
                            <IconBase iconName="Flame" className="text-amber-400" size={14} />
                            <span className="text-xs font-bold uppercase tracking-wide text-white">{toast.msg}</span>
                        </div>
                    </div>

                    <div className="fixed bottom-24 right-4 lg:bottom-6 lg:right-6 z-40">
                        <button type="button" aria-label="Добавить быструю заметку" onClick={() => setInsightModalOpen(true)} className="w-12 h-12 rounded-full bg-amber-500 text-neutral-950 flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-all min-h-[44px] min-w-[44px]">
                            <IconBase iconName="Edit3" size={18} />
                        </button>
                    </div>

                    {insightModalOpen && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-[110] animate-in fade-in">
                            <div className="bg-[#121212] border border-[#262626] rounded-2xl p-5 w-full max-w-md space-y-3">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-xs font-bold uppercase tracking-wide text-white">Быстрая фиксация инсайта</h3>
                                    <button type="button" onClick={() => setInsightModalOpen(false)} className="text-neutral-400 hover:text-white p-1.5 bg-[#1a1a1a] rounded-lg flex items-center justify-center min-h-[32px] min-w-[32px]"><IconBase iconName="X" size={14}/></button>
                                </div>
                                <textarea value={quickInsightText} onChange={e => setQuickInsightText(e.target.value)} placeholder="Запишите пришедшую мысль, концепт или стратегическое решение..." className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-sm text-white focus:outline-none focus:border-amber-500 font-medium leading-relaxed" rows={4} />
                                <Button className="w-full" onClick={handleAddQuickInsight}>Сохранить заметку</Button>
                            </div>
                        </div>
                    )}

                    {numerologyModalOpen && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-[110] animate-in fade-in">
                            <div className="bg-[#121212] border border-[#262626] rounded-2xl p-5 w-full max-w-md space-y-3">
                                <div className="flex justify-between items-center border-b border-[#262626] pb-2">
                                    <h3 className="text-xs font-bold uppercase tracking-wide text-amber-400 flex items-center gap-2">
                                        <IconBase iconName="Anchor" size={14} /> Системный Профиль
                                    </h3>
                                    <button type="button" onClick={() => setNumerologyModalOpen(false)} className="text-neutral-400 hover:text-white bg-[#1a1a1a] p-1.5 rounded-lg flex items-center justify-center min-h-[32px] min-w-[32px]"><IconBase iconName="X" size={12}/></button>
                                </div>
                                <div className="space-y-3 text-sm leading-relaxed text-neutral-300 font-medium">
                                    <p><span className="text-amber-400 font-bold block">14.03.1997 // Константа 7 (Стратег)</span> Системное проектирование, пренебрежение ментальным шумом, аналитический контур контроля.</p>
                                    <p><span className="text-amber-500 font-bold block">Знак: Рыбы (♓)</span> Развитая интуиция, чтение неявных мотивов, менторская деятельность.</p>
                                </div>
                                <Button className="w-full mt-2" onClick={() => setNumerologyModalOpen(false)}>Закрыть контур</Button>
                            </div>
                        </div>
                    )}

                    <aside className={`hidden lg:flex flex-col w-[270px] bg-[#0c0c0c] border-r border-[#262626]/40 p-5 h-screen sticky top-0 z-30 transition-all duration-300 ${state.deepFocusActive ? 'opacity-0 -translate-x-[270px] pointer-events-none' : 'opacity-100'}`}>
                        <div className="mb-4">
                            <h1 className="text-2xl font-black tracking-wider text-white uppercase">Markov<span className="text-amber-500">OS</span></h1>
                            <p className="text-[9px] text-neutral-400 font-bold tracking-widest uppercase flex items-center gap-1">Elite v15 Hyper <span className="w-1.5 h-1.5 bg-amber-500 rounded-full"></span></p>
                        </div>

                        <button type="button" onClick={toggleNumerology} className="w-full text-left mb-4 p-3 rounded-xl bg-[#141414] border border-[#262626] hover:border-amber-500/30 transition-all">
                            <span className="text-[8px] font-mono font-bold text-amber-400 uppercase block tracking-wider">Sovereign Profile</span>
                            <div className="text-[11px] font-mono text-neutral-300 font-bold mt-0.5">14.03.1997 // P:7 // S:5</div>
                        </button>

                        <div className="mb-4 p-2.5 rounded-xl bg-[#141414] border border-[#262626] flex items-center justify-between text-[10px] font-bold uppercase text-neutral-400">
                            <span>Контур времени:</span>
                            <span className="font-mono bg-neutral-800 text-amber-400 px-1.5 py-0.5 rounded font-black">{computedCircadianPhase}</span>
                        </div>

                        {!isCompact && (
                            <div className="p-4 rounded-xl bg-[#121212] border border-[#262626] mb-4">
                                <div className="flex justify-between items-start">
                                    <h4 className="text-xs font-bold uppercase text-neutral-200">Anti-психология</h4>
                                    <span className="font-mono text-xs font-bold text-amber-400">{Math.min(100, Math.floor(((state.bookProgress?.totalPages || 15) / 77) * 100))}%</span>
                                </div>
                                <div className="w-full h-1 bg-[#050505] rounded-full mt-2 overflow-hidden">
                                    <div className="h-full bg-amber-500 transition-all duration-300" style={{ width: `${Math.min(100, Math.floor(((state.bookProgress?.totalPages || 15) / 77) * 100))}%` }}></div>
                                </div>
                                <div className="flex justify-between items-center mt-3 pt-2 border-t border-[#222] text-xs text-neutral-400 font-bold">
                                    <span>{state.bookProgress?.totalPages || 15} / 77 стр</span>
                                    <div className="flex bg-[#0a0a0a] rounded-lg p-0.5 border border-[#222]">
                                        <button type="button" disabled={!canWrite(state)} onClick={() => update('bookProgress', { totalPages: Math.max(0, (state.bookProgress?.totalPages || 0) - 1) })} className="px-1.5 py-0.5 text-neutral-300 font-mono text-xs hover:text-white">-</button>
                                        <button type="button" disabled={!canWrite(state)} onClick={() => update('bookProgress', { totalPages: Math.min(77, (state.bookProgress?.totalPages || 0) + 1) })} className="px-1.5 py-0.5 text-amber-400 font-mono text-xs hover:text-white">+</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <nav className="flex-1 space-y-1 overflow-y-auto hide-scrollbar" aria-label="Основное меню навигации">
                            {TABS.map(tab => {
                                const active = state.currentTab === tab.id;
                                return (
                                    <button 
                                        type="button"
                                        key={tab.id} onClick={() => update('currentTab', tab.id)}
                                        aria-label={`Открыть раздел ${tab.label}`}
                                        aria-current={active ? 'page' : undefined}
                                        className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all font-bold text-xs uppercase tracking-wider min-h-[38px] ${active ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20 font-black' : 'text-neutral-400 hover:text-neutral-200'}`}
                                    >
                                        <IconBase iconName={tab.icon} size={14} />
                                        <span className="truncate">{tab.label}</span>
                                    </button>
                                )
                            })}
                        </nav>
                    </aside>

                    <main className="flex-1 p-4 md:p-6 lg:p-8 w-full min-h-screen relative z-10 pb-32 lg:pb-8 overflow-y-auto">
                        <div className="max-w-[1000px] mx-auto w-full">{view}</div>
                    </main>

                    <nav className={`lg:hidden fixed bottom-0 left-0 right-0 bg-[#0d0d0d]/95 backdrop-blur-xl border-t border-[#262626]/80 flex overflow-x-auto hide-scrollbar z-30 py-1.5 transition-all duration-300 ${state.deepFocusActive ? 'translate-y-24 opacity-0' : 'translate-y-0 opacity-100'}`} aria-label="Мобильное меню навигации">
                        {TABS.map(tab => {
                            const active = state.currentTab === tab.id;
                            return (
                                <button 
                                    type="button"
                                    key={tab.id} onClick={() => update('currentTab', tab.id)}
                                    aria-label={`Открыть раздел ${tab.label}`}
                                    aria-current={active ? 'page' : undefined}
                                    className={`flex-1 flex flex-col items-center justify-center min-w-[64px] min-h-[44px] py-0.5 gap-0.5 touch-manipulation ${active ? 'text-amber-400 font-black' : 'text-neutral-400'}`}
                                >
                                    <IconBase iconName={tab.icon} size={15} />
                                    <span className="text-[8px] font-bold uppercase tracking-wide whitespace-nowrap">{tab.label || tab.id}</span>
                                </button>
                            )
                        })}
                    </nav>
                </div>
            );
        }

        setTimeout(() => {
            const root = document.getElementById('root');
            if ((!window.React || !window.ReactDOM) && root) {
                root.innerHTML = `
                    <div style="background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:system-ui">
                        <div style="max-width:520px;text-align:center">
                            <h1 style="font-size:20px;margin-bottom:12px;font-weight:bold;color:#ef4444">ОШИБКА ЗАГРУЗКИ CDN</h1>
                            <p style="color:#a3a3a3;font-size:14px;">Не удалось загрузить скрипты сборщика React. Проверьте сетевое соединение.</p>
                        </div>
                    </div>
                `;
            }
        }, 4000);

        if (window.React && window.ReactDOM) {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(
                <ErrorBoundary>
                    <App />
                </ErrorBoundary>
            );
        }
    </script>
</body>
</html>
