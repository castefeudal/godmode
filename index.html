                    template = "ХУК (0-3 сек): Перегрузка ЦНС и выгорание? Вот алгоритм перезагрузки за 2 минуты, который использует топ-нутрициолог.\n\nДОКАЗАТЕЛЬНЫЙ МЕТОД: Биохакинг воли, баланс электролитов и каскадное дыхание 4-4-4-4 для стабилизации коры.\n\nПРИЗЫВ: Твое тело — манифестация бренда. Сохраняй этот алгоритм Павла Маркова.";
                } else if (type === 'math') {
                    template = "ХУК (0-3 сек): У тебя осталось ровно столько недель жизни... Хватит тратить время на пустые сомнения.\n\nАНАЛИЗ ВРЕМЕНИ (MEMENTO MORI): Посмотри на сетку матрицы. Каждая ячейка безвозвратно уходит. Судьба тащит того, кто не хочет.\n\nПРИЗЫВ: Перестань спать, пока другие действуют. Включай личные алгоритмы прямо сейчас.";
                }
                setContentIdea(template);
                triggerHaptic(15);
            };

            return (
                <div className="space-y-6 animate-in fade-in zoom-in-95 duration-500">
                    <h1 className="text-3xl font-black tracking-tighter text-white uppercase">Контент</h1>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-xl font-black text-white flex items-center gap-2 mb-2 uppercase"><IconBase iconName="Edit3" className="text-amber-500" size={20}/> <span>Архив смыслов Obsidian Павла</span></h2>
                            
                            {/* Кнопки Быстрых Скрипт-Шаблонов исключительно под Павла Маркова */}
                            <div className="flex flex-wrap gap-2 mb-3">
                                <button onClick={() => insertScriptTemplate('dogma')} className="text-[10px] font-black uppercase tracking-wider bg-amber-500/10 text-amber-400 border border-amber-500/30 px-2.5 py-1.5 rounded-lg hover:bg-amber-500/20">Шаблон: Разрушение догм</button>
                                <button onClick={() => insertScriptTemplate('cns')} className="text-[10px] font-black uppercase tracking-wider bg-yellow-500/10 text-yellow-400 border border-yellow-500/30 px-2.5 py-1.5 rounded-lg hover:bg-yellow-500/20">Шаблон: Биохакинг Воли</button>
                                <button onClick={() => insertScriptTemplate('math')} className="text-[10px] font-black uppercase tracking-wider bg-orange-500/10 text-orange-400 border border-orange-500/30 px-2.5 py-1.5 rounded-lg hover:bg-orange-500/20">Шаблон: Математика Суверена</button>
                            </div>

                            <textarea rows={6} placeholder="Промпты, скрипты коротких роликов Павла, тезисы книги «Anti-психология» без цензуры..." value={contentIdea} onChange={e => setContentIdea(e.target.value)} className="w-full bg-[#0f0f0f]/80 border border-[#262626]/60 rounded-xl p-3.5 text-slate-200 placeholder:text-slate-600 focus:outline-none focus:border-amber-500/60 text-xs resize-none font-medium leading-relaxed" />
                            <Button className="w-full mt-3" onClick={() => { if(contentIdea.trim()){ saveDailyNote(contentIdea, 'CONTENT'); setContentIdea(''); }}}>Залить идею в матрицу</Button>
                        </div>
                        
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-xl font-black text-white flex items-center gap-2 mb-4 uppercase"><IconBase iconName="TrendingUp" className="text-yellow-500" size={20}/> <span>Медиа-лестница личного бренда</span></h2>
                            <div className="space-y-2">
                                {['Концепт Павла зафиксирован в ядре', 'Скрипт развернут в Obsidian', 'Материал захвачен на съемке', 'Монтаж Павла и цветокоррекция', 'Контент опубликован в матрице'].map((step, i) => (
                                    <div key={i} className={`p-3.5 rounded-xl border cursor-pointer flex justify-between items-center transition-all premium-elevation ${state.contentLadder >= i ? 'bg-amber-500/10 border-amber-500/40 text-amber-400' : 'bg-[#0f0f0f]/40 border-[#262626]/40 text-slate-400'}`} onClick={() => update('contentLadder', state.contentLadder === i ? i - 1 : i)}>
                                        <span className="text-xs font-black uppercase tracking-wide">{i+1}. {step}</span>
                                        {state.contentLadder >= i && <IconBase iconName="Check" size={14} strokeWidth={3} />}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ЭКРАН 6: Стабилизированные Ритуалы
        const RitualsView = ({ state, toggleTask, onCodeClick }) => {
            return (
                <div className="space-y-6 animate-in fade-in zoom-in-95 duration-500">
                    <h1 className="text-3xl font-black tracking-tighter text-white uppercase">Ритуалы</h1>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                        <div className={`${THEME.panel} border-t-4 border-t-amber-500`}>
                            <h2 className="text-xl font-black text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="Flame" className="text-amber-400" size={20}/> <span>Утренний Алгоритм Павла</span></h2>
                            <BreathingTimer type="morning" onCompleteAction={() => toggleTask('breathAm', 'spirit', 15, true)} />
                            <ManifestReader type="AM" onCodeClick={onCodeClick} />
                        </div>
                        <div className={`${THEME.panel} border-t-4 border-t-yellow-600`}>
                            <h2 className="text-xl font-black text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="Moon" className="text-yellow-600" size={20}/> <span>Вечерний Алгоритм Павла</span></h2>
                            <BreathingTimer type="evening" onCompleteAction={() => toggleTask('breathPm', 'spirit', 15, true)} />
                            <ManifestReader type="PM" onCodeClick={onCodeClick} />
                        </div>
                    </div>
                </div>
            );
        };

        // ЭКРАН 7: Модуль Прогресса и Сетка Memento Mori
        const ProgressView = ({ state, update }) => {
            const { xp, level, categories, returnRate } = state.stats;
            const progressToNext = xp % 200;
            const progressPercent = (progressToNext / 200) * 100;
            const [selectedWeek, setSelectedWeek] = useState(null);

            const currentAgeWeeks = useMemo(() => {
                const birthDate = new Date(1997, 2, 14);
                const now = new Date();
                const diffMs = now - birthDate;
                return Math.floor(diffMs / (1000 * 60 * 60 * 24 * 7));
            }, []);

            const totalWeeks = 4160;

            const handleWeekClick = (index) => {
                triggerHaptic(10);
                const weekNum = index + 1;
                const isPassed = index < currentAgeWeeks;
                const diff = Math.abs(currentAgeWeeks - index);
                
                let text = "";
                if (index === currentAgeWeeks) {
                    text = "Павел, ты находишься в этой точке прямо сейчас. Высший уровень Рыб — идеальная интуиция и чтение мотивов. Направь всю волю Семерки (Стратега) в текущие 7 дней.";
                } else if (isPassed) {
                    text = `${diff} нед. назад осталось в истории. Каждая секунда сформировала твою сегодняшнюю мощь как ментора и эксперта. Прошлого не изменить.`;
                } else {
                    text = `Через ${diff} нед. наступит это будущее. Будет ли там планетарный триумф Павла Маркова — решается твоим действием сегодня.`;
                }

                setSelectedWeek({ weekNum, text });
            };

            const RenderBar = ({ label, val, col }) => (
                <div className="bg-[#0f0f0f]/40 p-4 rounded-2xl border border-[#262626]/60">
                    <div className="flex justify-between text-[10px] mb-1.5 font-black uppercase tracking-wider">
                        <span className="text-slate-300">{label}</span>
                        <span className="text-slate-200">{Math.floor(val)}%</span>
                    </div>
                    <div className="h-1.5 w-full bg-[#050505] rounded-full border border-[#262626]/40 overflow-hidden">
                        <div className={`h-full ${col}`} style={{ width: `${val}%` }}></div>
                    </div>
                </div>
            );

            return (
                <div className="space-y-6 animate-in fade-in zoom-in-95 duration-500">
                    <h1 className="text-3xl font-black tracking-tighter text-white uppercase">Прогресс</h1>
                    <div className={`${THEME.panel} bg-gradient-to-br from-[#121212]/90 to-[#0a0a0a]/90`}>
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                            <div className="flex items-center gap-4">
                                <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-yellow-400 to-amber-600 flex items-center justify-center shadow-lg">
                                    <IconBase iconName="Trophy" className="text-[#0a0a0a]" size={24} />
                                </div>
                                <div>
                                    <h2 className="text-2xl md:text-3xl font-black text-white tracking-tight">Уровень Павла: {level}</h2>
                                    <p className="text-amber-400 font-black tracking-widest uppercase text-[10px]">Каста Суверенов // Код Пути: 7 (Мудрец)</p>
                                </div>
                            </div>
                            <div className="bg-[#050505] px-4 py-2.5 rounded-xl border border-[#262626]/60 font-mono text-base font-black text-white">
                                {xp} <span className="text-xs text-amber-500">XP</span>
                            </div>
                        </div>

                        <div className="space-y-2 mb-6">
                            <div className="flex justify-between text-[10px] uppercase tracking-wider text-slate-300">
                                <span>До следующего уровня</span>
                                <span className="text-amber-400 font-mono">{progressToNext} / 200</span>
                            </div>
                            <div className="h-3 bg-[#050505] rounded-full border border-[#262626]/60 p-0.5">
                                <div className="h-full bg-gradient-to-r from-amber-600 to-yellow-500 rounded-full" style={{ width: `${progressPercent}%` }}></div>
                            </div>
                        </div>

                        <h3 className="text-xs font-black text-slate-300 uppercase tracking-widest mb-3">Баланс идентичностей Павла Маркова</h3>
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                            <RenderBar label="Атлет (Тело)" val={categories.body} col="bg-amber-500" />
                            <RenderBar label="Структура (PM)" val={categories.pm} col="bg-yellow-500" />
                            <RenderBar label="Мир (English)" val={categories.english} col="bg-orange-400" />
                            <RenderBar label="Создатель (Контент)" val={categories.content} col="bg-amber-300" />
                            <RenderBar label="Дух (Ритуалы)" val={categories.spirit} col="bg-yellow-600" />
                            <RenderBar label="Return Rate" val={returnRate} col="bg-gradient-to-r from-amber-400 to-yellow-500" />
                        </div>
                    </div>

                    {/* Модуль Memento Mori с адаптивной плавной горизонтальной прокруткой для глаз */}
                    <div className={`${THEME.panel}`}>
                        <div className="flex justify-between items-center mb-3">
                            <div>
                                <h3 className="text-sm font-black text-white uppercase tracking-wider">Модуль «Memento Mori Павла»</h3>
                                <p className="text-[11px] text-slate-400 mt-0.5">Каждая ячейка — 1 неделя жизни Павла. Каждая строка — 1 полный год (52 недели). Кликни для инсайта.</p>
                            </div>
                            <span className="text-xs font-mono font-black text-rose-400 bg-rose-500/10 px-2.5 py-1 rounded">Осталось: {totalWeeks - currentAgeWeeks} нед</span>
                        </div>

                        {selectedWeek && (
                            <div className="mb-4 p-4 bg-[#181818] border border-amber-500/30 rounded-2xl animate-in fade-in flex justify-between items-start">
                                <div>
                                    <h4 className="text-xs font-black text-amber-400 uppercase">Неделя Матрицы №{selectedWeek.weekNum}</h4>
                                    <p className="text-xs text-slate-200 mt-1">{selectedWeek.text}</p>
                                </div>
                                <button onClick={() => setSelectedWeek(null)} className="text-slate-400 hover:text-white ml-2"><IconBase iconName="X" size={14}/></button>
                            </div>
                        )}
                        
                        <div className="p-3 bg-[#070707] rounded-xl border border-[#222] overflow-x-auto hide-scrollbar">
                            <div className="min-w-[750px] space-y-[1.5px]">
                                {Array.from({ length: 80 }).map((_, yearIdx) => (
                                    <div key={yearIdx} className="flex gap-[1.5px] items-center">
                                        <span className="w-5 text-[8px] font-mono font-black text-slate-500 text-right mr-1 select-none">{yearIdx}</span>
                                        {Array.from({ length: 52 }).map((_, weekInYearIdx) => {
                                            const globalIndex = yearIdx * 52 + weekInYearIdx;
                                            const isPassed = globalIndex < currentAgeWeeks;
                                            const isCurrent = globalIndex === currentAgeWeeks;
                                            return (
                                                <div 
                                                    key={weekInYearIdx} 
                                                    onClick={() => handleWeekClick(globalIndex)}
                                                    className={`flex-1 aspect-square rounded-[0.5px] transition-all duration-300 cursor-pointer ${isCurrent ? 'bg-amber-400 scale-125 z-10 animate-pulse ring-1 ring-amber-300' : isPassed ? 'bg-amber-500/20 border-[0.2px] border-amber-600/30 hover:bg-amber-400/40' : 'bg-[#181818] border-[0.2px] border-[#292929] hover:bg-[#333]'}`}
                                                />
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="flex justify-between text-[10px] font-mono text-slate-400 mt-2.5 px-1">
                            <span>0 лет (Рождение)</span>
                            <span className="text-amber-500 font-bold">Текущий возраст Павла: {Math.floor(currentAgeWeeks/52)} лет // Знак: Рыбы ♓</span>
                            <span>80 лет (Финал)</span>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <NumericInput label="Текущий уровень энергии ЦНС Павла" min={1} max={10} value={state.energyMetrics.energy} onChange={(v) => update('energyMetrics', {energy: v})} />
                        <NumericInput label="Уровень психологического стресса" min={1} max={10} color="red" value={state.energyMetrics.stress} onChange={(v) => update('energyMetrics', {stress: v})} />
                    </div>
                </div>
            );
        };

        // ЭКРАН 8: Модуль Экспорта и Хранилища Данных
        const ToolsExportView = ({ state, setState, showToast, update }) => {
            const [sunoInput, setSunoInput] = useState('');

            const generateObsidianData = () => {
                const m = state.energyMetrics, logs = state.taskTimestamps;
                return `# Суверенный Лог Павла Маркова: ${new Date().toLocaleDateString('ru-RU')}\n\n` +
                       `## Метрики ЦНС Павла\n- Сон: ${m.sleep}ч\n- Энергия: ${m.energy}/10\n- Стресс: ${m.stress}/10\n- Готовность: ${m.readiness}/10\n\n` +
                       `## Вектор Книги «Anti-психология»\n- Глава: ${state.bookProgress.chapter}, Страницы: ${state.bookProgress.totalPages}/77\n\n` +
                       `## Стоический Анализ Дня\n` +
                       `### Дневной триумф Павла\n${state.notes.stoicTriump || 'Не заполнено'}\n\n` +
                       `### Точки роста Павла\n${state.notes.stoicGrowth || 'Не заполнено'}\n\n` +
                       `## Таймстампы Действий Павла\n` +
                       `- [${logs.waterAm || '—'}] Вода + Свет + Вентиляция\n` +
                       `- [${logs.morningCharge || '—'}] Микро-зарядка\n` +
                       `- [${logs.breathAm || '—'}] Box Breathing\n` +
                       `- [${logs.pm || '—'}] PM deep work\n` +
                       `- [${logs.body || '—'}] Силовая сессия в клубе\n\n` +
                       `## Зафиксированные смыслы дня Павла\n${state.notes.savedDaily.join('\n') || '- Нет записей'}`;
            };

            const runCopy = () => {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(generateObsidianData()).then(() => showToast("Лог скопирован по шаблону Стоицизма. ✨"));
                }
            };

            const runBackupExport = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
                const anchor = document.createElement('a');
                anchor.setAttribute("href", dataStr);
                anchor.setAttribute("download", `Markov_OS_v15_${new Date().toISOString().split('T')[0]}.json`);
                document.body.appendChild(anchor);
                anchor.click();
                anchor.remove();
                showToast("Архив ядра заархивирован в JSON. 🔐");
            };

            const runBackupImport = (e) => {
                if(e.target.files.length === 0) return;
                const reader = new FileReader();
                reader.readAsText(e.target.files[0], "UTF-8");
                reader.onload = evt => {
                    try {
                        const parsed = JSON.parse(evt.target.result);
                        if (parsed.stats && parsed.dailyTasks) {
                            setState(parsed);
                            showToast("Ядро Системы успешно восстановлено. ⚡");
                        }
                    } catch (err) { showToast("Ошибка парсинга структуры JSON."); }
                };
            };

            return (
                <div className="space-y-6 animate-in fade-in zoom-in-95 duration-500">
                    <h1 className="text-3xl font-black tracking-tighter text-white uppercase">Экспорт данных</h1>
                    
                    <div className={`${THEME.panel}`}>
                        <h2 className="text-xl font-black text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="Anchor" className="text-amber-400" size={20}/> <span>Анализ Павла по методологии Стоицизма</span></h2>
                        <div className="space-y-3">
                            <div>
                                <label className="text-xs font-black uppercase text-slate-300 block mb-1">## Дневной триумф Павла (Что сделано безупречно?)</label>
                                <textarea value={state.notes.stoicTriump || ''} onChange={e => update('notes', { stoicTriump: e.target.value })} placeholder="Запиши победы Павла над хаосом внешнего мира..." className="w-full bg-[#0f0f0f] border border-[#262626] rounded-xl p-3 text-xs focus:outline-none text-slate-200" rows={2} />
                            </div>
                            <div>
                                <label className="text-xs font-black uppercase text-slate-300 block mb-1">## Точки роста (Где разум уступил шуму?)</label>
                                <textarea value={state.notes.stoicGrowth || ''} onChange={e => update('notes', { stoicGrowth: e.target.value })} placeholder="Где была допущена микро-слабость или потеря фокуса воли..." className="w-full bg-[#0f0f0f] border border-[#262626] rounded-xl p-3 text-xs focus:outline-none text-slate-200" rows={2} />
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-xl font-black text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="Download" className="text-amber-500" size={20}/> <span>Obsidian Синхронизация Павла</span></h2>
                            <p className="text-xs text-slate-300 mb-4">Сборка автоматического структурированного markdown-файла твоего лога дня Павла Маркова.</p>
                            <Button variant="primary" className="w-full text-xs" onClick={runCopy}>Копировать готовый шаблон лога</Button>
                        </div>
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-xl font-black text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="Settings" className="text-orange-400" size={20}/> <span>Бекап Ядра Markov OS</span></h2>
                            <p className="text-xs text-slate-300 mb-4">Локальное сохранение уровней, прогресса книги Павла и логов в независимый зашифрованный слепок JSON.</p>
                            <div className="flex gap-2">
                                <Button variant="secondary" className="flex-1 text-xs" onClick={runBackupExport}>Скачать бекап</Button>
                                <label className="flex-1 flex items-center justify-center px-4 py-3 rounded-2xl bg-[#1a1a1a] border border-[#333]/60 text-amber-400 font-bold hover:bg-[#222] cursor-pointer text-xs uppercase transition-colors">
                                    <span>Загрузить</span>
                                    <input type="file" accept=".json" onChange={runBackupImport} className="hidden" />
                                </label>
                            </div>
                        </div>
                        <div className={`${THEME.panel} lg:col-span-2`}>
                            <h2 className="text-xl font-black text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="Music" className="text-amber-400" size={20}/> <span>Банк творческих идей SUNO</span></h2>
                            <div className="flex gap-3 mb-4">
                                <input type="text" placeholder="Концепт музыкального промпта, структуры трека Павла..." value={sunoInput} onChange={e => setSunoInput(e.target.value)} className="flex-1 bg-[#0f0f0f]/80 border border-[#262626]/60 rounded-xl p-3 text-xs text-slate-200 focus:outline-none" />
                                <Button onClick={() => { if(sunoInput.trim()){ setState(p => ({...p, sunoIdeas: [...p.sunoIdeas, sunoInput]})); setSunoInput(''); showToast("Идея добавлена в творческий инкубатор."); }}}>Сохранить</Button>
                            </div>
                            {state.sunoIdeas.length > 0 && (
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 p-3 bg-[#0a0a0a]/60 rounded-xl border border-[#222]">
                                    {state.sunoIdeas.map((idea, i) => (
                                        <div key={i} className="p-2.5 bg-[#141414] rounded-lg border border-[#262626] text-xs font-bold text-slate-200 flex items-center gap-2">
                                            <IconBase iconName="Music" className="text-amber-500" size={12} /> <span className="truncate">{idea}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Корневой модуль приложения Павла Маркова
        function App() {
            const { state, setState, update, toggleTask, toast, showToast, globalFocusId, setGlobalFocusId } = useAppState();
            const [insightModalOpen, setInsightModalOpen] = useState(false);
            const [quickInsightText, setQuickInsightText] = useState('');
            const [numerologyModalOpen, setNumerologyModalOpen] = useState(false);

            const TABS = [
                { id: 'dashboard', icon: 'Home', label: 'Сегодня' },
                { id: 'schedule', icon: 'Clock', label: 'Распорядок' },
                { id: 'learning', icon: 'Brain', label: 'Обучение' },
                { id: 'body', icon: 'Dumbbell', label: 'Тело' },
                { id: 'content', icon: 'Smartphone', label: 'Контент' },
                { id: 'rituals', icon: 'Wind', label: 'Ритуалы' },
                { id: 'progress', icon: 'Trophy', label: 'Прогресс' },
                { id: 'tools', icon: 'Settings', label: 'Экспорт' }
            ];

            const computedCircadianPhase = useMemo(() => {
                if (state.circadianOverride) return state.circadianOverride;
                const hours = new Date().getHours();
                if (hours >= 6 && hours < 12) return 'AM';
                if (hours >= 12 && hours < 18) return 'DAY';
                return 'PM';
            }, [state.circadianOverride]);

            useEffect(() => {
                const glows = {
                    AM: 'radial-gradient(circle at top, rgba(251,191,36,0.06) 0%, rgba(10,10,10,0) 70%)',
                    DAY: 'radial-gradient(circle at top, rgba(245,158,11,0.03) 0%, rgba(10,10,10,0) 55%)',
                    PM: 'radial-gradient(circle at top, rgba(38,38,38,0.3) 0%, rgba(10,10,10,0) 65%)'
                };
                const target = document.getElementById('ambient-glow-layer');
                if (target) target.style.backgroundImage = glows[computedCircadianPhase] || glows.DAY;
            }, [computedCircadianPhase]);

            const saveDailyNote = useCallback((text, source) => {
                const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                update('notes', { savedDaily: [...state.notes.savedDaily, `[${time}] [${source}] ${text}`] });
                showToast("Инсайт зафиксирован в ядре Павла. 📝");
            }, [state.notes.savedDaily, update, showToast]);

            const addLanguagePhrase = useCallback((p) => {
                update('languagePhrases', [...state.languagePhrases, p]);
                showToast("Нейронная связь лингво-спринта построена. 🧠");
            }, [state.languagePhrases, update, showToast]);

            const handleAddQuickInsight = () => {
                if (quickInsightText.trim()) {
                    saveDailyNote(quickInsightText, 'QUICK-INSIGHT');
                    setQuickInsightText('');
                    setInsightModalOpen(false);
                }
            };

            const toggleNumerology = () => {
                triggerHaptic(15);
                setNumerologyModalOpen(!numerologyModalOpen);
            };

            const view = useMemo(() => {
                switch (state.currentTab) {
                    case 'dashboard': return <DashboardView state={state} update={update} toggleTask={toggleTask} setGlobalFocusId={setGlobalFocusId} globalFocusId={globalFocusId} onCodeClick={toggleNumerology} />;
                    case 'schedule': return <ScheduleView state={state} />;
                    case 'learning': return <LearningView state={state} saveDailyNote={saveDailyNote} addLanguagePhrase={addLanguagePhrase} />;
                    case 'body': return <BodyView state={state} update={update} toggleTask={toggleTask} />;
                    case 'content': return <ContentView state={state} update={update} saveDailyNote={saveDailyNote} />;
                    case 'rituals': return <RitualsView state={state} toggleTask={toggleTask} onCodeClick={toggleNumerology} />;
                    case 'progress': return <ProgressView state={state} update={update} />;
                    case 'tools': return <ToolsExportView state={state} setState={setState} showToast={showToast} update={update} />;
                    default: return <DashboardView state={state} update={update} toggleTask={toggleTask} setGlobalFocusId={setGlobalFocusId} globalFocusId={globalFocusId} onCodeClick={toggleNumerology} />;
                }
            }, [state.currentTab, state, update, toggleTask, saveDailyNote, addLanguagePhrase, setState, showToast, globalFocusId, setGlobalFocusId]);

            return (
                <div className="min-h-screen bg-[#0a0a0a] text-slate-200 font-sans flex flex-col lg:flex-row overflow-x-hidden antialiased relative w-full">
                    <div id="ambient-glow-layer" className="fixed inset-0 pointer-events-none z-0 transition-all duration-1000 ease-in-out"></div>

                    {/* Всплывающие уведомления */}
                    <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] transition-all duration-300 ease-out pointer-events-none w-[90%] md:w-auto max-w-md ${toast.visible ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-6'}`}>
                        <div className="px-4 py-3 rounded-2xl bg-[#121212]/95 border border-amber-500/40 shadow-2xl backdrop-blur-xl flex items-center gap-2.5 justify-center">
                            <IconBase iconName="Flame" className="text-amber-400" size={16} />
                            <span className="text-xs font-black uppercase tracking-wider text-white">{toast.msg}</span>
                        </div>
                    </div>

                    {/* Глобальная кнопка быстрого инсайта Павла */}
                    <div className="fixed bottom-24 right-6 lg:bottom-6 lg:right-6 z-50">
                        <button onClick={() => setInsightModalOpen(true)} className="w-12 h-12 rounded-full bg-gradient-to-r from-amber-400 to-amber-600 text-black flex items-center justify-center shadow-2xl hover:scale-105 active:scale-95 transition-all">
                            <IconBase iconName="Edit3" size={20} />
                        </button>
                    </div>

                    {/* Модальное окно быстрого инсайта */}
                    {insightModalOpen && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-[110] animate-in fade-in">
                            <div className="bg-[#121212] border border-[#262626] rounded-3xl p-6 w-full max-w-md space-y-4">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-sm font-black uppercase tracking-wider text-white">Мгновенный Инсайт Павла</h3>
                                    <button onClick={() => setInsightModalOpen(false)} className="text-slate-400 hover:text-white"><IconBase iconName="X" size={16}/></button>
                                </div>
                                <textarea value={quickInsightText} onChange={e => setQuickInsightText(e.target.value)} placeholder="Зафиксируй мысль или менторский инсайт Павла прямо сейчас..." className="w-full bg-[#0a0a0a] border border-[#262626] rounded-2xl p-3.5 text-xs text-slate-200 focus:outline-none focus:border-amber-500" rows={4} />
                                <Button className="w-full" onClick={handleAddQuickInsight}>Сохранить в матрицу ядра</Button>
                            </div>
                        </div>
                    )}

                    {/* Модальное окно Нумерологии и Астро-кода Павла Маркова */}
                    {numerologyModalOpen && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-[120] animate-in fade-in">
                            <div className="bg-[#121212] border border-amber-500/40 rounded-[2rem] p-6 w-full max-w-lg space-y-4 relative overflow-hidden">
                                <div className="absolute right-[-20px] bottom-[-20px] opacity-5 pointer-events-none">
                                    <IconBase iconName="Anchor" size={150} />
                                </div>
                                <div className="flex justify-between items-center border-b border-[#262626]/60 pb-3">
                                    <h3 className="text-sm font-black uppercase tracking-widest text-amber-400 flex items-center gap-2">
                                        <IconBase iconName="Anchor" size={16} /> Сакральная Матрица Павла Маркова
                                    </h3>
                                    <button onClick={() => setNumerologyModalOpen(false)} className="text-slate-400 hover:text-white bg-[#1a1a1a] p-1.5 rounded-lg"><IconBase iconName="X" size={14}/></button>
                                </div>
                                <div className="space-y-3.5 font-medium leading-relaxed text-sm text-slate-200">
                                    <div>
                                        <span className="text-amber-400 font-mono font-black block text-xs uppercase tracking-wider">Число Пути // Судьбы: 7 (Мудрец / Стратег)</span>
                                        <p className="text-xs text-slate-300 mt-1">Твое оружие — жесткая структура, презрение к ментальному шуму и создание собственной «Касты». Ты видишь суть вещей за сухой математикой алгоритмов.</p>
                                    </div>
                                    <div>
                                        <span className="text-yellow-500 font-mono font-black block text-xs uppercase tracking-wider">Число Души: 5 (Лидер // Наставник)</span>
                                        <p className="text-xs text-slate-300 mt-1">14 число — кармический баланс структуры и трансформации хаоса в порядок. Вектор вечного масштабирования личного бренда Павла Маркова.</p>
                                    </div>
                                    <div>
                                        <span className="text-orange-400 font-mono font-black block text-xs uppercase tracking-wider">Архетип Высшего Знака: Рыбы (♓)</span>
                                        <p className="text-xs text-slate-300 mt-1">Абсолютная интуиция, глубинная психология и прямое чтение подсознания пространства. Вектор менторства и безупречного контроля.</p>
                                    </div>
                                </div>
                                <div className="bg-amber-500/5 border border-amber-500/20 rounded-xl p-3 text-center">
                                    <span className="text-[10px] font-mono font-black text-amber-400 uppercase tracking-widest">Активирован скрытый буст опыта на 5, 7 и 14 выполненное действие</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Меню Навигации Левое (Десктоп) */}
                    <aside className={`hidden lg:flex flex-col w-[290px] bg-[#121212]/50 backdrop-blur-2xl border-r border-[#262626]/50 p-6 h-screen sticky top-0 z-40 transition-all duration-500 ${state.deepFocusActive ? 'opacity-0 -translate-x-[290px] pointer-events-none' : 'opacity-100'}`}>
                        <div className="mb-4 select-none">
                            <h1 className="text-3xl font-black tracking-widest text-white uppercase">Markov<span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-amber-500">OS</span></h1>
                            <p className="text-[9px] text-slate-400 font-black tracking-widest mt-1 uppercase flex items-center gap-1.5">Elite v15 Hyper <span className="w-1.5 h-1.5 bg-amber-400 rounded-full animate-pulse"></span></p>
                        </div>

                        {/* Нумерологический виджет Павла Маркова */}
                        <div onClick={toggleNumerology} className="mb-4 p-3 rounded-2xl bg-gradient-to-br from-[#141414] to-[#0f0f0f] border border-amber-500/20 hover:border-amber-500/50 transition-all cursor-pointer group">
                            <div className="flex justify-between items-center mb-1">
                                <span className="text-[8px] font-mono font-black text-amber-400 uppercase tracking-wider">Sovereign Code // ♓</span>
                                <IconBase iconName="Anchor" size={10} className="text-amber-500 group-hover:rotate-12 transition-transform" />
                            </div>
                            <div className="text-[10px] font-mono text-slate-300 font-bold tracking-tight truncate">
                                14.03.1997 // P:7 // S:5
                            </div>
                        </div>

                        {/* Индикатор Циркадного Ритма */}
                        <div className="mb-4 p-3 rounded-2xl bg-[#0f0f0f] border border-[#222] flex items-center justify-between">
                            <span className="text-[10px] font-black uppercase tracking-wider text-slate-400">Циркадный статус:</span>
                            <div className="flex gap-1">
                                {['AM', 'DAY', 'PM'].map(p => (
                                    <button key={p} onClick={() => update('circadianOverride', p)} className={`px-2 py-1 rounded text-[9px] font-mono font-black ${computedCircadianPhase === p ? 'bg-amber-500 text-black' : 'text-slate-400'}`}>{p}</button>
                                ))}
                            </div>
                        </div>

                        <nav className="flex-1 space-y-1 overflow-y-auto hide-scrollbar">
                            {TABS.map(tab => {
                                const active = state.currentTab === tab.id;
                                return (
                                    <button 
                                        key={tab.id} onClick={() => update('currentTab', tab.id)}
                                        className={`w-full flex items-center gap-3.5 px-4 py-3 rounded-xl transition-all font-black text-xs uppercase tracking-widest ${active ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20' : 'text-slate-400 hover:text-slate-200'}`}
                                    >
                                        <IconBase iconName={tab.icon} size={16} />
                                        <span className="truncate">{tab.label}</span>
                                    </button>
                                )
                            })}
                        </nav>
                    </aside>

                    {/* Рабочая плоскость */}
                    <main className="flex-1 p-4 md:p-8 lg:p-10 w-full min-h-screen relative z-10 pb-24 lg:pb-10 overflow-hidden">
                        <div className="max-w-[1100px] mx-auto w-full">{view}</div>
                    </main>

                    {/* Навигационное меню Нижнее (Мобильные) */}
                    <nav className={`lg:hidden fixed bottom-0 left-0 right-0 bg-[#121212]/90 backdrop-blur-3xl border-t border-[#262626]/60 flex overflow-x-auto hide-scrollbar z-50 py-1 transition-all duration-500 ${state.deepFocusActive ? 'translate-y-24 opacity-0' : 'translate-y-0 opacity-100'}`}>
                        {TABS.map(tab => {
                            const active = state.currentTab === tab.id;
                            return (
                                <button 
                                    key={tab.id} onClick={() => update('currentTab', tab.id)}
                                    className={`flex-1 flex flex-col items-center justify-center min-w-[66px] py-1.5 gap-1 ${active ? 'text-amber-400' : 'text-slate-400'}`}
                                >
                                    <IconBase iconName={tab.icon} size={16} />
                                    <span className="text-[10px] font-black uppercase tracking-widest">{tab.label.substring(0, 5)}</span>
                                </button>
                            )
                        })}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
