<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARKOV OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-main: #0a0a0a;
            --bg-panel: rgba(18, 18, 18, 0.9);
            --border-panel: #262626;
            --accent: #fbbf24;
            --accent-glow: rgba(251, 191, 36, 0.3);
        }
        body {
            background-color: var(--bg-main);
            color: #e2e8f0;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        ::selection { background: rgba(251,191,36,0.3); color: white; }
        
        .glass-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-panel);
        }
        
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        .animate-shimmer { animation: shimmer 2.5s infinite; }
        
        /* Safe area for mobile bottoms */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .mobile-nav { padding-bottom: calc(0.5rem + env(safe-area-inset-bottom)); }
        }

        /* Smooth tab transitions */
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 400ms, transform 400ms; }
    </style>
</head>
<body class="flex flex-col lg:flex-row min-h-screen overflow-x-hidden selection:bg-amber-500/30 text-slate-200">

    <div id="toast-container" class="fixed top-4 md:top-8 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none w-[95%] md:w-auto max-w-lg"></div>

    <aside class="hidden lg:flex flex-col w-[280px] xl:w-[320px] glass-panel p-6 xl:p-8 h-screen sticky top-0 z-40 shadow-[15px_0_40px_rgba(0,0,0,0.8)]">
        <div class="mb-12 xl:mb-16 relative group cursor-default select-none">
            <div class="absolute -inset-4 bg-gradient-to-r from-amber-400 to-yellow-600 rounded-2xl blur-xl opacity-10 transition duration-1000"></div>
            <h1 class="relative text-4xl xl:text-5xl font-black tracking-widest text-white drop-shadow-md">MARKOV<br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-amber-500">OS</span></h1>
            <p class="relative text-[10px] xl:text-[11px] text-slate-400 font-black tracking-widest mt-3 xl:mt-4 flex items-center gap-2 uppercase">
                System Elite <span id="system-status-dot" class="w-2 h-2 xl:w-2.5 xl:h-2.5 rounded-full shadow-[0_0_12px_currentColor] bg-amber-400 text-amber-400 animate-pulse"></span>
            </p>
        </div>
        <nav id="desktop-nav" class="flex-1 space-y-2 xl:space-y-3 overflow-y-auto hide-scrollbar pr-2 pb-10"></nav>
    </aside>

    <main class="flex-1 p-4 sm:p-6 md:p-10 lg:p-12 xl:p-16 w-full max-w-full min-h-screen relative z-10 pb-28 md:pb-32 lg:pb-16 overflow-hidden">
        <div class="fixed top-0 left-1/2 -translate-x-1/2 w-full h-[800px] bg-amber-500 opacity-[0.015] blur-[150px] pointer-events-none -z-10"></div>
        <div id="app-content" class="max-w-[1200px] mx-auto w-full transition-all duration-500">
            <!-- Dynamic Content Renders Here -->
        </div>
    </main>

    <nav id="mobile-nav" class="lg:hidden fixed bottom-0 left-0 right-0 glass-panel border-t flex overflow-x-auto hide-scrollbar z-50 shadow-[0_-20px_50px_rgba(0,0,0,0.9)] px-1 pt-2 mobile-nav"></nav>

    <script>
        // --- 1. ROBUST DATABASE (IndexedDB) ---
        class MarkovDB {
            constructor() {
                this.dbName = 'MarkovOS_DB';
                this.dbVersion = 1;
                this.storeName = 'stateStore';
                this.db = null;
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.dbVersion);
                    request.onupgradeneeded = (e) => {
                        this.db = e.target.result;
                        if (!this.db.objectStoreNames.contains(this.storeName)) {
                            this.db.createObjectStore(this.storeName);
                        }
                    };
                    request.onsuccess = (e) => {
                        this.db = e.target.result;
                        resolve();
                    };
                    request.onerror = (e) => reject(e);
                });
            }

            async get(key) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(this.storeName, 'readonly');
                    const store = tx.objectStore(this.storeName);
                    const request = store.get(key);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async set(key, value) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(this.storeName, 'readwrite');
                    const store = tx.objectStore(this.storeName);
                    const request = store.put(value, key);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
        }

        // --- 2. CONFIGURATION & MANIFESTS ---
        const MODES = {
            max: { id: 'max', label: 'Максимум', pmTime: 90, engTime: 30 },
            norm: { id: 'norm', label: 'Норма', pmTime: 60, engTime: 25 },
            min: { id: 'min', label: 'Минимум', pmTime: 15, engTime: 10 },
            recovery: { id: 'recovery', label: 'Восстановление', pmTime: 0, engTime: 0 },
            saturday: { id: 'saturday', label: 'Суббота', pmTime: 0, engTime: 0 },
            sunday: { id: 'sunday', label: 'Воскресенье', pmTime: 0, engTime: 0 }
        };

        const MANIFESTS = {
            AM: {
                domination: {
                    title: "СВЕРХ-МАНИФЕСТ: ДОМИНАЦИЯ",
                    instruction: "Читай стоя, глубоким голосом. Твой вектор — экспансия.",
                    text: `Я, Павел Марков, пробуждаю свою истинную силу и заявляю права на свою реальность. Прямо сейчас я активирую ультимативный щит разума: любой ментальный шум и страх мгновенно аннигилируются.\n\nВселенная, синхронизируй мои вибрации с кодами безграничного богатства и триумфа. Я притягиваю сильных, верных, масштабных людей. Мою касту.\n\nМой фокус безупречен. Каждое действие сегодня материализует успех. Мой вектор неизменен.\n\nДа будет так. Сбылось.`
                },
                stoic: {
                    title: "ЩИТ СТОИКА: СОХРАНЕНИЕ",
                    instruction: "Читай спокойно. Твой вектор — внутренняя цитадель и баланс.",
                    text: `Сегодня я принимаю реальность такой, какая она есть. Я не могу контролировать всё, но я полностью контролирую свои реакции, свой фокус и свои действия.\n\nЯ отпускаю тревогу о том, что не в моей власти. Моя задача сегодня — не покорить мир, а сохранить целостность системы. Я действую без надрыва, методично и спокойно.\n\nМоя энергия — мой главный ресурс. Я расходую её только на то, что действительно важно. Я — скала в центре шторма.\n\nДа будет так. Сбылось.`
                }
            },
            PM: {
                domination: {
                    title: "ВЕЧЕРНИЙ СИНТЕЗ",
                    instruction: "Читай в постели. Замедляй темп.",
                    text: `Я полностью очищаю свое пространство от дневного шума. Любое внешнее влияние обесточено. Мой разум чист и неуязвим.\n\nЯ принимаю этот день как идеальную структуру опыта. Всё, что произошло, работает на меня.\n\nПока я сплю, мое подсознание программирует физический мир. Ко мне прокладывают дорогу грандиозный успех и нужные люди. Я засыпаю с абсолютным знанием своего величия.\n\nДа будет так. Сбылось.`
                },
                stoic: {
                    title: "ВЕЧЕРНИЙ СТОИК",
                    instruction: "Читай на выдохе. Отпусти контроль.",
                    text: `Я сделал то, что было в моих силах. Я снимаю с себя ответственность за этот мир до завтрашнего утра. \n\nВсё недоделанное останется недоделанным. Всё тревожное теряет силу в темноте. Моя оперативная память очищена.\n\nЯ разрешаю своему телу и разуму полное восстановление. Я погружаюсь в тишину без чувства вины.\n\nДа будет так. Сбылось.`
                }
            }
        };

        const INITIAL_STATE = {
            currentTab: 'dashboard',
            currentMode: 'norm',
            energyMetrics: { sleep: 7.5, energy: 7, stress: 3, readiness: 7 },
            dailyTasks: {
                waterAm: false, breathAm: false, prayerAm: false, morningCharge: false, hygieneAm: false, breakfast: false,
                pm: false, english: false, body: false, content: false,
                cardio: false, hygienePm: false, supplements: false, planTomorrow: false, breathPm: false, prayerPm: false
            },
            missedYesterday: false,
            notes: { savedDaily: [] },
            sunoIdeas: [],
            languagePhrases: [],
            stats: { 
                xp: 0, level: 1, returnRate: 100, daysLogged: 1,
                categories: { body: 15, pm: 15, english: 15, content: 15, spirit: 15 }
            },
            contentLadder: 0,
            lastLoginDate: new Date().toDateString(),
            manifestState: 'domination' // or 'stoic'
        };

        // --- 3. STATE MANAGEMENT ---
        const db = new MarkovDB();
        let state = {};

        async function initApp() {
            try {
                await db.init();
                const saved = await db.get('markovState');
                state = saved ? { ...INITIAL_STATE, ...saved } : INITIAL_STATE;
                checkNewDay();
                renderNavigationHTML();
                renderCurrentView();
            } catch (e) {
                console.error("DB Error, falling back to basic init", e);
                state = INITIAL_STATE;
                renderNavigationHTML();
                renderCurrentView();
            }
        }

        async function saveState() {
            try {
                await db.set('markovState', state);
            } catch(e) { console.error("Save error", e); }
        }

        function updateState(updater) {
            state = typeof updater === 'function' ? updater(state) : { ...state, ...updater };
            saveState();
            renderCurrentView();
        }

        function checkNewDay() {
            const today = new Date().toDateString();
            if (state.lastLoginDate !== today) {
                const missedCore = !state.dailyTasks.pm && !state.dailyTasks.body;
                let newRR = state.stats.returnRate;
                if (missedCore) newRR = Math.max(0, newRR - 5);
                else newRR = Math.min(100, newRR + 2);

                updateState(prev => ({
                    ...prev,
                    currentMode: 'norm',
                    missedYesterday: missedCore,
                    dailyTasks: INITIAL_STATE.dailyTasks, // Reset tasks
                    energyMetrics: { ...prev.energyMetrics, sleep: 0 },
                    languagePhrases: [],
                    contentLadder: 0,
                    lastLoginDate: today,
                    manifestState: 'domination',
                    stats: { ...prev.stats, daysLogged: prev.stats.daysLogged + 1, returnRate: newRR }
                }));
                showToast("Новый цикл. Система перезапущена. ⚡");
            }
        }

        // Burnout Shield Logic
        function isBurnout() {
            return state.energyMetrics.stress >= 7 || state.energyMetrics.sleep < 6 || state.energyMetrics.energy <= 4;
        }

        function getActiveTimeConfig() {
            const base = MODES[state.currentMode];
            // If burnout shield is active AND we are not already in minimum/recovery, cut times by 50%
            if (isBurnout() && !['min', 'recovery', 'saturday', 'sunday'].includes(state.currentMode)) {
                return {
                    ...base,
                    pmTime: Math.max(10, Math.floor(base.pmTime * 0.5)),
                    engTime: Math.max(5, Math.floor(base.engTime * 0.5))
                };
            }
            return base;
        }

        function toggleTask(taskId, category, xpReward) {
            const isDone = !state.dailyTasks[taskId];
            let newXp = state.stats.xp;
            let newCatVal = state.stats.categories[category] || 0;

            if (isDone) {
                newXp += xpReward;
                newCatVal = Math.min(100, newCatVal + (xpReward / 1.5));
                if(xpReward > 0) showToast(`+${xpReward} XP. Синхронизация. ✨`);
            } else {
                newXp = Math.max(0, newXp - xpReward);
                newCatVal = Math.max(0, newCatVal - (xpReward / 1.5));
            }

            const newLevel = Math.floor(newXp / 200) + 1;
            
            updateState(prev => ({
                ...prev,
                dailyTasks: { ...prev.dailyTasks, [taskId]: isDone },
                stats: { 
                    ...prev.stats, xp: newXp, level: newLevel, 
                    categories: { ...prev.stats.categories, [category]: newCatVal } 
                }
            }));
        }

        // --- 4. UTILS & UI COMPONENTS ---
        function showToast(msg, isAlert = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-4 md:px-6 py-4 md:py-5 rounded-2xl font-bold shadow-2xl flex items-center gap-3 md:gap-4 border-[1.5px] backdrop-blur-2xl transition-all duration-500 opacity-0 translate-y-[-20px] ${isAlert ? 'bg-rose-950/95 text-rose-100 border-rose-500/50 shadow-[0_15px_50px_rgba(251,113,133,0.3)]' : 'bg-[#121212]/95 text-white border-amber-500/50 shadow-[0_15px_50px_rgba(251,191,36,0.25)]'}`;
            
            const iconName = isAlert ? 'shield-alert' : 'sparkles';
            const iconColor = isAlert ? 'text-rose-400' : 'text-amber-400';
            
            toast.innerHTML = `
                <i data-lucide="${iconName}" class="${iconColor} flex-shrink-0 w-6 h-6 md:w-7 md:h-7"></i>
                <span class="text-sm md:text-lg leading-tight break-words">${msg}</span>
            `;
            container.appendChild(toast);
            lucide.createIcons({ root: toast });

            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('opacity-0', 'translate-y-[-20px]');
                toast.classList.add('opacity-100', 'translate-y-0');
            });

            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-[-20px]');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function ButtonHTML(text, variant = 'primary', icon = null, onClickStr = '') {
            const variants = {
                primary: `bg-gradient-to-r from-amber-400 to-yellow-600 text-[#0a0a0a] font-black shadow-[0_0_20px_rgba(251,191,36,0.15)] hover:brightness-110 border border-amber-300/40`,
                secondary: `bg-[#1a1a1a] text-amber-50 hover:bg-[#222222] border border-[#333333] hover:border-amber-500/40 hover:shadow-[0_0_15px_rgba(251,191,36,0.1)]`,
                ghost: `text-slate-400 hover:text-amber-400 hover:bg-[#1a1a1a]`,
                danger: `bg-rose-950/30 text-rose-400 border border-rose-900/40 hover:bg-rose-900/50 hover:text-rose-200`
            };
            const iconHtml = icon ? `<i data-lucide="${icon}" class="w-5 h-5 ${variant === 'primary' ? 'text-[#0a0a0a]' : ''}"></i>` : '';
            return `<button onclick="${onClickStr}" class="flex items-center justify-center gap-2 md:gap-3 px-4 md:px-6 py-3.5 md:py-4 rounded-2xl transition-all duration-300 active:scale-[0.98] w-full sm:w-auto ${variants[variant]}">
                        ${iconHtml} <span class="truncate">${text}</span>
                    </button>`;
        }

        function CheckItemHTML(taskId, category, xp, label, subLabel, anchor = '') {
            const checked = state.dailyTasks[taskId];
            const bgClass = checked ? 'bg-amber-500/5 border-amber-500/30 shadow-[0_0_25px_rgba(251,191,36,0.08)]' : 'bg-[#0f0f0f] border-[#262626] hover:border-[#3a3a3a] hover:bg-[#1a1a1a]';
            const textClass = checked ? 'text-slate-500 line-through decoration-amber-500/50' : 'text-slate-200';
            const iconClass = checked ? 'bg-gradient-to-br from-yellow-400 to-amber-600 border-transparent text-[#0a0a0a] shadow-[0_0_20px_rgba(251,191,36,0.5)] scale-110' : 'border-slate-600 group-hover:border-amber-500/50';
            
            return `
            <div class="flex items-start gap-3 md:gap-4 p-4 md:p-5 rounded-2xl transition-all duration-300 cursor-pointer group border min-h-[76px] relative overflow-hidden ${bgClass}" 
                 onclick="toggleTask('${taskId}', '${category}', ${xp})">
                ${checked ? '<div class="absolute inset-0 bg-gradient-to-r from-amber-500/0 via-amber-500/5 to-amber-500/0 animate-shimmer pointer-events-none"></div>' : ''}
                <div class="mt-0.5 w-7 h-7 md:w-8 md:h-8 rounded-full flex items-center justify-center border-[2.5px] transition-all duration-500 flex-shrink-0 relative z-10 ${iconClass}">
                    ${checked ? '<i data-lucide="check" class="w-4 h-4" stroke-width="4"></i>' : ''}
                </div>
                <div class="flex flex-col flex-1 justify-center relative z-10 min-w-0">
                    ${anchor ? `<span class="text-amber-500 font-black text-[9px] md:text-[10px] uppercase tracking-widest mb-1 flex items-center gap-1 truncate"><i data-lucide="anchor" class="w-3 h-3 flex-shrink-0"></i> [Якорь: ${anchor}]</span>` : ''}
                    <span class="font-bold transition-colors duration-300 text-base md:text-lg leading-tight break-words pr-2 ${textClass}">${label}</span>
                    ${subLabel ? `<span class="text-xs md:text-sm mt-1.5 transition-colors font-medium leading-snug break-words pr-2 ${checked ? 'text-slate-600' : 'text-slate-400'}">${subLabel}</span>` : ''}
                </div>
                ${!checked && xp > 0 ? `<span class="text-[10px] md:text-[11px] font-mono font-bold text-amber-400 bg-amber-400/10 border border-amber-400/20 px-2 md:px-3 py-1 md:py-1.5 rounded-full flex-shrink-0 mt-1 relative z-10 hidden sm:flex">+${xp} XP</span>` : ''}
            </div>`;
        }

        const activeTimers = {}; // Store global references to manage intervals

        function renderFocusTimer(id, defaultMins, taskName) {
            return `
            <div id="ft-${id}-closed" class="flex flex-wrap gap-2 md:gap-3 mt-4">
                <button onclick="startTimerUI('${id}', ${defaultMins}, false)" class="text-[11px] md:text-xs flex items-center gap-1.5 md:gap-2 font-bold text-slate-300 bg-[#1a1a1a] border border-[#333333] px-3 md:px-4 py-2.5 md:py-3 rounded-xl hover:bg-[#222222] hover:text-amber-400 transition-all">
                    <i data-lucide="timer" class="w-4 h-4 text-amber-500"></i> Фокус ${defaultMins} мин
                </button>
                ${defaultMins > 15 ? `
                <button onclick="startTimerUI('${id}', 2, true)" class="text-[11px] md:text-xs flex items-center gap-1.5 md:gap-2 font-bold text-amber-400 bg-amber-500/10 border border-amber-500/30 px-3 md:px-4 py-2.5 md:py-3 rounded-xl hover:bg-amber-500/20 shadow-[0_0_10px_rgba(251,191,36,0.1)] transition-all">
                    <i data-lucide="zap" class="w-4 h-4"></i> Микро-старт (2 мин)
                </button>` : ''}
            </div>
            <div id="ft-${id}-open" class="hidden mt-4 md:mt-5 p-5 md:p-8 bg-[#0f0f0f] border border-[#262626] rounded-2xl md:rounded-3xl flex flex-col items-center relative overflow-hidden">
                <div class="flex justify-between w-full mb-6 md:mb-8 items-center relative z-10">
                    <span class="text-slate-300 font-black text-xs md:text-sm flex items-center gap-2 uppercase tracking-wider truncate">
                        <i data-lucide="target" class="w-[18px] h-[18px] text-amber-500 flex-shrink-0"></i> <span id="ft-${id}-title" class="truncate">${taskName}</span>
                    </span>
                    <button onclick="closeTimerUI('${id}')" class="text-slate-500 hover:text-white p-2 bg-[#1a1a1a] rounded-xl transition-colors flex-shrink-0"><i data-lucide="x" class="w-[18px] h-[18px]"></i></button>
                </div>
                <div class="relative w-40 h-40 md:w-48 md:h-48 flex items-center justify-center mb-8 md:mb-10">
                    <svg class="w-full h-full -rotate-90 absolute drop-shadow-md" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#262626" stroke-width="6"></circle>
                        <circle id="ft-${id}-circle" cx="50" cy="50" r="45" fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="0" class="transition-all duration-1000 ease-linear drop-shadow-[0_0_15px_rgba(251,191,36,0.5)]"></circle>
                    </svg>
                    <div id="ft-${id}-display" class="text-4xl md:text-5xl font-mono font-black text-white relative z-10 drop-shadow-[0_0_15px_rgba(251,191,36,0.4)] tracking-tighter">00:00</div>
                </div>
                <div class="flex gap-3 md:gap-4 w-full max-w-[300px] relative z-10">
                    <button id="ft-${id}-btn" onclick="toggleTimer('${id}')" class="flex-1 py-3 md:py-4 rounded-xl font-black text-base md:text-lg flex justify-center items-center gap-2 md:gap-3 transition-all bg-gradient-to-r from-amber-400 to-yellow-600 text-[#0a0a0a] shadow-[0_0_20px_rgba(251,191,36,0.3)] hover:brightness-110">
                        <i data-lucide="play" class="w-5 h-5"></i> Фокус
                    </button>
                    <button onclick="resetTimer('${id}')" class="px-4 md:px-5 py-3 md:py-4 rounded-xl bg-[#0f0f0f] border border-[#262626] text-slate-400 hover:text-white hover:border-slate-500 transition-all">
                        <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                    </button>
                </div>
                <p id="ft-${id}-msg" class="text-xs md:text-sm text-slate-400 mt-6 md:mt-8 font-medium text-center leading-relaxed px-2 break-words"></p>
            </div>`;
        }

        // Logic for timers using Date.now()
        function startTimerUI(id, mins, isMicro) {
            document.getElementById(`ft-${id}-closed`).classList.add('hidden');
            document.getElementById(`ft-${id}-open`).classList.remove('hidden');
            document.getElementById(`ft-${id}-title`).innerText = isMicro ? 'Атомный Старт' : document.getElementById(`ft-${id}-title`).innerText;
            
            const msg = isMicro ? "Мозг не сопротивляется 2 минутам. Просто начни." : "Самое сложное — начать. Барьер пройден.";
            document.getElementById(`ft-${id}-msg`).innerText = msg;
            
            activeTimers[id] = {
                totalSeconds: mins * 60,
                timeLeft: mins * 60,
                isActive: false,
                endTime: 0,
                interval: null
            };
            updateTimerDisplay(id);
            if(isMicro) updateState({ currentMode: 'min' }); // Auto switch to min mode on micro start
        }

        function closeTimerUI(id) {
            if(activeTimers[id]) clearInterval(activeTimers[id].interval);
            document.getElementById(`ft-${id}-closed`).classList.remove('hidden');
            document.getElementById(`ft-${id}-open`).classList.add('hidden');
        }

        function toggleTimer(id) {
            const t = activeTimers[id];
            if(!t) return;
            const btn = document.getElementById(`ft-${id}-btn`);
            
            if(t.isActive) {
                // Pause
                t.isActive = false;
                clearInterval(t.interval);
                btn.innerHTML = `<i data-lucide="play" class="w-5 h-5"></i> Фокус`;
                btn.className = "flex-1 py-3 md:py-4 rounded-xl font-black text-base md:text-lg flex justify-center items-center gap-2 md:gap-3 transition-all bg-gradient-to-r from-amber-400 to-yellow-600 text-[#0a0a0a] shadow-[0_0_20px_rgba(251,191,36,0.3)] hover:brightness-110";
            } else {
                // Start/Resume
                t.isActive = true;
                t.endTime = Date.now() + (t.timeLeft * 1000);
                btn.innerHTML = `<i data-lucide="pause" class="w-5 h-5 text-slate-200"></i> Пауза`;
                btn.className = "flex-1 py-3 md:py-4 rounded-xl font-black text-base md:text-lg flex justify-center items-center gap-2 md:gap-3 transition-all bg-[#1a1a1a] text-slate-200 border border-[#333333]";
                
                t.interval = setInterval(() => {
                    const now = Date.now();
                    t.timeLeft = Math.max(0, Math.ceil((t.endTime - now) / 1000));
                    updateTimerDisplay(id);
                    if(t.timeLeft <= 0) {
                        clearInterval(t.interval);
                        t.isActive = false;
                        showToast("Фокус завершен. Синхронизация.", false);
                    }
                }, 500); // 500ms for smoothness
            }
            lucide.createIcons();
        }

        function resetTimer(id) {
            const t = activeTimers[id];
            if(!t) return;
            t.isActive = false;
            clearInterval(t.interval);
            t.timeLeft = t.totalSeconds;
            const btn = document.getElementById(`ft-${id}-btn`);
            btn.innerHTML = `<i data-lucide="play" class="w-5 h-5"></i> Фокус`;
            btn.className = "flex-1 py-3 md:py-4 rounded-xl font-black text-base md:text-lg flex justify-center items-center gap-2 md:gap-3 transition-all bg-gradient-to-r from-amber-400 to-yellow-600 text-[#0a0a0a] shadow-[0_0_20px_rgba(251,191,36,0.3)] hover:brightness-110";
            updateTimerDisplay(id);

        function updateTimerDisplay(id) {
            const t = activeTimers[id];
            if(!t) return;
            const m = Math.floor(t.timeLeft / 60).toString().padStart(2, '0');
            const s = (t.timeLeft % 60).toString().padStart(2, '0');
            document.getElementById(`ft-${id}-display`).innerText = `${m}:${s}`;
            
            const progress = ((t.totalSeconds - t.timeLeft) / t.totalSeconds) * 100;
            const dashoffset = 283 - (283 * progress) / 100;
            document.getElementById(`ft-${id}-circle`).style.strokeDashoffset = dashoffset;
        }

        let breathInterval = null;
        function openBreathing(type) {

        function toggleBreathing() {
            if(state.breathActive) {
                updateState({ breathActive: false });
                clearInterval(breathInterval);
            } else {
                updateState({ breathActive: true });
                const endTime = Date.now() + (state.breathTimeLeft * 1000);
                breathInterval = setInterval(() => {
                    const now = Date.now();
                    const left = Math.max(0, Math.ceil((endTime - now) / 1000));
                    
                    // Direct DOM update for performance
                    const m = Math.floor(left / 60);
                    const s = (left % 60).toString().padStart(2, '0');
                    const disp = document.getElementById('breath-display');
                    if(disp) disp.innerText = `${m}:${s}`;
                    
                    const timeElapsed = 180 - left;
                    const isMorning = state.breathTypeOpen === 'morning';
                    const currentCycleSec = timeElapsed % (isMorning ? 16 : 10);
                    
                    let phase = '', scale = 1, phaseLeft = 0;
                    if(isMorning) {
                        if (currentCycleSec < 4) { phase = 'Вдох'; phaseLeft = 4 - currentCycleSec; scale = 1.6; }
                        else if (currentCycleSec < 8) { phase = 'Задержка'; phaseLeft = 8 - currentCycleSec; scale = 1.6; }
                        else if (currentCycleSec < 12) { phase = 'Выдох'; phaseLeft = 12 - currentCycleSec; scale = 1; }
                        else { phase = 'Задержка'; phaseLeft = 16 - currentCycleSec; scale = 1; }
                    } else {
                        if (currentCycleSec < 4) { phase = 'Вдох'; phaseLeft = 4 - currentCycleSec; scale = 1.5; }
                        else { phase = 'Выдох'; phaseLeft = 10 - currentCycleSec; scale = 1; }
                    }

                    const phaseDisp = document.getElementById('breath-phase');
                    const circleOuter = document.getElementById('breath-circle-outer');
                    const circleInner = document.getElementById('breath-circle-inner');
                    const numDisp = document.getElementById('breath-num');

                    if(phaseDisp) phaseDisp.innerText = phase;
                    if(circleOuter) circleOuter.style.transform = `scale(${scale})`;
                    if(circleInner) circleInner.style.transform = `scale(${scale})`;
                    if(numDisp) numDisp.innerText = phaseLeft;

                    if(left <= 0) {
                        clearInterval(breathInterval);
                        updateState({ breathActive: false, breathTimeLeft: 0 });
                        showToast("Практика завершена. XP начислено.", false);
                        if(isMorning && !state.dailyTasks.breathAm) toggleTask('breathAm', 'spirit', 15);
                        if(!isMorning && !state.dailyTasks.breathPm) toggleTask('breathPm', 'spirit', 15);
                    } else {
                        // Store silently to keep state in sync if navigating away
                        state.breathTimeLeft = left; 
                    }
                }, 1000);
            }
        }

        function ViewRituals() {
            const isDomination = state.manifestState === 'domination';
            
            const manifestToggleHtml = `
                <div class="flex bg-[#0f0f0f] p-1.5 rounded-xl border border-[#262626] mb-4 w-max">
                    <button onclick="updateState({manifestState: 'domination'})" class="px-4 py-2 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${isDomination ? 'bg-amber-500/20 text-amber-400' : 'text-slate-500 hover:text-slate-300'}">Доминация</button>
                    <button onclick="updateState({manifestState: 'stoic'})" class="px-4 py-2 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${!isDomination ? 'bg-indigo-500/20 text-indigo-400' : 'text-slate-500 hover:text-slate-300'}">Защита (Стоик)</button>
                </div>
            `;

            const mAm = MANIFESTS.AM[state.manifestState];
            const mPm = MANIFESTS.PM[state.manifestState];

            if(state.breathTypeOpen) {
                const isAm = state.breathTypeOpen === 'morning';
                const exp = isAm ? "Box Breathing (4-4-4-4). Баланс симпатической и парасимпатической системы. Ясность и фокус." : "Стимуляция блуждающего нерва (Вдох 4с / Выдох 6с). Снижение пульса и кортизола перед сном.";
                return `
                <div class="space-y-8 animate-in fade-in">
                    <button onclick="clearInterval(breathInterval); updateState({breathTypeOpen: null});" class="text-slate-400 hover:text-white flex items-center gap-2 mb-4"><i data-lucide="chevron-left" class="w-5 h-5"></i> Назад к ритуалам</button>
                    <div class="bg-[#0f0f0f] border border-[#262626] p-5 md:p-10 rounded-2xl md:rounded-3xl flex flex-col items-center justify-center relative overflow-hidden min-h-[400px] w-full max-w-2xl mx-auto shadow-2xl">
                        <div class="absolute top-4 md:top-5 left-4 md:left-5 text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest bg-[#1a1a1a] px-3 py-1.5 rounded-lg border border-[#333333]">
                            ${isAm ? 'Box Breathing' : 'Relax Breathing'}
                        </div>
                        <div id="breath-display" class="absolute top-4 md:top-5 right-4 md:right-5 text-sm font-mono font-black text-amber-400 bg-amber-500/10 px-3 py-1.5 rounded-lg border border-amber-500/30">
                            ${Math.floor(state.breathTimeLeft/60)}:${(state.breathTimeLeft%60).toString().padStart(2,'0')}
                        </div>
                        
                        <div class="relative w-48 h-48 md:w-64 md:h-64 flex items-center justify-center mb-8 mt-6">
                            <div id="breath-circle-outer" class="absolute rounded-full bg-amber-500/10 blur-3xl transition-all duration-1000 ease-in-out w-full h-full"></div>
                            <div id="breath-circle-inner" class="relative z-10 rounded-full border-[3px] border-amber-500/40 bg-gradient-to-br from-[#121212] to-[#050505] flex flex-col items-center justify-center transition-all duration-1000 ease-in-out shadow-[0_0_30px_rgba(251,191,36,0.1)] w-[120px] h-[120px]">
                                ${state.breathActive ? `<div id="breath-num" class="text-5xl font-black font-mono text-amber-400">0</div>` : `<i data-lucide="wind" class="text-slate-600 w-10 h-10"></i>`}
                            </div>
                        </div>

                        <div id="breath-phase" class="text-3xl font-black mb-5 h-10 flex items-center tracking-tight ${state.breathActive ? 'text-white' : 'text-slate-500'}">
                            ${state.breathActive ? 'Вдох' : 'Готов?'}
                        </div>
                        <p class="text-xs md:text-sm text-slate-400 text-center max-w-sm mb-8 font-medium bg-[#1a1a1a]/50 p-4 rounded-xl border border-[#262626]">${exp}</p>

                        ${ButtonHTML(state.breathActive ? 'Пауза' : (state.breathTimeLeft < 180 ? 'Продолжить' : 'Начать 3 минуты'), state.breathActive ? 'secondary' : 'primary', state.breathActive ? 'pause' : 'play', 'toggleBreathing()')}
                    </div>
                </div>`;
            }

            return `
            <div class="space-y-8 md:space-y-10 animate-in fade-in zoom-in-95 duration-700">
                <h1 class="text-3xl sm:text-4xl md:text-6xl font-black tracking-tighter text-white uppercase drop-shadow-lg break-words">Ритуалы</h1>
                ${manifestToggleHtml}
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
                    <div class="glass-panel rounded-[2rem] p-5 md:p-8 border-t-4 border-t-amber-400 flex flex-col h-full bg-gradient-to-b from-[#121212] to-[#0a0a0a]">
                        <h2 class="text-2xl md:text-4xl font-black text-white flex items-center gap-3 md:gap-4 mb-4 md:mb-6 uppercase tracking-tight truncate"><i data-lucide="compass" class="w-8 h-8 text-amber-400 flex-shrink-0"></i> Утро</h2>
                        <div class="space-y-3 md:space-y-4 mb-8 flex-1">
                            ${CheckItemHTML('waterAm', 'spirit', 5, 'Вода, свет, проветривание', 'Мягкий запуск.', 'Пробуждение')}
                            ${CheckItemHTML('morningCharge', 'body', 5, 'Микро-зарядка (2 мин)', 'Разгон крови.', 'Вода')}
                        </div>
                        <div class="pt-6 border-t border-[#262626] space-y-4">
                            <button onclick="openBreathing('morning')" class="w-full bg-[#1a1a1a] hover:bg-[#222222] border border-[#333333] p-4 rounded-xl flex items-center justify-between text-slate-200 transition-all font-bold">
                                <span class="flex items-center gap-3"><i data-lucide="wind" class="text-amber-400 w-5 h-5"></i> Практика Дыхания (3 мин)</span>
                                <i data-lucide="chevron-right" class="w-5 h-5 text-slate-500"></i>
                            </button>
                            <div class="bg-[#0f0f0f] border border-[#262626] rounded-xl p-4">
                                <h4 class="font-black text-amber-400 text-xs uppercase tracking-widest mb-2">${mAm.title}</h4>
                                <p class="text-[10px] text-slate-500 mb-3">${mAm.instruction}</p>
                                <p class="text-sm text-slate-300 whitespace-pre-wrap font-medium">${mAm.text}</p>
                            </div>
                        </div>
                    </div>

                    <div class="glass-panel rounded-[2rem] p-5 md:p-8 border-t-4 border-t-yellow-600 flex flex-col h-full bg-gradient-to-b from-[#121212] to-[#0a0a0a]">
                        <h2 class="text-2xl md:text-4xl font-black text-white flex items-center gap-3 md:gap-4 mb-4 md:mb-6 uppercase tracking-tight truncate"><i data-lucide="moon" class="w-8 h-8 text-yellow-600 flex-shrink-0"></i> Вечер</h2>
                        <div class="space-y-3 md:space-y-4 mb-8 flex-1">
                            ${CheckItemHTML('hygienePm', 'spirit', 5, 'Душ и уход', 'Смыть день.', 'Кардио')}
                            ${CheckItemHTML('supplements', 'spirit', 5, 'Магний + 5-HTP', 'Биохимия сна.', 'Душ')}
                            ${CheckItemHTML('planTomorrow', 'pm', 10, 'План на завтра', 'Разгрузить голову.', 'Постель')}
                        </div>
                        <div class="pt-6 border-t border-[#262626] space-y-4">
                            <button onclick="openBreathing('evening')" class="w-full bg-[#1a1a1a] hover:bg-[#222222] border border-[#333333] p-4 rounded-xl flex items-center justify-between text-slate-200 transition-all font-bold">
                                <span class="flex items-center gap-3"><i data-lucide="wind" class="text-yellow-600 w-5 h-5"></i> Практика Дыхания (3 мин)</span>
                                <i data-lucide="chevron-right" class="w-5 h-5 text-slate-500"></i>
                            </button>
                            <div class="bg-[#0f0f0f] border border-[#262626] rounded-xl p-4">
                                <h4 class="font-black text-yellow-600 text-xs uppercase tracking-widest mb-2">${mPm.title}</h4>
                                <p class="text-[10px] text-slate-500 mb-3">${mPm.instruction}</p>
                                <p class="text-sm text-slate-300 whitespace-pre-wrap font-medium">${mPm.text}</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function setNumericVal(path, val, min, max) {
            val = Math.max(min, Math.min(max, Number(val) || 0));
            updateState(prev => {
                const keys = path.split('.');
                let current = prev;
                for (let i = 0; i < keys.length - 1; i++) current = current[keys[i]];
                current[keys[keys.length - 1]] = val;
                return prev;
            });
        }

        function NumInputHTML(label, path, val, min, max, hint, color="amber") {
            const cText = color === 'red' ? 'text-rose-400 drop-shadow-[0_0_8px_rgba(251,113,133,0.4)]' : 'text-amber-400 drop-shadow-[0_0_8px_rgba(251,191,36,0.4)]';
            return `
            <div class="flex flex-col gap-2 w-full">
                <div class="flex flex-wrap justify-between items-end text-sm mb-1 px-2">
                    <span class="text-slate-400 font-bold tracking-wide">${label} <span class="text-xs opacity-50 ml-1 font-normal">(${hint})</span></span>
                </div>
                <div class="flex items-center gap-1 bg-[#0f0f0f] border border-[#262626] p-1.5 rounded-2xl w-full shadow-inner">
                    <button onclick="setNumericVal('${path}', ${val-1}, ${min}, ${max})" class="p-3 rounded-xl bg-[#1a1a1a] text-slate-400 hover:text-amber-400 transition-all active:scale-95"><i data-lucide="minus" class="w-5 h-5"></i></button>
                    <input type="number" value="${val}" onchange="setNumericVal('${path}', this.value, ${min}, ${max})" class="flex-1 bg-transparent text-center text-2xl md:text-3xl font-mono font-black focus:outline-none w-full min-w-0 ${cText}" />
                    <button onclick="setNumericVal('${path}', ${val+1}, ${min}, ${max})" class="p-3 rounded-xl bg-[#1a1a1a] text-slate-400 hover:text-amber-400 transition-all active:scale-95"><i data-lucide="plus" class="w-5 h-5"></i></button>
                </div>
            </div>`;
        }

        function ViewProgress() {
            const s = state.stats;
            const progressToNext = s.xp % 200;
            const pct = (progressToNext / 200) * 100;

            const bar = (label, val, colorClass) => `
                <div class="w-full bg-[#0f0f0f] p-4 md:p-6 rounded-2xl border border-[#262626] shadow-inner">
                    <div class="flex justify-between text-[10px] sm:text-xs mb-3 font-black uppercase tracking-widest gap-2">
                        <span class="text-slate-400 truncate">${label}</span>
                        <span class="text-slate-200 drop-shadow-sm flex-shrink-0">${Math.floor(val)}%</span>
                    </div>
                    <div class="h-3 w-full bg-[#050505] rounded-full overflow-hidden border border-[#262626]">
                        <div class="h-full ${colorClass} transition-all duration-1000 ease-out shadow-[0_0_15px_currentColor] opacity-90" style="width: ${val}%"></div>
                    </div>
                </div>`;

            return `
            <div class="space-y-8 animate-in fade-in">
                <h1 class="text-3xl sm:text-4xl md:text-6xl font-black tracking-tighter text-white uppercase drop-shadow-lg">Прогресс</h1>
                
                <div class="glass-panel rounded-[2rem] p-6 md:p-12 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-amber-400 to-transparent opacity-70"></div>
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
                        <div class="flex items-center gap-4 md:gap-8">
                            <div class="w-16 h-16 md:w-24 md:h-24 rounded-2xl bg-gradient-to-br from-yellow-400 to-amber-600 flex items-center justify-center shadow-[0_0_40px_rgba(251,191,36,0.3)] border-2 border-white/10">
                                <i data-lucide="trophy" class="w-8 h-8 md:w-12 md:h-12 text-[#0a0a0a]"></i>
                            </div>
                            <div>
                                <h2 class="text-2xl sm:text-4xl md:text-6xl font-black text-white tracking-tight">Уровень ${s.level}</h2>
                                <p class="text-amber-400 font-black mt-1 uppercase text-[10px] md:text-sm drop-shadow-md">Каста Суверенов</p>
                            </div>
                        </div>
                        <div class="bg-[#050505] px-6 py-4 rounded-2xl border border-[#262626] shadow-inner">
                            <span class="font-mono text-3xl sm:text-5xl md:text-6xl font-black text-white">${s.xp} <span class="text-lg text-amber-500/80">XP</span></span>
                        </div>
                    </div>
                    
                    <div class="space-y-4 mb-10">
                        <div class="flex justify-between text-xs text-slate-400 font-black uppercase tracking-widest">
                            <span>До Ур. ${s.level + 1}</span>
                            <span class="text-amber-400 font-mono">${progressToNext} / 200</span>
                        </div>
                        <div class="h-6 md:h-8 w-full bg-[#050505] rounded-full border border-[#262626] p-1 relative overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-amber-600 via-yellow-400 to-amber-600 rounded-full transition-all duration-1000 shadow-[0_0_30px_rgba(251,191,36,0.5)] relative overflow-hidden" style="width: ${pct}%">
                                <div class="absolute inset-0 bg-white/20 skew-x-12 translate-x-full animate-shimmer"></div>
                            </div>
                        </div>
                    </div>

                    <h3 class="text-lg font-black text-white uppercase tracking-widest mb-6 flex items-center gap-2"><i data-lucide="activity" class="w-5 h-5 text-amber-400"></i> Идентичности</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        ${bar('Атлет (Тело)', s.categories.body, 'bg-amber-500')}
                        ${bar('Структура (PM)', s.categories.pm, 'bg-yellow-500')}
                        ${bar('Мир (English)', s.categories.english, 'bg-orange-400')}
                        ${bar('Создатель (Контент)', s.categories.content, 'bg-amber-300')}
                        ${bar('Return Rate', s.returnRate, 'bg-gradient-to-r from-amber-400 to-yellow-600')}
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    ${NumInputHTML('Сон', 'energyMetrics.sleep', state.energyMetrics.sleep, 0, 16, 'часы')}
                    ${NumInputHTML('Энергия', 'energyMetrics.energy', state.energyMetrics.energy, 1, 10, '1-10')}
                    ${NumInputHTML('Стресс', 'energyMetrics.stress', state.energyMetrics.stress, 1, 10, '1-10', 'red')}
                </div>
            </div>`;
        }

        function openObsidianURI() {
            const dateStr = new Date().toLocaleDateString('ru-RU');
            const e = state.energyMetrics, t = state.dailyTasks;
            
            const content = `
# День: ${dateStr}

## Энергия
- Сон: ${e.sleep}ч
- Энергия: ${e.energy}/10
- Стресс: ${e.stress}/10

## Идентичности (База)
- Структура (PM): ${t.pm ? 'Выполнено' : 'Пропуск'}
- Структура (Eng): ${t.english ? 'Выполнено' : 'Пропуск'}
- Атлет (Тело): ${t.body ? 'Тренировка' : t.cardio ? 'Только кардио' : 'Пропуск'}
- Ритуалы: ${t.prayerAm && t.prayerPm ? 'Обеспечены' : 'Сбой'}

## Вечерний разбор
Что сделал: 
Что слил: 
Что улучшить: 
Благодарен за: 
            `.trim();

            const title = `Markov_${dateStr.replace(/\./g, '-')}`;
            // URI Schema for Obsidian
            const uri = `obsidian://new?file=${encodeURIComponent(title)}&content=${encodeURIComponent(content)}`;
            
            window.location.href = uri;
            showToast("Отправлено в Obsidian 🚀");
        }

        function ViewTools() {
            return `
            <div class="space-y-8 animate-in fade-in">
                <h1 class="text-3xl sm:text-4xl md:text-6xl font-black tracking-tighter text-white uppercase drop-shadow-lg">Инструменты</h1>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
                    <div class="glass-panel rounded-[2rem] p-6 space-y-6">
                        <h2 class="text-2xl font-black text-white flex items-center gap-3 uppercase"><i data-lucide="download" class="w-6 h-6 text-amber-500"></i> Obsidian Export</h2>
                        <p class="text-sm text-slate-400 font-medium">Создает новый файл в твоем локальном Obsidian через безопасный URI протокол. Все метрики и чекбоксы за сегодня.</p>
                        ${ButtonHTML('Отправить в Obsidian', 'primary', 'download', 'openObsidianURI()')}
                    </div>
                </div>
            </div>`;
        }

        // Fallbacks for empty views to satisfy the system 
        function ViewLearning() { return `<div class="p-10 text-center text-slate-500">Обучение. Используйте Obsidian для глубоких записей.</div>`; }
        function ViewBody() { return `<div class="p-10 text-center text-slate-500">Тело. Контроль в дашборде.</div>`; }
        function ViewContent() { return `<div class="p-10 text-center text-slate-500">Контент-лестница. Фокус на создание.</div>`; }

        // --- 6. ROUTING & RENDERING ---
        const TABS = [
            { id: 'dashboard', icon: 'home', label: 'Сегодня', render: ViewDashboard },
            { id: 'schedule', icon: 'clock', label: 'Расписание', render: ViewSchedule },
            // Removed redundant tabs per "minimalistic" requirement, integrated their logic into Today/Tools
            { id: 'rituals', icon: 'wind', label: 'Ритуалы', render: ViewRituals },
            { id: 'progress', icon: 'trophy', label: 'Прогресс', render: ViewProgress },
            { id: 'tools', icon: 'settings', label: 'Экспорт', render: ViewTools }
        ];

        // Выносим генерацию HTML кнопок навигации в отдельную функцию
        function renderNavigationHTML() {
            const html = TABS.map(t => {
                const active = state.currentTab === t.id;
                const dClass = active ? 'bg-amber-500/10 text-amber-400 border-amber-500/30 shadow-[inset_0_0_20px_rgba(251,191,36,0.05)]' : 'text-slate-500 hover:text-slate-200 hover:bg-[#1a1a1a]';
                return `
                <button onclick="updateState({currentTab: '${t.id}'}, true)" class="w-full flex items-center gap-4 xl:gap-5 px-4 xl:px-6 py-3 xl:py-4 rounded-2xl transition-all duration-300 font-bold text-sm xl:text-lg uppercase tracking-wider ${dClass}">
                    <i data-lucide="${t.icon}" class="w-5 h-5 flex-shrink-0 ${active ? 'text-amber-400 drop-shadow-[0_0_12px_rgba(251,191,36,0.5)]' : ''}"></i> 
                    <span class="truncate">${t.label}</span>
                </button>`;
            }).join('');
            
            document.getElementById('desktop-nav').innerHTML = html;

            const mHtml = TABS.map(t => {
                const active = state.currentTab === t.id;
                const mClass = active ? 'text-amber-400 scale-105 -translate-y-1' : 'text-slate-500 hover:text-slate-300';
                return `
                <button onclick="updateState({currentTab: '${t.id}'}, true)" class="flex-1 flex flex-col items-center justify-center min-w-[64px] py-2 gap-1 transition-all pb-3 ${mClass}">
                    <i data-lucide="${t.icon}" class="w-5 h-5 ${active ? 'drop-shadow-[0_0_15px_rgba(251,191,36,0.6)]' : ''}"></i>
                    <span class="text-[8px] font-black uppercase tracking-widest mt-1 truncate px-1">${t.label}</span>
                </button>`;
            }).join('');

            document.getElementById('mobile-nav').innerHTML = mHtml;
            lucide.createIcons();
        }

        function renderCurrentView() {
            const tab = TABS.find(t => t.id === state.currentTab) || TABS[0];
            const contentArea = document.getElementById('app-content');
            
            // Мягко глушим интервалы таймеров ПЕРЕД очисткой экрана, чтобы память не текла
            if (activeTimers && Object.keys(activeTimers).length > 0) {
                for (let id in activeTimers) {
                    if (activeTimers[id].interval) clearInterval(activeTimers[id].interval);
                }
            }
            // Не сносим breathInterval, если вкладка "rituals" просто обновляется изнутри
            
            // Плавный переход контента (Fade Animation)
            contentArea.style.opacity = '0';
            contentArea.style.transform = 'translateY(8px)';
            
            setTimeout(() => {
                contentArea.innerHTML = tab.render();
                lucide.createIcons();
                renderNavigationHTML(); // Обновляем HTML каркас кнопок меню
                
                contentArea.style.opacity = '1';
                contentArea.style.transform = 'translateY(0)';
            }, 150);
        }

        // Boot
        window.addEventListener('DOMContentLoaded', () => {
            initApp();
        });

    </script>
</body>
</html>
