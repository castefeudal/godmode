            lastLoginDate: new Date().toDateString(),
            streakCounter: 0,
            bookProgress: { chapter: 1, totalPages: 15 },
            history: {}
        };

        const safeStorage = {
            get: () => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (!saved) return INITIAL_STATE;
                    const parsed = JSON.parse(saved);
                    
                    // Безопасное слияние структур без потери новых вложенных объектов
                    return {
                        ...INITIAL_STATE,
                        ...parsed,
                        dailyTasks: { ...INITIAL_STATE.dailyTasks, ...(parsed.dailyTasks || {}) },
                        energyMetrics: { ...INITIAL_STATE.energyMetrics, ...(parsed.energyMetrics || {}) },
                        notes: { ...INITIAL_STATE.notes, ...(parsed.notes || {}) },
                        stats: { 
                            ...INITIAL_STATE.stats, 
                            ...(parsed.stats || {}),
                            categories: { ...INITIAL_STATE.stats.categories, ...(parsed.stats?.categories || {}) }
                        },
                        bookProgress: { ...INITIAL_STATE.bookProgress, ...(parsed.bookProgress || {}) },
                        history: { ...INITIAL_STATE.history, ...(parsed.history || {}) }
                    };
                } catch (e) {
                    console.error("Storage corrupted. State reset to fallback schema.", e);
                    return INITIAL_STATE;
                }
            },
            set: (state) => {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                } catch (e) {
                    console.error("Local storage sync error:", e);
                }
            }
        };

        function useAppState() {
            const [state, setState] = useState(() => safeStorage.get());
            const [toast, setToast] = useState({ visible: false, msg: '' });
            const [globalFocusId, setGlobalFocusId] = useState(null);
            const toastTimeoutRef = useRef(null);

            const showToast = useCallback((msg) => {
                if (toastTimeoutRef.current) clearTimeout(toastTimeoutRef.current);
                setToast({ visible: true, msg });
                toastTimeoutRef.current = setTimeout(() => {
                    setToast({ visible: false, msg: '' });
                }, 3500);
            }, []);

            useEffect(() => {
                safeStorage.set(state);
            }, [state]);

            useEffect(() => {
                const today = new Date().toDateString();
                if (state.lastLoginDate !== today) {
                    setState(prev => {
                        const yesterdayStr = prev.lastLoginDate || new Date(Date.now() - 86400000).toDateString();
                        const updatedHistory = { ...prev.history };
                        
                        // Снимок прошедшего дня перед автоматическим сбросом
                        updatedHistory[yesterdayStr] = {
                            date: yesterdayStr,
                            dailyTasks: { ...prev.dailyTasks },
                            taskTimestamps: { ...prev.taskTimestamps },
                            notes: { ...prev.notes },
                            statsSnapshot: { ...prev.stats },
                            currentMode: prev.currentMode
                        };

                        const perfectDay = prev.dailyTasks.pm && prev.dailyTasks.body && prev.dailyTasks.waterAm;
                        const newStreak = perfectDay ? (prev.streakCounter || 0) + 1 : 0;
                        const drop = (!prev.dailyTasks.pm || !prev.dailyTasks.body) ? 6 : 0;

                        return {
                            ...prev,
                            currentMode: 'NORM',
                            deepFocusActive: false,
                            dailyTasks: { ...INITIAL_STATE.dailyTasks },
                            taskTimestamps: {},
                            languagePhrases: [],
                            lastLoginDate: today,
                            streakCounter: newStreak,
                            history: updatedHistory,
                            stats: {
                                ...prev.stats,
                                daysLogged: prev.stats.daysLogged + 1,
                                returnRate: Math.max(20, Math.min(100, prev.stats.returnRate - drop + 3))
                            }
                        };
                    });
                    showToast("Запущен новый суверенный цикл. Архитектура обновлена. ⚡");
                }
            }, [state.lastLoginDate, showToast]);

            const update = useCallback((key, value) => {
                setState(prev => {
                    if (typeof value === 'object' && !Array.isArray(value) && value !== null && prev[key]) {
                        return { ...prev, [key]: { ...prev[key], ...value } };
                    }
                    return { ...prev, [key]: value };
                });
            }, []);

            const toggleTask = useCallback((taskId, category, xpReward = 10, forceState = null) => {
                AudioEngine.playClick();
                triggerHaptic(15);
                const currentTime = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                
                const el = document.getElementById(`task-card-${taskId}`);
                if (el && (forceState === true || !state.dailyTasks[taskId])) {
                    el.classList.add('task-success-animate');
                    setTimeout(() => el.classList.remove('task-success-animate'), 600);
                }

                setState(prev => {
                    const isDone = forceState !== null ? forceState : !prev.dailyTasks[taskId];
                    if (forceState !== null && prev.dailyTasks[taskId] === forceState) return prev;

                    let newXp = prev.stats.xp;
                    let catVal = prev.stats.categories[category] || 0;
                    const updatedTimestamps = { ...prev.taskTimestamps };

                    const completedCount = Object.values(prev.dailyTasks).filter(Boolean).length + (isDone ? 1 : -1);
                    const isNumerologyMatch = [5, 7, 14].includes(completedCount);
                    const finalReward = isDone && isNumerologyMatch ? xpReward + 25 : xpReward;

                    if (isDone) {
                        newXp += finalReward;
                        catVal = Math.min(100, catVal + finalReward / 1.5);
                        updatedTimestamps[taskId] = currentTime;
                        AudioEngine.playSuccess();
                    } else {
                        newXp = Math.max(0, newXp - finalReward);
                        catVal = Math.max(0, catVal - finalReward / 1.5);
                        delete updatedTimestamps[taskId];
                    }

                    return {
                        ...prev,
                        dailyTasks: { ...prev.dailyTasks, [taskId]: isDone },
                        taskTimestamps: updatedTimestamps,
                        stats: {
                            ...prev.stats,
                            xp: newXp,
                            level: Math.floor(newXp / 200) + 1,
                            categories: { ...prev.stats.categories, [category]: catVal }
                        }
                    };
                });
                
                showToast(`Действие сохранено в матрице логов. ✨`);
            }, [state.dailyTasks, showToast]);

            return { state, setState, update, toggleTask, toast, showToast, globalFocusId, setGlobalFocusId };
        }

        // Кнопки с поддержкой доступности
        const Button = ({ children, variant = 'primary', className = "", onClick, icon: iconName, ariaLabel }) => {
            const variants = {
                primary: `${THEME.accentBg} text-[#0a0a0a] font-black shadow-[0_0_20px_rgba(251,191,36,0.15)] ${THEME.accentHover} border border-amber-300/40`,
                secondary: `bg-[#1a1a1a]/80 text-amber-50 backdrop-blur-md hover:bg-[#222222] border border-[#333333]/60 hover:border-amber-500/40`,
                danger: `bg-rose-950/40 text-rose-400 border border-rose-900/50 backdrop-blur-md hover:bg-rose-900/50 hover:text-rose-200 shadow-[0_0_25px_rgba(244,63,94,0.15)]`
            };
            return (
                <button 
                    type="button"
                    aria-label={ariaLabel}
                    onClick={() => { triggerHaptic(10); if(onClick) onClick(); }} 
                    className={`flex items-center justify-center gap-2 px-5 py-4 rounded-2xl transition-all duration-300 active:scale-[0.98] touch-manipulation font-bold uppercase tracking-wider text-xs min-h-[44px] ${variants[variant]} ${className}`}
                >
                    {iconName && <IconBase iconName={iconName} size={16} />}
                    {children && <span className="truncate">{children}</span>}
                </button>
            );
        };

        const NumericInput = ({ label, value, onChange, min=0, max=10, step=1, hint, color="accent" }) => {
            return (
                <div className="flex flex-col gap-2 w-full">
                    <span className={`${THEME.textMuted} text-xs font-black uppercase tracking-widest px-1`}>{label} {hint && <span className="opacity-40 normal-case font-normal">({hint})</span>}</span>
                    <div className="flex items-center bg-[#0f0f0f]/60 backdrop-blur-xl border border-[#262626]/60 p-1.5 rounded-2xl w-full">
                        <button type="button" aria-label="Уменьшить значение" onClick={() => { triggerHaptic(10); onChange(Math.max(min, Number(value) - step)); }} className="p-3.5 rounded-xl bg-[#1a1a1a] text-slate-300 hover:text-amber-400 active:scale-95 min-h-[44px] min-w-[44px] flex items-center justify-center"><IconBase iconName="Minus" size={16}/></button>
                        <input type="number" readOnly value={value} className={`flex-1 bg-transparent text-center text-2xl font-mono font-black ${color === 'red' ? 'text-rose-400' : 'text-amber-400'}`} />
                        <button type="button" aria-label="Увеличить значение" onClick={() => { triggerHaptic(10); onChange(Math.min(max, Number(value) + step)); }} className="p-3.5 rounded-xl bg-[#1a1a1a] text-slate-300 hover:text-amber-400 active:scale-95 min-h-[44px] min-w-[44px] flex items-center justify-center"><IconBase iconName="Plus" size={16}/></button>
                    </div>
                </div>
            );
        };

        // CheckItem полностью оптимизированный под семантику и кликабельность
        const CheckItem = ({ id, checked, onChange, label, subLabel, anchor, timeLog }) => {
            const isUrgent = !checked && (id === 'morningHygiene' || id === 'waterAm' || id === 'supplements');
            return (
                <button 
                    type="button"
                    id={`task-card-${id}`} 
                    aria-pressed={checked}
                    className={`w-full text-left flex items-start gap-4 p-4 rounded-2xl transition-all duration-300 border relative overflow-hidden min-h-[52px] premium-elevation touch-manipulation ${checked ? 'bg-amber-500/5 border-amber-500/30' : isUrgent ? 'bg-rose-500/10 border-rose-500/40 hover:border-rose-500/60' : 'bg-[#0f0f0f]/40 border-[#262626]/60 hover:border-amber-500/40'}`} 
                    onClick={onChange}
                >
                    <div className={`mt-0.5 w-7 h-7 rounded-full flex items-center justify-center border-2 flex-shrink-0 ${checked ? 'bg-gradient-to-br from-yellow-400 to-amber-600 border-transparent text-[#0a0a0a]' : isUrgent ? 'border-rose-500' : 'border-slate-500'}`}>
                        {checked && <IconBase iconName="Check" size={14} strokeWidth={4} />}
                    </div>
                    <div className="flex-1 min-w-0 pointer-events-none">
                        <div className="flex items-center gap-2 flex-wrap mb-1">
                            <span className={`${isUrgent ? 'text-rose-400' : 'text-amber-500'} font-black text-[10px] uppercase tracking-widest flex items-center gap-1`}><IconBase iconName="Anchor" size={10}/> {anchor || 'Действие'}</span>
                            {checked && timeLog && <span className="text-white font-mono text-[10px] bg-amber-500/20 px-1.5 py-0.5 rounded">🕒 {timeLog}</span>}
                        </div>
                        <span className={`font-bold block text-base md:text-lg leading-tight break-words ${checked ? 'text-slate-500 line-through decoration-amber-500/50' : 'text-white'}`}>{label}</span>
                        {subLabel && <span className={`text-xs md:text-sm mt-1 block leading-snug ${checked ? 'text-slate-500' : 'text-slate-300'}`}>{subLabel}</span>}
                    </div>
                </button>
            );
        };

        const TipCard = ({ text, title="Логика системы", iconName = "Zap" }) => (
            <div className="bg-gradient-to-r from-[#121212]/80 to-[#0f0f0f]/80 backdrop-blur-xl border border-[#262626]/60 rounded-2xl p-5 flex gap-4 items-start relative overflow-hidden shadow-md">
                <div className="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-amber-400 to-yellow-600"></div>
                <div className="p-2.5 bg-amber-500/10 rounded-xl flex-shrink-0 border border-amber-500/20 text-amber-400">
                    <IconBase iconName={iconName} size={18} />
                </div>
                <div className="flex-1 min-w-0">
                    <h4 className="text-[10px] font-black text-amber-400 uppercase tracking-widest mb-1">{title}</h4>
                    <p className="text-sm text-slate-200 leading-relaxed font-medium break-words">{text}</p>
                </div>
            </div>
        );

        // Расширенный интерактивный тренажер дыхания со сферой и частотным Web Audio
        const BreathingTimer = ({ type, compact = false, onCompleteAction }) => {
            const [phase, setPhase] = useState('Ожидание');
            const [timeLeft, setTimeLeft] = useState(0);
            const [isRunning, setIsRunning] = useState(false);
            const timerRef = useRef(null);

            const startBreathing = () => {
                AudioEngine.playClick();
                setIsRunning(true);
                setPhase('Вдох');
                setTimeLeft(4);
                AudioEngine.playInhale(4);
            };

            useEffect(() => {
                if (isRunning && timeLeft > 0) {
                    timerRef.current = setTimeout(() => {
                        setTimeLeft(timeLeft - 1);
                    }, 1000);
                } else if (isRunning && timeLeft === 0) {
                    AudioEngine.playPhaseChange();
                    if (phase === 'Вдох') {
                        setPhase('Задержка'); setTimeLeft(4); AudioEngine.playHold(4);
                    } else if (phase === 'Задержка') {
                        setPhase('Выдох'); setTimeLeft(4); AudioEngine.playExhale(4);
                    } else if (phase === 'Выдох') {
                        setPhase('Пустая задержка'); setTimeLeft(4); AudioEngine.playEmptyHold(4);
                    } else {
                        setIsRunning(false);
                        setPhase('Выполнено');
                        if (onCompleteAction) onCompleteAction();
                    }
                }
                return () => clearTimeout(timerRef.current);
            }, [isRunning, timeLeft, phase]);

            const sphereScale = useMemo(() => {
                if (!isRunning) return 'scale-100';
                if (phase === 'Вдох') return 'scale-150 duration-1000';
                if (phase === 'Задержка') return 'scale-150 duration-0';
                if (phase === 'Выдох') return 'scale-90 duration-1000';
                return 'scale-90 duration-0';
            }, [isRunning, phase]);

            if (compact) {
                return (
                    <div className="p-4 bg-[#121212]/90 border border-[#262626] rounded-2xl flex items-center justify-between">
                        <span className="text-xs font-black uppercase text-slate-300">Каскадное нейро-дыхание (4-4-4-4)</span>
                        <button type="button" onClick={startBreathing} disabled={isRunning} className="px-3 py-2 bg-amber-500 text-black font-bold text-xs uppercase rounded-lg disabled:opacity-50 min-h-[36px]">
                            {isRunning ? `${phase} (${timeLeft})` : 'Запуск'}
                        </button>
                    </div>
                );
            }

            return (
                <div className="p-5 bg-[#0a0a0a] border border-[#262626] rounded-2xl text-center flex flex-col items-center justify-center space-y-4 mb-4">
                    <h4 className="text-xs font-black uppercase tracking-widest text-amber-400">Квадратное дыхание стабилизации коры</h4>
                    
                    <div className="w-28 h-28 flex items-center justify-center relative my-2">
                        <div className={`absolute w-16 h-16 rounded-full bg-gradient-to-br from-amber-400 to-yellow-600 opacity-60 filter blur-sm transition-transform transform ${sphereScale}`}></div>
                        <div className={`absolute w-12 h-12 rounded-full bg-amber-500 border border-white/20 transition-transform transform ${sphereScale} flex items-center justify-center shadow-inner`}>
                            <IconBase iconName="Wind" size={16} className="text-black" />
                        </div>
                    </div>

                    <div className="text-xl font-mono font-black text-white">{phase} {isRunning && `: ${timeLeft}`}</div>
                    <button type="button" onClick={startBreathing} disabled={isRunning} className="w-full py-3 bg-[#1a1a1a] border border-[#333] hover:border-amber-500/40 text-slate-200 rounded-xl font-black text-xs uppercase tracking-wider min-h-[44px]">
                        {isRunning ? 'Цикл активен...' : 'Начать настройку ЦНС'}
                    </button>
                </div>
            );
        };

        const ManifestReader = ({ type, onCodeClick }) => {
            const data = MANIFESTS[type];
            return (
                <div className="p-4 bg-[#0c0c0c] border border-[#222] rounded-2xl space-y-3">
                    <h3 className="text-sm font-black text-white tracking-wide uppercase">{data.title}</h3>
                    <p className="text-[10px] italic text-rose-400 leading-snug">{data.instruction}</p>
                    <div className="text-xs text-slate-300 whitespace-pre-wrap font-medium max-h-48 overflow-y-auto hide-scrollbar bg-[#050505] p-3 rounded-xl border border-[#1a1a1a]">
                        {data.text}
                    </div>
                    <button type="button" onClick={onCodeClick} className="w-full py-2 text-[10px] font-mono font-black text-amber-500/60 hover:text-amber-400 text-center uppercase tracking-widest min-h-[32px]">
                        [ Показать Скрытые Коды Матрицы ]
                    </button>
                </div>
            );
        };

        // Стабилизированный таймер без лишних перерисовок
        const FocusTimer = ({ defaultMinutes, taskName, taskId, category, xpReward, onCompleteTask, state, update, setGlobalFocusId, globalFocusId }) => {
            const [timeLeft, setTimeLeft] = useState(defaultMinutes * 60);
            const [isActive, setIsActive] = useState(false);
            const [isOpen, setIsOpen] = useState(false);
            const [isMicro, setIsMicro] = useState(false);
            const completedTriggered = useRef(false);
            
            const totalSeconds = useMemo(() => (isMicro ? 2 : defaultMinutes) * 60, [isMicro, defaultMinutes]);
            
            useEffect(() => { 
                setTimeLeft(totalSeconds); 
                completedTriggered.current = false;
            }, [totalSeconds]);

            useEffect(() => {
                let interval = null;
                if (isActive && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                setIsActive(false);
                                clearInterval(interval);
                                if (!completedTriggered.current) {
                                    completedTriggered.current = true;
                                    AudioEngine.playSuccess();
                                    triggerHaptic([100, 50, 100]);
                                    onCompleteTask(taskId, category, xpReward, true);
                                    setIsOpen(false);
                                    update('deepFocusActive', false);
                                    setGlobalFocusId(null);
                                }
                                return 0;
                            }
                            if ((prev - 1) % 10 === 0) AudioEngine.playTick();
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => { if (interval) clearInterval(interval); };
            }, [isActive, taskId, category, xpReward, onCompleteTask, update, setGlobalFocusId]);

            const handleToggleActive = () => {
                const nextActive = !isActive;
                setIsActive(nextActive);
                update('deepFocusActive', nextActive);
                if (nextActive) {
                    setGlobalFocusId(taskId);
                } else {
                    setGlobalFocusId(null);
                }
            };

            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            const progress = totalSeconds > 0 ? ((totalSeconds - timeLeft) / totalSeconds) * 100 : 0;

            if (state.deepFocusActive && globalFocusId !== taskId) return null;

            if (!isOpen) return (
                <div className="flex gap-2.5 mt-3 flex-wrap">
                    <button type="button" onClick={() => { setIsMicro(false); setIsOpen(true); }} className="text-[11px] flex items-center gap-2 font-bold text-slate-200 bg-[#161616] border border-[#2b2b2b] px-3.5 py-3 rounded-xl hover:text-amber-400 transition-colors min-h-[44px]">
                        <IconBase iconName="Clock" size={14} className="text-amber-500"/> Спринт {defaultMinutes} мин
                    </button>
                    <button type="button" onClick={() => { setIsMicro(true); setIsOpen(true); }} className="text-[11px] flex items-center gap-2 font-bold text-amber-400 bg-amber-500/10 border border-amber-500/20 px-3.5 py-3 rounded-xl min-h-[44px]">
                        <IconBase iconName="Zap" size={14} /> Атомный старт (2 мин)
                    </button>
                </div>
            );

            return (
                <div className="nav-offset mt-4 p-5 bg-[#0a0a0a]/90 border border-[#262626] rounded-2xl flex flex-col items-center w-full transform transition-all animate-in zoom-in-95">
                    <div className="flex justify-between w-full mb-4 items-center">
                        <span className="text-slate-200 font-black text-xs uppercase tracking-wider truncate flex items-center gap-1">
                            <IconBase iconName="Target" size={14} className="text-amber-500"/> {isMicro ? 'Микро-Концентрация' : taskName}
                        </span>
                        <button type="button" onClick={() => { setIsActive(false); setIsOpen(false); update('deepFocusActive', false); setGlobalFocusId(null); }} className="text-slate-400 hover:text-white p-2 bg-[#1a1a1a] rounded-lg min-h-[36px] min-w-[36px] flex items-center justify-center"><IconBase iconName="X" size={14}/></button>
                    </div>
                    <div className="relative w-36 h-36 flex items-center justify-center mb-5">
                        <svg className="w-full h-full -rotate-90 absolute" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="44" fill="none" stroke="#1f1f1f" strokeWidth="6" />
                            <circle cx="50" cy="50" r="44" fill="none" stroke="#fbbf24" strokeWidth="6" strokeLinecap="round" strokeDasharray="276" strokeDashoffset={276 - (276 * progress) / 100} style={{ transition: 'stroke-dashoffset 1s linear' }} />
                        </svg>
                        <div className="text-3xl font-mono font-black text-white">{m}:{s}</div>
                    </div>
                    <div className="flex gap-2 w-full max-w-[240px]">
                        <button type="button" onClick={handleToggleActive} className={`flex-1 py-3 rounded-xl font-black text-xs uppercase min-h-[44px] ${isActive ? 'bg-[#1a1a1a] text-slate-200' : 'bg-amber-400 text-black'}`}>
                            {isActive ? 'Пауза' : 'Старт'}
                        </button>
                        <button type="button" onClick={() => { setIsActive(false); setTimeLeft(totalSeconds); }} className="p-3 rounded-xl bg-[#0f0f0f] border border-[#262626] text-slate-300 min-h-[44px] min-w-[44px] flex items-center justify-center"><IconBase iconName="Clock" size={16}/></button>
                    </div>
                </div>
            );
        };

        // Главный Дашборд с вычисляемой аналитикой и блоком "Следующее лучшее действие"
        const DashboardView = ({ state, update, toggleTask, setGlobalFocusId, globalFocusId, onCodeClick }) => {
            const todayDate = new Date().toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
            const mode = state.currentMode.toUpperCase();
            const timeSettings = MODES[mode] || MODES.NORM;

            const randomQuote = useMemo(() => {
                const seed = state.stats.xp + (state.streakCounter * 7);
                return STOIC_QUOTES[seed % STOIC_QUOTES.length];
            }, [state.stats.xp, state.streakCounter]);

            const bookPercent = useMemo(() => Math.min(100, Math.floor((state.bookProgress.totalPages / 77) * 100)), [state.bookProgress.totalPages]);
            const targetDaysLeft = useMemo(() => Math.max(1, 77 - state.bookProgress.totalPages), [state.bookProgress.totalPages]);

            const currentChapterName = useMemo(() => {
                const chapters = [
                    "Глава 1: Иллюзия ментального шума",
                    "Глава 2: Дихотомия контроля в действии",
                    "Глава 3: Разрушение современных психологических догм",
                    "Глава 4: Нейробиология суверенной воли",
                    "Глава 5: Математика личных алгоритмов",
                    "Глава 6: Выход из когнитивного плена",
                    "Глава 7: Создание личной касты"
                ];
                return chapters[Math.min(6, state.bookProgress.chapter - 1)];
            }, [state.bookProgress.chapter]);

            // Вычисляемая расширенная аналитика
            const dayAnalytics = useMemo(() => {
                const tasks = Object.keys(state.dailyTasks);
                const total = tasks.length;
                const completed = Object.values(state.dailyTasks).filter(Boolean).length;
                const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
                
                const coreKeys = ['waterAm', 'morningHygiene', 'pm', 'body', 'eveningHygiene'];
                const coreTotal = coreKeys.length;
                const coreCompleted = coreKeys.filter(k => state.dailyTasks[k]).length;

                return { total, completed, percent, coreTotal, coreCompleted };
            }, [state.dailyTasks]);

            // Алгоритм "Следующее лучшее действие"
            const nextBestAction = useMemo(() => {
                if (!state.dailyTasks.waterAm) {
