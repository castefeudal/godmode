            if (!window.crypto || !window.crypto.subtle) {

            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);

        const createInitialState = () => ({

        const clampNumber = (value, fallback, min, max) => {
            const number = Number(value);
            const safe = Number.isFinite(number) ? number : fallback;
            return Math.max(min, Math.min(max, safe));
        };

        const clampInteger = (value, fallback, min, max) => {
            return Math.floor(clampNumber(value, fallback, min, max));
        };

        const isOwner = (state) => state.access?.mode === ACCESS_MODES.OWNER;
        const isGuest = (state) => state.access?.mode === ACCESS_MODES.GUEST;
        const isLocked = (state) => state.access?.mode === ACCESS_MODES.LOCKED;
        const canWrite = (state) => isOwner(state);

        const getTodayKey = () => new Date().toISOString().slice(0, 10);
        
        const safeDateKey = (value) => {
            if (!value) return getTodayKey();
            const d = new Date(value);
            if (!Number.isFinite(d.getTime())) return getTodayKey();
            return d.toISOString().slice(0, 10);

        const buildDayArchive = (state) => {
            const allTasks = Object.keys(state.dailyTasks || {});
            const completed = Object.values(state.dailyTasks || {}).filter(Boolean).length;
            const total = allTasks.length;
            const percent = total > 0 ? Math.round((completed / total) * 100) : 0;

            const coreTasks = getCoreTasksForMode(state.currentMode, state.mainGoal?.active);
            const coreCompleted = coreTasks.filter(id => state.dailyTasks[id]).length;
            const coreTotal = coreTasks.length;
            const corePercent = coreTotal > 0 ? Math.round((coreCompleted / coreTotal) * 100) : 0;

            return {
                date: state.lastLoginDate || getTodayKey(),
                archivedAt: new Date().toISOString(),
                dailyTasks: { ...state.dailyTasks },
                taskTimestamps: { ...state.taskTimestamps },
                energyMetrics: { ...state.energyMetrics },
                cuttingTracker: { ...state.cuttingTracker },
                nutrition: { ...state.nutrition },
                mainGoal: { ...state.mainGoal },
                currentMode: state.currentMode,
                statsSnapshot: { ...state.stats },
                completionPercent: percent,
                coreCompletionPercent: corePercent,
                completed,
                total,
                coreCompleted,
                coreTotal,
                xpEarned: state.stats?.xp || 0
            };
        };

        function migrateState(rawState) {
            if (!rawState) return createInitialState();
            
            const state = createInitialState();
            
            state.currentTab = VALID_TABS.includes(rawState.currentTab) ? rawState.currentTab : INITIAL_STATE.currentTab;
            state.currentMode = VALID_MODES.includes(rawState.currentMode) ? rawState.currentMode : INITIAL_STATE.currentMode;
            
            if (rawState.circadianOverride) state.circadianOverride = rawState.circadianOverride;
            state.deepFocusActive = !!rawState.deepFocusActive;
            if (rawState.lastLoginDate) state.lastLoginDate = String(rawState.lastLoginDate);
            if (rawState.streakCounter) state.streakCounter = Math.max(0, Number(rawState.streakCounter) || 0);
            if (rawState.contentLadder) state.contentLadder = Number(rawState.contentLadder);
            if (rawState.sunoIdeas) state.sunoIdeas = Array.isArray(rawState.sunoIdeas) ? rawState.sunoIdeas : [];
            if (rawState.languagePhrases) state.languagePhrases = Array.isArray(rawState.languagePhrases) ? rawState.languagePhrases : [];

            state.dailyTasks = { ...state.dailyTasks, ...(rawState.dailyTasks || {}) };
            state.mainGoal = { ...state.mainGoal, ...(rawState.mainGoal || {}) };
            state.mainGoal.timeLimitMinutes = clampInteger(state.mainGoal.timeLimitMinutes, 60, 15, 60);
            state.mainGoal.active = Boolean(state.mainGoal.active);

            state.cuttingTracker = { ...state.cuttingTracker, ...(rawState.cuttingTracker || {}) };
            state.nutrition = { ...state.nutrition, ...(rawState.nutrition || {}) };
            state.supplementPlan = { ...state.supplementPlan, ...(rawState.supplementPlan || {}) };

            state.taskTimestamps = { ...(rawState.taskTimestamps || {}) };
            state.notes = { ...state.notes, ...(rawState.notes || {}) };
            state.history = { ...(rawState.history || {}) };
            
            state.settings = { ...state.settings, ...(rawState.settings || {}) };
            state.settings.evidenceMode = Boolean(state.settings.evidenceMode);
            state.settings.soundEnabled = Boolean(state.settings.soundEnabled);
            state.settings.hapticsEnabled = Boolean(state.settings.hapticsEnabled);
            state.settings.animationsEnabled = Boolean(state.settings.animationsEnabled);
            state.settings.compactMode = Boolean(state.settings.compactMode);
            state.settings.confirmBeforeReset = Boolean(state.settings.confirmBeforeReset);
            state.settings.autoArchiveDays = clampInteger(state.settings.autoArchiveDays, 90, 7, 365);
            state.settings.autoLockMinutes = clampInteger(state.settings.autoLockMinutes, 30, 5, 240);

            state.access = { ...state.access, ...(rawState.access || {}) };
            if (!Object.values(ACCESS_MODES).includes(state.access.mode)) {
                state.access.mode = ACCESS_MODES.LOCKED;
            }
            state.access.ownerPinSet = true;
            state.access.ownerPinHash = String(state.access.ownerPinHash || DEFAULT_OWNER_PIN_HASH);
            state.access.guestClicks = clampInteger(state.access.guestClicks, 0, 0, 1000000);
            state.access.lastOwnerLoginAt = String(state.access.lastOwnerLoginAt || '');
            state.access.sessionStartedAt = String(state.access.sessionStartedAt || '');
            state.access.lastActivityAt = String(state.access.lastActivityAt || '');

            const rMetrics = rawState.energyMetrics || {};
            state.energyMetrics = {
                sleep: clampNumber(rMetrics.sleep, 7.5, 0, 12),
                energy: clampNumber(rMetrics.energy, 7, 0, 10),
                stress: clampNumber(rMetrics.stress, 3, 0, 10),
                readiness: clampNumber(rMetrics.readiness, 7, 0, 10)
            };

            const rBook = rawState.bookProgress || {};
            state.bookProgress = {
                chapter: clampInteger(rBook.chapter, 1, 1, 7),
                totalPages: clampInteger(rBook.totalPages, 15, 0, 77)
            };
            
            const rStats = rawState.stats || {};
            const xp = clampInteger(rStats.xp, 0, 0, 100000000);
            state.stats = {
                xp,
                level: Math.floor(Math.sqrt(xp / 100)) + 1,
                returnRate: clampNumber(rStats.returnRate, 100, 20, 100),
                daysLogged: clampInteger(rStats.daysLogged, 1, 1, 100000),
                categories: { ...state.stats.categories, ...(rStats.categories || {}) }
            };
            
            Object.keys(state.stats.categories).forEach(key => {
                state.stats.categories[key] = clampNumber(state.stats.categories[key], state.stats.categories[key] || 0, 0, 100);
            });
            
            return state;
        }

        const safeStorage = {
            get() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (!saved) return migrateState(null);
                    return migrateState(JSON.parse(saved));
                } catch (e) {
                    console.error("Storage corrupted. Fallback loaded.", e);
                    return migrateState(null);
                }
            },
            set(state) {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                } catch (e) {
                    console.error("Ошибка синхронизации LocalStorage:", e);

        const useCurrentDateTime = () => {

        class ErrorBoundary extends React.Component {

            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ background: '#0a0a0a', color: '#ef4444', minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifycontent: 'center', padding: '24px', fontFamily: 'monospace' }}>

                                СБРОСИТЬ СТОРИДЖ И ОБНОВИТЬ
                            </button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        function useAppState() {
            const [state, setState] = useState(() => safeStorage.get());
            const [toast, setToast] = useState({ visible: false, msg: '' });
            const [globalFocusId, setGlobalFocusId] = useState(null);
            const toastTimeoutRef = useRef(null);
            const saveDebounceRef = useRef(null);

            const showToast = useCallback((msg) => {
                if (toastTimeoutRef.current) clearTimeout(toastTimeoutRef.current);
                setToast({ visible: true, msg });
                toastTimeoutRef.current = setTimeout(() => {
                    setToast({ visible: false, msg: '' });
                }, 3000);
            }, []);

            useEffect(() => {
                if (state.access?.mode !== ACCESS_MODES.OWNER) return;
                saveDebounceRef.current = setTimeout(() => {
                    safeStorage.set(state);
                }, 250);
                return () => { if (saveDebounceRef.current) clearTimeout(saveDebounceRef.current); };
            }, [state]);

            useEffect(() => {
                const handleUnload = () => {
                    if (state.access?.mode === ACCESS_MODES.OWNER) {
                        safeStorage.set(state);
                    }
                };
                window.addEventListener('beforeunload', handleUnload);
                return () => window.removeEventListener('beforeunload', handleUnload);
            }, [state]);

            useEffect(() => {
                if (state.access?.mode !== ACCESS_MODES.OWNER) return;

                const markActivity = () => {
                    setState(prev => {
                        if (prev.access?.mode !== ACCESS_MODES.OWNER) return prev;
                        return {
                            ...prev,
                            access: { ...prev.access, lastActivityAt: new Date().toISOString() }
                        };
                    });
                };

                window.addEventListener('click', markActivity);
                window.addEventListener('keydown', markActivity);
                window.addEventListener('touchstart', markActivity);

                const interval = setInterval(() => {
                    setState(prev => {
                        if (prev.access?.mode !== ACCESS_MODES.OWNER) return prev;
                        const last = new Date(prev.access?.lastActivityAt || prev.access?.sessionStartedAt || Date.now()).getTime();
                        const diff = Date.now() - last;
                        const limit = (prev.settings?.autoLockMinutes || 30) * 60 * 1000;

                        if (diff > limit) {
                            return {
                                ...prev,
                                access: { ...prev.access, mode: ACCESS_MODES.LOCKED }
                            };
                        }
                        return prev;
                    });
                }, 30000);

                return () => {
                    window.removeEventListener('click', markActivity);
                    window.removeEventListener('keydown', markActivity);
                    window.removeEventListener('touchstart', markActivity);
                    clearInterval(interval);
                };
            }, [state.access?.mode]);

            useEffect(() => {
                const today = new Date().toISOString().slice(0, 10);
                if (state.lastLoginDate !== today && state.access?.mode === ACCESS_MODES.OWNER) {
                    setState(prev => {
                        const yesterdayStr = prev.lastLoginDate || new Date(Date.now() - 86400000).toISOString().slice(0, 10);
                        const updatedHistory = { ...prev.history };
                        
                        const archiveKey = safeDateKey(yesterdayStr);
                        updatedHistory[archiveKey] = buildDayArchive(prev);

                        const coreTasks = getCoreTasksForMode(prev.currentMode, prev.mainGoal?.active);
                        const coreCompletedAll = coreTasks.every(k => prev.dailyTasks[k]);
                        const newStreak = coreCompletedAll ? (prev.streakCounter || 0) + 1 : 0;
                        const penaltyRate = !prev.dailyTasks.pm || !prev.dailyTasks.body ? 5 : 0;

                        return {
                            ...prev,
                            currentMode: 'NORM',
                            deepFocusActive: false,
                            dailyTasks: { ...INITIAL_STATE.dailyTasks },
                            taskTimestamps: {},
                            languagePhrases: [],
                            lastLoginDate: today,
                            streakCounter: newStreak,
                            history: updatedHistory,
                            stats: {
                                ...prev.stats,
                                daysLogged: (prev.stats.daysLogged || 1) + 1,
                                returnRate: Math.max(20, Math.min(100, (prev.stats.returnRate || 100) - penaltyRate + 3))
                            }
                        };
                    });
                    showToast("Начался новый день.");
                }
            }, [state.lastLoginDate, state.access?.mode, showToast]);

            const update = useCallback((key, value) => {
                setState(prev => {
                    const guestAllowedKeys = ['currentTab'];
                    if (!canWrite(prev) && !guestAllowedKeys.includes(key)) {
                        return {
                            ...prev,
                            access: { ...prev.access, guestClicks: (prev.access?.guestClicks || 0) + 1 }
                        };
                    }

                    if (typeof value === 'object' && !Array.isArray(value) && value !== null && prev[key]) {
                        return { ...prev, [key]: { ...prev[key], ...value } };
                    }
                    return { ...prev, [key]: value };
                });
                
                setState(current => {
                    if (!canWrite(current) && key !== 'currentTab') {
                        showToast('Гостевой режим: изменения не сохраняются.');
                    }
                    return current;
                });
            }, [showToast]);

            const toggleTask = useCallback((taskId, category, xpReward = 10, forceState = null) => {
                let checkWrite = false;
                setState(p => { if (canWrite(p)) checkWrite = true; return p; });

                if (!checkWrite) {
                    setState(prev => ({
                        ...prev,
                        access: { ...prev.access, guestClicks: (prev.access?.guestClicks || 0) + 1 }
                    }));
                    showToast('Гостевой режим: клик не засчитан.');
                    return;
                }

                setState(prev => {
                    const isDone = forceState !== null ? forceState : !prev.dailyTasks[taskId];
                    if (forceState !== null && prev.dailyTasks[taskId] === forceState) return prev;

                    AudioEngine.playClick(prev.settings.soundEnabled);
                    triggerHaptic(prev.settings.hapticsEnabled, 14);

                    const currentTime = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                    let newXp = prev.stats.xp || 0;
                    let catVal = prev.stats.categories[category] || 0;
                    const updatedTimestamps = { ...prev.taskTimestamps };

                    const coreTasks = getCoreTasksForMode(prev.currentMode, prev.mainGoal?.active);
                    const isCore = coreTasks.includes(taskId);
                    const finalReward = isCore && isDone ? xpReward + 10 : xpReward;

                    if (isDone) {
                        newXp += finalReward;
                        catVal = Math.min(100, catVal + finalReward / 2);
                        updatedTimestamps[taskId] = currentTime;
                        AudioEngine.playSuccess(prev.settings.soundEnabled);
                    } else {
                        newXp = Math.max(0, newXp - finalReward);
                        catVal = Math.max(0, catVal - finalReward / 2);
                        delete updatedTimestamps[taskId];
                    }

                    const computedLevel = Math.floor(Math.sqrt(newXp / 100)) + 1;

                    return {
                        ...prev,
                        dailyTasks: { ...prev.dailyTasks, [taskId]: isDone },
                        taskTimestamps: updatedTimestamps,
                        stats: {
                            ...prev.stats,
                            xp: newXp,
                            level: computedLevel,
                            categories: { ...prev.stats.categories, [category]: catVal }
                        }
                    };
                });
                showToast('Готово, сохранено.');
            }, [showToast]);

            return { state, setState, update, toggleTask, toast, showToast, globalFocusId, setGlobalFocusId };
        }

        const Button = React.memo(({ children, variant = 'primary', className = "", onClick, icon: iconName, ariaLabel }) => {
            const variants = {
                primary: `${THEME.accentBg} text-[#0a0a0a] font-black ${THEME.accentHover} border border-amber-400/20`,
                secondary: `bg-[#1c1c1c] text-neutral-200 hover:bg-[#262626] border border-[#333]`,
                danger: `bg-red-950/40 text-red-400 border border-red-900/40 hover:bg-red-900/40 hover:text-red-100`
            };
            return (
                <button 
                    type="button"
                    aria-label={ariaLabel}
                    onClick={onClick} 
                    className={`flex items-center justify-center gap-2 px-4 py-3 rounded-xl transition-all duration-200 active:scale-[0.99] touch-manipulation font-bold uppercase tracking-wide text-xs min-h-[44px] ${variants[variant]} ${className}`}
                >
                    {iconName && <IconBase iconName={iconName} size={14} />}
                    {children && <span className="truncate">{children}</span>}
                </button>
            );
        });
        Button.displayName = 'Button';

        const NumericInput = React.memo(({ label, value, onChange, min=0, max=10, step=1, hint, color="accent", readOnly=false }) => {
            return (
                <div className="flex flex-col gap-1 w-full">
                    <span className={`${THEME.textMuted} text-xs uppercase tracking-wider px-1`}>
                        {label} {hint && <span className="opacity-50 font-normal normal-case">({hint})</span>}
                    </span>
                    <div className="flex items-center bg-[#141414] border border-[#262626] p-1 rounded-xl w-full">
                        <button type="button" aria-label="Уменьшить" disabled={readOnly} onClick={() => onChange(Math.max(min, Number(value) - step))} className="p-3 rounded-lg bg-[#1c1c1c] text-neutral-300 hover:text-amber-400 active:scale-95 min-h-[44px] min-w-[44px] flex items-center justify-center disabled:opacity-30"><IconBase iconName="Minus" size={14}/></button>
                        <input type="number" readOnly value={value} className={`flex-1 bg-transparent text-center text-lg font-mono font-bold ${color === 'red' ? 'text-red-400' : 'text-amber-400'}`} />
                        <button type="button" aria-label="Увеличить" disabled={readOnly} onClick={() => onChange(Math.min(max, Number(value) + step))} className="p-3 rounded-lg bg-[#1c1c1c] text-neutral-300 hover:text-amber-400 active:scale-95 min-h-[44px] min-w-[44px] flex items-center justify-center disabled:opacity-30"><IconBase iconName="Plus" size={14}/></button>
                    </div>
                </div>
            );
        });
        NumericInput.displayName = 'NumericInput';

        const CheckItem = React.memo(({ id, checked, onChange, label, subLabel, anchor, timeLog, mode = 'NORM', disabled=false }) => {
            const coreTasks = getCoreTasksForMode(mode);
            const isCore = coreTasks.includes(id);
            return (
                <button 
                    type="button"
                    id={`task-card-${id}`} 
                    aria-pressed={checked}
                    disabled={disabled}
                    className={`w-full text-left flex items-start gap-4 p-4 rounded-xl transition-all border relative overflow-hidden min-h-[56px] touch-manipulation ${checked ? 'bg-amber-500/5 border-amber-500/20' : isCore ? 'bg-[#1a1510] border-amber-500/30 hover:border-amber-500/50' : 'bg-[#141414] border-[#262626] hover:border-amber-500/20'} ${disabled ? 'opacity-70 cursor-not-allowed' : ''}`} 
                    onClick={onChange}
                >
                    <div className={`mt-0.5 w-6 h-6 rounded-full flex items-center justify-center border-2 flex-shrink-0 ${checked ? 'bg-amber-500 border-transparent text-neutral-950' : isCore ? 'border-amber-500/70' : 'border-neutral-500'}`}>
                        {checked && <IconBase iconName="Check" size={12} strokeWidth={4} />}
                    </div>
                    <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap mb-0.5">
                            <span className={`text-[10px] font-bold uppercase tracking-wider flex items-center gap-1 ${isCore ? 'text-amber-400' : 'text-neutral-400'}`}>
                                <IconBase iconName="Anchor" size={9}/> {anchor || 'Действие'}
                            </span>
                            {checked && timeLog && <span className="text-neutral-400 font-mono text-[10px] bg-neutral-800 px-1.5 py-0.5 rounded">🕒 {timeLog}</span>}
                        </div>
                        <span className={`font-bold block text-base leading-tight break-words ${checked ? 'text-neutral-500 line-through decoration-amber-500/30' : 'text-neutral-100'}`}>{label}</span>
                        {subLabel && <span className={`text-sm mt-0.5 block leading-normal break-words ${checked ? 'text-neutral-500' : 'text-neutral-400'}`}>{subLabel}</span>}
                    </div>
                </button>
            );
        });
        CheckItem.displayName = 'CheckItem';

        const TipCard = React.memo(({ text, title="Подсказка.", iconName = "Zap" }) => (
            <div className="bg-[#121212] border border-[#262626] rounded-xl p-4 flex gap-3 items-start relative overflow-hidden shadow-sm">
                <div className="absolute left-0 top-0 bottom-0 w-1 bg-amber-500"></div>
                <div className="p-2 bg-amber-500/10 rounded-lg flex-shrink-0 text-amber-400 border border-amber-500/10">
                    <IconBase iconName={iconName} size={16} />
                </div>
                <div className="flex-1 min-w-0">
                    <h4 className="text-[10px] font-bold text-amber-400 uppercase tracking-wider mb-0.5">{title}</h4>
                    <p className="text-sm text-neutral-300 leading-relaxed font-medium break-words">{text}</p>
                </div>
            </div>
        ));
        TipCard.displayName = 'TipCard';

        const FocusTimer = ({ defaultMinutes, taskName, taskId, category, xpReward, onCompleteTask, state, update, setGlobalFocusId, globalFocusId, readOnly=false }) => {
            const [timeLeft, setTimeLeft] = useState(defaultMinutes * 60);
            const [isActive, setIsActive] = useState(false);
            const [isOpen, setIsOpen] = useState(false);
            const [isMicro, setIsMicro] = useState(false);
            
            const endTimeRef = useRef(null);
            const intervalRef = useRef(null);
            const completedTriggered = useRef(false);
            const lastTickSecondRef = useRef(null);
            
            const totalSeconds = useMemo(() => (isMicro ? 3 : defaultMinutes) * 60, [isMicro, defaultMinutes]);
            
            useEffect(() => { 
                setTimeLeft(totalSeconds); 
                completedTriggered.current = false;
                lastTickSecondRef.current = null;
                if (isActive) {
                    endTimeRef.current = Date.now() + totalSeconds * 1000;
                }
            }, [totalSeconds]);

            useEffect(() => {
                if (isActive) {
                    intervalRef.current = setInterval(() => {
                        const remaining = Math.max(0, Math.ceil((endTimeRef.current - Date.now()) / 1000));
                        setTimeLeft(remaining);
                        
                        if (remaining <= 0) {
                            setIsActive(false);
                            clearInterval(intervalRef.current);
                            if (!completedTriggered.current) {
                                completedTriggered.current = true;
                                AudioEngine.playSuccess(state.settings.soundEnabled);
                                onCompleteTask(taskId, category, xpReward, true);
                                setIsOpen(false);
                                update('deepFocusActive', false);
                                setGlobalFocusId(null);
                                lastTickSecondRef.current = null;
                            }
                        } else if (remaining % 10 === 0 && lastTickSecondRef.current !== remaining) {
                            lastTickSecondRef.current = remaining;
                            AudioEngine.playTick(state.settings.soundEnabled);
                        }
                    }, 250);
                } else {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                }
                return () => { if (intervalRef.current) clearInterval(intervalRef.current); };
            }, [isActive, taskId, category, xpReward, onCompleteTask, update, setGlobalFocusId, state.settings.soundEnabled, totalSeconds]);

            const handleToggleActive = () => {
                if (readOnly) return;
                const nextActive = !isActive;
                if (nextActive) {
                    endTimeRef.current = Date.now() + timeLeft * 1000;
                    completedTriggered.current = false;
                    lastTickSecondRef.current = null;
                    setGlobalFocusId(taskId);
                } else {
                    setGlobalFocusId(null);
                }
                setIsActive(nextActive);
                update('deepFocusActive', nextActive);
            };

            const handleReset = () => {
                if (readOnly) return;
                setIsActive(false);
                update('deepFocusActive', false);
                setGlobalFocusId(null);
                completedTriggered.current = false;
                lastTickSecondRef.current = null;
                setTimeLeft(totalSeconds);
                AudioEngine.playClickReset(state.settings.soundEnabled);
            };

            if (defaultMinutes <= 0) return null;
            if (state.deepFocusActive && globalFocusId !== taskId) return null;

            if (readOnly) {
                return (
                    <div className="mt-2 text-xs text-neutral-400 bg-[#141414] border border-[#262626] rounded-xl p-3 font-medium">
                        Таймер продуктивности доступен только владельцу.
                    </div>
                );
            }

            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            const progress = totalSeconds > 0 ? ((totalSeconds - timeLeft) / totalSeconds) * 100 : 0;

            if (!isOpen) return (
                <div className="flex gap-2 mt-2 flex-wrap">
                    <button type="button" onClick={() => { setIsMicro(false); setIsOpen(true); }} className="text-xs flex items-center gap-2 font-bold text-neutral-200 bg-[#1a1a1a] border border-[#2d2d2d] px-3 py-2 rounded-xl hover:text-amber-400 min-h-[40px]">
                        <IconBase iconName="Clock" className="text-amber-500"/> Таймер {defaultMinutes} мин
                    </button>
                    <button type="button" onClick={() => { setIsMicro(true); setIsOpen(true); }} className="text-xs flex items-center gap-2 font-bold text-amber-400 bg-amber-500/10 border border-amber-500/20 px-3 py-2 rounded-xl min-h-[40px]">
                        <IconBase iconName="Zap" /> Тест-Спринт (3 мин)
                    </button>
                </div>
            );

            return (
                <div className="mt-3 p-4 bg-[#0d0d0d] border border-[#262626] rounded-xl flex flex-col items-center w-full animate-in zoom-in-95">
                    <div className="flex justify-between w-full mb-3 items-center">
                        <span className="text-neutral-200 font-bold text-xs uppercase tracking-wide truncate flex items-center gap-1.5">
                            <IconBase iconName="Target" className="text-amber-500"/> {isMicro ? 'Короткий тест' : taskName}
                        </span>
                        <button type="button" aria-label="Закрыть таймер" onClick={() => { setIsActive(false); setIsOpen(false); update('deepFocusActive', false); setGlobalFocusId(null); lastTickSecondRef.current = null; }} className="text-neutral-400 hover:text-white p-1.5 bg-[#1a1a1a] rounded-lg min-h-[32px] min-w-[32px] flex items-center justify-center"><IconBase iconName="X" size={12}/></button>
                    </div>
                    <div className="relative w-24 h-24 flex items-center justify-center mb-4">
                        <svg className="w-full h-full -rotate-90 absolute" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="44" fill="none" stroke="#1c1c1c" strokeWidth="5" />
                            <circle cx="50" cy="50" r="44" fill="none" stroke="#f59e0b" strokeWidth="5" strokeLinecap="round" strokeDasharray="276" strokeDashoffset={276 - (276 * progress) / 100} style={{ transition: 'stroke-dashoffset 0.3s ease' }} />
                        </svg>
                        <div className="text-xl font-mono font-bold text-white">{m}:{s}</div>
                    </div>
                    <div className="flex gap-2 w-full max-w-[200px]">
                        <button type="button" onClick={handleToggleActive} className={`flex-1 py-2 rounded-lg font-bold text-xs uppercase min-h-[38px] ${isActive ? 'bg-[#222] text-neutral-200' : 'bg-amber-500 text-neutral-950'}`}>
                            {isActive ? 'Пауза' : 'Старт'}
                        </button>
                        <button type="button" aria-label="Сбросить таймер" onClick={handleReset} className="p-2 rounded-lg bg-[#141414] border border-[#262626] text-neutral-300 min-h-[38px] min-w-[38px] flex items-center justify-center"><IconBase iconName="RotateCcw" size={14}/></button>
                    </div>
                </div>
            );
        };

        const BreathingTimer = ({ type, state, compact = false, onCompleteAction, disabled=false }) => {
            const [phase, setPhase] = useState('Ожидание');
            const [timeLeft, setTimeLeft] = useState(0);
            const [isRunning, setIsRunning] = useState(false);
            const timerRef = useRef(null);

            const clearTimer = () => {
                if (timerRef.current) {
                    clearTimeout(timerRef.current);
                    timerRef.current = null;
                }
            };

            useEffect(() => { return () => clearTimer(); }, []);

            const startBreathing = () => {
                if (disabled) return;
                clearTimer();
                setIsRunning(true);
                setPhase('Вдох');
                setTimeLeft(4);
            };

            const handleReset = () => {
                clearTimer();
                setIsRunning(false);
                setPhase('Ожидание');
                setTimeLeft(0);
            };

            useEffect(() => {
                if (isRunning && timeLeft > 0) {
                    timerRef.current = setTimeout(() => {
                        setTimeLeft(timeLeft - 1);
                    }, 1000);
                } else if (isRunning && timeLeft === 0) {
                    AudioEngine.playPhaseChange(state.settings.soundEnabled);
                    if (phase === 'Вдох') {
                        setPhase('Задержка'); setTimeLeft(4);
                    } else if (phase === 'Задержка') {
                        setPhase('Выдох'); setTimeLeft(4);
                    } else if (phase === 'Выдох') {
                        setPhase('Пауза'); setTimeLeft(4);
                    } else {
                        setIsRunning(false);
                        setPhase('Завершено');
                        if (onCompleteAction) onCompleteAction();
                    }
                }
                return () => clearTimeout(timerRef.current);
            }, [isRunning, timeLeft, phase, state.settings.soundEnabled]);

            const sphereScale = useMemo(() => {
                if (!isRunning) return 'scale-100';
                if (phase === 'Вдох') return 'scale-125 duration-1000';
                if (phase === 'Задержка') return 'scale-125 duration-0';
                if (phase === 'Выдох') return 'scale-95 duration-1000';
                return 'scale-95 duration-0';
            }, [isRunning, phase]);

            if (compact) {
                return (
                    <div className="p-3.5 bg-[#121212] border border-[#262626] rounded-xl flex items-center justify-between gap-3 shadow-sm">
                        <div className="min-w-0">
                            <h4 className="text-sm font-bold text-amber-400">Настройка фокуса 4-4-4-4</h4>
                            <p className="text-xs text-neutral-400 truncate font-medium">
                                {isRunning ? `${phase}: ${timeLeft} сек` : 'Простое дыхание для перезагрузки ума.'}
                            </p>
                        </div>
                        <button
                            type="button"
                            disabled={disabled && !isRunning}
                            onClick={isRunning ? handleReset : startBreathing}
                            className="px-4 py-2 bg-[#1c1c1c] border border-[#333] hover:border-amber-500/30 text-neutral-200 rounded-lg text-xs font-bold uppercase min-h-[36px] disabled:opacity-30"
                        >
                            {isRunning ? 'Сброс' : 'Начать'}
                        </button>
                    </div>
                );
            }

            return (
                <div className="p-4 bg-[#0d0d0d] border border-[#262626] rounded-xl text-center flex flex-col items-center justify-center space-y-3 mb-3">
                    <h4 className="text-xs font-bold uppercase text-amber-400">Спокойное квадратное дыхание</h4>
                    <div className="w-16 h-16 flex items-center justify-center relative my-1">
                        <div className={`absolute w-12 h-12 rounded-full bg-amber-500/20 transition-transform transform ${sphereScale}`}></div>
                        <div className={`absolute w-10 h-10 rounded-full bg-amber-500 transition-transform transform ${sphereScale} flex items-center justify-center`}>
                            <IconBase iconName="Wind" size={14} className="text-neutral-950" />
                        </div>
                    </div>
                    <div className="text-base font-mono font-bold text-white">{phase} {isRunning && `: ${timeLeft}`}</div>
                    <div className="flex gap-2 w-full">
                        <button type="button" onClick={startBreathing} disabled={isRunning || disabled} className="flex-1 py-2 bg-[#1c1c1c] border border-[#333] hover:border-amber-500/30 text-neutral-200 rounded-lg font-bold text-xs uppercase disabled:opacity-30 min-h-[38px]">
                            {isRunning ? 'Идет цикл' : 'Начать'}
                        </button>
                        {isRunning && (
                            <button type="button" onClick={handleReset} className="px-3 bg-red-950/40 text-red-400 border border-red-900/40 rounded-lg text-xs font-bold uppercase min-h-[38px]">Сброс</button>
                        )}
                    </div>
                </div>
            );
        };

        const ManifestReader = ({ type, onCodeClick }) => {
            const data = {
                AM: {
                    title: "Утренний манифест",
                    text: "Я возвращаю attention к тому, чем управляю сегодня. Моя задача — действовать спокойно, точно и последовательно. Я выбираю структуру, движение по вектору и реальные шаги."
                },
                PM: {
                    title: "Вечерний манифест",
                    text: "День завершен. Моя текущая задача — убрать лишний ментальный шум, зафиксировать сделанное, полностью восстановиться и вовремя лечь спать, чтобы завтра продолжить со свежими силами."
                }
            }[type];

            return (
                <div className="p-4 bg-[#0c0c0c] border border-[#222] rounded-xl space-y-2">
                    <h3 className="text-xs font-bold text-white uppercase tracking-wider">{data.title}</h3>
                    <div className="text-sm text-neutral-300 bg-[#050505] p-3 rounded-lg border border-[#1a1a1a] leading-relaxed font-medium italic">
                        "{data.text}"
                    </div>
                    <button type="button" onClick={onCodeClick} className="w-full py-1 text-[10px] font-mono font-bold text-amber-500/40 hover:text-amber-400 uppercase tracking-wider min-h-[28px]">
                        [ Системные константы личности ]
                    </button>
                </div>
            );
        };

        const CuttingPanel = ({ state, update, readOnly=false }) => {
            return (
                <div className={`${THEME.panel} space-y-4`}>
                    <div className="flex items-center gap-2 border-b border-[#262626] pb-2">
                        <div className="p-2 bg-amber-500/10 Triump-amber-400 rounded-xl text-amber-400">
                            <IconBase iconName="TrendingUp" size={16} />
                        </div>
                        <div>
                            <h3 className="text-lg font-bold text-white uppercase">Сушка и аналитика тела</h3>
                            <p className="text-xs text-neutral-400 lowercase">Цель — стабильность, белок, тренировка и сон. Повторяемость важнее идеала.</p>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                        <div>
                            <label className="text-[11px] font-bold text-neutral-400 block mb-1 uppercase">Вес утром (кг)</label>
                            <input type="text" placeholder="--.-" disabled={readOnly} value={state.cuttingTracker.weightMorning || ''} onChange={e => update('cuttingTracker', { weightMorning: e.target.value })} className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-sm text-amber-400 font-mono font-bold focus:outline-none focus:border-amber-500/50 disabled:opacity-60" />
                        </div>
                        <div>
                            <label className="text-[11px] font-bold text-neutral-400 block mb-1 uppercase">Калории (ккал)</label>
                            <input type="text" placeholder={`цель: ${state.nutrition.targetCalories}`} disabled={readOnly} value={state.cuttingTracker.calories || ''} onChange={e => update('cuttingTracker', { calories: e.target.value })} className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-sm text-amber-400 font-mono font-bold focus:outline-none focus:border-amber-500/50 disabled:opacity-60" />
                        </div>
                        <div>
                            <label className="text-[11px] font-bold text-neutral-400 block mb-1 uppercase">Белок (г)</label>
                            <input type="text" placeholder={`цель: ${state.nutrition.proteinTarget}г`} disabled={readOnly} value={state.cuttingTracker.protein || ''} onChange={e => update('cuttingTracker', { protein: e.target.value })} className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-sm text-amber-400 font-mono font-bold focus:outline-none focus:border-amber-500/50 disabled:opacity-60" />
                        </div>
                        <div>
                            <label className="text-[11px] font-bold text-neutral-400 block mb-1 uppercase">Вода (л)</label>
                            <input type="text" placeholder={`цель: ${state.nutrition.waterTarget}л`} disabled={readOnly} value={state.cuttingTracker.water || ''} onChange={e => update('cuttingTracker', { water: e.target.value })} className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-sm text-amber-400 font-mono font-bold focus:outline-none focus:border-amber-500/50 disabled:opacity-60" />
                        </div>
                        <div>
                            <label className="text-[11px] font-bold text-neutral-400 block mb-1 uppercase">Шаги</label>
                            <input type="text" placeholder="0" disabled={readOnly} value={state.cuttingTracker.steps || ''} onChange={e => update('cuttingTracker', { steps: e.target.value })} className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-sm text-amber-400 font-mono font-bold focus:outline-none focus:border-amber-500/50 disabled:opacity-60" />
                        </div>
                        <div>
                            <label className="text-[11px] font-bold text-neutral-400 block mb-1 uppercase">Кардио (мин)</label>
                            <input type="text" placeholder="0" disabled={readOnly} value={state.cuttingTracker.cardioMinutes || ''} onChange={e => update('cuttingTracker', { cardioMinutes: e.target.value })} className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-sm text-amber-400 font-mono font-bold focus:outline-none focus:border-amber-500/50 disabled:opacity-60" />
                        </div>
                    </div>
                </div>
            );
        };

        const DashboardView = ({ state, update, toggleTask, setGlobalFocusId, globalFocusId, onCodeClick }) => {
            const randomQuote = useMemo(() => {
                const seed = (state.stats?.xp || 0) + (state.streakCounter * 7);
                return STOIC_QUOTES[seed % STOIC_QUOTES.length];
            }, [state.stats?.xp, state.streakCounter]);

            const dayAnalytics = useMemo(() => {
                const activeTasks = Object.keys(state.dailyTasks);
                const total = activeTasks.length;
                const completed = Object.values(state.dailyTasks).filter(Boolean).length;
                const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
                
                const coreTasks = getCoreTasksForMode(state.currentMode, state.mainGoal?.active);
                const coreTotal = coreTasks.length;
                const coreCompleted = coreTasks.filter(k => state.dailyTasks[k]).length;

                let status = "Алгоритм дня запущен";
                let statusColor = "text-red-400";

                if (coreCompleted === coreTotal) {
                    status = "Якоря закрыты";
                    statusColor = "text-amber-400";
                } else if (coreCompleted > 2) {
                    status = "Хороший темп";
                    statusColor = "text-neutral-300";
                }

                return { total, completed, percent, coreTotal, coreCompleted, status, statusColor };
            }, [state.dailyTasks, state.currentMode, state.mainGoal]);

            const nextBestAction = useMemo(() => {
                const modeOrder = {
                    NORM: ['waterAm', 'morningHygiene', 'morningCharge', 'breakfast', 'spanish', 'chinese', 'mainTask', 'pm', 'english', 'workStart', 'body', 'workMeal', 'homeArrival', 'cardio', 'dinner', 'plannedProcrastination', 'eveningHygiene', 'faceCare', 'nightSupplements', 'sleep'],
                    MAX: ['waterAm', 'morningHygiene', 'morningCharge', 'breakfast', 'spanish', 'chinese', 'mainTask', 'pm', 'english', 'workStart', 'body', 'workMeal', 'homeArrival', 'cardio', 'dinner', 'plannedProcrastination', 'eveningHygiene', 'faceCare', 'nightSupplements', 'sleep'],
                    MIN: ['waterAm', 'morningHygiene', 'breakfast', 'mainTask', 'pm', 'body', 'dinner', 'eveningHygiene', 'nightSupplements', 'sleep'],
                    RECOVERY: ['waterAm', 'morningHygiene', 'breakfast', 'body', 'dinner', 'eveningHygiene', 'faceCare', 'nightSupplements', 'sleep'],
                    SATURDAY: ['waterAm', 'breakfast', 'creativity', 'body', 'dinner', 'eveningHygiene', 'sleep'],
                    SUNDAY: ['waterAm', 'breakfast', 'weeklyPlanning', 'creativity', 'dinner', 'eveningHygiene', 'sleep']
                };

                const currentOrder = modeOrder[state.currentMode] || modeOrder.NORM;

                for (const taskId of currentOrder) {
                    if (taskId === 'mainTask' && !state.mainGoal.active) continue;
                    if (!state.dailyTasks[taskId]) {
                        const anchorInfo = DAY_ANCHORS.find(a => a.taskIds.includes(taskId));
                        
                        let labelText = "Следующий шаг";
                        let cat = "spirit";
                        let xp = 10;

                        if (taskId === 'waterAm') { labelText = "Вода после сна"; xp = 5; }
                        else if (taskId === 'morningHygiene') { labelText = "Утренний уход"; xp = 5; }
                        else if (taskId === 'morningCharge') { labelText = "Легкая разминка"; xp = 5; }
                        else if (taskId === 'breakfast') { labelText = "Завтрак"; xp = 5; }
                        else if (taskId === 'spanish') { labelText = "Испанский язык (15 мин)"; cat = "english"; }
                        else if (taskId === 'chinese') { labelText = "Китайский язык (15 мин)"; cat = "english"; }
                        else if (taskId === 'mainTask') { labelText = state.mainGoal.title || "Главная задача"; cat = "pm"; xp = 20; }
                        else if (taskId === 'pm') { labelText = "Project Management (Обучение)"; cat = "pm"; xp = 15; }
                        else if (taskId === 'english') { labelText = "Английский (30 мин)"; cat = "english"; xp = 15; }
                        else if (taskId === 'workStart') { labelText = "Старт работы в клубе"; cat = "pm"; }
                        else if (taskId === 'body') { labelText = "Тренировка в зале (1 час)"; cat = "body"; xp = 20; }
                        else if (taskId === 'workMeal') { labelText = "Прием пищи на работе"; cat = "body"; }
                        else if (taskId === 'homeArrival') { labelText = "Приход домой (Вода/Переодеться)"; }
                        else if (taskId === 'cardio') { labelText = "Легкое кардио (20-30 мин)"; cat = "body"; xp = 15; }
                        else if (taskId === 'dinner') { labelText = "Легкий чистый ужин"; cat = "body"; }
                        else if (taskId === 'plannedProcrastination') { labelText = "Плановый разрешенный отдых"; }
                        else if (taskId === 'eveningHygiene') { labelText = "Вечерний уход за зубами"; }
                        else if (taskId === 'faceCare') { labelText = "Умывание и уход за лицом"; }
                        else if (taskId === 'nightSupplements') { labelText = "Прием ночных добавок"; xp = 5; }
                        else if (taskId === 'sleep') { labelText = "Сон (Лечь в 01:00)"; xp = 5; }
                        else if (taskId === 'creativity') { labelText = "Свободное творчество / Музыка"; cat = "content"; }
                        else if (taskId === 'weeklyPlanning') { labelText = "Планирование следующей недели"; cat = "pm"; }

                        return { taskId, category: cat, xp, text: labelText, hint: anchorInfo ? anchorInfo.note : "Шаг текущего алгоритма дня." };
                    }
                }
                return null;
            }, [state.dailyTasks, state.currentMode, state.mainGoal]);

            const isCompact = state.settings.compactMode;
            const wBlock = !canWrite(state);

            return (
                <div className="space-y-5 transform transition-all anonymity-fade animate-in fade-in zoom-in-95">
                    <AccessBanner state={state} setState={update} />
                    <TodayHeader state={state} dayAnalytics={dayAnalytics} />
                    
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                        <div className="flex items-center gap-2">
                            <h2 className="text-xl font-bold text-white uppercase tracking-tight">Сегодня по плану</h2>
                            {state.streakCounter > 0 && (
                                <div className="flex items-center gap-1 px-2.5 py-0.5 rounded-full bg-orange-500 text-neutral-950 font-bold text-[10px]">
                                    <IconBase iconName="Flame" size={10} /> <span>СТАБИЛЬНОСТЬ: {state.streakCounter} ДН</span>
                                </div>
                            )}
                        </div>
                        <div className="flex bg-[#141414] p-1 rounded-xl border border-[#262626] overflow-x-auto w-full sm:w-auto hide-scrollbar gap-1 items-center">
                            {['MAX', 'NORM', 'MIN', 'RECOVERY', 'SATURDAY', 'SUNDAY'].map(mId => (
                                <button 
                                    type="button"
                                    disabled={wBlock}
                                    key={mId} onClick={() => update('currentMode', mId)}
                                    className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all duration-150 uppercase whitespace-nowrap min-h-[36px] ${state.currentMode === mId ? 'bg-amber-500 text-neutral-950 font-black' : 'text-neutral-400 hover:text-neutral-200'} disabled:opacity-40`}
                                >
                                    {MODES[mId]?.label || mId}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 bg-[#121212] p-4 border border-[#262626] rounded-2xl shadow-lg">
                        <div className="p-3 bg-[#0a0a0a] rounded-xl border border-[#1f1f1f]">
                            <span className="text-[10px] text-neutral-400 font-bold uppercase block tracking-wider">Всего задач</span>
                            <span className="text-xl font-mono font-bold text-amber-400">{dayAnalytics.completed} <span className="text-xs text-neutral-500">/ {dayAnalytics.total}</span></span>
                        </div>
                        <div className="p-3 bg-[#0a0a0a] rounded-xl border border-[#1f1f1f]">
                            <span className="text-[10px] text-neutral-400 font-bold uppercase block tracking-wider">Выполнение</span>
                            <span className="text-xl font-mono font-bold text-amber-400">{dayAnalytics.percent}%</span>
                        </div>
                        <div className="p-3 bg-[#0a0a0a] rounded-xl border border-[#1f1f1f]">
                            <span className="text-[10px] text-neutral-400 font-bold uppercase block tracking-wider">Ключевые якоря</span>
                            <span className="text-xl font-mono font-bold text-orange-400">{dayAnalytics.coreCompleted} <span className="text-xs text-neutral-500">/ {dayAnalytics.coreTotal}</span></span>
                        </div>
                        <div className="p-3 bg-[#0a0a0a] rounded-xl border border-[#1f1f1f]">
                            <span className="text-[10px] text-neutral-400 font-bold uppercase block tracking-wider">Статус дня</span>
                            <span className={`text-sm font-bold uppercase block mt-1 truncate ${dayAnalytics.statusColor}`}>{dayAnalytics.status}</span>
                        </div>
                    </div>

                    {nextBestAction && (
                        <div className="p-4 rounded-xl bg-gradient-to-r from-amber-500/10 via-amber-600/5 to-transparent border border-amber-500/20 shadow-md flex items-center justify-between gap-4">
                            <div className="flex items-center gap-3 min-w-0">
                                <div className="p-2.5 bg-amber-500 rounded-lg text-neutral-950 flex-shrink-0">
                                    <IconBase iconName="Target" size={16} strokeWidth={3} />
                                </div>
                                <div className="min-w-0">
                                    <span className="text-[9px] font-mono font-bold text-amber-400 uppercase tracking-wider block">Рекомендуемое действие</span>
                                    <h3 className="text-base font-bold text-white uppercase tracking-wide truncate">{nextBestAction.text}</h3>
                                    <p className="text-xs text-neutral-400 truncate font-medium">{nextBestAction.hint}</p>
                                </div>
                            </div>
                            <button 
                                type="button" 
                                disabled={wBlock}
                                onClick={() => toggleTask(nextBestAction.taskId, nextBestAction.category, nextBestAction.xp)}
                                className="px-4 py-2 bg-amber-500/10 hover:bg-amber-500 text-amber-400 hover:text-black font-bold text-xs uppercase rounded-lg transition-colors border border-amber-500/30 whitespace-nowrap min-h-[38px] disabled:opacity-40"
                            >
                                Выполнить
                            </button>
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="p-4 bg-[#121212] border border-[#262626] rounded-xl space-y-3">
                            <h4 className="text-xs font-bold text-amber-500 uppercase tracking-wider border-b border-[#222] pb-1">Старт дня и Языки</h4>
                            <CheckItem id="waterAm" anchor="10:30" disabled={wBlock} checked={state.dailyTasks.waterAm} timeLog={state.taskTimestamps.waterAm} onChange={() => toggleTask('waterAm', 'spirit', 5)} label="Вода после сна" subLabel="300-500 мл чистой воды для запуска организма." mode={state.currentMode} />
                            <CheckItem id="morningHygiene" anchor="10:35" disabled={wBlock} checked={state.dailyTasks.morningHygiene} timeLog={state.taskTimestamps.morningHygiene} onChange={() => toggleTask('morningHygiene', 'spirit', 5)} label="Утренний уход за собой" subLabel="Контрастный душ, чистка зубов и свежесть." mode={state.currentMode} />
                            <CheckItem id="morningCharge" anchor="10:45" disabled={wBlock} checked={state.dailyTasks.morningCharge} timeLog={state.taskTimestamps.morningCharge} onChange={() => toggleTask('morningCharge', 'body', 5)} label="Лёгкая зарядка" subLabel="Суставная разминка, легкие потягивания." mode={state.currentMode} />
                            <CheckItem id="breakfast" anchor="11:00" disabled={wBlock} checked={state.dailyTasks.breakfast} timeLog={state.taskTimestamps.breakfast} onChange={() => toggleTask('breakfast', 'body', 5)} label="Сбалансированный завтрак" subLabel="Первый прием пищи по плану сушки." mode={state.currentMode} />
                            
                            {['NORM', 'MAX'].includes(state.currentMode) && (
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 pt-1 border-t border-[#222]/50">
                                    <CheckItem id="spanish" anchor="Языки" disabled={wBlock} checked={state.dailyTasks.spanish} timeLog={state.taskTimestamps.spanish} onChange={() => toggleTask('spanish', 'english', 10)} label="Испанский" subLabel="10-15 мин за завтраком." mode={state.currentMode} />
                                    <CheckItem id="chinese" anchor="Языки" disabled={wBlock} checked={state.dailyTasks.chinese} timeLog={state.taskTimestamps.chinese} onChange={() => toggleTask('chinese', 'english', 10)} label="Китайский" subLabel="10-15 мин с кириллицей." mode={state.currentMode} />
                                </div>
                            )}
                        </div>

                        <div className="p-4 bg-[#121212] border border-[#262626] rounded-xl space-y-3">
                            <h4 className="text-xs font-bold text-amber-500 uppercase tracking-wider border-b border-[#222] pb-1">Фокус и Обучение</h4>
                            {state.mainGoal.active && (
                                <div className="p-3.5 bg-[#0a0a0a] rounded-xl border border-amber-500/10">
                                    <CheckItem id="mainTask" anchor="11:45" disabled={wBlock} checked={state.dailyTasks.mainTask} timeLog={state.taskTimestamps.mainTask} onChange={() => toggleTask('mainTask', 'pm', 20)} label={state.mainGoal.title || "Главная задача"} subLabel={state.mainGoal.description || "Ключевой вектор сегодняшнего дня."} mode={state.currentMode} />
                                    {!state.dailyTasks.mainTask && <FocusTimer defaultMinutes={state.mainGoal.timeLimitMinutes} taskName={state.mainGoal.title} taskId="mainTask" category="pm" xpReward={20} onCompleteTask={toggleTask} state={state} update={update} setGlobalFocusId={setGlobalFocusId} globalFocusId={globalFocusId} readOnly={wBlock} />}
                                </div>
                            )}
                            
                            {['NORM', 'MAX'].includes(state.currentMode) && (
                                <div className="p-3.5 bg-[#0a0a0a] rounded-xl border border-[#1f1f1f] space-y-2">
                                    <CheckItem id="pm" anchor="12:45" disabled={wBlock} checked={state.dailyTasks.pm} timeLog={state.taskTimestamps.pm} onChange={() => toggleTask('pm', 'pm', 15)} label="Project Management" subLabel="До 60 минут плотного структурированного обучения." mode={state.currentMode} />
                                    {!state.dailyTasks.pm && <FocusTimer defaultMinutes={(MODES[state.currentMode]?.pmTime ?? 60)} taskName="PM Обучение" taskId="pm" category="pm" xpReward={15} onCompleteTask={toggleTask} state={state} update={update} setGlobalFocusId={setGlobalFocusId} globalFocusId={globalFocusId} readOnly={wBlock} />}
                                </div>
                            )}

                            {['NORM', 'MAX'].includes(state.currentMode) && (
                                <div className="p-3.5 bg-[#0a0a0a] rounded-xl border border-[#1f1f1f] space-y-2">
                                    <CheckItem id="english" anchor="13:45" disabled={wBlock} checked={state.dailyTasks.english} timeLog={state.taskTimestamps.english} onChange={() => toggleTask('english', 'english', 15)} label="Английский язык" subLabel="До 30 минут речевой практики без перегруза." mode={state.currentMode} />
                                    {!state.dailyTasks.english && <FocusTimer defaultMinutes={(MODES[state.currentMode]?.engTime ?? 30)} taskName="Английская практика" taskId="english" category="english" xpReward={15} onCompleteTask={toggleTask} state={state} update={update} setGlobalFocusId={setGlobalFocusId} globalFocusId={globalFocusId} readOnly={wBlock} />}
                                </div>
                            )}
                        </div>
                    </div>

                    {!isCompact && <CuttingPanel state={state} update={update} readOnly={wBlock} />}

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="p-4 bg-[#121212] border border-[#262626] rounded-xl space-y-3">
                            <h4 className="text-xs font-bold text-amber-500 uppercase tracking-wider border-b border-[#222] pb-1">Работа в «Стимуле» и Тренинг</h4>
                            <CheckItem id="workStart" anchor="16:00" disabled={wBlock} checked={state.dailyTasks.workStart} timeLog={state.taskTimestamps.workStart} onChange={() => toggleTask('workStart', 'pm', 10)} label="Старт рабочей смены" subLabel="Начало ведения клиентов и работы в фитнес-клубе." mode={state.currentMode} />
                            {state.currentMode !== 'RECOVERY' && (
                                <CheckItem id="body" anchor="В зале" disabled={wBlock} checked={state.dailyTasks.body} timeLog={state.taskTimestamps.body} onChange={() => toggleTask('body', 'body', 20)} label="Силовая тренировка (1 час)" subLabel="Плотный тренинг, встроенный в рабочий перерыв." mode={state.currentMode} />
                            )}
                            <CheckItem id="workMeal" anchor="19:00" disabled={wBlock} checked={state.dailyTasks.workMeal} timeLog={state.taskTimestamps.workMeal} onChange={() => toggleTask('workMeal', 'body', 10)} label="Рабочий прием пищи" subLabel="Плановый контейнер с едой для контроля аппетита." mode={state.currentMode} />
                        </div>

                        <div className="p-4 bg-[#121212] border border-[#262626] rounded-xl space-y-3">
                            <h4 className="text-xs font-bold text-amber-500 uppercase tracking-wider border-b border-[#222] pb-1">Вечерний возврат и Сон</h4>
                            <CheckItem id="homeArrival" anchor="22:40" disabled={wBlock} checked={state.dailyTasks.homeArrival} timeLog={state.taskTimestamps.homeArrival} onChange={() => toggleTask('homeArrival', 'spirit', 5)} label="Приезд домой" subLabel="Переодеться, стакан воды, ментальное расслабление." mode={state.currentMode} />
                            <CheckItem id="cardio" anchor="22:50" disabled={wBlock} checked={state.dailyTasks.cardio} timeLog={state.taskTimestamps.cardio} onChange={() => toggleTask('cardio', 'body', 15)} label="Кардио сессия" subLabel="20–30 минут легкой ходьбы дома для жиросжигания." mode={state.currentMode} />
                            <CheckItem id="dinner" anchor="23:25" disabled={wBlock} checked={state.dailyTasks.dinner} timeLog={state.taskTimestamps.dinner} onChange={() => toggleTask('dinner', 'body', 10)} label="Легкий ужин" subLabel="Белок + простые овощи. Завершающий прием пищи." mode={state.currentMode} />
                            <CheckItem id="plannedProcrastination" anchor="23:50" disabled={wBlock} checked={state.dailyTasks.plannedProcrastination} timeLog={state.taskTimestamps.plannedProcrastination} onChange={() => toggleTask('plannedProcrastination', 'spirit', 5)} label="Плановая прокрастинация" subLabel="Разрешенный чистый отдых без гаджетов или легкое залипание." mode={state.currentMode} />
                            <div className="grid grid-cols-2 gap-2 pt-1 border-t border-[#222]/50">
                                <CheckItem id="eveningHygiene" anchor="00:15" disabled={wBlock} checked={state.dailyTasks.eveningHygiene} timeLog={state.taskTimestamps.eveningHygiene} onChange={() => toggleTask('eveningHygiene', 'spirit', 5)} label="Уход за зубами" subLabel="Щетка, ирригатор." mode={state.currentMode} />
                                <CheckItem id="nightSupplements" anchor="00:30" disabled={wBlock} checked={state.dailyTasks.nightSupplements} timeLog={state.taskTimestamps.nightSupplements} onChange={() => toggleTask('nightSupplements', 'body', 5)} label="Добавки на ночь" subLabel="Магний + 5-HTP." mode={state.currentMode} />
                            </div>
                            <CheckItem id="sleep" anchor="01:00" disabled={wBlock} checked={state.dailyTasks.sleep} timeLog={state.taskTimestamps.sleep} onChange={() => toggleTask('sleep', 'spirit', 10)} label="Лечь спать" subLabel="Своевременное выключение для глубокого восстановления." mode={state.currentMode} />
                        </div>
                    </div>

                    {['SATURDAY', 'SUNDAY'].includes(state.currentMode) && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <CheckItem id="creativity" anchor="Суббота / Воскресенье" disabled={wBlock} checked={state.dailyTasks.creativity} timeLog={state.taskTimestamps.creativity} onChange={() => toggleTask('creativity', 'content', 15)} label="Музыка и Творчество" subLabel="Свободная генерация идей в Suno или ведение заметок." mode={state.currentMode} />
                            {state.currentMode === 'SUNDAY' && (
                                <CheckItem id="weeklyPlanning" anchor="Воскресенье" disabled={wBlock} checked={state.dailyTasks.weeklyPlanning} timeLog={state.taskTimestamps.weeklyPlanning} onChange={() => toggleTask('weeklyPlanning', 'pm', 15)} label="Планирование недели" subLabel="30–45 минут: набросать сетку задач и меню на физической доске." mode={state.currentMode} />
                            )}
                        </div>
                    )}

                    {!isCompact && (
                        <div className="p-4 bg-gradient-to-br from-amber-500/5 to-transparent border border-amber-500/10 rounded-xl flex flex-col justify-between">
                            <div>
                                <span className="text-[10px] font-bold text-amber-500 uppercase tracking-wider bg-amber-500/10 px-2 py-0.5 rounded">Стоический ориентир</span>
                                <p className="mt-3 text-sm italic text-neutral-200 leading-relaxed">"{randomQuote.text}"</p>
                                <h4 className="mt-1 text-xs font-bold text-neutral-400 text-right">— {randomQuote.author}</h4>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ScheduleView = ({ state, update, toggleTask }) => {
            const wBlock = !canWrite(state);
            return (
                <div className="space-y-4 transform transition-all anonymity-fade animate-in fade-in zoom-in-95">
                    <AccessBanner state={state} setState={update} />
                    <div>
                        <h1 className="text-2xl font-bold text-white uppercase">Распорядок дня</h1>
                        <p className="text-sm text-neutral-400 font-medium">План по привычным якорям: событие → действие. Это гибкий ориентир, а не жесткая тюрьма.</p>
                    </div>

                    <div className="flex bg-[#141414] p-1 rounded-xl border border-[#262626] overflow-x-auto w-full hide-scrollbar gap-1 items-center">
                        {['MAX', 'NORM', 'MIN', 'RECOVERY', 'SATURDAY', 'SUNDAY'].map(mId => (
                            <button 
                                type="button"
                                disabled={wBlock}
                                key={mId} onClick={() => update('currentMode', mId)}
                                className={`flex-1 px-3 py-1.5 rounded-lg text-xs font-bold transition-all duration-150 uppercase whitespace-nowrap min-h-[36px] ${state.currentMode === mId ? 'bg-amber-500 text-neutral-950 font-black' : 'text-neutral-400 hover:text-neutral-200'} disabled:opacity-40`}
                            >
                                {MODES[mId]?.label || mId}
                            </button>
                        ))}
                    </div>

                    <div className="p-4 bg-[#121212] border border-[#262626] rounded-xl">
                        <h3 className="text-xs font-bold uppercase text-amber-400 mb-2.5 tracking-wider">Идеальная цепочка якорей</h3>
                        <div className="flex flex-wrap gap-x-2 gap-y-1 text-sm font-medium text-neutral-300">
                            <span>Проснулся</span> <span className="text-amber-500">→</span>
                            <span>Вода</span> <span className="text-amber-500">→</span>
                            <span>Уход AM</span> <span className="text-amber-500">→</span>
                            <span>Завтрак + Языки</span> <span className="text-amber-500">→</span>
                            {state.mainGoal.active && <><span>Главная задача</span> <span className="text-amber-500">→</span></>}
                            <span>PM + English</span> <span className="text-amber-500">→</span>
                            <span>16:00 Работа</span> <span className="text-amber-500">→</span>
                            <span>Тренировка</span> <span className="text-amber-500">→</span>
                            <span>22:40 Домой</span> <span className="text-amber-500">→</span>
                            <span>Кардио</span> <span className="text-amber-500">→</span>
                            <span>Ужин</span> <span className="text-amber-500">→</span>
                            <span>Отдых</span> <span className="text-amber-500">→</span>
                            <span>Сон</span>
                        </div>
                    </div>

                    <div className="bg-[#121212] border border-[#262626] rounded-2xl p-4 md:p-6 shadow-lg">
                        <div className="relative border-l border-[#262626] ml-2 space-y-4 py-1">
                            {DAY_ANCHORS.map((item, i) => {
                                const isRecovery = state.currentMode === 'RECOVERY';
                                const isMin = state.currentMode === 'MIN';
                                const isWeekend = ['SATURDAY', 'SUNDAY'].includes(state.currentMode);
                                
                                if (isRecovery && (item.taskIds.includes('pm') || item.taskIds.includes('english') || item.taskIds.includes('workStart'))) return null;
                                if (isMin && (item.taskIds.includes('english') || item.taskIds.includes('spanish') || item.taskIds.includes('chinese'))) return null;
                                if (isWeekend && (item.taskIds.includes('pm') || item.taskIds.includes('english') || item.taskIds.includes('workStart'))) return null;
                                if (!state.mainGoal.active && item.taskIds.includes('mainTask')) return null;

                                const isAnchorDone = item.taskIds.length > 0 && item.taskIds.every(id => state.dailyTasks[id]);

                                return (
                                    <div key={i} className="relative pl-6 md:pl-8">
                                        <div className={`absolute -left-[13px] top-1.5 w-6 h-6 rounded-full border bg-[#0a0a0a] flex items-center justify-center ${isAnchorDone ? 'border-amber-500 text-amber-500' : 'border-[#262626] text-neutral-500'}`}>
                                            <IconBase iconName={isAnchorDone ? "Check" : "Clock"} size={11} />
                                        </div>
                                        <div className="p-4 rounded-xl bg-[#161616]/60 border border-[#222] flex flex-col md:flex-row md:items-center justify-between gap-4">
                                            <div className="space-y-1 flex-1 min-w-0">
                                                <div className="flex items-center gap-2 flex-wrap">
                                                    <span className="font-mono font-bold text-xs bg-amber-500/10 text-amber-400 px-2 py-0.5 rounded">{item.time}</span>
                                                    <span className="text-xs font-bold uppercase tracking-wider text-neutral-400">Якорь: {item.anchor}</span>
                                                </div>
                                                <h3 className="text-base font-bold text-white uppercase tracking-wide">{item.title}</h3>
                                                <p className="text-sm text-neutral-300 leading-relaxed font-medium">{item.note}</p>
                                                
                                                {item.taskIds.length > 0 && (
                                                    <div className="pt-2 flex flex-wrap gap-2">
                                                        {item.taskIds.map(taskId => {
                                                            const taskDone = !!state.dailyTasks[taskId];
                                                            const label = taskId === 'mainTask' ? (state.mainGoal?.title || 'Главная задача') : (TASK_LABELS[taskId] || taskId);
                                                            return (
                                                                <button 
                                                                    key={taskId}
                                                                    type="button"
                                                                    disabled={wBlock}
                                                                    onClick={() => toggleTask(taskId, 'spirit', 10)}
                                                                    className={`px-2.5 py-1 rounded-lg font-bold font-sans text-[11px] uppercase border transition-all ${taskDone ? 'bg-amber-500/10 border-amber-500/30 text-amber-400 line-through' : 'bg-[#0f0f0f] border-[#2d2d2d] text-neutral-300 hover:border-amber-500/20'} disabled:opacity-70`}
                                                                >
                                                                    {taskDone ? '✓ ' : ''}{label}
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const LearningView = ({ state, saveDailyNote, addLanguagePhrase, update }) => {
            const [pmInput, setPmInput] = useState('');
            const [engInput, setEngInput] = useState('');
            const [langPhrase, setLangPhrase] = useState('');
            const [langTranslit, setLangTranslit] = useState('');
            const [langTranslation, setLangTranslation] = useState('');
            const wBlock = !canWrite(state);

            return (
                <div className="space-y-5 transform transition-all anonymity-fade animate-in fade-in zoom-in-95">
                    <AccessBanner state={state} setState={update} />
                    <h1 className="text-2xl font-bold text-white uppercase">Заметки и обучение</h1>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="BookOpen" className="text-amber-500" size={16}/> <span>Бизнес-инсайты Павла</span></h2>
                            <textarea rows={3} disabled={wBlock} placeholder="Фиксация мыслей по управлению, стратегиям ведения клиентов и развитию личного бренда..." value={pmInput} onChange={e => setPmInput(e.target.value)} className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-white placeholder:text-neutral-700 focus:outline-none focus:border-amber-500/50 text-sm resize-none font-medium leading-relaxed disabled:opacity-60" />
                            <Button variant="secondary" className="w-full mt-2" onClick={() => { if(pmInput.trim()){ saveDailyNote(pmInput, 'PM'); setPmInput(''); }}}>Сохранить в буфер</Button>
                        </div>
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="Globe" className="text-amber-500" size={16}/> <span>English Speech Модули</span></h2>
                            <textarea rows={3} disabled={wBlock} placeholder="Фразы, речевые обороты и мысли для масштабирования личного бренда на английском..." value={engInput} onChange={e => setEngInput(e.target.value)} className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-white placeholder:text-neutral-700 focus:outline-none focus:border-amber-500/50 text-sm resize-none font-medium leading-relaxed disabled:opacity-60" />
                            <Button variant="secondary" className="w-full mt-2" onClick={() => { if(engInput.trim()){ saveDailyNote(engInput, 'ENG'); setEngInput(''); }}}>Фиксировать в системе</Button>
                        </div>
                        <div className={`${THEME.panel} lg:col-span-2`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="Utensils" className="text-amber-400" size={16}/> <span>Лингво-интеграция за завтраком (Испанский / Китайский)</span></h2>
