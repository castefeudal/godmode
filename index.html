                    const dataStr = "data:text/markdown;charset=utf-8," + encodeURIComponent(generateObsidianData());
                    const anchor = document.createElement('a');
                    anchor.setAttribute("href", dataStr);
                    anchor.setAttribute("download", `Markov_Log_${new Date().toISOString().split('T')[0]}.md`);
                    document.body.appendChild(anchor);
                    anchor.click();
                    anchor.remove();
                    showToast("Файл .md успешно скачан.");
                } catch(e) { showToast("Сбой скачивания Markdown."); }
            };

            const runBackupExport = () => {
                try {
                    const exportPackage = {
                        app: "Markov OS",
                        exportedAt: new Date().toISOString(),
                        schemaVersion: SCHEMA_VERSION,
                        data: state
                    };
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportPackage));
                    const anchor = document.createElement('a');
                    anchor.setAttribute("href", dataStr);
                    anchor.setAttribute("download", `Markov_OS_v15_Backup_${new Date().toISOString().split('T')[0]}.json`);
                    document.body.appendChild(anchor);
                    anchor.click();
                    anchor.remove();
                    showToast("Ядро успешно экспортировано в JSON.");
                } catch(e) { showToast("Сбой экспорта."); }
            };

            const runBackupImport = (e) => {
                if (e.target.files.length === 0) return;
                const reader = new FileReader();
                reader.readAsText(e.target.files[0], "UTF-8");
                reader.onload = evt => {
                    try {
                        const parsed = JSON.parse(evt.target.result);
                        let sourceData = null;

                        // Корректное чтение как нового пакета с метаданными, так и старого чистого слепка
                        if (parsed && parsed.app === "Markov OS" && parsed.data) {
                            sourceData = parsed.data;
                        } else if (parsed && typeof parsed === 'object' && 'dailyTasks' in parsed) {
                            sourceData = parsed;
                        }

                        if (sourceData) {
                            try {
                                localStorage.setItem(`${STORAGE_KEY}_pre_import_${Date.now()}`, JSON.stringify(state));
                            } catch(err) {}

                            const mergedState = migrateState(sourceData);
                            setState(mergedState);
                            showToast("Архив ядра успешно импортирован. ⚡");
                        } else {
                            showToast("Ошибка: Файл не содержит валидной структуры Markov OS.");
                        }
                    } catch (err) {
                        showToast("Ошибка обработки структуры JSON.");
                    }
                    e.target.value = ''; // Очистка инпута после обработки
                };
            };

            return (
                <div className="space-y-5 transform transition-all animate-in fade-in zoom-in-95">
                    <h1 className="text-2xl font-bold text-white uppercase">Инструментарий ядра</h1>
                    
                    <div className={`${THEME.panel}`}>
                        <h2 className="text-base font-bold text-white flex items-center gap-2 mb-2 uppercase"><IconBase iconName="Anchor" className="text-amber-500" size={14}/> <span>Стоический самоанализ и аналитика результатов</span></h2>
                        <div className="space-y-3">
                            <div>
                                <label className="text-[11px] font-bold uppercase text-neutral-400 block mb-1">Дневной триумф Павла (Решения, выполненные безупречно)</label>
                                <textarea value={state.notes.stoicTriump || ''} onChange={e => update('notes', { stoicTriump: e.target.value })} placeholder="Запись ключевых результатов побед над хаосом..." className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-xs text-white focus:outline-none focus:border-amber-500/50" rows={2} />
                            </div>
                            <div>
                                <label className="text-[11px] font-bold uppercase text-neutral-400 block mb-1">Точки деструктивной потери фокуса (Где уступлено внешнему шуму)</label>
                                <textarea value={state.notes.stoicGrowth || ''} onChange={e => update('notes', { stoicGrowth: e.target.value })} placeholder="Рефлексия слабых зон и микро-потерь концентрации..." className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-xs text-white focus:outline-none focus:border-amber-500/50" rows={2} />
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-2 uppercase"><IconBase iconName="Download" className="text-amber-500" size={16}/> <span>Синхронизация Obsidian / Markdown</span></h2>
                            <p className="text-xs text-neutral-400 mb-3">Генерация структурированного отчета лога дня Павла Маркова для локальной базы знаний.</p>
                            <div className="flex gap-2">
                                <Button variant="primary" className="flex-1 text-xs" onClick={runCopy}>Копировать</Button>
                                <Button variant="secondary" className="flex-1 text-xs" onClick={runDownloadMarkdown}>Скачать .md</Button>
                            </div>
                        </div>
                        <div className={`${THEME.panel}`}>
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-2 uppercase"><IconBase iconName="Settings" className="text-amber-500" size={16}/> <span>Резервное архивирование OS</span></h2>
                            <p className="text-xs text-neutral-400 mb-3">Полное сохранение уровней, прогресса рукописи и истории в слепок JSON.</p>
                            <div className="flex gap-2">
                                <Button variant="secondary" className="flex-1 text-xs" onClick={runBackupExport}>Экспорт</Button>
                                <label className="flex-1 flex items-center justify-center px-4 py-2 bg-[#1c1c1c] border border-[#333] text-amber-500 font-bold hover:bg-[#262626] cursor-pointer text-xs uppercase rounded-xl min-h-[44px]">
                                    <span>Импорт</span>
                                    <input type="file" accept=".json" onChange={runBackupImport} className="hidden" />
                                </label>
                            </div>
                        </div>
                    </div>

                    {/* Раздел: Настройки и системная конфигурация (SystemView) */}
                    <div className={`${THEME.panel}`}>
                        <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-4 uppercase"><IconBase iconName="Settings" className="text-amber-500" size={16}/> <span>Системные конфигурации Markov OS</span></h2>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs font-bold uppercase tracking-wide text-neutral-300">
                            <label className="flex items-center justify-between p-3 bg-[#0a0a0a] border border-[#262626] rounded-xl min-h-[44px]">
                                <span>Рациональный режим (Evidence)</span>
                                <input type="checkbox" checked={state.settings.evidenceMode} onChange={e => update('settings', { evidenceMode: e.target.checked })} className="w-4 h-4 accent-amber-500" />
                            </label>
                            <label className="flex items-center justify-between p-3 bg-[#0a0a0a] border border-[#262626] rounded-xl min-h-[44px]">
                                <span>Аудио подсказки системы</span>
                                <input type="checkbox" checked={state.settings.soundEnabled} onChange={e => update('settings', { soundEnabled: e.target.checked })} className="w-4 h-4 accent-amber-500" />
                            </label>
                            <label className="flex items-center justify-between p-3 bg-[#0a0a0a] border border-[#262626] rounded-xl min-h-[44px]">
                                <span>Виброотклик интерфейса</span>
                                <input type="checkbox" checked={state.settings.hapticsEnabled} onChange={e => update('settings', { hapticsEnabled: e.target.checked })} className="w-4 h-4 accent-amber-500" />
                            </label>
                            <label className="flex items-center justify-between p-3 bg-[#0a0a0a] border border-[#262626] rounded-xl min-h-[44px]">
                                <span>Интерфейсные анимации</span>
                                <input type="checkbox" checked={state.settings.animationsEnabled} onChange={e => update('settings', { animationsEnabled: e.target.checked })} className="w-4 h-4 accent-amber-500" />
                            </label>
                            <label className="flex items-center justify-between p-3 bg-[#0a0a0a] border border-[#262626] rounded-xl min-h-[44px]">
                                <span>Компактный режим панелей</span>
                                <input type="checkbox" checked={state.settings.compactMode} onChange={e => update('settings', { compactMode: e.target.checked })} className="w-4 h-4 accent-amber-500" />
                            </label>
                            <div className="p-2 bg-red-950/10 border border-red-900/30 rounded-xl flex items-center">
                                <button type="button" onClick={() => {
                                    const confirm = state.settings.confirmBeforeReset ? window.confirm("Вы уверены, что хотите полностью стереть текущее состояние Markov OS?") : true;
                                    if(confirm) { localStorage.removeItem(STORAGE_KEY); window.location.reload(); }
                                }} className="w-full text-center text-red-400 font-bold uppercase text-xs hover:text-red-300 min-h-[32px]">СБРОСИТЬ ВСЕ ДАННЫЕ К СТАНДАРТУ</button>
                            </div>
                        </div>
                    </div>

                    <div className={`${THEME.panel}`}>
                        <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-3 uppercase"><IconBase iconName="Music" className="text-amber-400" size={16}/> <span>Банк творческих идей SUNO</span></h2>
                        <div className="flex gap-2 mb-3">
                            <input type="text" placeholder="Музыкальные концепты, структуры текстовых триггеров Павла..." value={sunoInput} onChange={e => setSunoInput(e.target.value)} className="flex-1 bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-xs text-white focus:outline-none focus:border-amber-500/40" />
                            <Button onClick={() => { if(sunoInput.trim()){ setState(p => ({...p, sunoIdeas: [...p.sunoIdeas, sunoInput]})); setSunoInput(''); showToast("Идея зафиксирована в банке."); }}}>Сохранить</Button>
                        </div>
                        {state.sunoIdeas.length > 0 && (
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 p-2 bg-[#0a0a0a] rounded-xl border border-[#222]">
                                {state.sunoIdeas.map((idea, i) => (
                                    <div key={i} className="p-2 bg-[#141414] rounded-lg border border-[#262626] text-xs text-neutral-300 flex items-center gap-2">
                                        <IconBase iconName="Music" className="text-amber-500" size={11} /> <span className="truncate">{idea}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        function App() {
            const { state, setState, update, toggleTask, toast, showToast, globalFocusId, setGlobalFocusId } = useAppState();
            const [insightModalOpen, setInsightModalOpen] = useState(false);
            const [quickInsightText, setQuickInsightText] = useState('');
            const [numerologyModalOpen, setNumerologyModalOpen] = useState(false);

            const TABS = [
                { id: 'dashboard', icon: 'Home', label: 'Сегодня' },
                { id: 'schedule', icon: 'Clock', label: 'Распорядок' },
                { id: 'learning', icon: 'Brain', label: 'Обучение' },
                { id: 'body', icon: 'Dumbbell', label: 'Тело' },
                { id: 'content', icon: 'Smartphone', label: 'Контент' },
                { id: 'rituals', icon: 'Wind', label: 'Ритуалы' },
                { id: 'history', icon: 'History', label: 'История' },
                { id: 'progress', icon: 'Trophy', label: 'Прогресс' },
                { id: 'tools', icon: 'Settings', label: 'Экспорт' }
            ];

            const computedCircadianPhase = useMemo(() => {
                if (state.circadianOverride) return state.circadianOverride;
                const hours = new Date().getHours();
                if (hours >= 6 && hours < 12) return 'AM';
                if (hours >= 12 && hours < 18) return 'DAY';
                return 'PM';
            }, [state.circadianOverride]);

            const saveDailyNote = useCallback((text, source) => {
                const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                update('notes', { savedDaily: [...(state.notes.savedDaily || []), `[${time}] [${source}] ${text}`] });
                showToast("Инсайт зафиксирован. 📝");
            }, [state.notes.savedDaily, update, showToast]);

            const addLanguagePhrase = useCallback((p) => {
                update('languagePhrases', [...(state.languagePhrases || []), p]);
                showToast("Ассоциативная связь построена.");
            }, [state.languagePhrases, update, showToast]);

            const handleAddQuickInsight = () => {
                if (quickInsightText.trim()) {
                    saveDailyNote(quickInsightText, 'QUICK-INSIGHT');
                    setQuickInsightText('');
                    setInsightModalOpen(false);
                }
            };

            const toggleNumerology = () => {
                triggerHaptic(state.settings.hapticsEnabled, 15);
                setNumerologyModalOpen(!numerologyModalOpen);
            };

            const view = useMemo(() => {
                switch (state.currentTab) {
                    case 'dashboard': return <DashboardView state={state} update={update} toggleTask={toggleTask} setGlobalFocusId={setGlobalFocusId} globalFocusId={globalFocusId} onCodeClick={toggleNumerology} />;
                    case 'schedule': return <ScheduleView state={state} />;
                    case 'learning': return <LearningView state={state} saveDailyNote={saveDailyNote} addLanguagePhrase={addLanguagePhrase} />;
                    case 'body': return <BodyView state={state} update={update} toggleTask={toggleTask} />;
                    case 'content': return <ContentView state={state} update={update} saveDailyNote={saveDailyNote} />;
                    case 'rituals': return <RitualsView state={state} toggleTask={toggleTask} onCodeClick={toggleNumerology} />;
                    case 'history': return <HistoryView state={state} />;
                    case 'progress': return <ProgressView state={state} update={update} />;
                    case 'tools': return <ToolsExportView state={state} setState={setState} showToast={showToast} update={update} />;
                    default: return <DashboardView state={state} update={update} toggleTask={toggleTask} setGlobalFocusId={setGlobalFocusId} globalFocusId={globalFocusId} onCodeClick={toggleNumerology} />;
                }
            }, [state.currentTab, state, update, toggleTask, saveDailyNote, addLanguagePhrase, setState, showToast, globalFocusId, setGlobalFocusId]);

            // Книжный блок вынесен во внешний контекст рендеринга
            const bookProgressBlock = useMemo(() => {
                if (state.settings.compactMode) return null;
                const bookPercent = Math.min(100, Math.floor(((state.bookProgress?.totalPages || 15) / 77) * 100));
                return (
                    <div className="p-4 rounded-xl bg-[#121212] border border-[#262626] mb-4">
                        <div className="flex justify-between items-start">
                            <div>
                                <h4 className="text-xs font-bold uppercase text-neutral-200">Книга «Anti-психология»</h4>
                                <p className="text-[11px] text-amber-500 font-medium mt-0.5">Раздел разработки суверенных концепций Павла</p>
                            </div>
                            <span className="font-mono text-xs font-bold text-amber-400">{bookPercent}%</span>
                        </div>
                        <div className="w-full h-1 bg-[#050505] rounded-full mt-2 overflow-hidden">
                            <div className="h-full bg-amber-500 transition-all duration-300" style={{ width: `${bookPercent}%` }}></div>
                        </div>
                        <div className="flex justify-between items-center mt-3 pt-2 border-t border-[#222] flex-wrap gap-2 text-xs text-neutral-400">
                            <span>{state.bookProgress?.totalPages || 15} / 77 страниц рукописи</span>
                            <div className="flex bg-[#0a0a0a] rounded-lg p-0.5 border border-[#222]">
                                <button type="button" onClick={() => update('bookProgress', { totalPages: Math.max(0, (state.bookProgress?.totalPages || 0) - 1) })} className="px-2 py-0.5 text-neutral-300 font-mono text-xs hover:text-white">- Стр</button>
                                <button type="button" onClick={() => update('bookProgress', { totalPages: Math.min(77, (state.bookProgress?.totalPages || 0) + 1) })} className="px-2 py-0.5 text-amber-400 font-mono text-xs hover:text-white">+ Стр</button>
                            </div>
                        </div>
                    </div>
                );
            }, [state.bookProgress, state.settings.compactMode, update]);

            return (
                <div className="min-h-screen bg-[#0a0a0a] text-neutral-200 flex flex-col lg:flex-row overflow-x-hidden antialiased relative w-full">
                    {/* Тост-нотификация верхнего уровня */}
                    <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] transition-all duration-300 ease-out pointer-events-none w-[90%] md:w-auto max-w-md ${toast.visible ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-4'}`}>
                        <div className="px-4 py-2.5 rounded-xl bg-[#161616] border border-amber-500/30 shadow-xl backdrop-blur-xl flex items-center gap-2 justify-center">
                            <IconBase iconName="Flame" className="text-amber-400" size={14} />
                            <span className="text-xs font-bold uppercase tracking-wide text-white">{toast.msg}</span>
                        </div>
                    </div>

                    {/* Мобильная плавающая кнопка инсайтов */}
                    <div className="fixed bottom-20 right-4 lg:bottom-6 lg:right-6 z-40">
                        <button type="button" aria-label="Добавить быстрый инсайт" onClick={() => setInsightModalOpen(true)} className="w-12 h-12 rounded-full bg-amber-500 text-neutral-950 flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-all min-h-[44px] min-w-[44px]">
                            <IconBase iconName="Edit3" size={18} />
                        </button>
                    </div>

                    {/* Модальное окно мгновенных инсайтов */}
                    {insightModalOpen && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-xs flex items-center justify-center p-4 z-[110] animate-in fade-in">
                            <div className="bg-[#121212] border border-[#262626] rounded-2xl p-5 w-full max-w-md space-y-3">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-xs font-bold uppercase tracking-wide text-white">Прямой инсайт Павла Маркова</h3>
                                    <button type="button" onClick={() => setInsightModalOpen(false)} className="text-neutral-400 hover:text-white p-1.5 bg-[#1a1a1a] rounded-lg"><IconBase iconName="X" size={14}/></button>
                                </div>
                                <textarea value={quickInsightText} onChange={e => setQuickInsightText(e.target.value)} placeholder="Фиксация инсайте или стратегической концепции..." className="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl p-3 text-xs text-white focus:outline-none focus:border-amber-500" rows={4} />
                                <Button className="w-full" onClick={handleAddQuickInsight}>Зафиксировать в ядре</Button>
                            </div>
                        </div>
                    )}

                    {/* Модальное окно скрытых кодов */}
                    {numerologyModalOpen && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-xs flex items-center justify-center p-4 z-[110] animate-in fade-in">
                            <div className="bg-[#121212] border border-[#262626] rounded-2xl p-5 w-full max-w-md space-y-3">
                                <div className="flex justify-between items-center border-b border-[#262626] pb-2">
                                    <h3 className="text-xs font-bold uppercase tracking-wide text-amber-400 flex items-center gap-2">
                                        <IconBase iconName="Anchor" size={14} /> Системные константы личности Павла
                                    </h3>
                                    <button type="button" onClick={() => setShiftNumerologyModalOpen(false)} className="text-neutral-400 hover:text-white bg-[#1a1a1a] p-1.5 rounded-lg"><IconBase iconName="X" size={12}/></button>
                                </div>
                                <div className="space-y-3 text-xs leading-relaxed text-neutral-300 font-medium">
                                    <p><span className="text-amber-400 font-bold block">14.03.1997 // Константа 7 (Стратег)</span> Системное проектирование, пренебрежение ментальным шумом, аналитический контур контроля.</p>
                                    <p><span className="text-amber-500 font-bold block">Знак: Рыбы (♓)</span> Развитая интуиция, чтение неявных мотивов, менторская деятельность.</p>
                                </div>
                                <Button className="w-full mt-2" onClick={() => setNumerologyModalOpen(false)}>Закрыть контур</Button>
                            </div>
                        </div>
                    )}

                    {/* Десктопный статический боковой сайдбар */}
                    <aside className={`hidden lg:flex flex-col w-[270px] bg-[#0c0c0c] border-r border-[#262626]/40 p-5 h-screen sticky top-0 z-30 transition-all duration-300 ${state.deepFocusActive ? 'opacity-0 -translate-x-[270px] pointer-events-none' : 'opacity-100'}`}>
                        <div className="mb-4">
                            <h1 className="text-2xl font-black tracking-wider text-white uppercase">Markov<span className="text-amber-500">OS</span></h1>
                            <p className="text-[9px] text-neutral-400 font-bold tracking-widest uppercase flex items-center gap-1">Elite v15 Hyper <span className="w-1.5 h-1.5 bg-amber-500 rounded-full"></span></p>
                        </div>

                        <button type="button" onClick={toggleNumerology} className="w-full text-left mb-4 p-3 rounded-xl bg-[#141414] border border-[#262626] hover:border-amber-500/30 transition-all">
                            <span className="text-[8px] font-mono font-bold text-amber-400 uppercase block tracking-wider">Sovereign Profile</span>
                            <div className="text-[11px] font-mono text-neutral-300 font-bold mt-0.5">14.03.1997 // P:7 // S:5</div>
                        </button>

                        <div className="mb-4 p-2.5 rounded-xl bg-[#141414] border border-[#262626] flex items-center justify-between text-[10px] font-bold uppercase text-neutral-400">
                            <span>Циркадный статус:</span>
                            <span className="font-mono bg-neutral-800 text-amber-400 px-1.5 py-0.5 rounded font-black">{computedCircadianPhase}</span>
                        </div>

                        {bookProgressBlock}

                        <nav className="flex-1 space-y-1 overflow-y-auto hide-scrollbar" aria-label="Основное меню навигации">
                            {TABS.map(tab => {
                                const active = state.currentTab === tab.id;
                                return (
                                    <button 
                                        type="button"
                                        key={tab.id} onClick={() => update('currentTab', tab.id)}
                                        className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all font-bold text-xs uppercase tracking-wider min-h-[38px] ${active ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20 font-black' : 'text-neutral-400 hover:text-neutral-200'}`}
                                    >
                                        <IconBase iconName={tab.icon} size={14} />
                                        <span className="truncate">{tab.label}</span>
                                    </button>
                                )
                            })}
                        </nav>
                    </aside>

                    {/* Основная рабочая зона приложения */}
                    <main className="flex-1 p-4 md:p-6 lg:p-8 w-full min-h-screen relative z-10 pb-28 lg:pb-8 overflow-y-auto">
                        <div className="max-w-[1000px] mx-auto w-full">{view}</div>
                    </main>

                    {/* Мобильная адаптивная навигационная панель */}
                    <nav className={`lg:hidden fixed bottom-0 left-0 right-0 bg-[#0d0d0d]/95 backdrop-blur-xl border-t border-[#262626]/80 flex overflow-x-auto hide-scrollbar z-30 py-1.5 transition-all duration-300 ${state.deepFocusActive ? 'translate-y-24 opacity-0' : 'translate-y-0 opacity-100'}`} aria-label="Мобильное меню навигации">
                        {TABS.map(tab => {
                            const active = state.currentTab === tab.id;
                            return (
                                <button 
                                    type="button"
                                    key={tab.id} onClick={() => update('currentTab', tab.id)}
                                    aria-label={tab.label}
                                    aria-current={active ? 'page' : undefined}
                                    className={`flex-1 flex flex-col items-center justify-center min-w-[64px] min-h-[44px] py-0.5 gap-0.5 touch-manipulation ${active ? 'text-amber-400 font-black' : 'text-neutral-400'}`}
                                >
                                    <IconBase iconName={tab.icon} size={15} />
                                    <span className="text-[8px] font-bold uppercase tracking-wide whitespace-nowrap">{tab.label}</span>
                                </button>
                            )
                        })}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
