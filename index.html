                    let newXp = prev.stats.xp;
                    let newCatVal = prev.stats.categories[category] || 0;
                    
                    const currentTime = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                    const updatedTimestamps = { ...prev.taskTimestamps };

                    if (isDone) {
                        newXp += xpReward;
                        newCatVal = Math.min(100, newCatVal + (xpReward / 1.5));
                        updatedTimestamps[taskId] = currentTime;
                    } else {
                        newXp = Math.max(0, newXp - xpReward);
                        newCatVal = Math.max(0, newCatVal - (xpReward / 1.5));
                        delete updatedTimestamps[taskId];
                    }

                    const newLevel = Math.floor(newXp / 200) + 1;
                    
                    return {
                        ...prev,
                        dailyTasks: { ...prev.dailyTasks, [taskId]: isDone },
                        taskTimestamps: updatedTimestamps,
                        stats: { 
                            ...prev.stats, xp: newXp, level: newLevel, 
                            categories: { ...prev.stats.categories, [category]: newCatVal } 
                        }
                    };
                });
            }, [showToast]);

            const saveDailyNote = useCallback((text, source = '') => {
                if (!text.trim()) return;
                const timeStr = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                const prefix = `[${timeStr}] [${source}] `;
                setState(prev => ({ ...prev, notes: { ...prev.notes, savedDaily: [...prev.notes.savedDaily, prefix + text] } }));
                showToast(`Мысль материализована в буфер OS. 📝`);
                triggerHaptic(20);
            }, [showToast]);

            const addLanguagePhrase = useCallback((phrase) => {
                if(!phrase.trim()) return;
                setState(prev => ({ ...prev, languagePhrases: [...(prev.languagePhrases || []), phrase] }));
                showToast("Нейронная связь зафиксирована. 🧠");
                triggerHaptic(20);
            }, [showToast]);

            const copyToClipboard = useCallback((text) => {
                triggerHaptic([15, 35]);
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text)
                        .then(() => showToast("Данные скопированы в буфер обмена ✨"))
                        .catch(() => showToast("Ошибка копирования", true));
                } else {
                    let textArea = document.createElement("textarea");
                    textArea.value = text; textArea.style.position = "fixed"; textArea.style.left = "-999999px";
                    document.body.appendChild(textArea); textArea.focus(); textArea.select();
                    try {
                        document.execCommand('copy');
                        showToast("Данные скопированы в буфер обмена ✨");
                    } catch (err) { showToast("Ошибка копирования", true); }
                    textArea.remove();
                }
            }, [showToast]);

            return { state, setState, update, toggleTask, saveDailyNote, addLanguagePhrase, copyToClipboard, toast, showToast };
        }

        // Атомарные UI компоненты верстки
        const NumericInput = ({ label, value, onChange, min=0, max=10, step=1, hint, color="accent" }) => {
            const handleDec = () => { triggerHaptic(10); onChange(Math.max(min, Number(value) - step)); };
            const handleInc = () => { triggerHaptic(10); onChange(Math.min(max, Number(value) + step)); };
            return (
                <div className="flex flex-col gap-2 w-full">
                    <span className="text-xs font-black text-slate-400 uppercase tracking-widest px-1">{label} {hint && <span className="opacity-50 font-normal">({hint})</span>}</span>
                    <div className="flex items-center gap-1 bg-black/40 border border-white/5 p-1 rounded-2xl w-full">
                        <button onClick={handleDec} class="p-3.5 rounded-xl bg-white/5 text-slate-400 hover:text-amber-400 transition-colors"><IconBase iconName="Minus" size={16}/></button>
                        <input type="number" value={value} readOnly class={`flex-1 bg-transparent text-center text-2xl font-mono font-black ${color === 'red' ? 'text-rose-400' : 'text-amber-400'}`} />
                        <button onClick={handleInc} class="p-3.5 rounded-xl bg-white/5 text-slate-400 hover:text-amber-400 transition-colors"><IconBase iconName="Plus" size={16}/></button>
                    </div>
                </div>
            );
        };

        const TextInput = ({ value, onChange, placeholder, multiline = false }) => {
            const cls = "w-full bg-black/30 border border-white/5 rounded-2xl p-4 text-slate-200 placeholder:text-slate-600 focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 transition-all font-medium text-sm leading-relaxed";
            return multiline ? <textarea rows={3} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} class={cls} /> : <input type="text" value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} class={cls} />;
        };

        // Вкладка: СЕГОДНЯ (Dashboard)
        const DashboardView = ({ state, update, toggleTask }) => {
            const todayStr = new Date().toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
            const mode = state.currentMode;
            const isMin = mode === 'min' || mode === 'recovery';
            const timeSettings = MODES[mode] || MODES.NORM;

            const curQuote = useMemo(() => {
                const idx = new Date().getDate() % STOIC_QUOTES.length;
                return STOIC_QUOTES[idx];
            }, []);

            const changeGoal = (id, inc) => {
                const upd = state.strategicGoals.map(g => {
                    if (g.id === id) return { ...g, current: inc ? Math.min(g.target, g.current + 1) : Math.max(0, g.current - 1) };
                    return g;
                });
                update('strategicGoals', upd);
            };

            return (
                <div class="space-y-6 md:space-y-8 animate-in">
                    {/* Стоическая цитата-щит дня */}
                    <div class="p-5 md:p-6 rounded-3xl bg-gradient-to-r from-amber-500/10 via-transparent to-transparent border border-white/5 backdrop-blur-3xl relative overflow-hidden">
                        <span class="text-[9px] font-black text-amber-400 uppercase tracking-widest font-mono bg-amber-400/10 px-2 py-0.5 rounded">Суверенное Мышление // Amor Fati</span>
                        <p class="mt-3 text-sm md:text-base italic font-medium text-slate-300 leading-relaxed">"{curQuote.text}"</p>
                        <h5 class="text-right text-[11px] font-bold text-slate-500 mt-1">— {curQuote.author}</h5>
                    </div>

                    {/* Заголовок страницы и выбор режима работы */}
                    <div class="flex flex-col xl:flex-row justify-between items-start xl:items-end gap-4 border-b border-white/5 pb-4">
                        <div>
                            <div class="flex items-center gap-3">
                                <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter">Сегодня</h1>
                                {state.streakCounter > 0 && (
                                    <div class="flex items-center gap-1 px-3 py-0.5 rounded-full bg-gradient-to-r from-orange-500 to-amber-500 text-black font-mono font-black text-xs">
                                        <IconBase iconName="Flame" size={14}/> <span>STREAK: {state.streakCounter} ДН</span>
                                    </div>
                                )}
                            </div>
                            <p class="text-amber-400 font-mono text-sm uppercase tracking-wider mt-1 flex items-center gap-1.5"><IconBase iconName="Calendar" size={14}/>{todayStr}</p>
                        </div>
                        <div class="flex bg-black/40 p-1.5 rounded-2xl border border-white/5 overflow-x-auto w-full xl:w-auto hide-scrollbar gap-1 items-center">
                            {Object.values(MODES).map(m => (
                                <button 
                                    key={m.id} onClick={() => { triggerHaptic(12); update('currentMode', m.id); }}
                                    class={`px-3 py-2 rounded-xl text-xs font-black uppercase tracking-wider transition-all duration-200 ${state.currentMode === m.id ? 'bg-gradient-to-r from-amber-400 to-yellow-600 text-black shadow-lg shadow-amber-500/10' : 'text-slate-500 hover:text-slate-300'}`}
                                >
                                    {m.label}
                                </button>
                            ))}
                            <button onClick={() => { triggerHaptic([30, 30]); update('currentMode', 'min'); }} class="px-3 py-2 rounded-xl text-xs font-black text-rose-400 bg-rose-950/30 border border-rose-900/40 uppercase ml-1 animate-pulse flex-shrink-0">
                                Аварийный Сброс
                            </button>
                        </div>
                    </div>

                    {/* Развернутый трекер стратегических целей Павла Маркова */}
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        {state.strategicGoals.map(g => {
                            const pct = Math.min(100, Math.floor((g.current / g.target) * 100));
                            return (
                                <div key={g.id} class="premium-glass p-5 rounded-3xl flex flex-col justify-between">
                                    <div>
                                        <div class="flex justify-between items-start gap-2">
                                            <span class="text-xs font-black uppercase tracking-wide text-slate-300">{g.title}</span>
                                            <span class="font-mono text-xs font-black text-amber-400 bg-amber-400/5 border border-amber-400/10 px-1.5 rounded">{pct}%</span>
                                        </div>
                                        <div class="w-full h-1 bg-black rounded-full mt-3 overflow-hidden">
                                            <div class="h-full bg-gradient-to-r from-amber-500 to-yellow-500" style={{ width: `${pct}%` }}></div>
                                        </div>
                                    </div>
                                    <div class="flex justify-between items-center mt-4 pt-3 border-t border-white/5">
                                        <span class="font-mono text-xs text-slate-500">
                                            {g.id === 'g1' ? `Глава ${Math.floor(g.current/11) + 1} // ${g.current}/${g.target} ${g.unit}` : `${g.current} / ${g.target} ${g.unit}`}
                                        </span>
                                        <div class="flex gap-1">
                                            <button onClick={() => changeGoal(g.id, false)} class="w-7 h-7 bg-white/5 rounded-md flex items-center justify-center text-slate-400 hover:text-white active:scale-90"><IconBase iconName="Minus" size={12}/></button>
                                            <button onClick={() => changeGoal(g.id, true)} class="w-7 h-7 bg-amber-500/10 border border-amber-500/20 rounded-md flex items-center justify-center text-amber-400 hover:text-white active:scale-90"><IconBase iconName="Plus" size={12}/></button>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Рабочие задачи текущего дня */}
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Левый блок: Матрица глубокой фокусировки */}
                        <div class="premium-glass p-5 md:p-6 rounded-[2rem] flex flex-col justify-between">
                            <div>
                                <h2 class="text-lg font-black uppercase tracking-wider text-white mb-4 flex items-center gap-2">
                                    <IconBase iconName="Activity" className="text-amber-400" size={18}/>
                                    <span>{mode === 'saturday' ? 'Творческий слот' : mode === 'sunday' ? 'Инкубатор планов' : 'Матрица задач'}</span>
                                </h2>
                                {mode === 'saturday' ? (
                                    <div class="p-6 bg-black/20 rounded-2xl border border-white/5 text-center my-auto">
                                        <IconBase iconName="Moon" className="text-slate-600 mb-3" size={32}/>
                                        <h4 class="text-sm font-black uppercase text-white mb-1">Режим Создателя Активирован</h4>
                                        <p class="text-xs text-slate-400">Тяжелый код и бизнес-системы заморожены. Смена деятельности — это лучший отдых для ЦНС.</p>
                                    </div>
                                ) : mode === 'sunday' ? (
                                    <div class="space-y-3">
                                        <CheckItem anchor="Пробуждение" checked={state.dailyTasks.pm} timeLog={state.taskTimestamps.pm} onChange={() => toggleTask('pm', 'pm', 10)} label="Обновление магнитной доски на стене" subLabel="Сброс и расстановка жестких приоритетов." />
                                        <CheckItem anchor="Обед" checked={state.dailyTasks.content} timeLog={state.taskTimestamps.content} onChange={() => toggleTask('content', 'content', 10)} label="Контент-векторы на ПН-ПТ" subLabel="Фиксация идей." />
                                    </div>
                                ) : (
                                    <div class="space-y-4">
                                        <div class={`p-1.5 rounded-2xl border transition-all ${state.dailyTasks.pm ? 'border-amber-500/20 bg-amber-500/5' : 'border-white/5 bg-black/10'}`}>
                                            <CheckItem anchor="English" checked={state.dailyTasks.pm} timeLog={state.taskTimestamps.pm} onChange={() => toggleTask('pm', 'pm', isMin?10:15)} label="Project Management" subLabel="Фокус на построение масштабируемых систем." />
                                            {!state.dailyTasks.pm && <FocusTimer defaultMinutes={timeSettings.pmTime} taskName="PM Deep Work" taskId="pm" category="pm" xpReward={isMin?10:15} onCompleteTask={toggleTask} />}
                                        </div>
                                        {!isMin && (
                                            <div class={`p-1.5 rounded-2xl border transition-all ${state.dailyTasks.english ? 'border-amber-500/20 bg-amber-500/5' : 'border-white/5 bg-black/10'}`}>
                                                <CheckItem anchor="Завтрак" checked={state.dailyTasks.english} timeLog={state.taskTimestamps.english} onChange={() => toggleTask('english', 'english', 10)} label="English Speaking Practice" subLabel="Инструмент глобального эксперта." />
                                                {!state.dailyTasks.english && <FocusTimer defaultMinutes={timeSettings.engTime} taskName="English Practice" taskId="english" category="english" xpReward={10} onCompleteTask={toggleTask} />}
                                            </div>
                                        )}
                                        <CheckItem anchor="Окна в расписании" checked={state.dailyTasks.body} timeLog={state.taskTimestamps.body} onChange={() => toggleTask('body', 'body', 20)} label={isMin ? "Микро-растяжка ЦНС" : "Личная силовая тренировка + Аудиокнига"} />
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Правый блок: Фиксированные дофаминовые цепочки привычек */}
                        <div class="premium-glass p-5 md:p-6 rounded-[2rem] flex flex-col">
                            <h2 class="text-lg font-black uppercase tracking-wider text-white mb-4 flex items-center gap-2"><IconBase iconName="Shield" className="text-slate-400" size={18}/><span>Нейро-цепочки (Habit Stacking)</span></h2>
                            <div class="space-y-4">
                                <div class="p-4 rounded-2xl bg-black/20 border border-white/5 relative">
                                    <span class="absolute top-3 right-4 text-[9px] font-mono text-slate-500 uppercase tracking-widest font-black">Утро</span>
                                    <div class="space-y-2 mt-2">
                                        <CheckItem anchor="Пробуждение" checked={state.dailyTasks.waterAm} timeLog={state.taskTimestamps.waterAm} onChange={() => toggleTask('waterAm', 'spirit', 5)} label="Вода + Свет + Воздух" />
                                        <CheckItem anchor="Вода" checked={state.dailyTasks.morningCharge} timeLog={state.taskTimestamps.morningCharge} onChange={() => toggleTask('morningCharge', 'body', 5)} label="Микро-зарядка ЦНС (2 мин)" />
                                        <CheckItem anchor="Зарядка" checked={state.dailyTasks.breathAm} timeLog={state.taskTimestamps.breathAm} onChange={() => toggleTask('breathAm', 'spirit', 10)} label="Дыхание Box Breathing" />
                                        <CheckItem anchor="Дыхание" checked={state.dailyTasks.prayerAm} timeLog={state.taskTimestamps.prayerAm} onChange={() => toggleTask('prayerAm', 'spirit', 10)} label="Утренний Сверх-Манифест" />
                                    </div>
                                </div>
                                <div class="p-4 rounded-2xl bg-black/20 border border-white/5 relative">
                                    <span class="absolute top-3 right-4 text-[9px] font-mono text-slate-500 uppercase tracking-widest font-black">Вечер</span>
                                    <div class="space-y-2 mt-2">
                                        {!isMin && !isWeekend && <CheckItem anchor="Конец ведения" checked={state.dailyTasks.cardio} timeLog={state.taskTimestamps.cardio} onChange={() => toggleTask('cardio', 'body', 10)} label="Домашнее кардио (Сброс кортизола)" />}
                                        <CheckItem anchor="Постель" checked={state.dailyTasks.breathPm} timeLog={state.taskTimestamps.breathPm} onChange={() => toggleTask('breathPm', 'spirit', 10)} label="Дыхание Relax (Выдох длиннее)" />
                                        <CheckItem anchor="Дыхание" checked={state.dailyTasks.prayerPm} timeLog={state.taskTimestamps.prayerPm} onChange={() => toggleTask('prayerPm', 'spirit', 10)} label="Вечерний Сверх-Манифест" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Вкладка: РАСПОРЯДОК ДНЯ
        const ScheduleView = ({ state }) => {
            const mode = state.currentMode;
            const timeline = useMemo(() => {
                if (mode === 'saturday') return [
                    { time: '11:00', title: 'Мягкий подъём', desc: 'Вода, свет, запуск базовой физиологии.', icon: 'Compass' },
                    { time: '14:00', title: 'Творчество (Vibe Coding)', desc: 'Suno, Obsidian, свободный созидательный поток.', icon: 'Music' },
                    { time: '18:00', title: 'Контроль Рефида', desc: 'Лимит 4500 ккал. Полное расслабление ЦНС.', icon: 'Coffee' },
                    { time: '23:30', title: 'Вечерний Манифест', desc: 'Обнуление ментального шума. Сон.', icon: 'Moon' }
                ];
                if (mode === 'sunday') return [
                    { time: '11:00', title: 'Подъем', desc: 'Вода, свет, запуск систем.', icon: 'Compass' },
                    { time: '13:00', title: 'Магнитная доска', desc: 'Жесткое планирование спринта на неделю вперед.', icon: 'Layout' },
                    { time: '19:00', title: 'Контент-план', desc: 'Разметка смысловых векторов на неделю.', icon: 'PenTool' }
                ];
                return [
                    { time: '10:30', title: 'Подъём', desc: 'Стабилизация циркадных ритмов. Вода + Свет.', icon: 'Compass' },
                    { time: '10:45', title: 'Дыхание + Манифест', desc: 'Box Breathing + Активация дофаминовой гравитации.', icon: 'Flame' },
                    { time: '11:10', title: 'Завтрак + Языковой спринт', desc: '[Якорь: Еда] Испанский / Китайский с транслитерацией.', icon: 'Utensils', highlight: true },
                    { time: '11:35', title: 'Daily English Practice', desc: 'Речевой разогрев мозга.', icon: 'Globe', highlight: true },
                    { time: '12:05', title: 'Project Management Спринт', desc: '[Якорь: Конец English] 60 минут глубокой работы.', icon: 'BrainCircuit', highlight: true },
                    { time: '13:05', title: 'ЛЕГАЛЬНЫЙ БЛОК: Перезагрузка', desc: 'Охлаждение коры. YouTube, соцсети без чувства вины.', icon: 'Coffee', special: true },
                    { time: '13:45', title: 'Контент + Obsidian', desc: 'Запись смыслов, инсайтов, структуры рилсов.', icon: 'Edit3', highlight: true },
                    { time: '16:00', title: 'Подопечные + Личная тренировка', desc: 'Основной рабочий блок. Тренировка встраивается в окна.', icon: 'Dumbbell' },
                    { time: '23:00', title: 'Кардио дома', desc: '[Якорь: Конец работы] 20-25 минут сжигания кортизола.', icon: 'HeartPulse' },
                    { time: '00:35', title: 'Разгрузка + Вечерний Манифест', desc: 'Магний, закрытие гештальтов дня, сон в 01:00.', icon: 'Moon' }
                ];
            }, [mode]);

            return (
                <div class="space-y-6 animate-in">
                    <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter">Распорядок</h1>
                    <TipCard text="График — это не клетка, это рельсы. Если сошел с курса, посмотри на часы и выполняй текущий блок." iconName="List"/>
                    <div class="max-w-3xl mx-auto premium-glass p-4 sm:p-8 rounded-[2rem]">
                        <div class="relative border-l-2 border-white/5 ml-2 sm:ml-6 space-y-8 py-2">
                            {timeline.map((item, idx) => (
                                <div key={idx} class="relative pl-6 sm:pl-10 group">
                                    <div class={`absolute -left-[13px] top-1.5 w-6 h-6 rounded-full border-2 bg-[#0a0a0a] flex items-center justify-center transition-colors ${item.special ? 'border-amber-500 text-amber-400' : 'border-white/10 text-slate-500'}`}>
                                        <IconBase iconName={item.icon} size={12}/>
                                    </div>
                                    <div class={`p-4 rounded-2xl border transition-all ${item.special ? 'bg-amber-500/5 border-amber-500/20' : item.highlight ? 'bg-white/5 border-white/5' : 'border-transparent'}`}>
                                        <span class="font-mono text-xs font-black px-2 py-0.5 rounded bg-amber-400/10 text-amber-400">{item.time}</span>
                                        <h3 class="text-base md:text-xl font-black uppercase tracking-tight mt-2 text-white">{item.title}</h3>
                                        <p class="text-xs md:text-sm text-slate-400 font-medium mt-1 leading-relaxed">{item.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // Вкладка: ОБУЧЕНИЕ
        const LearningView = ({ state, saveDailyNote, addLanguagePhrase }) => {
            const [pm, setPm] = useState(''); const [eng, setEng] = useState(''); const [lang, setLang] = useState('');
            return (
                <div class="space-y-6 animate-in">
                    <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter">Обучение</h1>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="premium-glass p-5 rounded-3xl space-y-4">
                            <h2 class="text-base font-black uppercase tracking-wider text-white flex items-center gap-2"><IconBase iconName="BookOpen" className="text-amber-500" size={18}/><span>Смыслы PM</span></h2>
                            <TextInput placeholder="Зафиксируй системный или архитектурный инсайт спринта..." value={pm} onChange={setPm} multiline />
                            <Button variant="secondary" className="w-full" onClick={() => { saveDailyNote(pm, 'PM'); setPm(''); }}>Отправить в буфер OS</Button>
                        </div>
                        <div class="premium-glass p-5 rounded-3xl space-y-4">
                            <h2 class="text-base font-black uppercase tracking-wider text-white flex items-center gap-2"><IconBase iconName="Globe" className="text-yellow-500" size={18}/><span>English Sprint</span></h2>
                            <TextInput placeholder="Новая устойчивая идиома или разобранный речевой оборот..." value={eng} onChange={setEng} multiline />
                            <Button variant="secondary" className="w-full" onClick={() => { saveDailyNote(eng, 'ENG'); setEng(''); }}>Отправить в буфер OS</Button>
                        </div>
                        <div class="premium-glass p-5 rounded-3xl lg:col-span-2 space-y-4">
                            <h2 class="text-base font-black uppercase tracking-wider text-white flex items-center gap-2"><IconBase iconName="Utensils" className="text-amber-400" size={18}/><span>Языковой Спринт (Завтрак)</span></h2>
                            <p class="text-xs text-slate-400 font-medium">Spanish / Mandarin с обязательной русской транслитерацией произношения.</p>
                            <div class="flex flex-col sm:flex-row gap-3">
                                <TextInput placeholder="Пример: Nǐ hǎo (Ни хао) — Привет..." value={lang} onChange={setLang} />
                                <Button className="sm:w-44 flex-shrink-0" onClick={() => { addLanguagePhrase(lang); setLang(''); }}>Сохранить</Button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Вкладка: ТЕЛО
        const BodyView = ({ state, update, toggleTask }) => (
            <div class="space-y-6 animate-in">
                <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter">Тело</h1>
                <TipCard text="Для профессионала в нутрициологии тело — это физическое подтверждение философии бренда. Инвестируй в ЦНС и мышечный корсет." iconName="Dumbbell"/>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="premium-glass p-5 rounded-3xl space-y-4">
                        <h2 class="text-base font-black uppercase tracking-wider text-white flex items-center gap-2"><IconBase iconName="Activity" className="text-amber-400" size={18}/><span>Физическая интеграция</span></h2>
                        <div class="space-y-2">
                            <CheckItem anchor="Окна ведения" checked={state.dailyTasks.body} timeLog={state.taskTimestamps.body} onChange={() => toggleTask('body', 'body', 20)} label="Личная силовая тренировка + Аудиокнига" />
                            <CheckItem anchor="Конец работы" checked={state.dailyTasks.cardio} timeLog={state.taskTimestamps.cardio} onChange={() => toggleTask('cardio', 'body', 15)} label="Домашнее кардио перед едой (20 мин)" />
                        </div>
                    </div>
                    <div class="premium-glass p-5 rounded-3xl space-y-6">
                        <h2 class="text-base font-black uppercase tracking-wider text-white flex items-center gap-2"><IconBase iconName="Battery" className="text-yellow-500" size={18}/><span>Восстановление ресурсов ЦНС</span></h2>
                        <NumericInput label="Продолжительность сна за ночь (цель: 7.5ч)" min={0} max={15} step={0.5} value={state.energyMetrics.sleep} onChange={(v) => update('energyMetrics', {sleep: v})} />
                        <NumericInput label="Индекс готовности к силовым нагрузкам" hint="1-10" min={1} max={10} value={state.energyMetrics.readiness} onChange={(v) => update('energyMetrics', {readiness: v})} />
                    </div>
                </div>
            </div>
        );

        // Вкладка: КОНТЕНТ
        const ContentView = ({ state, update, saveDailyNote }) => {
            const [idea, setIdea] = useState('');
            return (
                <div class="space-y-6 animate-in">
                    <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter">Контент</h1>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="premium-glass p-5 rounded-3xl space-y-4">
                            <h2 class="text-base font-black uppercase tracking-wider text-white flex items-center gap-2"><IconBase iconName="PenTool" className="text-amber-500" size={18}/><span>Буфер смыслов Obsidian</span></h2>
                            <TextInput placeholder="Запиши концепт рилса, манифест или структуру поста без жесткой редактуры..." value={idea} onChange={setIdea} multiline />
                            <Button className="w-full" onClick={() => { saveDailyNote(idea, 'CONTENT'); setIdea(''); }}>Зафиксировать смысл</Button>
                        </div>
                        <div class="premium-glass p-5 rounded-3xl space-y-3">
                            <h2 class="text-base font-black uppercase tracking-wider text-white flex items-center gap-2"><IconBase iconName="TrendingUp" className="text-yellow-500" size={18}/><span>Медиа-лестница проекта</span></h2>
                            {['Смысл пойман в буфер', 'Скрипт развернут в Obsidian', 'Черновой видеоматериал снят', 'Пост-продакшн завершен', 'Контент опубликован в сеть'].map((step, idx) => (
                                <div key={idx} className={`p-4 rounded-2xl border transition-all cursor-pointer flex justify-between items-center ${state.contentLadder >= idx ? 'bg-amber-500/10 border-amber-500/30 text-amber-400' : 'bg-black/20 border-white/5 text-slate-500'}`} onClick={() => update('contentLadder', state.contentLadder === idx ? idx - 1 : idx)}>
                                    <span class="text-xs font-black uppercase tracking-wide">{idx+1}. {step}</span>
                                    {state.contentLadder >= idx && <IconBase iconName="CheckCircle2" size={16}/>}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // Подкомпонент: Интерактивный Дыхательный Тренажер (Изолированное и исправленное состояние)
        const BreathingTimer = ({ type = 'morning', onComplete }) => {
            const [isActive, setIsActive] = useState(false);
            const [timeElapsed, setTimeElapsed] = useState(0);
            const TOTAL_SEC = 180;

            const [phase, setPhase] = useState('Готов?');
            const [secLeft, setSecLeft] = useState(0);
            const [pulseScale, setPulseScale] = useState(1);

            useEffect(() => {
                let timer = null;
                if (isActive && timeElapsed < TOTAL_SEC) {
                    timer = setInterval(() => {
                        setTimeElapsed(p => {
                            const next = p + 1;
                            AudioEngine.playTick();
                            return next;
                        });
                    }, 1000);
                } else if (timeElapsed >= TOTAL_SEC && isActive) {
                    setIsActive(false);
                    AudioEngine.playSuccess();
                    triggerHaptic([60, 40, 60]);
                    if (onComplete) onComplete();
                }
                return () => clearInterval(timer);
            }, [isActive, timeElapsed, onComplete]);

            useEffect(() => {
                if (!isActive) return;
                const cycle = timeElapsed % (type === 'morning' ? 16 : 10);

                if (type === 'morning') {
                    if (cycle < 4) {
                        if (cycle === 0) AudioEngine.playPhaseChange();
                        setPhase('Вдох'); setSecLeft(4 - cycle); setPulseScale(1.4);
                    } else if (cycle < 8) {
                        if (cycle === 4) AudioEngine.playPhaseChange();
                        setPhase('Задержка'); setSecLeft(8 - cycle); setPulseScale(1.4);
                    } else if (cycle < 12) {
                        if (cycle === 8) AudioEngine.playPhaseChange();
                        setPhase('Выдох'); setSecLeft(12 - cycle); setPulseScale(1);
                    } else {
                        if (cycle === 12) AudioEngine.playPhaseChange();
                        setPhase('Задержка'); setSecLeft(16 - cycle); setPulseScale(1);
                    }
                } else {
                    if (cycle < 4) {
                        if (cycle === 0) AudioEngine.playPhaseChange();
                        setPhase('Вдох'); setSecLeft(4 - cycle); setPulseScale(1.3);
                    } else {
                        if (cycle === 4) AudioEngine.playPhaseChange();
                        setPhase('Выдох'); setSecLeft(10 - cycle); setPulseScale(1);
                    }
                }
            }, [timeElapsed, isActive, type]);

            const curMin = Math.floor((TOTAL_SEC - timeElapsed) / 60);
            const curSec = ((TOTAL_SEC - timeElapsed) % 60).toString().padStart(2, '0');

            return (
                <div class="bg-black/30 border border-white/5 p-6 rounded-3xl flex flex-col items-center justify-center relative min-h-[380px]">
                    <div class="absolute top-4 left-4 text-[10px] font-mono font-black text-amber-400 bg-amber-400/5 px-2.5 py-1 rounded border border-amber-400/10 uppercase">
                        {type === 'morning' ? 'Box 4-4-4-4' : 'Vagus Relax 4-6'}
                    </div>
                    <div class="absolute top-4 right-4 text-xs font-mono font-black text-slate-400 bg-white/5 px-2.5 py-1 rounded">
                        {curMin}:{curSec}
                    </div>

                    <div class="relative w-40 h-40 flex items-center justify-center my-6">
                        <div class="absolute inset-0 rounded-full bg-amber-500/5 blur-2xl transition-transform duration-1000" style={{ transform: `scale(${pulseScale * 1.3})` }}></div>
                        <div class="w-24 h-24 rounded-full border-2 border-amber-500/30 bg-black/80 flex flex-col items-center justify-center shadow-2xl transition-transform duration-1000" style={{ transform: `scale(${pulseScale})` }}>
                            <span class="text-3xl font-mono font-black text-amber-400">{isActive ? secLeft : '—'}</span>
                        </div>
                    </div>

                    <h3 class="text-xl font-black uppercase text-white tracking-wide h-8">{phase}</h3>
                    <p class="text-[11px] text-slate-500 text-center max-w-xs mt-1 mb-6 leading-relaxed">
                        {type === 'morning' ? 'Синхронизация полушарий мозга. Аудио-метроном активен.' : 'Глубокий тормозящий выдох для полного сброса кортизола ЦНС.'}
                    </p>

                    <Button variant={isActive ? 'secondary' : 'primary'} class="w-full max-w-[200px] text-xs uppercase" onClick={() => { triggerHaptic(10); setIsActive(!isActive); }} icon={isActive ? Pause : Play}>
                        {isActive ? 'Пауза' : timeElapsed > 0 ? 'Продолжить' : 'Запуск'}
                    </Button>
                </div>
            );
        };

        // Вкладка: РИТУАЛЫ (Восстановленная страница)
        const RitualsView = ({ state, toggleTask }) => (
            <div class="space-y-6 animate-in">
                <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter">Ритуалы</h1>
                <TipCard text="Ритуалы — это твои психологические якоря. Если день развалился полностью, просто выполни утренний и вечерний ритуал. Это сохранит контроль и идентичность." iconName="Anchor" />
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="premium-glass p-5 rounded-[2rem] border-t-2 border-t-amber-500 space-y-4">
                        <h2 class="text-base font-black uppercase tracking-wider text-white flex items-center gap-2"><IconBase iconName="Compass" className="text-amber-400" size={18}/><span>Утренний алгоритм ЦНС</span></h2>
                        <BreathingTimer type="morning" onComplete={() => toggleTask('breathAm', 'spirit', 15)} />
                        <ManifestReader type="AM" />
                    </div>
                    <div class="premium-glass p-5 rounded-[2rem] border-t-2 border-t-yellow-600 space-y-4">
                        <h2 class="text-base font-black uppercase tracking-wider text-white flex items-center gap-2"><IconBase iconName="Moon" className="text-yellow-600" size={18}/><span>Вечерний детокс разума</span></h2>
                        <BreathingTimer type="evening" onComplete={() => toggleTask('breathPm', 'spirit', 15)} />
                        <ManifestReader type="PM" />
                    </div>
                </div>
            </div>
        );

        // Вкладка: ПРОГРЕСС И СТОИЧЕСКАЯ КАРТА ЖИЗНИ
        const ProgressView = ({ state, update }) => {
            const { xp, level, categories, returnRate } = state.stats;
            const progressToNext = xp % 200;
            const progressPercent = (progressToNext / 200) * 100;

            const mementoMoriData = useMemo(() => {
                const birth = new Date(BIRTH_DATE);
                const today = new Date();
                const diffTime = Math.abs(today - birth);
                const livedWeeks = Math.floor(diffTime / (1000 * 60 * 60 * 24 * 7));
                const totalWeeks = TARGET_YEARS * 52;
                return { lived: livedWeeks, total: totalWeeks, pct: Math.min(100, Math.floor((livedWeeks / totalWeeks) * 100)) };
            }, []);

            const Bar = ({ label, val, col }) => (
                <div class="bg-black/30 p-4 rounded-2xl border border-white/5">
                    <div class="flex justify-between text-xs mb-2 font-black uppercase tracking-wider">
                        <span class="text-slate-400">{label}</span>
                        <span class="text-slate-200 font-mono">{Math.floor(val)}%</span>
                    </div>
                    <div class="h-1.5 w-full bg-black/60 rounded-full border border-white/5 overflow-hidden">
                        <div class={`h-full ${col}`} style={{ width: `${val}%` }}></div>
                    </div>
                </div>
            );

            return (
                <div class="space-y-6 animate-in">
                    <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter">Прогресс</h1>
                    
                    {/* Графическая сетка Memento Mori */}
                    <div class="premium-glass p-5 md:p-6 rounded-[2rem] space-y-4">
                        <div class="flex justify-between items-center border-b border-white/5 pb-2">
                            <span class="text-xs font-black uppercase tracking-widest text-slate-300 flex items-center gap-1.5"><IconBase iconName="Anchor" size={14} className="text-amber-500"/>Memento Mori // Ресурс Жизни Павла Маркова</span>
                            <span class="font-mono text-xs text-amber-400 font-black">Прожито: {mementoMoriData.pct}%</span>
                        </div>
                        <p class="text-xs text-slate-400 leading-relaxed font-medium">Каждый пиксель ниже — одна неделя твоей жизни из 80-летнего лимита. Твой текущий год жизни подсвечен неоновой пульсацией. Время необратимо.</p>
                        
                        {/* Матричный рендеринг сетки недель */}
                        <div class="flex flex-wrap gap-[2px] p-3 bg-black/40 rounded-xl border border-white/5 max-h-[140px] overflow-y-auto hide-scrollbar select-none">
                            {Array.from({ length: mementoMoriData.total }).map((_, i) => {
                                let bg = 'bg-white/5 border border-white/5'; // Будущее
                                if (i < mementoMoriData.lived) bg = 'bg-neutral-800'; // Прошлое
                                if (i >= mementoMoriData.lived && i < mementoMoriData.lived + 52) bg = 'bg-amber-400 shadow-[0_0_6px_#fbbf24]'; // Настоящий год
                                return <div key={i} class={`mori-dot ${bg}`} />;
                            })}
                        </div>
                        <div class="flex justify-between items-center text-[10px] font-mono text-slate-500 font-bold uppercase">
                            <span>Рождение: 14.03.1997</span>
                            <span>Лимит: {mementoMoriData.total} недель</span>
                        </div>
                    </div>

                    {/* Панель Уровней */}
                    <div class="premium-glass p-5 md:p-6 rounded-[2rem]">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                            <div class="flex items-center gap-4">
                                <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-amber-400 to-yellow-600 flex items-center justify-center text-black font-black"><IconBase iconName="Trophy" size={24}/></div>
                                <div>
                                    <h2 class="text-2xl font-black text-white">Уровень {level}</h2>
                                    <p class="text-amber-400 font-mono font-black text-[10px] uppercase tracking-widest">Каста Суверенов</p>
                                </div>
                            </div>
                            <div class="bg-black/50 px-5 py-2.5 rounded-xl border border-white/5 font-mono font-black text-white">{xp} <span class="text-xs text-amber-500">XP</span></div>
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between text-[11px] uppercase tracking-wider text-slate-500 font-bold"><span>Прогресс ядра</span><span class="font-mono text-amber-400">{progressToNext} / 200 XP</span></div>
                            <div class="h-3 bg-black rounded-full p-0.5 border border-white/5"><div class="h-full bg-gradient-to-r from-amber-500 to-yellow-500 rounded-full transition-all duration-1000" style={{ width: `${progressPercent}%` }}></div></div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-6 pt-6 border-t border-white/5">
                            <Bar label="Атлет (Тело)" val={categories.body} col="bg-amber-500" />
                            <Bar label="Структура (PM)" val={categories.pm} col="bg-yellow-500" />
                            <Bar label="Мир (English)" val={categories.english} col="bg-orange-400" />
                            <Bar label="Создатель (Контент)" val={categories.content} col="bg-amber-300" />
                            <Bar label="Дух (Ритуалы)" val={categories.spirit} col="bg-yellow-600" />
                            <Bar label="Return Rate (Стабильность)" val={returnRate} col="bg-gradient-to-r from-amber-400 to-yellow-500 shadow-[0_0_10px_rgba(251,191,36,0.3)]" />
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <NumericInput label="Суточный уровень энергии" min={1} max={10} value={state.energyMetrics.energy} onChange={(v) => update('energyMetrics', {energy: v})} />
                        <NumericInput label="Уровень стресса ЦНС" min={1} max={10} color="red" value={state.energyMetrics.stress} onChange={(v) => update('energyMetrics', {stress: v})} />
                    </div>
                </div>
            );
        };

        // Вкладка: ЭКСПОРТ И БЭКАПЫ
        const ToolsExportView = ({ state, copyToClipboard, setState, showToast }) => {
            const [suno, setSuno] = useState('');
            const getObsidianTemplate = () => {
                const e = state.energyMetrics, t = state.dailyTasks, logs = state.taskTimestamps;
                const notesStr = state.notes.savedDaily.length > 0 ? state.notes.savedDaily.join('\n') : '- Нет записей';
                const langStr = state.languagePhrases.length > 0 ? state.languagePhrases.map(l => `- ${l}`).join('\n') : '- Нет записей';
                const goalsStr = state.strategicGoals.map(g => `- ${g.title}: ${Math.floor((g.current/g.target)*100)}% (${g.current}/${g.target} ${g.unit})`).join('\n');
                return `# Суверенный Лог Дня: ${new Date().toLocaleDateString('ru-RU')}\n\n## Метрики ЦНС\n- Сон: ${e.sleep}ч\n- Энергия: ${e.energy}/10\n- Стресс: ${e.stress}/10\n- Готовность: ${e.readiness}/10\n\n## Стратегические Векторы\n${goalsStr}\n\n## Хронология Дисциплины\n- [${logs.waterAm || '—'}] Вода + Свет\n- [${logs.morningCharge || '—'}] Зарядка\n- [${logs.breathAm || '—'}] Box Breathing (AM)\n- [${logs.prayerAm || '—'}] Unrenний Манифест\n- [${logs.english || '—'}] English practice\n- [${logs.pm || '—'}] PM Deep Work\n- [${logs.body || '—'}] Силовая сессия\n- [${logs.cardio || '—'}] Домашнее кардио\n- [${logs.breathPm || '—'}] Дыхание (PM)\n- [${logs.prayerPm || '—'}] Вечерний Манифест\n\n## Буфер Инсайтов\n${notesStr}\n\n## Микро-Языки\n${langStr}`;
            };

            const downloadFile = () => {
                const blob = new Blob([getObsidianTemplate()], { type: 'text/markdown;charset=utf-8;' });
                const url = URL.createObjectURL(blob); const link = document.createElement("a");
                link.href = url; link.setAttribute("download", `${new Date().toISOString().split('T')[0]}_Markov_OS.md`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
                showToast("Файл .md успешно скачан в твой Obsidian Vault 💾");
            };

            const runBackup = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
                const a = document.createElement('a'); a.setAttribute("href", dataStr);
                a.setAttribute("download", `Markov_OS_Core_${new Date().toISOString().split('T')[0]}.json`);
                document.body.appendChild(a); a.click(); a.remove();
                showToast("Ядро бэкапа JSON выгружено локально 🔐");
            };

            const runRestore = (e) => {
                if(e.target.files.length === 0) return;
                const r = new FileReader(); r.readAsText(e.target.files[0], "UTF-8");
                r.onload = evt => {
                    try {
                        const p = JSON.parse(evt.target.result);
                        if (p.stats && p.dailyTasks) { setState(p); showToast("Ядро OS успешно восстановлено! ⚡"); }
                    } catch (err) { showToast("Ошибка парсинга бэкапа", true); }
                };
            };

            return (
                <div class="space-y-6 animate-in">
                    <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter">Экспорт</h1>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="premium-glass p-5 rounded-3xl space-y-4">
                            <h2 class="text-base font-black uppercase tracking-wider text-white flex items-center gap-2"><IconBase iconName="Download" className="text-amber-500" size={18}/><span>Obsidian Vault Sync</span></h2>
                            <p class="text-xs text-slate-400 leading-relaxed">Генерация монолитного дневного отчета с поминутными таймстампами закрытия привычек для твоей базы знаний Obsidian.</p>
                            <div class="flex gap-2">
                                <Button variant="primary" className="flex-1 text-xs uppercase font-black" onClick={() => copyToClipboard(getObsidianTemplate())}>Копировать</Button>
                                <Button variant="secondary" className="flex-1 text-xs uppercase font-black" onClick={downloadFile}>Скачать .md</Button>
                            </div>
                        </div>
                        <div class="premium-glass p-5 rounded-3xl space-y-4">
                            <h2 class="text-base font-black uppercase tracking-wider text-white flex items-center gap-2"><IconBase iconName="Settings" className="text-orange-400" size={18}/><span>Архивация Локальной Базы</span></h2>
                            <p class="text-xs text-slate-400 leading-relaxed">Экспорт и импорт полной базы данных приложения для предотвращения утери логов при чистке браузера.</p>
                            <div class="flex gap-2">
                                <Button variant="secondary" className="flex-1 text-xs uppercase font-black" onClick={runBackup}>Бэкап JSON</Button>
                                <label class="flex-1 flex items-center justify-center px-4 py-3 rounded-2xl bg-white/5 border border-white/5 text-amber-400 font-bold hover:bg-white/10 cursor-pointer text-xs uppercase transition-all select-none">
                                    <span>Импорт</span><input type="file" accept=".json" onChange={runRestore} class="hidden" />
                                </label>
                            </div>
                        </div>
                        <div class="premium-glass p-5 rounded-3xl lg:col-span-2 space-y-4">
                            <h2 class="text-base font-black uppercase tracking-wider text-white flex items-center gap-2"><IconBase iconName="Music" className="text-amber-400" size={18}/><span>Творческий Банк Идей SUNO</span></h2>
                            <div class="flex flex-col sm:flex-row gap-2">
                                <TextInput placeholder="Введи концепт трека, музыкальный промпт или стилевой хук..." value={suno} onChange={setSuno} />
                                <Button onClick={() => { if(suno.trim()) { setState(p => ({...p, sunoIdeas: [...p.sunoIdeas, suno]})); setSuno(''); showToast("Промпт сохранен в банк."); } }}>Добавить</Button>
                            </div>
                            {state.sunoIdeas && state.sunoIdeas.length > 0 && (
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 p-3 bg-black/30 rounded-2xl border border-white/5 max-h-52 overflow-y-auto hide-scrollbar">
                                    {state.sunoIdeas.map((id, i) => (
                                        <div key={i} class="p-3 bg-white/5 rounded-xl text-xs font-bold text-slate-300 flex items-center gap-2 border border-white/5"><IconBase iconName="Music" className="text-amber-500" size={14}/><span>{id}</span></div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Вспомогательные листовые подкомпоненты
        const ManifestReader = ({ type }) => {
            const [open, setOpen] = useState(false); const d = MANIFESTS[type];
            return (
                <div class="border border-white/5 rounded-2xl bg-black/20 overflow-hidden transition-all duration-300">
                    <button onClick={() => { triggerHaptic(10); setOpen(!open); }} class="w-full flex items-center justify-between p-4 text-left">
                        <span class="text-xs font-black uppercase tracking-wider text-slate-300 flex items-center gap-2"><IconBase iconName="Flame" size={16} className="text-amber-500"/>{d.title}</span>
                        <IconBase iconName="ChevronDown" size={18} className={`text-slate-500 transition-transform ${open?'rotate-180':''}`}/>
                    </button>
                    {open && (
                        <div class="p-4 border-t border-white/5 bg-black/40 space-y-3">
                            <p class="text-[10px] font-mono text-amber-500 uppercase tracking-widest leading-relaxed bg-amber-500/5 p-2 rounded border border-amber-500/10">{d.instruction}</p>
                            {d.text.split('\n\n').map((p, i) => <p key={i} class="text-xs md:text-sm text-slate-300 leading-relaxed tracking-wide font-medium whitespace-pre-wrap">{p}</p>)}
                        </div>
                    )}
                </div>
            );
        };

        const CheckItem = ({ checked, onChange, label, subLabel, xpBadge, anchor, timeLog }) => (
            <div class={`flex items-start gap-3 md:gap-4 p-4 md:p-5 rounded-2xl transition-all duration-300 cursor-pointer group border touch-manipulation min-h-[76px] relative overflow-hidden ${checked ? 'bg-amber-500/5 border-amber-500/30 shadow-[0_0_25px_rgba(251,191,36,0.08)]' : 'bg-[#0f0f0f]/40 border-white/5 hover:border-white/10 hover:bg-[#1a1a1a]/60'}`} onClick={onChange}>
                <div class={`mt-0.5 w-7 h-7 md:w-8 md:h-8 rounded-full flex items-center justify-center border-[2.5px] transition-all duration-500 flex-shrink-0 relative z-10 ${checked ? 'bg-gradient-to-br from-yellow-400 to-amber-600 border-transparent text-black shadow-[0_0_20px_rgba(251,191,36,0.5)] scale-110' : 'border-slate-600 group-hover:border-amber-500/50'}`}>
                    {checked && <IconBase iconName="Check" size={16} strokeWidth={4} />}
                </div>
                <div class="flex flex-col flex-1 justify-center relative z-10 min-w-0">
                    <div class="flex items-center gap-2 flex-wrap">
                        {anchor && <span class="text-amber-500 font-black text-[9px] uppercase tracking-widest flex items-center gap-1"><IconBase iconName="Anchor" size={10} /> [Якорь: {anchor}]</span>}
                        {checked && timeLog && <span class="text-slate-500 font-mono text-[10px] bg-amber-500/10 px-1.5 py-0.5 rounded border border-amber-500/20">🕒 {timeLog}</span>}
                    </div>
                    <span class={`font-bold transition-colors duration-300 text-base md:text-lg leading-tight mt-1 ${checked ? 'text-slate-500 line-through decoration-amber-500/50' : 'text-slate-200'}`}>{label}</span>
                    {subLabel && <span class={`text-xs md:text-sm mt-1.5 transition-colors font-medium leading-snug ${checked ? 'text-slate-600' : 'text-slate-400'}`}>{subLabel}</span>}
                </div>
            </div>
        );

        const TipCard = ({ text, title="Принцип системы", iconName = "Zap" }) => (
            <div class="bg-gradient-to-r from-[#121212]/80 to-[#0f0f0f]/80 backdrop-blur-xl border border-white/5 rounded-2xl p-4 md:p-6 flex gap-4 md:gap-5 items-start relative overflow-hidden mb-6 shadow-md">
                <div class="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-amber-400 to-yellow-600"></div>
                <div class="p-2.5 bg-amber-500/10 rounded-xl flex-shrink-0 border border-amber-500/20">
                    <IconBase iconName={iconName} className="text-amber-400" size={20} />
                </div>
                <div class="flex-1 min-w-0">
                    <h4 class="text-[10px] md:text-xs font-black text-amber-400 uppercase tracking-widest mb-1.5 opacity-90">{title}</h4>
                    <p class="text-sm md:text-base text-slate-300 leading-relaxed font-medium">{text}</p>
                </div>
            </div>
        );

        // Главный корневой оркестратор приложения
        function App() {
            const { state, setState, update, toggleTask, saveDailyNote, addLanguagePhrase, copyToClipboard, toast, showToast } = useAppState();

            const TABS = [
                { id: 'dashboard', icon: 'Home', label: 'Сегодня' },
                { id: 'schedule', icon: 'Clock', label: 'Распорядок' },
                { id: 'learning', icon: 'Brain', label: 'Обучение' },
                { id: 'body', icon: 'Dumbbell', label: 'Тело' },
                { id: 'content', icon: 'Smartphone', label: 'Контент' },
                { id: 'rituals', icon: 'Wind', label: 'Ритуалы' },
                { id: 'progress', icon: 'Trophy', label: 'Прогресс' },
                { id: 'tools', icon: 'Settings', label: 'Экспорт' },
            ];

            useEffect(() => {
                const bgGlows = {
                    max: 'radial-gradient(circle at top, rgba(251,191,36,0.06) 0%, rgba(5,5,5,0) 60%)',
                    norm: 'radial-gradient(circle at top, rgba(251,191,36,0.03) 0%, rgba(5,5,5,0) 50%)',
                    min: 'radial-gradient(circle at top, rgba(239,68,68,0.05) 0%, rgba(5,5,5,0) 50%)',
                    recovery: 'radial-gradient(circle at top, rgba(168,85,247,0.05) 0%, rgba(5,5,5,0) 50%)',
                    saturday: 'radial-gradient(circle at top, rgba(99,102,241,0.06) 0%, rgba(5,5,5,0) 60%)',
                    sunday: 'radial-gradient(circle at top, rgba(34,197,94,0.04) 0%, rgba(5,5,5,0) 50%)'
                };
                document.body.style.backgroundImage = bgGlows[state.currentMode] || bgGlows.norm;
            }, [state.currentMode]);

            const currentView = useMemo(() => {
                switch (state.currentTab) {
                    case 'dashboard': return <DashboardView state={state} update={update} toggleTask={toggleTask} />;
                    case 'schedule': return <ScheduleView state={state} />;
                    case 'learning': return <LearningView state={state} saveDailyNote={saveDailyNote} addLanguagePhrase={addLanguagePhrase} />;
                    case 'body': return <BodyView state={state} update={update} toggleTask={toggleTask} />;
                    case 'content': return <ContentView state={state} update={update} saveDailyNote={saveDailyNote} />;
                    case 'rituals': return <RitualsView state={state} toggleTask={toggleTask} />;
                    case 'progress': return <ProgressView state={state} update={update} />;
                    case 'tools': return <ToolsExportView state={state} copyToClipboard={copyToClipboard} setState={setState} showToast={showToast} />;
                    default: return <DashboardView state={state} update={update} toggleTask={toggleTask} />;
                }
            }, [state.currentTab, state, update, toggleTask, saveDailyNote, addLanguagePhrase, copyToClipboard, setState, showToast]);

            return (
                <div class="min-h-screen bg-transparent text-slate-200 font-sans flex flex-col lg:flex-row overflow-x-hidden relative">
                    {/* Боковое меню (Desktop Sidebar) */}
                    <aside class="hidden lg:flex flex-col w-72 xl:w-80 bg-[#121212]/50 backdrop-blur-3xl border-r border-white/5 p-6 h-screen sticky top-0 z-40">
                        <div class="mb-10 select-none">
                            <h1 class="text-4xl font-black tracking-widest text-white uppercase">Markov<br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-amber-500 font-serif italic">OS</span></h1>
                            <p class="text-[10px] text-slate-500 font-black tracking-widest mt-1.5 uppercase flex items-center gap-1.5">Hyper-Elite v15 Ultimate <span class="w-2 h-2 bg-amber-400 rounded-full animate-pulse shadow-[0_0_8px_#fbbf24]"></span></p>
                        </div>
                        <nav class="flex-1 space-y-1 overflow-y-auto hide-scrollbar">
                            {TABS.map(t => {
                                const act = state.currentTab === t.id;
                                return (
                                    <button 
                                        key={t.id} onClick={() => { triggerHaptic(10); update('currentTab', t.id); }}
                                        class={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl transition-all font-bold text-xs uppercase tracking-wider ${act ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20 shadow-inner' : 'text-slate-500 hover:text-slate-300 hover:bg-white/5'}`}
                                    >
                                        <IconBase iconName={t.icon} size={16} />
                                        <span class="truncate">{t.label}</span>
                                    </button>
                                );
                            })}
                        </nav>
                    </aside>

                    {/* Главная контентная область */}
                    <main class="flex-1 p-4 sm:p-8 md:p-10 lg:p-12 xl:p-16 w-full min-h-screen z-10 pb-24 lg:pb-12 overflow-hidden">
                        <div class="max-w-[1100px] mx-auto w-full">
                            {currentView}
                        </div>
                    </main>

                    {/* Меню навигации (Mobile iOS/Android) */}
                    <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-[#121212]/90 backdrop-blur-3xl border-t border-white/5 flex overflow-x-auto hide-scrollbar z-50 px-1 pt-1.5 safe-bottom">
                        {TABS.map(t => {
                            const act = state.currentTab === t.id;
                            return (
                                <button 
                                    key={t.id} onClick={() => { triggerHaptic(10); update('currentTab', t.id); }}
                                    class={`flex-1 flex flex-col items-center justify-center min-w-[66px] py-1.5 gap-1 transition-all ${act ? 'text-amber-400' : 'text-slate-500'}`}
                                >
                                    <IconBase iconName={t.icon} size={16} />
                                    <span class="text-[8px] font-black uppercase tracking-widest truncate max-w-full px-1">{t.label}</span>
                                </button>
                            );
                        })}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
