        const AudioEngine = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            playClick() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, this.ctx.currentTime + 0.04);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.04);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.04);
            },
            playTick() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.02, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.02);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.02);
            },
            playPhaseChange() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1000, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.03, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.1);
            },
            playSuccess() {
                this.init();
                const now = this.ctx.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50]; // До-Ми-Соль-До (Мажорный триумф)
                notes.forEach((freq, index) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + index * 0.08);
                    gain.gain.setValueAtTime(0.04, now + index * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.08 + 0.3);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + index * 0.08);
                    osc.stop(now + index * 0.08 + 0.3);
                });
            }

                text: `«Господь, Творец всего сущего, и Ты, Вселенная, разворачивающая миры в безупречном порядке.\n\nЯ, Павел Марков, подвожу итог этого дня. Прямо сейчас я полностью очищаю свое пространство от дневного шума и суеты. Любое внешнее влияние, чужие эмоции, страхи и сомнения обесточены, стерты и лишены силы. Мой разум чист, стабилен и неуязвим.\n\nЯ принимаю этот день во всей его полноте — как идеальную и необходимую структуру своего опыта. Моя дисциплина зафиксирована, мои действия неизбежно ведут к триумфу. Всё, что произошло сегодня, уже работает на меня и приумножает мою силу.\n\nПока мое тело погружается в глубокий, исцеляющий сон, мое подсознание программирует физический мир. Вселенная перестраивает реальность под мои утренние манифесты. В эти минуты ко мне прокладывают дорогу колоссальные ресурсы, грандиозный успех и люди высочайшего ментального порядка. Мои клетки обновляются, моя сила растет в тишине. Я засыпаю с абсолютным знанием своего величия. Мой вектор непоколебим.\n\nДа будет так. Сбылось. And so it is. Done. Así sea. Hecho está. 14.03.1997. 如此在. 成了. [Rúcǐ zài. Chéng le.]»`
            }
        };

        const INITIAL_STATE = {
            currentTab: 'dashboard',
            currentMode: 'norm',
            energyMetrics: { sleep: 7.5, energy: 7, stress: 3, readiness: 7 },
            dailyTasks: {
                waterAm: false, breathAm: false, prayerAm: false, morningCharge: false, hygieneAm: false, breakfast: false,
                pm: false, english: false, body: false, content: false,
                cardio: false, hygienePm: false, supplements: false, planTomorrow: false, breathPm: false, prayerPm: false
            },
            missedYesterday: { pm: false, english: false, body: false },
            notes: { savedDaily: [] },
            sunoIdeas: [],
            languagePhrases: [],
            stats: { 
                xp: 0, level: 1, returnRate: 100, daysLogged: 1,
                categories: { body: 15, pm: 15, english: 15, content: 15, spirit: 15 }
            },
            contentLadder: 0,
            lastLoginDate: new Date().toDateString(),
        };

        function useAppState() {
            const [state, setState] = useState(() => {
                try {
                    const saved = localStorage.getItem('markov_os_state_v11_elite');
                    if (saved) return { ...INITIAL_STATE, ...JSON.parse(saved) };
                } catch (e) {}
                return INITIAL_STATE;
            });

            const [toast, setToast] = useState({ visible: false, msg: '', isAlert: false });

            const showToast = useCallback((msg, isAlert = false) => {
                setToast({ visible: true, msg, isAlert });
                setTimeout(() => setToast({ visible: false, msg: '', isAlert: false }), 4000);
            }, []);

            useEffect(() => {
                localStorage.setItem('markov_os_state_v11_elite', JSON.stringify(state));
            }, [state]);

            useEffect(() => {
                const today = new Date().toDateString();
                if (state.lastLoginDate !== today) {
                    setState(prev => {
                        const missedPM = !prev.dailyTasks.pm;
                        const missedEng = !prev.dailyTasks.english;
                        const missedBody = !prev.dailyTasks.body;
                        let rrDrop = 0;
                        if(missedPM || missedBody) rrDrop = 5;

                        return {
                            ...prev,
                            currentMode: 'norm',
                            missedYesterday: { pm: missedPM, english: missedEng, body: missedBody },
                            dailyTasks: INITIAL_STATE.dailyTasks,
                            energyMetrics: { ...prev.energyMetrics, sleep: 0 },
                            languagePhrases: [],
                            contentLadder: 0,
                            lastLoginDate: today,
                            stats: { 
                                ...prev.stats, 
                                daysLogged: prev.stats.daysLogged + 1, 
                                returnRate: Math.max(0, Math.min(100, prev.stats.returnRate - rrDrop + 2)) 
                            }
                        }
                    });
                    showToast("Новый цикл. Система перезапущена. ⚡");
                }
            }, [state.lastLoginDate, showToast]);

            const update = useCallback((key, value) => {
                setState(prev => {
                    if (typeof value === 'object' && !Array.isArray(value) && value !== null && prev[key]) {
                        return { ...prev, [key]: { ...prev[key], ...value } };
                    }
                    return { ...prev, [key]: value };
                });
            }, []);

            const toggleTask = useCallback((taskId, category, xpReward = 10, forceState = null) => {
                AudioEngine.playClick();
                triggerHaptic(15);
                setState(prev => {
                    const isDone = forceState !== null ? forceState : !prev.dailyTasks[taskId];
                    // Если состояние не изменилось (например, повторный вызов принудительного стейта)
                    if (forceState !== null && prev.dailyTasks[taskId] === forceState) return prev;

                    let newXp = prev.stats.xp;
                    let newCatVal = prev.stats.categories[category] || 0;

                    if (isDone) {
                        newXp += xpReward;
                        newCatVal = Math.min(100, newCatVal + (xpReward / 1.5));
                        if(xpReward > 0) showToast(`+${xpReward} XP. Синхронизация. ✨`);
                    } else {
                        newXp = Math.max(0, newXp - xpReward);
                        newCatVal = Math.max(0, newCatVal - (xpReward / 1.5));
                    }

                    const newLevel = Math.floor(newXp / 200) + 1;
                    
                    return {
                        ...prev,
                        dailyTasks: { ...prev.dailyTasks, [taskId]: isDone },
                        stats: { 
                            ...prev.stats, 
                            xp: newXp, 
                            level: newLevel, 
                            categories: { ...prev.stats.categories, [category]: newCatVal } 
                        }
                    };
                });
            }, [showToast]);

            const saveDailyNote = useCallback((text, source = '') => {
                if (!text.trim()) return;
                const prefix = source ? `[${source}] ` : '';
                setState(prev => ({ ...prev, notes: { ...prev.notes, savedDaily: [...prev.notes.savedDaily, prefix + text] } }));
                showToast(`Идея материализована. 📝`);
                triggerHaptic(20);
            }, [showToast]);

            const addLanguagePhrase = useCallback((phrase) => {
                if(!phrase.trim()) return;
                setState(prev => ({ ...prev, languagePhrases: [...(prev.languagePhrases || []), phrase] }));
                showToast("Нейронная связь закреплена. 🧠");
                triggerHaptic(20);
            }, [showToast]);

            const copyToClipboard = useCallback((text) => {
                triggerHaptic([10, 30]);
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text)
                        .then(() => showToast("Скопировано. Готово к интеграции. ✨"))
                        .catch(() => showToast("Ошибка копирования", true));
                } else {
                    let textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-999999px";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        showToast("Скопировано. Готово к интеграции. ✨");
                    } catch (err) {
                        showToast("Ошибка копирования", true);
                    }
                    textArea.remove();
                }
            }, [showToast]);

            return { state, setState, update, toggleTask, saveDailyNote, addLanguagePhrase, copyToClipboard, toast, showToast };
        }

        const Card = ({ children, className = "", interactive = false, glowing = false }) => (
            <div className={`
                ${THEME.panel} border ${THEME.panelBorder} rounded-[2rem] p-5 md:p-8 shadow-2xl flex flex-col
                ${interactive ? 'cursor-pointer hover:border-amber-500/40 transition-all duration-300' : ''} 
                ${glowing ? 'relative overflow-hidden' : ''}
                ${className}
            `}>
                {glowing && <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-amber-400 to-transparent opacity-70"></div>}
                {children}
            </div>
        );

        const Button = ({ children, variant = 'primary', className = "", onClick, icon: IconComponent }) => {
            const variants = {
                primary: `${THEME.accentBg} text-[#0a0a0a] font-black shadow-[0_0_20px_rgba(251,191,36,0.15)] ${THEME.accentHover} border border-amber-300/40`,
                secondary: `bg-[#1a1a1a] text-amber-50 hover:bg-[#222222] border border border-[#333333] hover:border-amber-500/40 hover:shadow-[0_0_15px_rgba(251,191,36,0.1)]`,
                ghost: `text-slate-400 hover:text-amber-400 hover:bg-[#1a1a1a]`,
                danger: `bg-rose-950/30 text-rose-400 border border border-rose-900/40 hover:bg-rose-900/50 hover:text-rose-200`
            };
            return (
                <button onClick={() => { triggerHaptic(10); if(onClick) onClick(); }} className={`flex items-center justify-center gap-2 md:gap-3 px-4 md:px-6 py-3.5 md:py-4 rounded-2xl transition-all duration-300 active:scale-[0.98] touch-manipulation ${variants[variant]} ${className}`}>
                    {IconComponent && <IconComponent size={20} className={variant === 'primary' ? 'text-[#0a0a0a]' : ''} />}
                    <span className="truncate">{children}</span>
                </button>
            );
        };

        const NumericInput = ({ label, value, onChange, min=0, max=10, step=1, hint, color="accent" }) => {
            const handleDec = () => { triggerHaptic(10); onChange(Math.max(min, Number(value) - step)); };
            const handleInc = () => { triggerHaptic(10); onChange(Math.min(max, Number(value) + step)); };
            const handleChange = (e) => {
                let val = e.target.value;
                if (val === '') return onChange('');
                val = Number(val);
                if (!isNaN(val)) onChange(Math.min(max, Math.max(min, val)));
            };

            return (
                <div className="flex flex-col gap-2 w-full">
                    <div className="flex flex-wrap justify-between items-end text-sm mb-1 px-2">
                        <span className={`${THEME.textMuted} font-bold tracking-wide`}>{label} {hint && <span className="text-xs opacity-50 ml-1 font-normal break-words">({hint})</span>}</span>
                    </div>
                    <div className="flex items-center gap-1 bg-[#0f0f0f] border border-[#262626] p-1.5 rounded-2xl w-full shadow-inner">
                        <button onClick={handleDec} className="p-3 md:p-4 rounded-xl bg-[#1a1a1a] text-slate-400 hover:text-amber-400 hover:bg-[#222222] transition-all active:scale-95 touch-manipulation flex-shrink-0">
                            <Minus size={20} />
                        </button>
                        <input 
                            type="number" value={value} onChange={handleChange} min={min} max={max} step={step}
                            className={`flex-1 bg-transparent text-center text-2xl md:text-3xl font-mono font-black focus:outline-none transition-colors w-full min-w-0 ${color === 'red' ? 'text-rose-400 drop-shadow-[0_0_8px_rgba(251,113,133,0.4)]' : 'text-amber-400 drop-shadow-[0_0_8px_rgba(251,191,36,0.4)]'}`}
                        />
                        <button onClick={handleInc} className="p-3 md:p-4 rounded-xl bg-[#1a1a1a] text-slate-400 hover:text-amber-400 hover:bg-[#222222] transition-all active:scale-95 touch-manipulation flex-shrink-0">
                            <Plus size={20} />
                        </button>
                    </div>
                </div>
            );
        };

        const CheckItem = ({ checked, onChange, label, subLabel, xpBadge, anchor }) => (
            <div className={`flex items-start gap-3 md:gap-4 p-4 md:p-5 rounded-2xl transition-all duration-300 cursor-pointer group border touch-manipulation min-h-[76px] relative overflow-hidden ${checked ? 'bg-amber-500/5 border-amber-500/30 shadow-[0_0_25px_rgba(251,191,36,0.08)]' : 'bg-[#0f0f0f] border-[#262626] hover:border-[#3a3a3a] hover:bg-[#1a1a1a]'}`} onClick={onChange}>
                {checked && <div className="absolute inset-0 bg-gradient-to-r from-amber-500/0 via-amber-500/5 to-amber-500/0 animate-[shimmer_2s_infinite]"></div>}
                <div className={`mt-0.5 w-7 h-7 md:w-8 md:h-8 rounded-full flex items-center justify-center border-[2.5px] transition-all duration-500 flex-shrink-0 relative z-10 ${checked ? 'bg-gradient-to-br from-yellow-400 to-amber-600 border-transparent text-[#0a0a0a] shadow-[0_0_20px_rgba(251,191,36,0.5)] scale-110' : 'border-slate-600 group-hover:border-amber-500/50'}`}>
                    {checked && <Check size={16} strokeWidth={4} />}
                </div>
                <div className="flex flex-col flex-1 justify-center relative z-10 min-w-0">
                    {anchor && <span className="text-amber-500 font-black text-[9px] md:text-[10px] uppercase tracking-widest mb-1 flex items-center gap-1 truncate"><Anchor size={10} className="flex-shrink-0"/> [Якорь: {anchor}]</span>}
                    <span className={`font-bold transition-colors duration-300 text-base md:text-lg leading-tight break-words pr-2 ${checked ? 'text-slate-500 line-through decoration-amber-500/50' : 'text-slate-200'}`}>{label}</span>
                    {subLabel && <span className={`text-xs md:text-sm mt-1.5 transition-colors font-medium leading-snug break-words pr-2 ${checked ? 'text-slate-600' : 'text-slate-400'}`}>{subLabel}</span>}
                </div>
                {xpBadge && !checked && (
                    <span className="text-[10px] md:text-[11px] font-mono font-bold text-amber-400 bg-amber-400/10 border border-amber-400/20 px-2 md:px-3 py-1 md:py-1.5 rounded-full flex-shrink-0 mt-1 relative z-10 hidden sm:flex">+{xpBadge} XP</span>
                )}
            </div>
        );

        const TextInput = ({ value, onChange, placeholder, multiline = false, className="" }) => {
            const baseClasses = `w-full bg-[#0f0f0f] border border-[#262626] rounded-2xl p-4 md:p-5 text-slate-200 placeholder:text-slate-600 focus:outline-none focus:border-amber-500/60 focus:ring-1 focus:ring-amber-500/60 transition-all resize-none shadow-inner text-sm md:text-base font-medium leading-relaxed ${className}`;
            return multiline ? (
                <textarea rows={4} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} className={baseClasses} />
            ) : (
                <input type="text" value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} className={baseClasses} />
            );
        };

        const TipCard = ({ text, title="Принцип системы", icon: IconComponent = Zap }) => (
            <div className="bg-gradient-to-r from-[#121212] to-[#0f0f0f] border border-[#262626] rounded-2xl p-4 md:p-6 flex gap-4 md:gap-5 items-start relative overflow-hidden mb-6 md:mb-8 shadow-md">
                <div className="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-amber-400 to-yellow-600"></div>
                <div className="p-2.5 md:p-3 bg-amber-500/10 rounded-xl flex-shrink-0 border border-amber-500/20">
                    <IconComponent className="text-amber-400" size={20} />
                </div>
                <div className="flex-1 min-w-0">
                    <h4 className="text-[10px] md:text-xs font-black text-amber-400 uppercase tracking-widest mb-1.5 md:mb-2 opacity-90 truncate">{title}</h4>
                    <p className="text-sm md:text-base text-slate-300 leading-relaxed font-medium break-words">{text}</p>
                </div>
            </div>
        );

        const MotivationCard = ({ text, title="Математика успеха" }) => (
            <div className="bg-gradient-to-r from-amber-500/10 to-yellow-600/5 border border-amber-500/30 rounded-2xl p-5 md:p-6 flex flex-col relative overflow-hidden shadow-[0_0_20px_rgba(251,191,36,0.05)]">
                <div className="flex items-center gap-3 mb-3">
                    <Crown className="text-amber-400" size={20}/>
                    <h4 className="text-xs md:text-sm font-black text-amber-400 uppercase tracking-widest truncate">{title}</h4>
                </div>
                <p className="text-sm md:text-base text-slate-200 leading-relaxed font-medium break-words">{text}</p>
            </div>
        );

        const FocusTimer = ({ defaultMinutes, taskName, taskId, category, xpReward, onCompleteTask }) => {
            const [timeLeft, setTimeLeft] = useState(defaultMinutes * 60);
            const [isActive, setIsActive] = useState(false);
            const [isOpen, setIsOpen] = useState(false);
            const [isMicro, setIsMicro] = useState(false);
            
            const totalSeconds = useMemo(() => (isMicro ? 2 : defaultMinutes) * 60, [isMicro, defaultMinutes]);

            useEffect(() => {
                setTimeLeft(totalSeconds);
            }, [totalSeconds]);

            useEffect(() => {
                let interval = null;
                if (isActive && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft(prev => prev - 1);
                        if (timeLeft % 10 === 0) AudioEngine.playTick(); // Легкий фоновый клик раз в 10 сек
                    }, 1000);
                } else if (timeLeft === 0 && isActive) {
                    setIsActive(false);
                    clearInterval(interval);
                    AudioEngine.playSuccess();
                    triggerHaptic([100, 50, 100]);
                    if (onCompleteTask) onCompleteTask(taskId, category, xpReward, true);
                    setIsOpen(false);
                }
                return () => clearInterval(interval);
            }, [isActive, timeLeft, taskId, category, xpReward, onCompleteTask]);

            const toggle = () => { triggerHaptic(15); setIsActive(!isActive); };
            const reset = () => { triggerHaptic(10); setIsActive(false); setTimeLeft(totalSeconds); };
            
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            const progress = ((totalSeconds - timeLeft) / totalSeconds) * 100;

            if (!isOpen) {
                return (
                    <div className="flex flex-wrap gap-2 md:gap-3 mt-4">
                        <button onClick={() => { triggerHaptic(10); setIsMicro(false); setIsOpen(true); }} className="text-[11px] md:text-xs flex items-center gap-1.5 md:gap-2 font-bold text-slate-300 bg-[#1a1a1a] border border-[#333333] px-3 md:px-4 py-2.5 md:py-3 rounded-xl hover:bg-[#222222] hover:text-amber-400 transition-all touch-manipulation">
                            <Timer size={16} className="text-amber-500"/> Фокус {defaultMinutes} мин
                        </button>
                        {defaultMinutes > 15 && (
                            <button onClick={() => { triggerHaptic(15); setIsMicro(true); setIsOpen(true); }} className="text-[11px] md:text-xs flex items-center gap-1.5 md:gap-2 font-bold text-amber-400 bg-amber-500/10 border border-amber-500/30 px-3 md:px-4 py-2.5 md:py-3 rounded-xl hover:bg-amber-500/20 transition-all touch-manipulation shadow-[0_0_10px_rgba(251,191,36,0.1)]">
                                <Zap size={16} /> Микро-старт (2 мин)
                            </button>
                        )}
                    </div>
                );
            }

            return (
                <div className="mt-4 md:mt-5 p-5 md:p-8 bg-[#0f0f0f] border border-[#262626] rounded-2xl md:rounded-3xl flex flex-col items-center relative overflow-hidden w-full">
                    {isActive && <div className="absolute inset-0 bg-amber-500/5 animate-pulse pointer-events-none"></div>}
                    <div className="flex justify-between w-full mb-6 md:mb-8 items-center relative z-10">
                        <span className="text-slate-300 font-black text-xs md:text-sm flex items-center gap-2 uppercase tracking-wider truncate">
                            <Target size={18} className="text-amber-500 flex-shrink-0"/> <span className="truncate">{isMicro ? 'Атомный Старт' : taskName}</span>
                        </span>
                        <button onClick={() => { triggerHaptic(10); setIsActive(false); setIsOpen(false); }} className="text-slate-500 hover:text-white p-2 bg-[#1a1a1a] rounded-xl transition-colors flex-shrink-0"><X size={18}/></button>
                    </div>
                    
                    <div className="relative w-40 h-40 md:w-48 md:h-48 flex items-center justify-center mb-8 md:mb-10">
                        <svg className="w-full h-full -rotate-90 absolute drop-shadow-md" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#262626" strokeWidth="6" />
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#fbbf24" strokeWidth="6" strokeLinecap="round" strokeDasharray="283" strokeDashoffset={283 - (283 * progress) / 100} className="transition-all duration-1000 ease-linear drop-shadow-[0_0_15px_rgba(251,191,36,0.5)]" />
                        </svg>
                        <div className="text-4xl md:text-5xl font-mono font-black text-white relative z-10 drop-shadow-[0_0_15px_rgba(251,191,36,0.4)] tracking-tighter">{m}:{s}</div>
                    </div>

                    <div className="flex gap-3 md:gap-4 w-full max-w-[300px] relative z-10">
                        <button onClick={toggle} className={`flex-1 py-3 md:py-4 rounded-xl font-black text-base md:text-lg flex justify-center items-center gap-2 md:gap-3 transition-all active:scale-95 touch-manipulation ${isActive ? 'bg-[#1a1a1a] text-slate-200 border border-[#333333]' : 'bg-gradient-to-r from-amber-400 to-yellow-600 text-[#0a0a0a] shadow-[0_0_20px_rgba(251,191,36,0.3)] hover:brightness-110'}`}>
                            {isActive ? <Pause size={20}/> : <Play size={20}/>} {isActive ? 'Пауза' : 'Фокус'}
                        </button>
                        <button onClick={reset} className="px-4 md:px-5 py-3 md:py-4 rounded-xl bg-[#0f0f0f] border border-[#262626] text-slate-400 hover:text-white hover:border-slate-500 transition-all active:scale-95 touch-manipulation">
                            <RotateCcw size={20}/>
                        </button>
                    </div>
                    <p className="text-xs md:text-sm text-slate-400 mt-6 md:mt-8 font-medium text-center leading-relaxed px-2 break-words">
                        {timeLeft <= 120 && totalSeconds > 120 ? "Самое сложное — начать. Барьер пройден." : "Мозг не сопротивляется 2 минутам. Просто начни."}
                    </p>
                </div>
            );
        };

        const BreathingTimer = ({ type = 'morning', onComplete }) => {
            const [isActive, setIsActive] = useState(false);
            const TOTAL_SECONDS = 180;
            const [timeElapsed, setTimeElapsed] = useState(0);
            
            const [phaseName, setPhaseName] = useState('Готов?');
            const [phaseSecondsLeft, setPhaseSecondsLeft] = useState(0);
            const [scale, setScale] = useState(1);
            
            useEffect(() => {
                let interval;
                if (isActive && timeElapsed < TOTAL_SECONDS) {
                    interval = setInterval(() => {
                        setTimeElapsed(prev => prev + 1);
                        AudioEngine.playTick(); // Физический метроном для удержания ритма без глаз
                    }, 1000);
                } else if (timeElapsed >= TOTAL_SECONDS && isActive) {
                    setIsActive(false);
                    setPhaseName('Практика завершена.');
                    setPhaseSecondsLeft(0);
                    setScale(1);
                    AudioEngine.playSuccess();
                    if(onComplete) onComplete();
                }
                return () => clearInterval(interval);
            }, [isActive, timeElapsed, onComplete]);

            useEffect(() => {
                if (!isActive) return;
                const currentCycleSec = timeElapsed % (type === 'morning' ? 16 : 10);

                if (type === 'morning') {
                    if (currentCycleSec < 4) {
                        if (currentCycleSec === 0) AudioEngine.playPhaseChange();
                        setPhaseName('Вдох'); setPhaseSecondsLeft(4 - currentCycleSec); setScale(1.6);
                    } else if (currentCycleSec < 8) {
                        if (currentCycleSec === 4) AudioEngine.playPhaseChange();
                        setPhaseName('Задержка'); setPhaseSecondsLeft(8 - currentCycleSec); setScale(1.6);
                    } else if (currentCycleSec < 12) {
                        if (currentCycleSec === 8) AudioEngine.playPhaseChange();
                        setPhaseName('Выдох'); setPhaseSecondsLeft(12 - currentCycleSec); setScale(1);
                    } else {
                        if (currentCycleSec === 12) AudioEngine.playPhaseChange();
                        setPhaseName('Задержка'); setPhaseSecondsLeft(16 - currentCycleSec); setScale(1);
                    }
                } else {
                    if (currentCycleSec < 4) {
                        if (currentCycleSec === 0) AudioEngine.playPhaseChange();
                        setPhaseName('Вдох'); setPhaseSecondsLeft(4 - currentCycleSec); setScale(1.5);
                    } else {
                        if (currentCycleSec === 4) AudioEngine.playPhaseChange();
                        setPhaseName('Выдох'); setPhaseSecondsLeft(10 - currentCycleSec); setScale(1);
                    }
                }
            }, [timeElapsed, isActive, type]);

            const s = (timeLeft % 60).toString().padStart(2, '0');

            const explanation = type === 'morning'

                        <Card className="border-t-4 border-t-yellow-600 flex flex-col h-full bg-gradient-to-b from-[#121212] to-[#0a0a0a]">
                            <h2 className="text-2xl md:text-4xl font-black text-white flex items-center gap-3 md:gap-4 mb-4 md:mb-6 uppercase tracking-tight truncate"><Moon className="text-yellow-600 flex-shrink-0" size={32}/> <span className="truncate">Вечер</span></h2>
                            <p className="text-slate-400 text-sm md:text-base mb-6 md:mb-8 leading-relaxed font-medium bg-[#1a1a1a] p-4 md:p-5 rounded-2xl border border-[#262626] break-words">Очистка оперативной памяти мозга. Закрытие гештальтов дня, чтобы тревога не ушла в сон.</p>

                            <div className="space-y-3 md:space-y-4 mb-8 md:mb-10 flex-1">
                                <CheckItem anchor="Кардио" checked={state.dailyTasks.hygienePm} onChange={() => toggleTask('hygienePm', 'spirit', 5)} label="Душ и уход" subLabel="Смыть день." xpBadge="5" />
                                <CheckItem anchor="Душ" checked={state.dailyTasks.supplements} onChange={() => toggleTask('supplements', 'spirit', 5)} label="Магний + 5-HTP" subLabel="Биохимия сна." xpBadge="5" />
                                <CheckItem anchor="Постель" checked={state.dailyTasks.planTomorrow} onChange={() => toggleTask('planTomorrow', 'pm', 10)} label="План на завтра" subLabel="Разгрузить голову." xpBadge="10" />
                            </div>

                            <div className="pt-6 md:pt-8 border-t border-[#262626] space-y-5 md:space-y-6">
                                <h3 className="text-xl md:text-2xl font-black text-slate-200 flex items-center gap-2 md:gap-3 uppercase tracking-tight truncate"><Wind className="text-yellow-600 flex-shrink-0" size={24}/> <span className="truncate">Вечерняя Практика</span></h3>
                                <BreathingTimer type="evening" onComplete={() => { if(!state.dailyTasks.breathPm) toggleTask('breathPm', 'spirit', 15, true); }} />
                                <ManifestReader type="PM" />
                                <CheckItem anchor="Дыхание" checked={state.dailyTasks.prayerPm} onChange={() => toggleTask('prayerPm', 'spirit', 10)} label="Подтвердить Манифест" xpBadge="10"/>
                            </div>
                        </Card>
                    </div>
                </div>
            );
        };

        const ProgressView = ({ state, update }) => {
            const { xp, level, categories, returnRate } = state.stats;
            const progressToNext = xp % 200;
            const progressPercent = (progressToNext / 200) * 100;
            const isBurnoutRisk = state.energyMetrics.stress >= 7 || state.energyMetrics.sleep < 6 || state.energyMetrics.energy <= 4;

            const ProgressBar = ({ label, progress, color }) => (
                <div className="w-full bg-[#0f0f0f] p-4 md:p-6 rounded-2xl md:rounded-3xl border border-[#262626] shadow-inner">
                    <div className="flex justify-between text-[10px] sm:text-xs md:text-sm mb-3 md:mb-5 font-black uppercase tracking-widest gap-2">
                        <span className="text-slate-400 truncate">{label}</span>
                        <span className="text-slate-200 drop-shadow-sm flex-shrink-0">{Math.floor(progress)}%</span>
                    </div>
                    <div className="h-3 md:h-4 w-full bg-[#050505] rounded-full overflow-hidden shadow-inner border border-[#262626]">
                        <div className={`h-full ${color} transition-all duration-1000 ease-out shadow-[0_0_15px_currentColor] opacity-90`} style={{ width: `${progress}%` }}></div>
                    </div>
                </div>
            );

            return (
                <div className="space-y-8 md:space-y-10 animate-in fade-in zoom-in-95 duration-700">
                    <h1 className="text-3xl sm:text-4xl md:text-6xl font-black tracking-tighter text-white uppercase drop-shadow-lg break-words">Прогресс</h1>
                    
                    <MotivationCard title="Элита (Топ 1%)" text="Этот экран отличает тебя от остальных. Ты не просто 'стараешься', ты оцифровываешь свой успех. Каждое очко опыта здесь — это гвоздь в гроб твоих сомнений и лени." />

                    {isBurnoutRisk && (
                        <div className="bg-rose-950/30 border border-rose-900/50 p-5 md:p-8 rounded-2xl md:rounded-3xl flex flex-col sm:flex-row gap-4 md:gap-6 items-start animate-pulse shadow-[0_0_40px_rgba(251,113,133,0.1)] mb-6 md:mb-8">
                            <div className="p-3 md:p-4 bg-rose-900/40 rounded-xl md:rounded-2xl flex-shrink-0 border border-rose-500/30"><ShieldAlert className="text-rose-400" size={28}/></div>
                            <div className="min-w-0">
                                <h3 className="text-rose-400 font-black text-lg md:text-2xl mb-2 md:mb-3 tracking-tight uppercase truncate">Burnout Shield Активен</h3>
                                <p className="text-xs md:text-base text-rose-200/80 leading-relaxed font-medium break-words">Высокий стресс или недосып. Переключись в режим "Минимум". Наращивать темп можно только на восстановленной системе.</p>
                            </div>
                        </div>
                    )}

                    <Card glowing className="bg-gradient-to-br from-[#121212] to-[#0a0a0a] border-amber-500/40 p-6 md:p-12">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 md:mb-14 gap-6 md:gap-8">
                            <div className="flex items-center gap-4 md:gap-8 min-w-0">
                                <div className="w-16 h-16 md:w-24 md:h-24 rounded-2xl md:rounded-[2rem] bg-gradient-to-br from-yellow-400 to-amber-600 flex items-center justify-center shadow-[0_0_40px_rgba(251,191,36,0.3)] flex-shrink-0 border-2 border-white/10">
                                    <Trophy className="text-[#0a0a0a]" size={32} />
                                </div>
                                <div className="min-w-0 pr-4">
                                    <h2 className="text-2xl sm:text-4xl md:text-6xl font-black text-white tracking-tight truncate">Уровень {level}</h2>
                                    <p className="text-amber-400 font-black mt-1 md:mt-3 tracking-widest uppercase text-[10px] md:text-sm drop-shadow-md truncate">Каста Суверенов</p>
                                </div>
                            </div>
                            <div className="text-left md:text-right bg-[#050505] px-6 py-4 md:px-8 md:py-6 rounded-2xl md:rounded-3xl border border-[#262626] w-full md:w-auto shadow-inner">
                                <span className="font-mono text-3xl sm:text-5xl md:text-6xl font-black text-white drop-shadow-lg truncate">{xp} <span className="text-lg md:text-2xl text-amber-500/80 ml-1">XP</span></span>
                            </div>
                        </div>
                        
                        <div className="space-y-4 md:space-y-5 mb-10 md:mb-16">
                            <div className="flex justify-between text-[10px] md:text-sm text-slate-400 font-black uppercase tracking-widest gap-2">
                                <span className="truncate">Прогресс до Ур. {level + 1}</span>
                                <span className="text-amber-400 font-mono drop-shadow-sm flex-shrink-0">{progressToNext} / 200</span>
                            </div>
                            <div className="h-6 md:h-8 w-full bg-[#050505] rounded-full overflow-hidden border border-[#262626] relative shadow-inner p-1 md:p-1.5">
                                <div className="h-full bg-gradient-to-r from-amber-600 via-yellow-400 to-amber-600 rounded-full transition-all duration-1000 shadow-[0_0_30px_rgba(251,191,36,0.5)] relative overflow-hidden" style={{ width: `${progressPercent}%` }}>
                                    <div className="absolute inset-0 bg-white/20 skew-x-12 translate-x-full animate-[shimmer_2s_infinite]"></div>
                                </div>
                            </div>
                        </div>

                        <h3 className="text-lg md:text-2xl font-black text-white uppercase tracking-widest mb-6 md:mb-8 flex items-center gap-2 md:gap-3 truncate"><Activity size={24} className="text-amber-400 flex-shrink-0"/> <span className="truncate">Идентичности (Навыки)</span></h3>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-8">
                            <ProgressBar label="Атлет (Тело)" progress={categories.body} color="bg-amber-500" />
                            <ProgressBar label="Структура (PM)" progress={categories.pm} color="bg-yellow-500" />
                            <ProgressBar label="Мир (English)" progress={categories.english} color="bg-orange-400" />
                            <ProgressBar label="Создатель (Контент)" progress={categories.content} color="bg-amber-300" />
                            <ProgressBar label="Дух (Ритуалы)" progress={categories.spirit} color="bg-yellow-600" />
                            <ProgressBar label="Return Rate" progress={returnRate} color="bg-gradient-to-r from-amber-400 to-yellow-600" />
                        </div>
                    </Card>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-8">
                        <NumericInput label="Энергия" hint="1-10" min={1} max={10} value={state.energyMetrics.energy} onChange={(v) => update('energyMetrics', {energy: v})} />
                        <NumericInput label="Стресс" hint="1-10" min={1} max={10} color="red" value={state.energyMetrics.stress} onChange={(v) => update('energyMetrics', {stress: v})} />
                    </div>
                    
                    <TipCard text="Главная метрика — Return Rate (Возврат в систему). Шкалы не обнуляются за пропуск, но Return Rate падает. Если ты упал, но вернулся (сделал микро-старт) — ты победил." icon={RotateCcw} />
                </div>
            );
        };

        const ToolsExportView = ({ state, copyToClipboard, update, setState, showToast }) => {
            const [sunoInput, setSunoInput] = useState('');

            const getObsidianTemplate = () => {
                const e = state.energyMetrics, t = state.dailyTasks;
                const notesStr = state.notes.savedDaily.length > 0 ? state.notes.savedDaily.map(n => `- ${n}`).join('\n') : 'Нет записей';
                const langStr = state.languagePhrases.length > 0 ? state.languagePhrases.map(l => `- ${l}`).join('\n') : 'Нет записей';
                return `# День: ${new Date().toLocaleDateString('ru-RU')}\n\n## Энергия\nСон: ${e.sleep}ч\nЭнергия: ${e.energy}/10\nСтресс: ${e.stress}/10\nГотовность: ${e.readiness}/10\n\n## Идентичности (База)\n- Структура (PM): ${t.pm ? 'Да' : 'Нет'}\n- Структура (Eng): ${t.english ? 'Да' : 'Нет'}\n- Атлет (Тело): ${t.body ? 'Тренировка' : t.cardio ? 'Только кардио' : 'Нет'}\n\n## Инсайты и Контент\n${notesStr}\n\n## Микро-Языки\n${langStr}\n\n## Ритуалы\n- Утро: ${t.waterAm && t.breathAm && t.prayerAm ? 'Да' : 'Частично'}\n- Вечер: ${t.cardio && t.hygienePm && t.breathPm && t.prayerPm ? 'Да' : 'Частично'}\n\n## Вечерний разбор\nЧто сделал:\nЧто слил:\nЧто улучшить:\nБлагодарен за:`;
            };

            const downloadMarkdownFile = () => {
                triggerHaptic([10, 30]);
                const text = getObsidianTemplate();
                const blob = new Blob([text], { type: 'text/markdown;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                const dateStr = new Date().toISOString().split('T')[0];
                link.href = url;
                link.setAttribute("download", `${dateStr}_Markov_OS.md`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast("Файл .md сгенерирован и скачан 💾");
            };

            const exportBackupJSON = () => {
                triggerHaptic([10, 30]);
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
                const downloadAnchor = document.createElement('a');
                const dateStr = new Date().toISOString().split('T')[0];
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `Markov_OS_Backup_${dateStr}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
                showToast("Резервная копия JSON сохранена 🔐");
            };

            const importBackupJSON = (event) => {
                const fileReader = new FileReader();
                if(event.target.files.length === 0) return;
                fileReader.readAsText(event.target.files[0], "UTF-8");
                fileReader.onload = e => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        if (parsed.currentTab && parsed.stats) {
                            setState(parsed);
                            showToast("Система успешно восстановлена из бэкапа! ⚡");
                            triggerHaptic([40, 40, 40]);
                        } else {
                            showToast("Ошибка: Неверная структура файла", true);
                        }
                    } catch (err) {
                        showToast("Ошибка при чтении файла бэкапа", true);
                    }
                };
            };

            const handleExportBoard = () => {
                const t = state.dailyTasks;
                const text = `НЕДЕЛЯ: PM + ENGLISH + CONTENT\n\nМИНИМУМ:\n[${t.breathAm||t.breathPm ? 'X' : ' '}] Дыхание (3 мин)\n[${t.pm ? 'X' : ' '}] PM\n[${t.english ? 'X' : ' '}] English\n[${t.body||t.cardio ? 'X' : ' '}] Тренировка\n[${t.content ? 'X' : ' '}] Контент\n[${t.prayerAm||t.prayerPm ? 'X' : ' '}] Манифест\n[ ] Сон 7.5ч\n\nПН [ ] ВТ [ ] СР [ ] ЧТ [ ] ПТ [ ] СБ [ ] ВС [ ]\n\nФРАЗА:\nНе идеальный день. Возврат в систему.\n\nАНТИ-СЛИВ:\nЕсли не хочешь — сделай микро-старт (2 мин).`;
                copyToClipboard(text);
            };

            const addSunoIdea = () => {
                if(!sunoInput.trim()) return;
                const newIdeas = [...(state.sunoIdeas || []), sunoInput];
                update('sunoIdeas', newIdeas);
                setSunoInput('');
            };

            return (
                <div className="space-y-8 md:space-y-10 animate-in fade-in zoom-in-95 duration-700">
                    <h1 className="text-3xl sm:text-4xl md:text-6xl font-black tracking-tighter text-white uppercase drop-shadow-lg break-words">Инструменты</h1>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
                        <Card interactive className="space-y-4 md:space-y-6">
                            <h2 className="text-2xl md:text-3xl font-black text-white flex items-center gap-3 md:gap-4 uppercase tracking-tight truncate"><Download className="text-amber-500 flex-shrink-0" size={28}/> <span className="truncate">Obsidian Vault</span></h2>
                            <p className="text-sm md:text-base text-slate-400 font-medium leading-relaxed break-words">Прямая сборка дневного файла Markdown для перемещения в базу.</p>
                            <div className="flex flex-col sm:flex-row gap-3">
                                <Button variant="primary" icon={Copy} className="flex-1 text-sm" onClick={() => copyToClipboard(getObsidianTemplate())}>Скопировать</Button>
                                <Button variant="secondary" icon={Download} className="flex-1 text-sm" onClick={downloadMarkdownFile}>Скачать .md файл</Button>
                            </div>
                        </Card>

                        <Card interactive className="space-y-4 md:space-y-6">
                            <h2 className="text-2xl md:text-3xl font-black text-white flex items-center gap-3 md:gap-4 uppercase tracking-tight truncate"><Layout className="text-yellow-600 flex-shrink-0" size={28}/> <span className="truncate">Магнитная доска</span></h2>
                            <p className="text-sm md:text-base text-slate-400 font-medium leading-relaxed break-words">Текст для заполнения физической доски на стену. Обновлять в Воскресенье.</p>
                            <Button variant="secondary" icon={Copy} className="w-full text-sm md:text-lg" onClick={handleExportBoard}>Текст для доски</Button>
                        </Card>

                        <Card className="lg:col-span-2 bg-gradient-to-br from-[#121212] to-[#0a0a0a] space-y-6">
                            <h2 className="text-2xl md:text-3xl font-black text-white flex items-center gap-3 md:gap-4 uppercase tracking-tight truncate"><Settings className="text-orange-400 flex-shrink-0" size={28}/> <span>Управление Ядром OS (Бэкапы)</span></h2>
                            <p className="text-sm text-slate-400 font-medium leading-relaxed">Так как приложение работает без бэкенда на GitHub Pages, твой единственный сервер — память браузера. Сохраняй слепки системы, чтобы не потерять статистику уровней и базу SUNO.</p>
                            <div className="flex flex-col sm:flex-row gap-4 items-center">
                                <Button variant="secondary" className="w-full sm:w-auto" onClick={exportBackupJSON}>Скачать резервную копию (.json)</Button>
                                <label className="w-full sm:w-auto flex items-center justify-center gap-2 px-6 py-3.5 rounded-2xl bg-[#1a1a1a] border border-[#333333] text-amber-400 font-bold hover:bg-[#222222] cursor-pointer transition-all text-center">
                                    <span>Восстановить из файла</span>
                                    <input type="file" accept=".json" onChange={importBackupJSON} className="hidden" />
                                </label>
                            </div>
                        </Card>
                        
                        <Card className="lg:col-span-2 bg-gradient-to-br from-[#121212] to-[#0a0a0a]">
                            <h2 className="text-2xl md:text-3xl font-black text-white flex items-center gap-3 md:gap-4 mb-4 md:mb-6 uppercase tracking-tight truncate"><Music className="text-amber-400 flex-shrink-0" size={28}/> <span className="truncate">Творчество / SUNO</span></h2>
                            <p className="text-sm md:text-base text-slate-400 mb-6 md:mb-8 font-medium break-words">Суббота (день) или свободное время. Банк идей для созидания без выгорания.</p>
                            <div className="flex flex-col sm:flex-row gap-4 md:gap-5 mb-6 md:mb-8">
                                <TextInput value={sunoInput} onChange={setSunoInput} placeholder="Идея, стиль, промпт..." className="flex-1 text-base md:text-lg" />
                                <Button variant="primary" className="sm:w-[200px] md:w-[250px] text-sm md:text-lg" onClick={addSunoIdea}><Plus size={20} className="hidden sm:block"/> Сохранить</Button>
                            </div>
                            {state.sunoIdeas.length > 0 && (
                                <div className="space-y-4 md:space-y-5 bg-[#0f0f0f] p-5 md:p-8 rounded-2xl md:rounded-3xl border border-[#262626] shadow-inner">
                                    <h3 className="text-xs md:text-sm font-black text-slate-500 uppercase tracking-widest mb-3 md:mb-4">Банк идей:</h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-5">
                                        {state.sunoIdeas.map((idea, i) => (
                                            <div key={i} className="p-4 md:p-6 bg-[#1a1a1a]/80 rounded-2xl border border-[#333333] text-slate-200 flex items-start gap-3 md:gap-4 font-bold text-sm md:text-lg shadow-sm break-words">
                                                <Music size={20} className="text-amber-500 flex-shrink-0 mt-0.5 md:mt-1 drop-shadow-sm" /> <span>{idea}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </Card>
                    </div>
                </div>
            );
        };

        function App() {
            const { state, setState, update, toggleTask, saveDailyNote, addLanguagePhrase, copyToClipboard, toast, showToast } = useAppState();

            const TABS = [
                { id: 'dashboard', icon: Home, label: 'Сегодня' },
                { id: 'schedule', icon: Clock, label: 'Расписание' },
                { id: 'learning', icon: Brain, label: 'Обучение' },
                { id: 'body', icon: Dumbbell, label: 'Тело' },
                { id: 'content', icon: Smartphone, label: 'Контент' },
                { id: 'rituals', icon: Wind, label: 'Ритуалы' },
                { id: 'progress', icon: Trophy, label: 'Прогресс' },
                { id: 'tools', icon: Settings, label: 'Экспорт' },
            ];

            const renderContent = () => {
                switch (state.currentTab) {
                    case 'dashboard': return <DashboardView state={state} update={update} toggleTask={toggleTask} showToast={showToast} />;
                    case 'schedule': return <ScheduleView state={state} />;
                    case 'learning': return <LearningView state={state} saveDailyNote={saveDailyNote} addLanguagePhrase={addLanguagePhrase} />;
                    case 'body': return <BodyView state={state} update={update} toggleTask={toggleTask} />;
                    case 'content': return <ContentView state={state} update={update} saveDailyNote={saveDailyNote} />;
                    case 'rituals': return <RitualsView state={state} toggleTask={toggleTask} />;
                    case 'progress': return <ProgressView state={state} update={update} />;
                    case 'tools': return <ToolsExportView state={state} copyToClipboard={copyToClipboard} update={update} setState={setState} showToast={showToast} />;
                    default: return <DashboardView state={state} update={update} toggleTask={toggleTask} showToast={showToast} />;
                }
            };

            return (
                <div className={`min-h-screen ${THEME.bg} text-slate-200 font-sans selection:bg-amber-500/30 flex flex-col lg:flex-row overflow-x-hidden antialiased`}>
                    
                    {/* Toast Notification */}
                    <div className={`fixed top-4 md:top-8 left-1/2 -translate-x-1/2 z-[100] transition-all duration-500 ease-out pointer-events-none w-[95%] md:w-auto max-w-lg ${toast.visible ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 -translate-y-10 scale-95'}`}>
                        <div className={`px-4 md:px-6 py-4 md:py-5 rounded-2xl font-bold shadow-2xl flex items-center gap-3 md:gap-4 border-[1.5px] backdrop-blur-2xl ${toast.isAlert ? 'bg-rose-950/95 text-rose-100 border-rose-500/50 shadow-[0_15px_50px_rgba(251,113,133,0.3)]' : 'bg-[#121212]/95 text-white border-amber-500/50 shadow-[0_15px_50px_rgba(251,191,36,0.25)]'}`}>
                            {toast.isAlert ? <ShieldAlert size={24} className="text-rose-400 flex-shrink-0" /> : <Sparkles size={24} className="text-amber-400 flex-shrink-0" />} 
                            <span className="text-sm md:text-lg leading-tight break-words">{toast.msg}</span>
                        </div>
                    </div>

                    {/* Desktop Sidebar */}
                    <aside className={`hidden lg:flex flex-col w-[280px] xl:w-[320px] ${THEME.panel} border-r ${THEME.panelBorder} p-6 xl:p-8 h-screen sticky top-0 z-40 shadow-[15px_0_40px_rgba(0,0,0,0.8)]`}>
                        <div className="mb-12 xl:mb-16 relative group cursor-default select-none">
                            <div className="absolute -inset-4 bg-gradient-to-r from-amber-400 to-yellow-600 rounded-2xl blur-xl opacity-10 group-hover:opacity-20 transition duration-1000 group-hover:duration-200"></div>
                            <h1 className="relative text-4xl xl:text-5xl font-black tracking-widest text-white drop-shadow-md break-words">MARKOV<br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-amber-500">OS</span></h1>
                            <p className="relative text-[10px] xl:text-[11px] text-slate-400 font-black tracking-widest mt-3 xl:mt-4 flex items-center gap-2 uppercase">System Elite <span className={`w-2 h-2 xl:w-2.5 xl:h-2.5 rounded-full shadow-[0_0_12px_currentColor] ${state.currentMode === 'min' ? 'bg-rose-500 text-rose-500' : 'bg-amber-400 text-amber-400 animate-pulse'}`}></span></p>
                        </div>
                        
                        <nav className="flex-1 space-y-2 xl:space-y-3 overflow-y-auto hide-scrollbar pr-2 pb-10">
                            {TABS.map(tab => {
                                const IconComp = tab.icon;
                                const active = state.currentTab === tab.id;
                                return (
                                    <button 
                                        key={tab.id} onClick={() => { triggerHaptic(10); update('currentTab', tab.id); }}
                                        className={`w-full flex items-center gap-4 xl:gap-5 px-4 xl:px-6 py-3 xl:py-4 rounded-2xl transition-all duration-300 font-bold text-sm xl:text-lg uppercase tracking-wider touch-manipulation ${active ? THEME.accentSoft : 'text-slate-500 hover:text-slate-200 hover:bg-[#1a1a1a]'}`}
                                    >
                                        <IconComp size={20} className={`flex-shrink-0 ${active ? 'text-amber-400 drop-shadow-[0_0_12px_rgba(251,191,36,0.5)]' : ''}`} /> 
                                        <span className="truncate">{tab.label}</span>
                                    </button>
                                )
                            })}
                        </nav>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 p-4 sm:p-6 md:p-10 lg:p-12 xl:p-16 w-full max-w-full min-h-screen relative z-10 pb-28 md:pb-32 lg:pb-16 overflow-hidden">
                        <div className="fixed top-0 left-1/2 -translate-x-1/2 w-full h-[800px] bg-amber-500 opacity-[0.015] blur-[150px] pointer-events-none -z-10"></div>
                        <div className="max-w-[1200px] mx-auto w-full">
                            {renderContent()}
                        </div>
                    </main>

                    {/* Mobile Bottom Navigation */}
                    <nav className={`lg:hidden fixed bottom-0 left-0 right-0 ${THEME.panel} border-t ${THEME.panelBorder} flex overflow-x-auto hide-scrollbar z-50 shadow-[0_-20px_50px_rgba(0,0,0,0.9)] px-1 pt-2 pb-2`}>
                        {TABS.map(tab => {
                            const IconComp = tab.icon;
                            const active = state.currentTab === tab.id;
                            return (
                                <button 
                                    key={tab.id} onClick={() => { triggerHaptic(10); update('currentTab', tab.id); }}
                                    className={`flex-1 flex flex-col items-center justify-center min-w-[64px] sm:min-w-[72px] py-2 gap-1 transition-all duration-300 touch-manipulation pb-3 ${active ? 'text-amber-400 scale-105 -translate-y-1' : 'text-slate-500 hover:text-slate-300'}`}
                                >
                                    <IconComp size={20} className={`${active ? 'drop-shadow-[0_0_15px_rgba(251,191,36,0.6)]' : ''}`} />
                                    <span className="text-[8px] sm:text-[9px] font-black uppercase tracking-widest mt-1 truncate max-w-full px-1">{tab.label}</span>
                                </button>
                            )
                        })}
                    </nav>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
